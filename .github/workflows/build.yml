name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install PyQt5 PyQt5-Qt5 matplotlib numpy scipy pyinstaller
          pip install -r requirements.txt

      - name: Build Windows executable
        run: pyinstaller fso_platform_windows.spec --clean --noconfirm

      - name: List dist contents
        run: ls -la dist/
        shell: bash

      - name: Package artifact
        run: |
          cd dist
          7z a FSOPlatform-Windows.zip FSOPlatform/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FSOPlatform-Windows
          path: dist/FSOPlatform-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS app
        run: pyinstaller fso_platform_macos.spec --clean --noconfirm

      - name: Package artifact
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent FSOPlatform.app FSOPlatform-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FSOPlatform-macOS
          path: dist/FSOPlatform-macOS.zip
