[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    atmosphere: atmosphere model tests
    geometric: geometric model tests
    turbulence: turbulence model tests
    distributions: distribution model tests
    link_budget: link budget tests
    ber: BER model tests
    constants: constants and conversion tests
