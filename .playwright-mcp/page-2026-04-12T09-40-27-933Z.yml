                        - text: "] estimated the prediction accuracy of received signal strength indicators (RSSI) on the receiver side of a FSO link by considering real time, non-linear atmospheric conditions in a maritime environment. Different models proposed in the literature predict the attenuation of the link based on the specific weather conditions of a region. Multi-impairments (fog, clouds, and haze) are time varying and depend on atmospheric and environmental variables."
                      - generic [ref=e278]: Regions with diverse meteorological conditions should be considered for analysis with an aim to evaluate the performance of the FSO link at high data rates under multi-impairment conditions Delhi, Washington, Cape Town, and London are meteorological regions and metropolitan cities with higher population densities and serve as hubs of information technology. The regions need better means of communication with higher achievable data rates under different impairments. Network planners must calculate the link length between the transmitter and receiver, link availability, outage probability, network dependability, and other factors based on the power margin/loss budget. It is important to investigate the performance of the link as a result of aggregate attenuation caused by different weather conditions.
                      - generic [ref=e279]:
                        - text: "In the present work, data on fog, haze, and cloud climate conditions of four distinct geographical regions have been analyzed to derive a unified empirical model for the prediction of attenuation at optical wavelengths caused by multi-impairments in any region. These regions have greater population density and are hubs of information technology. The DP-QPSK modulation technique with Laguerre Gaussian (LG 00 and LG 01) modes has been employed to investigate the performance of the WDM-MDM-based FSO link under fog, haze, and cloud weather conditions. Accurate attenuation predictions may help determine the required transmitter power, antenna alignment receiver sensitivity, and other system parameters to achieve reliable communication. Further, performance estimation of the system has been achieved by employing random forest (RF), k-nearest neighbors (KNN), multi-layer perceptron (MLP), and gradient boosting (GB) machine learning (ML) techniques. The rest of the paper is organized as follows:"
