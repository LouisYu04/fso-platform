                      - heading "5. Results and Discussion" [level=2] [ref=e1617]
                      - generic [ref=e1618]:
                        - text: In this section, the results of the proposed MDM-WDM FSO link have been investigated by employing DP-QPSK modulation under real weather conditions. The signal to noise ratio (SNR) of the received signal has been analyzed and compared as a function of transmission range considering diverse geographical regions for different channels. Next, the received power has been obtained as a function of the propagation range for the four regions, and ML techniques have been employed for SNR estimation of the received signal.
                        - link "Figure 8" [ref=e1619] [cursor=pointer]:
                          - /url: "#fig_body_display_telecom-06-00029-f008"
                        - text: depicts the comparative analysis of attenuation due to different weather conditions in the four regions. It can be observed that clouds and haze cause a maximum attenuation of 10.06 and 4.84 dB/km in the case of New Delhi and London regions, respectively. Fog is the main contributing factor affecting visibility in Washington and Cape Town regions. Maximum attenuation has been reported in the New Delhi region due to cloud and haze weather conditions in December, February, and January months, respectively.
