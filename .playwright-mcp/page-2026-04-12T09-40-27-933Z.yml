                  - generic [ref=e1966]:
                    - link "" [ref=e1967] [cursor=pointer]:
                      - /url: mailto:?&subject=From%20MDPI%3A%20%22Modeling%20and%20Performance%20Analysis%20of%20MDM%26minus%3BWDM%20FSO%20Link%20Using%20DP-QPSK%20Modulation%20Under%20Real%20Weather%20Conditions"&body=https://www.mdpi.com/3279658%3A%0A%0AModeling%20and%20Performance%20Analysis%20of%20MDM%26minus%3BWDM%20FSO%20Link%20Using%20DP-QPSK%20Modulation%20Under%20Real%20Weather%20Conditions%0A%0AAbstract%3A%20Free%20space%20optics%20%28FSOs%29%20is%20an%20emerging%20technology%20offering%20solutions%20for%20secure%20and%20high%20data%20rate%20transmission%20in%20dense%20urban%20areas%2C%20back%20haul%20link%20in%20telecommunication%20networks%2C%20and%20last%20mile%20access%20applications.%20It%20is%20important%20to%20investigate%20the%20performance%20of%20the%20FSO%20link%20as%20a%20result%20of%20aggregate%20attenuation%20caused%20by%20different%20weather%20conditions%20in%20a%20region.%20In%20the%20present%20work%2C%20empirical%20models%20have%20been%20derived%20in%20terms%20of%20visibility%2C%20considering%20fog%2C%20haze%2C%20and%20cloud%20conditions%20of%20diverse%20geographical%20regions%20of%20Delhi%2C%20Washington%2C%20London%2C%20and%20Cape%20Town.%20Mean%20square%20error%20%28MSE%29%20and%20goodness%20of%20fit%20%28R%20squared%29%20have%20been%20employed%20as%20measures%20for%20estimating%20model%20performance.%20The%20dual%20polarization-quadrature%20phase%20shift%20keying%20%28DP-QPSK%29%20modulation%20technique%20has%20been%20employed%20with%20hybrid%20mode%20and%20the%20wave%20division%20multiplexing%20%28MDM-WDM%29%20scheme%20for%20analyzing%20the%20performance%20of%20the%20FSO%20link%20with%20two%20Laguerre%20Gaussian%20modes%20%28LG00%20and%20LG%2001%29%20at%205%20different%20wavelengths%20from%201550%20nm%20to%201554%20nm.%20The%20performance%20of%20the%20system%20has%20been%20analyzed%20in%20terms%20of%20received%20power%20and%20signal%20to%20noise%20ratio%20with%20respect%20to%20the%20transmission%20range[...]
