                      - heading "2. Attenuation Prediction Models" [level=2] [ref=e285]
                      - generic [ref=e286]:
                        - text: Fog, clouds, and haze are the main challenges in the implementation of a FSO link. Atmospheric attenuation caused by different environmental factors are mainly dominated by fog as the particle size in this case is comparable to the wavelengths of interest. The fog (1–20 μm) and clouds (3–6 μm) consist of very fine droplets of water, which may cause absorption and scattering of transmitted optical signals. Due to their small refractive index and particle size, ice crystals do not contribute much to attenuation due to absorption [
                        - link "18" [ref=e287] [cursor=pointer]:
                          - /url: "#B18-telecom-06-00029"
                        - text: "]. Thus, absorption can generally be neglected at the wavelength of interest for free space communication ["
                        - link "19" [ref=e288] [cursor=pointer]:
                          - /url: "#B19-telecom-06-00029"
                        - text: "]."
                      - generic [ref=e289]:
                        - text: Haze (0.01–1 μm) consists of small aerosol particles suspended in the air, dust, pollutants, etc. As the size of particles is comparable to the wavelengths in visible and IR bands, it may cause attenuation at FSO wavelengths. In order to estimate the attenuation, visibility statistics and the relationship between visibility and propagation loss has to be known. For characterization of fog and haze attenuation, the term “specific attenuation” is used, which represents attenuation in dB/km and is expressed as [
