                        - generic [ref=e1039]: Figure 5. Schematic diagram of the DP-QPSK-based FSO link with hybrid MDM-WDM multiplexing.
                      - generic [ref=e1040]: The SL outputs are fed to DP-QPSK transmitters, and power combiners (PCs) combine the output of two different modes at the same wavelength. Power combiner outputs representing 10 transmission channels have been multiplexed, and the resultant signal propagates through the FSO link impaired with fog, haze, or cloud weather conditions. A 1 × 5 demultiplexer at the receiving end splits the different channels, and power splitters (PSs) direct the corresponding channels to the mode selector (MS) switches to select LG00 or LG01 mode at the receiver.
                      - generic [ref=e1041]:
                        - text: The detailed schematics of the DP-QPSK transmitter and receiver are shown in
                        - link "Figure 6" [ref=e1042] [cursor=pointer]:
                          - /url: "#fig_body_display_telecom-06-00029-f006"
                        - text: and
                        - link "Figure 7" [ref=e1043] [cursor=pointer]:
                          - /url: "#fig_body_display_telecom-06-00029-f007"
                        - text: ", respectively. The light emitted by the laser splits into two components for horizontal polarization and two components for vertical polarization. Each light beam is modulated by Mach–Zehnder modulator (MZM), which converts the data into a sequence of light pulses. Within each polarization, the П/2 phase shifter is used to generate the quadrature component. The polarization rotator (PR) rotates the incoming signal with respect to another, and the resultant signals are combined by the beam combiner (BC) to generate the 100 Gbps DP-QPSK signal, as shown in"
                        - link "Figure 6" [ref=e1044] [cursor=pointer]:
