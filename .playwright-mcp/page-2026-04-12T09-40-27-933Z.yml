                      - generic [ref=e1615]: Local oscillator (LO) and polarization beam splitter (PBS) are deployed for coherent detection that improves the signal to noise ratio. PBS splits the received signal into two orthogonally polarized beams for coherent detection. Both I and Q signals have been passed through a 90° optical hybrid (OH) followed by an array of photo diodes to detect the information signal. The DSP module has been employed to overcome the channel distortion and compensation of carrier phase noise. Parallel to the serial converter (PSC) gives the resultant demodulated signal. After the detection and decoding of the signal, the BER test set has been employed for direct-error counting.
