                      - generic [ref=e1858]: Further, different ML techniques (RF, KNN, MLP, GB) have been employed to assess the performance of the DP-QPSK-based FSO link using the Jupiter notebook in Python 3.0. The transmission range, wavelength, average attenuation, LG modes, and SNR are the input features and modeling target of the ML models, respectively. Initially, the entire sets of observations have been split into two subsets. Different models have been trained using the first subset and tested using the second data subset. Training and testing data sets are divided into fractions of 80% and 20%, respectively. The models develop relationships by learning from the features and target values of the training data and predict the SNR value for unseen data. Scaling has been performed to pre-optimize the features of the data set to similar ranges.
                      - generic [ref=e1859]: In RF, multiple decision trees have been developed and further averaged for predictions of the final outputs. It may reduce bias due to ensemble of learning and averaging errors of individual trees. The number of random variables chosen at each stage of splits for a single decision tree is set to 42. A total of 100 trees have been considered as one of the other hyper parameter of the RF algorithm. In the KNN algorithm, an optimal K value of 5 has been chosen to predict the class of new data points by selecting the K closest neighbors based on the distance between points in the training set and the new point. To assign the predicted class based on the majority class, the majority class of K neighbors has been identified. MLP incorporates input, hidden, and output neurons to improve the input–output mapping capabilities. Two hidden layers with 100 and 50 neurons each have been used in our work. The MLP algorithm updates the model’s weights using an optimization and back propagation technique. Stochastic gradient descent (SGD) has been used to minimize the loss function in the MLP model. An ensemble of weak learners is trained successively in the GB method, with each weak learner attempting to fix the failings of the preceding learners. Fewer repetitions enable GB to converge rapidly and the model performs well on both training and test data to give low bias.
                      - generic [ref=e1860]:
                        - text: The objective is to estimate the performance of the ML models in terms of SNR for different input feature values.
                        - link "Table 8" [ref=e1861] [cursor=pointer]:
                          - /url: "#table_body_display_telecom-06-00029-t008"
                        - text: depicts the performance metrics employed to analyze the performance of RF, KNN, MLP, and GB ML techniques. The MSE, mean absolute error (MAE), root mean square error (RMSE), and coefficient of determination (R squared) have been determined. The GB technique has the ability to handle over fitting and noise and works well with the small dataset. The higher R squared (0.99) and lower MSE (0.11), MAE (0.25), and RMSE (0.33) values have been reported in the case of the GB algorithm, depicting a close relationship between training and testing data sets. ML models thus perform well in the estimation and prediction of the performance of the system.
