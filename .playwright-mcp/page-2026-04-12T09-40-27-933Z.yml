                    - generic [ref=e1868]:
                      - heading "6. Conclusions" [level=2] [ref=e1869]
                      - generic [ref=e1870]: In this work, DP-QPSK modulation with the MDM-WDM scheme has been employed to analyze the performance of the FSO link under fog, rain, and haze weather conditions. Real-time data for different months of 2023 and 2024 have been obtained for four diverse regions. Unified empirical models have been developed with the capability to predict overall attenuation due to multi-impairments of different regions. The minimum values of SNR and received power have been reported in the case of the New Delhi region. SNR and received power values above 38 dB and −45 dB have been obtained for the other three regions, respectively, due to the effect of multi-impairments. RF, KNN, MLP, and GB have been employed for the performance prediction of the MDM-WDM FSO link using DP-QPSK modulation under real weather conditions in the DP-QPSK system for SNR. The highest R squared (0.99) and lowest MSE (0.11), MAE (0.25), and RMSE (0.33) values have been reported in the case of the GB ML model for the estimation of the performance of the system. The work may be investigated further for cutting edge modulation techniques and real-time performance estimation and monitoring of impairments in optical networks.
