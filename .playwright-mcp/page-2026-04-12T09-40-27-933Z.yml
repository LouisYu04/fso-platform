                        - text: depicts the regression models for predicting attenuation (dB/km) as a function of visibility for different regions along with corresponding R squared and MSE values as performance metrics. Values of R squared fall between 0 and 1. The higher the value better fit the model. MSE is best suited for regression problems, as with large deviations, they are penalized severely by squaring errors, which raises the penalty for large errors. The maximum and minimum attenuation have been predicted for Delhi and Washington regions, respectively. In the case of the Delhi region, there is a better correlation between visibility values for the data set with different weather conditions. A moderate value of R squared prevents over-fitting of the model so that it performs better on unseen values of visibility. MSE is a measure of the quality of the estimation. Performance metrics and generalization of empirical models may be further improved by increasing the values in the data set and by incorporating more regions. The minimum mean square error and maximum coefficient of determination have been reported in the case of models developed for the Washington and Delhi regions, respectively.
