                  - paragraph
                - generic [ref=e242]:
                  - generic [ref=e243]:
                    - generic [ref=e244]:
                      - heading "1. Introduction" [level=2] [ref=e245]
                      - generic [ref=e246]:
                        - text: In today’s era, there is an enormous demand for fast data rates, bandwidth, and capacity for live streaming, social networking, and video conferencing [
                        - link "1" [ref=e247] [cursor=pointer]:
                          - /url: "#B1-telecom-06-00029"
                        - text: "]. Radio frequency technology has been widely used for terrestrial communication, but it has limited bandwidth and suffers from interference that decreases the capacity and security. Radio frequency links offer lower data rates, need large antennas, and are highly susceptible to multipath fading. Free space optics (FSOs) is considered a strong candidate to complement and integrate with next generation technologies and is currently considered as one of the key technologies for solving the last mile access problem resulting from the backbone of optical fibers to user terminals. It may offer high-speed broadband access in regions where fiber optic cabling may be impractical or costly. There is a challenge of getting high speed, stable, and secure communication service from core network infrastructure (e.g., central office, local exchange) to remote sites (e.g., businesses, offices, individual homes, hilly areas, or other end-user locations) ["
                        - link "2" [ref=e248] [cursor=pointer]:
                          - /url: "#B2-telecom-06-00029"
                        - text: "]. Unrestricted spectrum access, low latency, the absence of interference to radio frequency and electromagnetic induction, and the possibility of quick and easy installation are some of the main features of this technology."
                      - generic [ref=e249]:
                        - text: As FSOs use air as a transmission medium to transfer the laser pulses, there is no need to dig up the ground, as in the case of optical fiber [
                        - link "3" [ref=e250] [cursor=pointer]:
                          - /url: "#B3-telecom-06-00029"
                        - text: ","
                        - link "4" [ref=e251] [cursor=pointer]:
                          - /url: "#B4-telecom-06-00029"
                        - text: "]. Thus, utilizing this technology for last mile communication or difficult terrain can significantly contribute to the connectivity between remote rural areas and cities. It also finds applications in the interconnection of high-rise buildings in urban areas and office blocks or structures on both sides of highways or railways as well as banks of rivers that are difficult to bridge."
                      - generic [ref=e252]:
                        - text: Technology faces many challenges, like scintillation, turbulence, geometric losses, and attenuation, due to different weather conditions. Random variations in temperature and pressure cause the refractive index of air to deviate, causing atmospheric turbulence. Scintillation may result in rapid fluctuations in the phase and intensity of light as it propagates through the atmosphere [
                        - link "5" [ref=e253] [cursor=pointer]:
                          - /url: "#B5-telecom-06-00029"
                        - text: "]. Geometric losses spread the optical beam due to misalignment of the transmitter and receiver, which causes diffraction of the signal during propagation through the atmosphere. Performance estimation could be useful for applications, including FSO link beam tracking and localization. The losses impact the received signal strength and may be considered as constant factors for a fixed link configuration ["
                        - link "6" [ref=e254] [cursor=pointer]:
                          - /url: "#B6-telecom-06-00029"
                        - text: "]. Weather conditions, like fog, haze, and clouds, may heavily attenuate the signal by absorbing and scattering the information-carrying photons, affecting link availability ["
                        - link "7" [ref=e255] [cursor=pointer]:
                          - /url: "#B7-telecom-06-00029"
                        - text: "]."
                      - generic [ref=e256]:
                        - text: Dual polarization comprises two distinct, orthogonally polarized optical signals at the same wavelength. The transmission of signals may require half the data rate by splitting the data across the two polarizations. Channels can be spaced closer together by utilizing dual polarization quadrature phase shift keying (DP-QPSK) as the modulation technique, thus reducing the amount of bandwidth needed to transmit the optical signal [
                        - link "8" [ref=e257] [cursor=pointer]:
                          - /url: "#B8-telecom-06-00029"
                        - text: "]."
                      - generic [ref=e258]:
                        - text: In WDM, different wavelength signals share the same transmission medium, thus improving the capacity of the transmission. Information rates and spectral efficiency can be increased by employing MDM with parallel transmission of information through different modes within the same frequency band [
                        - link "9" [ref=e259] [cursor=pointer]:
                          - /url: "#B9-telecom-06-00029"
                        - text: "]. Further capacity enhancement is achieved by incorporating MDM along with WDM in a FSO system by utilizing both spatial modes and multiple wavelengths for free-space channels ["
                        - link "10" [ref=e260] [cursor=pointer]:
                          - /url: "#B10-telecom-06-00029"
                        - text: ","
                        - link "11" [ref=e261] [cursor=pointer]:
                          - /url: "#B11-telecom-06-00029"
                        - text: "]. DP-QPSK combined with WDM and MDM enables the simultaneous transmission of numerous independent data streams at different wavelengths, polarizations, and modes. This may enable a very high data rate throughput and capacity enhancement of optical networks."
                      - generic [ref=e262]:
                        - text: In the literature, several techniques have been proposed to improve spectral efficiency, OSNR, capacity, and the data rate of the FSO link [
                        - link "12" [ref=e263] [cursor=pointer]:
                          - /url: "#B12-telecom-06-00029"
                        - text: ","
                        - link "13" [ref=e264] [cursor=pointer]:
                          - /url: "#B13-telecom-06-00029"
                        - text: ","
                        - link "14" [ref=e265] [cursor=pointer]:
                          - /url: "#B14-telecom-06-00029"
                        - text: ","
                        - link "15" [ref=e266] [cursor=pointer]:
                          - /url: "#B15-telecom-06-00029"
                        - text: ","
                        - link "16" [ref=e267] [cursor=pointer]:
                          - /url: "#B16-telecom-06-00029"
                        - text: ","
                        - link "17" [ref=e268] [cursor=pointer]:
                          - /url: "#B17-telecom-06-00029"
                        - text: "]. The authors of ["
                        - link "12" [ref=e269] [cursor=pointer]:
                          - /url: "#B12-telecom-06-00029"
                        - text: "] modeled the cloud induced attenuation of Tokyo and Sendai regions of Japan by deriving its probability distribution function using curve-fitting techniques. The experimental evaluation of fog and haze climate conditions of a FSO link have been carried out under controlled conditions employing the Kim, Kruse, and Alnaboulsi prediction models in ["
                        - link "13" [ref=e270] [cursor=pointer]:
                          - /url: "#B13-telecom-06-00029"
                        - text: "]. The simulation results have been compared with experimental data, exhibiting the same trend of decrease in the received voltage levels with the increase in the intensity of fog or haze conditions. The authors of ["
                        - link "2" [ref=e271] [cursor=pointer]:
                          - /url: "#B2-telecom-06-00029"
                        - text: "] analyzed the attenuation as a result of fog weather conditions in hilly regions of India. The PSK modulation technique results in better performance of the FSO link at a data rate and transmission wavelength of 40 Gbps and 1550 nm, respectively."
                      - generic [ref=e272]:
