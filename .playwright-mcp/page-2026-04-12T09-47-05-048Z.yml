                      - generic [ref=e14031]:
                        - heading "4.10. Adaptive Detection Thresholds" [level=3] [ref=e14032]
                        - generic [ref=e14033]: This section introduces Adaptive Detection Threshold (ADT) schemes, which are essential for optimizing communication system performance in varying conditions. ADT schemes dynamically adjust detection thresholds based on real-time environmental and signal quality metrics, thereby enhancing reliability and efficiency. By continuously adapting to changing conditions, these schemes mitigate the impact of noise, interference, and signal fading, ensuring robust and efficient data transmission.
                        - generic [ref=e14034]:
                          - heading "4.10.1. Background" [level=4] [ref=e14035]
                          - generic [ref=e14036]:
                            - text: In the absence of scintillation, the BER of an FSO system can be improved significantly through the use of an optimal detection threshold based on the maximum likelihood principle, assuming the bit level means and variances are known. However, in an atmospheric channel, turbulence-induced scintillation causes considerable fluctuations in the bit means and variances, which in turn affects the optimal threshold. To address this, a new thresholding method has been developed that replaces the constant threshold with an adaptive one. This method utilizes a Kalman filter algorithm to continuously track and adjust the bit means and variances. In this context, conventional fixed detection thresholds (FDTs) are insufficient for the dynamic environments of FSO systems, as they fail to consider real-time fluctuations in signal quality. Conversely, ADTs improve system performance by dynamically adjusting threshold levels based on the existing channel conditions, thereby optimizing the detection process [
                            - link "413" [ref=e14037] [cursor=pointer]:
                              - /url: "#B413-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e14038]:
                            - text: Typically, the standard approach for adaptive detection assumes perfect knowledge of the instantaneous CSI, utilizing the instantaneous SNR to detect each data symbol [
                            - link "414" [ref=e14039] [cursor=pointer]:
                              - /url: "#B414-sensors-24-08036"
                            - text: ","
                            - link "415" [ref=e14040] [cursor=pointer]:
                              - /url: "#B415-sensors-24-08036"
                            - text: ","
                            - link "416" [ref=e14041] [cursor=pointer]:
                              - /url: "#B416-sensors-24-08036"
                            - text: ","
                            - link "417" [ref=e14042] [cursor=pointer]:
                              - /url: "#B417-sensors-24-08036"
                            - text: "]. To ensure reliable communication, adaptive detection techniques can be used to dynamically adjust the Rx sensitivity in response to these fluctuations ["
                            - link "418" [ref=e14043] [cursor=pointer]:
                              - /url: "#B418-sensors-24-08036"
                            - text: ","
                            - link "419" [ref=e14044] [cursor=pointer]:
                              - /url: "#B419-sensors-24-08036"
                            - text: ","
                            - link "420" [ref=e14045] [cursor=pointer]:
                              - /url: "#B420-sensors-24-08036"
                            - text: ","
                            - link "421" [ref=e14046] [cursor=pointer]:
                              - /url: "#B421-sensors-24-08036"
                            - text: ","
                            - link "422" [ref=e14047] [cursor=pointer]:
                              - /url: "#B422-sensors-24-08036"
                            - text: "]. Consequently, ADT methods have garnered significant interest as effective strategies for alleviating the impacts of AT in FSO. ADT enables systems to attain improved average BER with low complexity ["
                            - link "418" [ref=e14048] [cursor=pointer]:
                              - /url: "#B418-sensors-24-08036"
                            - text: "]. For instance, it is well known that an OOK IM/DD system with a fixed decision techniques leads to an irreducible error floor and is power inefficient. Optimal OOK demodulation necessitates time-varying ADTs based on perfect CSI for detecting each data symbol ["
                            - link "194" [ref=e14049] [cursor=pointer]:
                              - /url: "#B194-sensors-24-08036"
                            - text: ","
                            - link "415" [ref=e14050] [cursor=pointer]:
                              - /url: "#B415-sensors-24-08036"
                            - text: ","
                            - link "416" [ref=e14051] [cursor=pointer]:
                              - /url: "#B416-sensors-24-08036"
                            - text: ","
                            - link "421" [ref=e14052] [cursor=pointer]:
                              - /url: "#B421-sensors-24-08036"
                            - text: "]. However, this approach presents clear practical challenges for OOK IM/DD operation with nanosecond data symbol durations (i.e., Gb/s rates) and millisecond turbulence coherence times. Specifically, it necessitates rapid adjustments to the detection threshold on the millisecond timescale of turbulence coherence times ["
                            - link "415" [ref=e14053] [cursor=pointer]:
                              - /url: "#B415-sensors-24-08036"
                            - text: ","
                            - link "416" [ref=e14054] [cursor=pointer]:
                              - /url: "#B416-sensors-24-08036"
                            - text: ","
                            - link "423" [ref=e14055] [cursor=pointer]:
                              - /url: "#B423-sensors-24-08036"
                            - text: "]. In this context, practical FSO systems will not be able to accurately track changes in the means and variances at the bit level. Therefore, optimizing the threshold to a constant value based on slowly varying statistical quantities, such as average signal power and turbulence strength, can also be adopted as a suboptimal method ["
                            - link "413" [ref=e14056] [cursor=pointer]:
                              - /url: "#B413-sensors-24-08036"
                            - text: ","
                            - link "422" [ref=e14057] [cursor=pointer]:
                              - /url: "#B422-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e14058]:
                            - text: Although the performance of the Rx heavily relies on the chosen threshold level [
                            - link "420" [ref=e14059] [cursor=pointer]:
                              - /url: "#B420-sensors-24-08036"
                            - text: "], determining the appropriate ADT remains a challenge ["
                            - link "418" [ref=e14060] [cursor=pointer]:
                              - /url: "#B418-sensors-24-08036"
                            - text: "]. Previous studies often assume detection with instantaneous CSI ["
                            - link "10" [ref=e14061] [cursor=pointer]:
                              - /url: "#B10-sensors-24-08036"
                            - text: ","
                            - link "293" [ref=e14062] [cursor=pointer]:
                              - /url: "#B293-sensors-24-08036"
                            - text: "]. To address these practical issues, an electrical-SNR-optimized detection system has been proposed ["
                            - link "211" [ref=e14063] [cursor=pointer]:
                              - /url: "#B211-sensors-24-08036"
                            - text: ","
                            - link "424" [ref=e14064] [cursor=pointer]:
                              - /url: "#B424-sensors-24-08036"
                            - text: "]. This system requires changing the detection thresholds only over extended timescales, such as seconds or minutes, during which a stationary turbulence channel assumption is valid ["
                            - link "425" [ref=e14065] [cursor=pointer]:
                              - /url: "#B425-sensors-24-08036"
                            - text: "]. However, this method necessitates knowledge of the turbulence channel’s PDF, thereby increasing computational complexity ["
                            - link "414" [ref=e14066] [cursor=pointer]:
                              - /url: "#B414-sensors-24-08036"
                            - text: "]. For instance, research has indicated that estimating the fading intensity requires using redundant overhead, such as pilot symbols or training sequences ["
                            - link "426" [ref=e14067] [cursor=pointer]:
                              - /url: "#B426-sensors-24-08036"
                            - text: "]. In ["
                            - link "424" [ref=e14068] [cursor=pointer]:
                              - /url: "#B424-sensors-24-08036"
                            - text: "], pilot-symbol assisted modulation (PSAM) and the maximum likelihood method are introduced as methods to reduce the effects of turbulence and improve system performance. However, PSAM can cause delays at the Rx because the entire frame must be stored before decoding. In practice, to simplify commercial implementation and ensure infrastructure transparency, detection without CSI and the PDF of the turbulence channel is the favored approach ["
                            - link "194" [ref=e14069] [cursor=pointer]:
                              - /url: "#B194-sensors-24-08036"
                            - text: ","
                            - link "424" [ref=e14070] [cursor=pointer]:
                              - /url: "#B424-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e14071]:
                            - text: In [
                            - link "189" [ref=e14072] [cursor=pointer]:
                              - /url: "#B189-sensors-24-08036"
                            - text: "], the performance enhancements of OOK FSO communication systems under AT conditions are investigated, focusing on the dynamic decision threshold and coherent detection schemes. The findings indicate that the dynamic decision threshold scheme achieves a 5.7 dB reduction in the power needed to reach a BER of"
                            - generic [ref=e14073]:
                              - generic [ref=e14079]:
                                - generic [ref=e14080]: "10"
                                - generic [ref=e14082]: −3
                              - math [ref=e14083]:
                                - generic [ref=e14085]:
                                  - generic [ref=e14086]: "10"
                                  - generic [ref=e14087]:
                                    - generic [ref=e14088]: −
                                    - generic [ref=e14089]: "3"
                            - text: in comparison to the conventional FDT approach. Similarly, in [
                            - link "427" [ref=e14090] [cursor=pointer]:
                              - /url: "#B427-sensors-24-08036"
                            - text: "], it is shown that an OOK IM/DD system can utilize two laser wavelengths at the Tx and two photodetectors at the Rx to operate in differential mode, leading to outstanding BER performance with a detection threshold set to zero. This study is also extended to include PPM. However, this scheme is limited by low throughput, as it requires two lasers to transmit the same information during each symbol duration."
                          - generic [ref=e14091]:
                            - text: Furthermore, to enhance performance beyond what is achieved in [
                            - link "427" [ref=e14092] [cursor=pointer]:
                              - /url: "#B427-sensors-24-08036"
                            - text: "], a source information transformation system has been introduced in ["
                            - link "414" [ref=e14093] [cursor=pointer]:
                              - /url: "#B414-sensors-24-08036"
                            - text: "]. This system utilizes multiple optical wavelengths to determine ADTs. It has been demonstrated that this approach can achieve a satisfactory BER performance without needing instantaneous CSI or the PDF of the turbulence model. Numerical simulations indicate that the proposed system delivers performance similar to a theoretical adaptive detection scheme, while significantly reducing implementation complexity. Additionally, it incurs only a 1.8 dB loss in SNR at a BER of"
                            - generic [ref=e14094]:
                              - generic [ref=e14100]:
                                - text: 1×
                                - generic [ref=e14101]:
                                  - generic [ref=e14102]: "10"
                                  - generic [ref=e14104]: −9
                              - math [ref=e14105]:
                                - generic [ref=e14107]:
                                  - generic [ref=e14108]: "1"
                                  - generic [ref=e14109]: ×
                                  - generic [ref=e14110]:
                                    - generic [ref=e14111]: "10"
                                    - generic [ref=e14112]:
                                      - generic [ref=e14113]: −
                                      - generic [ref=e14114]: "9"
                            - text: for a lognormal turbulence channel. Also, to enhance threshold accuracy and overall system performance, an FSO communication system using OOK with coherent detection-double ADT has been developed [
                            - link "418" [ref=e14115] [cursor=pointer]:
                              - /url: "#B418-sensors-24-08036"
                            - text: "]. The Tx employs 3-bit encoding to relay information, while the Rx features two adaptive thresholds to identify the in-phase and quadrature components of the signal, operating without instantaneous CSI or the PDF of the channel model. Additionally, a decision-aided scheme is proposed to establish the second detection threshold, further refining precision. Numerical analyses indicate that this system achieves a BER performance comparable to that of an idealized adaptive detection system."
                        - generic [ref=e14116]:
                          - heading "4.10.2. Mechanism of ADTs" [level=4] [ref=e14117]
                          - generic [ref=e14118]: "ADTs work by continuously monitoring the received signal’s parameters, such as BER, SNR, and scintillation index. Algorithms, often based on ML or statistical analysis, process these real-time data to determine the optimal threshold. The primary mechanisms include the following:"
                          - generic [ref=e14120]:
                            - term [ref=e14121]: (i)
                            - definition [ref=e14122]:
                              - generic [ref=e14123]:
                                - text: "Feedback Loops: Real-time feedback from the Rx to the Tx helps adjust the power levels and detection thresholds. This feedback loop ensures that the system adapts to varying conditions promptly ["
                                - link "194" [ref=e14124] [cursor=pointer]:
                                  - /url: "#B194-sensors-24-08036"
                                - text: ","
                                - link "424" [ref=e14125] [cursor=pointer]:
                                  - /url: "#B424-sensors-24-08036"
                                - text: "]."
                            - term [ref=e14126]: (ii)
                            - definition [ref=e14127]:
                              - generic [ref=e14128]:
                                - text: "Threshold Adjustment Algorithms: Algorithms such as the Kalman filter, maximum likelihood estimation, and adaptive filtering techniques dynamically adjust the detection thresholds. These algorithms analyze the statistical properties of the received signal and make predictive adjustments ["
                                - link "413" [ref=e14129] [cursor=pointer]:
                                  - /url: "#B413-sensors-24-08036"
                                - text: "]."
                            - term [ref=e14130]: (iii)
                            - definition [ref=e14131]:
                              - generic [ref=e14132]:
                                - text: "Diversity Techniques: Implementing spatial or temporal diversity techniques can also aid in adaptive threshold adjustment. By combining multiple received signals, the system can better estimate the optimal threshold ["
                                - link "423" [ref=e14133] [cursor=pointer]:
                                  - /url: "#B423-sensors-24-08036"
                                - text: "]."
                        - generic [ref=e14134]:
                          - heading "4.10.3. Benefits of ADTs" [level=4] [ref=e14135]
                          - generic [ref=e14136]: "ADTs offer several advantages in FSO communication systems:"
                          - generic [ref=e14138]:
                            - term [ref=e14139]: (i)
                            - definition [ref=e14140]:
                              - generic [ref=e14141]:
                                - text: "Improved Signal Detection: By continuously adjusting to the optimal threshold, the Rx can better distinguish between the signal and noise, leading to lower BER and enhanced data integrity ["
                                - link "418" [ref=e14142] [cursor=pointer]:
                                  - /url: "#B418-sensors-24-08036"
                                - text: ","
                                - link "427" [ref=e14143] [cursor=pointer]:
                                  - /url: "#B427-sensors-24-08036"
                                - text: "]."
                            - term [ref=e14144]: (ii)
                            - definition [ref=e14145]:
                              - generic [ref=e14146]:
                                - text: "Enhanced System Reliability: Adaptive thresholds help maintain consistent communication quality even under adverse weather conditions and AT, thereby increasing the system’s reliability ["
                                - link "413" [ref=e14147] [cursor=pointer]:
                                  - /url: "#B413-sensors-24-08036"
                                - text: "]."
                            - term [ref=e14148]: (iii)
                            - definition [ref=e14149]:
                              - generic [ref=e14150]:
                                - text: "Efficient Use of Power: Adaptive thresholds can lead to the more efficient use of power by ensuring that the system only uses the necessary amount of power to maintain communication, which is particularly beneficial in power-constrained applications ["
                                - link "189" [ref=e14151] [cursor=pointer]:
                                  - /url: "#B189-sensors-24-08036"
                                - text: ","
                                - link "413" [ref=e14152] [cursor=pointer]:
                                  - /url: "#B413-sensors-24-08036"
                                - text: ","
                                - link "422" [ref=e14153] [cursor=pointer]:
                                  - /url: "#B422-sensors-24-08036"
                                - text: "]."
                        - generic [ref=e14154]:
                          - heading "4.10.4. Implementation Challenges" [level=4] [ref=e14155]
                          - generic [ref=e14156]: "Despite their advantages, implementing ADTs in FSO systems comes with challenges:"
                          - generic [ref=e14158]:
                            - term [ref=e14159]: (i)
                            - definition [ref=e14160]:
                              - generic [ref=e14161]: "Complexity: The algorithms required for real-time threshold adjustment can be complex and computationally intensive, necessitating advanced processing capabilities."
                            - term [ref=e14162]: (ii)
                            - definition [ref=e14163]:
                              - generic [ref=e14164]: "Latency: Real-time adjustments must be swift to be effective. Any latency in the feedback loop or threshold adjustment process can degrade performance."
                            - term [ref=e14165]: (iii)
                            - definition [ref=e14166]:
                              - generic [ref=e14167]: "Calibration: Adaptive systems require initial calibration and ongoing tuning to ensure they respond appropriately to changing conditions."
                      - generic [ref=e14168]:
                        - heading "4.11. Hybrid FSO Systems" [level=3] [ref=e14169]
                        - generic [ref=e14170]: The integration of FSO communication with RF, mmWave, and THz technologies has emerged as a promising approach to overcoming the limitations of standalone FSO systems. Hybrid FSO systems leverage the strengths of these technologies to provide enhanced reliability and coverage. This section examines the architecture of hybrid FSO systems, their operational principles, and the benefits they offer in terms of performance and reliability.
                        - generic [ref=e14171]:
                          - heading "4.11.1. Overview" [level=4] [ref=e14172]
                          - generic [ref=e14173]:
                            - text: FSO, mmWave, and THz communications have proven to be effective solutions for high-data-rate wireless transmission over short distances. They offer a promising response to the increasing demand for higher data rates amid the growing scarcity of RF spectrum, positioning them as strong candidates for joint deployment to ensure reliable, high-data-rate wireless backhaul [
                            - link "428" [ref=e14174] [cursor=pointer]:
                              - /url: "#B428-sensors-24-08036"
                            - text: "]. Nevertheless, these technologies fall short of achieving the desired carrier-grade availability of 99.999% due to their related transmission issues. A possible solution to enhance the FSO link’s availability and reliability is to integrate it with the RF (or mmWave/THz) link (hereinafter referred to as an alternative link), which can reach data rates similar to those of an FSO link, to create a hybrid FSO/RF (or mmWave/THz) communication system (hereinafter referred to as a hybrid system) ["
                            - link "2" [ref=e14175] [cursor=pointer]:
                              - /url: "#B2-sensors-24-08036"
                            - text: ","
                            - link "362" [ref=e14176] [cursor=pointer]:
                              - /url: "#B362-sensors-24-08036"
                            - text: ","
                            - link "365" [ref=e14177] [cursor=pointer]:
                              - /url: "#B365-sensors-24-08036"
                            - text: ","
                            - link "429" [ref=e14178] [cursor=pointer]:
                              - /url: "#B429-sensors-24-08036"
                            - text: "]. As a result, a hybrid system is better equipped to maintain connectivity compared to a purely FSO system. By integrating the advantages of various technologies and addressing the limitations of each, the hybrid system greatly improves network performance. It enhances network resilience and offers a backup solution in difficult atmospheric conditions, thereby contributing to overall network reliability ["
                            - link "2" [ref=e14179] [cursor=pointer]:
                              - /url: "#B2-sensors-24-08036"
                            - text: ","
                            - link "365" [ref=e14180] [cursor=pointer]:
                              - /url: "#B365-sensors-24-08036"
                            - text: "]."
                        - generic [ref=e14181]:
                          - heading "4.11.2. Architecture of Hybrid FSO Systems" [level=4] [ref=e14182]
                          - generic [ref=e14183]:
                            - text: "Hybrid FSO systems typically combine FSO links with RF, mmWave, or THz links to create a robust communication network. In this system, the efficiency and reliability of signal transmission are significantly influenced by the switching configurations employed. This section delves into two primary switching architectures: soft-switching and hard-switching. Soft-switching aims to minimize losses and electromagnetic interference by ensuring smoother transitions between states, thereby enhancing system performance and longevity. Conversely, hard-switching, characterized by abrupt transitions, can lead to increased efficiency under certain conditions but may also introduce greater stress on system components. Understanding the nuances of these configurations is crucial for optimizing FSO systems for various operational scenarios."
                            - link "Figure 15" [ref=e14184] [cursor=pointer]:
                              - /url: "#fig_body_display_sensors-24-08036-f015"
                            - text: illustrates two potential setups for a hybrid FSO/RF link.
                          - generic [ref=e14185]:
                            - generic [ref=e14187] [cursor=pointer]:
                              - img "Sensors 24 08036 g015" [ref=e14188]
                              - link [ref=e14189]:
                                - /url: "#fig_body_display_sensors-24-08036-f015"
                            - generic [ref=e14190]: "Figure 15. Hybrid FSO switching configurations: (a) soft-switching and (b) hard-switching."
                          - generic [ref=e14191]:
                            - heading "Hard-Switching Configurations" [level=5] [ref=e14192]
                            - generic [ref=e14193]:
                              - text: One switching approach is a switch-over hybrid technique that employs hard-switching between the FSO and alternative links to make use of their complementary natures [
                              - link "430" [ref=e14194] [cursor=pointer]:
                                - /url: "#B430-sensors-24-08036"
                              - text: ","
                              - link "431" [ref=e14195] [cursor=pointer]:
                                - /url: "#B431-sensors-24-08036"
                              - text: "]. In this approach, as shown in"
                              - link "Figure 15" [ref=e14196] [cursor=pointer]:
                                - /url: "#fig_body_display_sensors-24-08036-f015"
                              - text: a, the Tx and Rx collaboratively decide between the FSO and an alternative channel for data transmission. The FSO link is chosen only when the channel conditions allow for reliable communication; otherwise, all data are transmitted via the alternative channel [
                              - link "432" [ref=e14197] [cursor=pointer]:
                                - /url: "#B432-sensors-24-08036"
                              - text: ","
                              - link "433" [ref=e14198] [cursor=pointer]:
                                - /url: "#B433-sensors-24-08036"
                              - text: "]. In this regard, commercially available hybrid solutions simply use the RF link as a hot-standby backup for the FSO link, which is to be used only when the FSO channel is inoperative ["
                              - link "434" [ref=e14199] [cursor=pointer]:
                                - /url: "#B434-sensors-24-08036"
                              - text: "]. It is important to note that the Tx and Rx need to be coordinated through feedback to choose the appropriate channel for transmission. One major drawback of hard-switching is that one link remains idle at any given time. In reality, scintillation or loss in the sensitive FSO channel leads to infrequent selection of that link. Consequently, once the RF link is chosen, the channel capacity of the FSO link goes unused ["
                              - link "432" [ref=e14200] [cursor=pointer]:
                                - /url: "#B432-sensors-24-08036"
                              - text: "]. Also, this method results in frequent switching between the FSO and alternative links ["
                              - link "429" [ref=e14201] [cursor=pointer]:
                                - /url: "#B429-sensors-24-08036"
                              - text: ","
                              - link "430" [ref=e14202] [cursor=pointer]:
                                - /url: "#B430-sensors-24-08036"
                              - text: "]."
                          - generic [ref=e14203]:
                            - heading "Soft-Switching Configurations" [level=5] [ref=e14204]
                            - generic [ref=e14205]:
                              - text: One solution to address the challenges of hard-switching is to synchronize data transmission across both links using channel coding, as illustrated in
                              - link "Figure 15" [ref=e14206] [cursor=pointer]:
                                - /url: "#fig_body_display_sensors-24-08036-f015"
                              - text: b. In this method, both the FSO and alternative links are utilized simultaneously for data transmission. One approach involves sending identical data concurrently over both links and employing diversity combining techniques for the received signals from each link [
                              - link "435" [ref=e14207] [cursor=pointer]:
                                - /url: "#B435-sensors-24-08036"
                              - text: "]. This method, however, limits the system’s data rate to that of the slower link. Alternatively, the data stream can be jointly coded and divided between the two links, potentially leading to a significant enhancement in overall system capacity ["
                              - link "431" [ref=e14208] [cursor=pointer]:
                                - /url: "#B431-sensors-24-08036"
                              - text: "]. In this context, data are encoded using a single LDPC code, with part of the codeword allocated to both FSO and alternative links, and the rate is modified through puncturing based on the current channel conditions ["
                              - link "429" [ref=e14209] [cursor=pointer]:
                                - /url: "#B429-sensors-24-08036"
                              - text: ","
                              - link "432" [ref=e14210] [cursor=pointer]:
                                - /url: "#B432-sensors-24-08036"
                              - text: "]. While this approach offers improvements over hard-switching, it necessitates knowledge of channel conditions at both the Tx and Rx, as well as complex soft decoding, which poses challenges at FSO data rates. Recently, Raptor codes have also been explored for hybrid FSO/RF links ["
                              - link "214" [ref=e14211] [cursor=pointer]:
                                - /url: "#B214-sensors-24-08036"
                              - text: ","
                              - link "434" [ref=e14212] [cursor=pointer]:
                                - /url: "#B434-sensors-24-08036"
                              - text: ","
                              - link "436" [ref=e14213] [cursor=pointer]:
                                - /url: "#B436-sensors-24-08036"
                              - text: ","
                              - link "437" [ref=e14214] [cursor=pointer]:
                                - /url: "#B437-sensors-24-08036"
                              - text: "]. These codes operate without the need for channel knowledge at the Tx and automatically adjust the rate between RF and FSO links based on channel conditions, utilizing just a single bit of feedback per message ["
                              - link "432" [ref=e14215] [cursor=pointer]:
                                - /url: "#B432-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e14216]:
                              - text: Generally, hard-switching schemes tend to result in some rate loss compared to soft-switching schemes. Both approaches require that the FSO and alternative links remain continuously active, even during periods of poor quality. Consequently, both links must be operational even when the FSO link has good quality and can independently meet the required BER. In such situations, these solutions are inefficient regarding bandwidth utilization and resource usage across both channels [
                              - link "429" [ref=e14217] [cursor=pointer]:
                                - /url: "#B429-sensors-24-08036"
                              - text: "]. For instance, the power used for alternative link transmission is wasted, leading to unnecessary interference with the environment ["
                              - link "428" [ref=e14218] [cursor=pointer]:
                                - /url: "#B428-sensors-24-08036"
                              - text: ","
                              - link "430" [ref=e14219] [cursor=pointer]:
                                - /url: "#B430-sensors-24-08036"
                              - text: "]. To tackle these issues of frequent switching, unnecessary RF interference, and RF power wastage, a new hybrid FSO/RF transmission scheme with adaptive combining is proposed in ["
                              - link "430" [ref=e14220] [cursor=pointer]:
                                - /url: "#B430-sensors-24-08036"
                              - text: "]. In this approach, the FSO link is utilized for data transmission as long as its quality remains acceptable, while the RF link is placed in standby mode. When the quality of the FSO link deteriorates, the system activates the RF link and employs MRC for signals received from both the FSO and RF links."
                            - generic [ref=e14221]:
                              - text: The complementary characteristics of FSO and RF channels have prompted several proposals for hybrid RF/FSO systems. A combination of high-rate FSO with low-rate RF systems operating in the 2.4 GHz frequency band is suggested in [
                              - link "438" [ref=e14222] [cursor=pointer]:
                                - /url: "#B438-sensors-24-08036"
                              - text: "] and experimentally validated in ["
                              - link "433" [ref=e14223] [cursor=pointer]:
                                - /url: "#B433-sensors-24-08036"
                              - text: ","
                              - link "439" [ref=e14224] [cursor=pointer]:
                                - /url: "#B439-sensors-24-08036"
                              - text: "]. However, the maximum data rate achievable in such hybrid systems is constrained by the limited RF bandwidth available in the 2.4 GHz band. This limitation can be addressed by utilizing RF systems in the mmWave frequency band, which supports data rates comparable to those of FSO ["
                              - link "440" [ref=e14225] [cursor=pointer]:
                                - /url: "#B440-sensors-24-08036"
                              - text: ","
                              - link "441" [ref=e14226] [cursor=pointer]:
                                - /url: "#B441-sensors-24-08036"
                              - text: ","
                              - link "442" [ref=e14227] [cursor=pointer]:
                                - /url: "#B442-sensors-24-08036"
                              - text: "]. When instantaneous CSI is available at the Tx, a straightforward CSI-dependent switching mechanism between the FSO and RF systems can be implemented ["
                              - link "438" [ref=e14228] [cursor=pointer]:
                                - /url: "#B438-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e14229]:
                              - text: Additionally, much of the prior research on hybrid FSO/RF systems has concentrated on the joint design of coding schemes for both FSO and RF links, facilitating soft-switching between the two links [
                              - link "429" [ref=e14230] [cursor=pointer]:
                                - /url: "#B429-sensors-24-08036"
                              - text: ","
                              - link "434" [ref=e14231] [cursor=pointer]:
                                - /url: "#B434-sensors-24-08036"
                              - text: ","
                              - link "443" [ref=e14232] [cursor=pointer]:
                                - /url: "#B443-sensors-24-08036"
                              - text: "]. For instance, to enhance the performance of hybrid FSO/RF systems, ref. ["
                              - link "443" [ref=e14233] [cursor=pointer]:
                                - /url: "#B443-sensors-24-08036"
                              - text: "] employs hybrid channel codes that not only optimally achieve the combined capacity of the FSO and RF channels but also ensure carrier-grade reliability (99.999%) for the FSO link. The coding scheme for the hybrid channel is based on non-uniform punctured LDPC codes. This scheme relies on knowledge of the instantaneous channel conditions at the Tx and the appropriate adjustment of code rates for RF and FSO transmission ["
                              - link "428" [ref=e14234] [cursor=pointer]:
                                - /url: "#B428-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e14235]:
                              - text: An alternative approach to joint FSO/RF channel coding using a practical implementation of rateless Fountain codes is presented in [
                              - link "434" [ref=e14236] [cursor=pointer]:
                                - /url: "#B434-sensors-24-08036"
                              - text: "]. The scheme belongs to the category of hybrid automatic repeat request (HARQ) that utilizes incremental redundancy coding, and as such does not require rate adjustment prior to transmission. This is a clear distinction relative to rate-adaptive coding techniques like the ones proposed in ["
                              - link "429" [ref=e14237] [cursor=pointer]:
                                - /url: "#B429-sensors-24-08036"
                              - text: ","
                              - link "443" [ref=e14238] [cursor=pointer]:
                                - /url: "#B443-sensors-24-08036"
                              - text: "]. A bit-interleaved CM scheme for hybrid systems is introduced in ["
                              - link "431" [ref=e14239] [cursor=pointer]:
                                - /url: "#B431-sensors-24-08036"
                              - text: "]. Additionally, ["
                              - link "432" [ref=e14240] [cursor=pointer]:
                                - /url: "#B432-sensors-24-08036"
                              - text: "] proposes the use of short-length Raptor codes. The link availability of hybrid FSO/RF systems is explored from an information theory perspective in ["
                              - link "444" [ref=e14241] [cursor=pointer]:
                                - /url: "#B444-sensors-24-08036"
                              - text: "]. Meanwhile, ref. ["
                              - link "435" [ref=e14242] [cursor=pointer]:
                                - /url: "#B435-sensors-24-08036"
                              - text: "] presents diversity combining for parallel FSO and RF channels, assuming both links transmit identical information simultaneously. The performance of a similar hybrid FSO/RF system subject to non-Gaussian noise is analyzed in ["
                              - link "445" [ref=e14243] [cursor=pointer]:
                                - /url: "#B445-sensors-24-08036"
                              - text: "]."
                    - generic [ref=e14244]:
                      - heading "5. Emerging Trends in FSO Communication" [level=2] [ref=e14245]
                      - generic [ref=e14246]:
                        - text: FSO communication is evolving rapidly, integrating cutting-edge technologies to overcome conventional limitations and enhance performance. This section delves into the latest advancements shaping the future of FSO systems. Key trends include the incorporation of emerging technologies, which bolster system capabilities and adaptability. Enhanced FSO transceiver design aims to improve reliability and efficiency. The integration of quantum cryptography offers unprecedented security for data transmission. OAM-aided FSO systems introduce a novel method for multiplexing, significantly increasing data throughput. Additionally, the application of AI in FSO systems promises to optimize performance through intelligent decision-making and adaptive strategies. Together, these innovations are poised to revolutionize FSO communication, making it a more viable and robust solution for modern communication needs [
                        - link "2" [ref=e14247] [cursor=pointer]:
                          - /url: "#B2-sensors-24-08036"
                        - text: "]."
                      - generic [ref=e14248]:
                        - heading "5.1. Incorporation of Emerging Technologies" [level=3] [ref=e14249]
                        - generic [ref=e14250]:
                          - text: The landscape of wireless communication is rapidly evolving, fueled by the increasing need for higher data rates, improved reliability, and seamless connectivity. As mentioned in the preceding section, FSO communication, known for its high bandwidth and security, is being integrated with other advanced technologies such as RF, mmWave, and THz systems [
                          - link "2" [ref=e14251] [cursor=pointer]:
                            - /url: "#B2-sensors-24-08036"
                          - text: ","
                          - link "93" [ref=e14252] [cursor=pointer]:
                            - /url: "#B93-sensors-24-08036"
                          - text: "]. This section discusses these emerging trends in detail, highlighting how these integrations can enhance communication systems’ overall performance and capabilities."
                        - generic [ref=e14253]:
                          - heading "5.1.1. Hybrid FSO/RF System" [level=4] [ref=e14254]
                          - generic [ref=e14255]:
                            - text: FSO and RF technologies have complementary strengths that can be harnessed to overcome the limitations of each. While FSO provides high bandwidth and secure communication, RF is less affected by weather conditions and can penetrate obstacles. This integration enhances reliability and resilience by providing alternative communication paths in adverse conditions. Also, in the hybrid system, RF links can serve as a backup for FSO links during adverse weather conditions (e.g., fog, rain) that degrade optical signals. This redundancy ensures continuous and reliable communication. Likewise, advanced algorithms can switch dynamically between RF and FSO links based on real-time environmental conditions and link quality, optimizing the communication system’s performance. Because of the offered reliability and redundancy, the hybrid FSO/RF system is ideal for providing last-mile connectivity in urban areas where physical obstructions and varying weather conditions pose challenges. Also, integration with RF enables the deployment of FSO links in mobile networks, supporting high-speed data transfer for moving platforms like vehicles and ships. Also, the scheme’s high-speed data transmission capabilities make it a suitable solution for backhaul and fronthaul applications, improving the overall performance of the 5G infrastructure [
                            - link "2" [ref=e14256] [cursor=pointer]:
                              - /url: "#B2-sensors-24-08036"
                            - text: ","
                            - link "93" [ref=e14257] [cursor=pointer]:
                              - /url: "#B93-sensors-24-08036"
                            - text: ","
                            - link "365" [ref=e14258] [cursor=pointer]:
                              - /url: "#B365-sensors-24-08036"
                            - text: "]."
                        - generic [ref=e14259]:
                          - heading "5.1.2. Hybrid FSO/mmWave System" [level=4] [ref=e14260]
                          - generic [ref=e14261]:
                            - text: mmWave frequencies (30–300 GHz) offer higher bandwidth compared to traditional RF frequencies, supporting gigabit per second (Gbps) data rates. Similar to FSO, mmWave communication utilizes highly directional beams, which can reduce interference and enhance security. So, combining FSO and mmWave technologies can significantly increase the available bandwidth, enabling ultra-high-speed communication. Also, both FSO and mmWave systems benefit from advanced beam steering and alignment techniques, often driven by AI and ML algorithms, to maintain optimal connectivity. Due to the high frequency, mmWave signals are best suited for short-range applications. Integrating them with FSO can extend the range and improve the reliability of these short-range links. Based on this, the scheme is crucial for the deployment of 5G networks and the development of 6G, providing the high data rates and low latency required for these advanced networks [
                            - link "12" [ref=e14262] [cursor=pointer]:
                              - /url: "#B12-sensors-24-08036"
                            - text: "]. Also, the hybrid system can be used for high-speed data transfer within data centers and for backhaul connections between network nodes ["
                            - link "2" [ref=e14263] [cursor=pointer]:
                              - /url: "#B2-sensors-24-08036"
                            - text: "]."
                        - generic [ref=e14264]:
                          - heading "5.1.3. Hybrid FSO/THz System" [level=4] [ref=e14265]
                          - generic [ref=e14266]:
                            - text: THz frequencies (0.1–10 THz) offer even higher data rates than mmWave, potentially supporting tens to hundreds of Gbps. The THz spectrum provides ample bandwidth, which is crucial for future high-capacity communication systems. FSO can complement THz communication by providing high-capacity links in scenarios where THz propagation is limited due to atmospheric absorption and scattering. Integrating FSO with THz technologies can leverage advanced modulation techniques to maximize data throughput and SE. AI-driven adaptive systems can dynamically allocate FSO and THz resources based on real-time performance metrics, optimizing the communication link’s quality and capacity. So, the scheme is a key enabler for wireless terabit networks, which are essential to enable future data-intensive applications, including holographic communications and immersive virtual reality. Hybrid FSO/THz systems can enhance space communication links, providing high-speed data transfer between satellites and ground stations or inter-satellite links [
                            - link "2" [ref=e14267] [cursor=pointer]:
                              - /url: "#B2-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e14268]:
                            - text: In general, the integration of FSO communication with RF, mmWave, and THz technologies represents a notable trend in the evolution of wireless communication systems. These hybrid systems leverage the strengths of each technology to overcome their individual limitations, resulting in enhanced performance, reliability, and capacity. As research and development continue, these integrated systems are expected to be instrumental in the deployment of next-generation networks, supporting a broad spectrum of applications from urban connectivity to space communications. This convergence of technologies represents a significant advancement in realizing the vision of ubiquitous, high-speed wireless communication [
                            - link "2" [ref=e14269] [cursor=pointer]:
                              - /url: "#B2-sensors-24-08036"
                            - text: ","
                            - link "365" [ref=e14270] [cursor=pointer]:
                              - /url: "#B365-sensors-24-08036"
                            - text: "]."
                      - generic [ref=e14271]:
                        - heading "5.2. Enhanced FSO Transceiver Design" [level=3] [ref=e14272]
                        - generic [ref=e14273]:
                          - text: A roadmap for future wireless communications is expected to exploit all transmission-suitable spectrum bands, from the microwave to the optical frequencies, to support orders of magnitude faster data transfer with much lower latency than the deployed solutions nowadays. The currently under-exploited mid-infrared (mid-IR) spectrum is an essential building block for such an envisioned all-spectra wireless communication paradigm. FSO communications in the mid-IR region have recently attracted great interest due to their intrinsic merits of low propagation loss and high tolerance of atmospheric perturbations [
                          - link "446" [ref=e14274] [cursor=pointer]:
                            - /url: "#B446-sensors-24-08036"
                          - text: "]."
                        - generic [ref=e14275]:
                          - text: Meanwhile, FSO technologies have been proposed, studied, and even developed for decades by reusing the fiber-optic components in the near-IR band (1–2 μm). Unfortunately, these have not been considered reliable building blocks of the modern ICT infrastructure. The main concern of these near-IR FSO technologies is that they are susceptible to the dynamic atmospheric environment. For instance, with the development of passive and active fiber components and devices, the 1.55 μm band, also referred to as the telecom band, has been applied for commercial FSO communication systems. However, the 1.55 μm band is sensitive to atmospheric channel perturbations caused by fog, dust, and turbulence [
                          - link "447" [ref=e14276] [cursor=pointer]:
                            - /url: "#B447-sensors-24-08036"
                          - text: "]."
                        - generic [ref=e14277]:
                          - text: Recently, the under-exploited mid-IR spectral region, particularly the two atmospheric transmission windows at the mid-wavelength IR (MWIR, 3–5 μm) and the long-wavelength IR (LWIR, 9–12 μm) [
                          - link "448" [ref=e14278] [cursor=pointer]:
                            - /url: "#B448-sensors-24-08036"
                          - text: "], are attracting increasing interest for FSO communications. The interest in a MWIR platform stems from the intrinsic PHY layer advantage of low absorption when propagating in the atmosphere even under adverse conditions (for instance, scattering by aerosols, rain, and snow, as well as beam broadening and scintillation by turbulence effects), robustness of the wavefront during long-distance propagation compared with the near-IR FSO, and the absence of regulations and restrictions for this range of wavelengths ["
                          - link "446" [ref=e14279] [cursor=pointer]:
                            - /url: "#B446-sensors-24-08036"
                          - text: ","
                          - link "448" [ref=e14280] [cursor=pointer]:
                            - /url: "#B448-sensors-24-08036"
                          - text: ","
                          - link "449" [ref=e14281] [cursor=pointer]:
                            - /url: "#B449-sensors-24-08036"
                          - text: ","
                          - link "450" [ref=e14282] [cursor=pointer]:
                            - /url: "#B450-sensors-24-08036"
                          - text: "]"
                        - generic [ref=e14283]:
                          - text: The future development of viable mid-IR FSO transceivers requires a semiconductor source to fulfill the high-bandwidth, low-energy-consumption, and small-footprint requirements. In this context, quantum cascade devices, including quantum cascade lasers (QCLs) and quantum cascade detectors (QCDs) appear as promising technological candidates to fulfill this role [
                          - link "446" [ref=e14284] [cursor=pointer]:
                            - /url: "#B446-sensors-24-08036"
                          - text: ","
                          - link "447" [ref=e14285] [cursor=pointer]:
                            - /url: "#B447-sensors-24-08036"
                          - text: ","
                          - link "451" [ref=e14286] [cursor=pointer]:
                            - /url: "#B451-sensors-24-08036"
                          - text: ","
                          - link "452" [ref=e14287] [cursor=pointer]:
                            - /url: "#B452-sensors-24-08036"
                          - text: "]. Quantum cascade devices are based on inter-sub-band transitions to cover a wide spectral range from the mid-IR to THz. Particularly, directly modulated-QCLs have ultra-short carrier relaxation lifetime, leading to a high intrinsic modulation bandwidth and making the laser response over-damped, thus repressing the resonance frequency ["
                          - link "449" [ref=e14288] [cursor=pointer]:
                            - /url: "#B449-sensors-24-08036"
                          - text: ","
                          - link "451" [ref=e14289] [cursor=pointer]:
                            - /url: "#B451-sensors-24-08036"
                          - text: ","
                          - link "452" [ref=e14290] [cursor=pointer]:
                            - /url: "#B452-sensors-24-08036"
                          - text: "]. It is a promising candidate for solid-state FSO Txs at the MWIR and LWIR bands. Combined with advanced modulation formats (e.g., PAM and DMT) and DSP techniques, capacity-approaching transmission performance in both optical and wireless communication systems can be achieved ["
                          - link "447" [ref=e14291] [cursor=pointer]:
                            - /url: "#B447-sensors-24-08036"
                          - text: "]."
                      - generic [ref=e14292]:
                        - heading "5.3. Quantum Cryptography" [level=3] [ref=e14293]
                        - generic [ref=e14294]:
                          - text: Quantum cryptography represents a groundbreaking advancement in secure communication, utilizing the concepts of quantum mechanics to ensure the confidentiality and integrity of data. When integrated with FSO communication systems, quantum cryptography, particularly Quantum Key Distribution (QKD), offers unparalleled security, providing ultra-secure communication channels, particularly in scenarios requiring high levels of data protection. Also, integrating QKD into FSO involves transmitting qubits via the same optical channel, requiring precise alignment and stable atmospheric conditions to minimize decoherence and loss. So, AT, scattering, and absorption can impact the fidelity of quantum states. Advanced error correction and AO schemes can be used to alleviate these effects. Also, maintaining accurate alignment between the Tx and Rx is crucial. Automated tracking systems and fine-tuning mechanisms help maintain the integrity of the quantum channel [
                          - link "2" [ref=e14295] [cursor=pointer]:
                            - /url: "#B2-sensors-24-08036"
                          - text: ","
                          - link "453" [ref=e14296] [cursor=pointer]:
                            - /url: "#B453-sensors-24-08036"
                          - text: ","
                          - link "454" [ref=e14297] [cursor=pointer]:
                            - /url: "#B454-sensors-24-08036"
                          - text: ","
                          - link "455" [ref=e14298] [cursor=pointer]:
                            - /url: "#B455-sensors-24-08036"
                          - text: "]."
                        - generic [ref=e14299]:
                          - text: In general, the integration of quantum cryptography with FSO communication systems holds immense potential for revolutionizing secure communications, particularly within the framework of 5G and future networks. By leveraging the principles of quantum mechanics, QKD provides a level of security that is fundamentally unattainable with classical cryptographic methods. As we advance towards more connected and data-driven environments, the role of QKD in ensuring ultra-secure communication channels will become increasingly vital, offering robust solutions across various sectors, from finance and healthcare to government and smart cities [
                          - link "453" [ref=e14300] [cursor=pointer]:
                            - /url: "#B453-sensors-24-08036"
                          - text: ","
                          - link "454" [ref=e14301] [cursor=pointer]:
                            - /url: "#B454-sensors-24-08036"
                          - text: ","
                          - link "456" [ref=e14302] [cursor=pointer]:
                            - /url: "#B456-sensors-24-08036"
                          - text: "]."
                      - generic [ref=e14303]:
                        - heading "5.4. Orbital Angular Momentum-Aided FSO Systems" [level=3] [ref=e14304]
                        - generic [ref=e14305]:
                          - text: Several multiplexing methods, such as WDM, space division multiplexing (SDM), and polarization division multiplexing (PDM), have been employed to enhance the transmission capacity of FSO communication systems. However, the numerous limitations and the complex architecture of FSO Rxs make it challenging to significantly boost the transmission capacity further. Recently, a new multiplexing technique known as OAM has gained prominence among researchers for its potential to further increase the capacity of FSO systems [
                          - link "457" [ref=e14306] [cursor=pointer]:
                            - /url: "#B457-sensors-24-08036"
                          - text: "]. So, in future ultra-fast optical communication, besides the widely applied characteristics of light, including amplitude, phase, polarization, and wavelength, the OAM will offer a new degree of freedom of light beams. In principle, light beams carrying different OAM states are mutually orthogonal, and the number of OAM eigenstates is infinite. Therefore, the application of OAM provides alternative technologies to meet the ever-increasing bandwidth demands in wireless communication systems ["
                          - link "2" [ref=e14307] [cursor=pointer]:
                            - /url: "#B2-sensors-24-08036"
                          - text: ","
                          - link "458" [ref=e14308] [cursor=pointer]:
                            - /url: "#B458-sensors-24-08036"
                          - text: "]."
                        - generic [ref=e14309]:
                          - text: Moreover, to enhance the data transmission capacity of FSO communication, techniques utilizing OAM—a fundamental property of Laguerre–Gaussian (LG) beams—have been proposed and garnered significant attention [
                          - link "459" [ref=e14310] [cursor=pointer]:
                            - /url: "#B459-sensors-24-08036"
                          - text: "]. Leveraging the theoretically unlimited range of available OAM states ["
                          - link "460" [ref=e14311] [cursor=pointer]:
                            - /url: "#B460-sensors-24-08036"
                          - text: "], OAM division multiplexing ["
                          - link "461" [ref=e14312] [cursor=pointer]:
                            - /url: "#B461-sensors-24-08036"
                          - text: ","
                          - link "462" [ref=e14313] [cursor=pointer]:
                            - /url: "#B462-sensors-24-08036"
                          - text: "] and OAM-shift keying (OAM-SK) ["
                          - link "50" [ref=e14314] [cursor=pointer]:
                            - /url: "#B50-sensors-24-08036"
                          - text: ","
                          - link "463" [ref=e14315] [cursor=pointer]:
                            - /url: "#B463-sensors-24-08036"
                          - text: ","
                          - link "464" [ref=e14316] [cursor=pointer]:
                            - /url: "#B464-sensors-24-08036"
                          - text: "] can significantly improve the capacity of FSO communication systems. Specifically, in OAM division multiplexing, LG beams carrying various OAM states act as channels to multiplex information streams ["
                          - link "458" [ref=e14317] [cursor=pointer]:
                            - /url: "#B458-sensors-24-08036"
                          - text: "]. Traditionally, these beams are multiplexed at the Tx and then transmitted through the atmosphere to the Rx, where they are demultiplexed due to their orthogonal properties ["
                          - link "465" [ref=e14318] [cursor=pointer]:
                            - /url: "#B465-sensors-24-08036"
                          - text: "]. Meanwhile, in OAM-SK, information is modulated into LG beams with different OAM modes, representing a new modulation format. The OAM-SK-FSO communication system offers distinct advantages, including reduced equipment costs, increased transmission distances, enhanced photon efficiency, and improved information security. This makes it particularly suitable for cost-effective emergency communication and medium-distance FSO applications, such as high-dimensional QKD and deep-space or near-Earth communications. Additionally, advancements in SLMs can further enhance the capacity of OAM-SK communication systems."
                      - generic [ref=e14319]:
                        - heading "5.5. Artificial Intelligence-Driven FSO Systems" [level=3] [ref=e14320]
                        - generic [ref=e14321]:
                          - text: The integration of AI and ML into FSO communication systems represents a significant advancement and is a rapidly growing trend, offering new possibilities for optimizing system performance and reliability. AI and ML technologies offer powerful tools to address the inherent challenges of FSO communication, such as atmospheric interference, alignment issues, and error correction. In this regard, AI-driven algorithms can be used to predict atmospheric conditions, estimate channels, modulate and demodulate signals, optimize beam alignment, monitor performance, and enhance error correction processes. For example, ML models can analyze vast amounts of meteorological data to predict weather patterns with high accuracy. By integrating these predictions into FSO systems, operators can anticipate adverse conditions and take preemptive measures [
                          - link "2" [ref=e14322] [cursor=pointer]:
                            - /url: "#B2-sensors-24-08036"
                          - text: ","
                          - link "404" [ref=e14323] [cursor=pointer]:
                            - /url: "#B404-sensors-24-08036"
                          - text: ","
                          - link "466" [ref=e14324] [cursor=pointer]:
                            - /url: "#B466-sensors-24-08036"
                          - text: ","
                          - link "467" [ref=e14325] [cursor=pointer]:
                            - /url: "#B467-sensors-24-08036"
                          - text: ","
                          - link "468" [ref=e14326] [cursor=pointer]:
                            - /url: "#B468-sensors-24-08036"
                          - text: ","
                          - link "469" [ref=e14327] [cursor=pointer]:
                            - /url: "#B469-sensors-24-08036"
                          - text: ","
                          - link "470" [ref=e14328] [cursor=pointer]:
                            - /url: "#B470-sensors-24-08036"
                          - text: ","
                          - link "471" [ref=e14329] [cursor=pointer]:
                            - /url: "#B471-sensors-24-08036"
                          - text: ","
                          - link "472" [ref=e14330] [cursor=pointer]:
                            - /url: "#B472-sensors-24-08036"
                          - text: ","
                          - link "473" [ref=e14331] [cursor=pointer]:
                            - /url: "#B473-sensors-24-08036"
                          - text: ","
                          - link "474" [ref=e14332] [cursor=pointer]:
                            - /url: "#B474-sensors-24-08036"
                          - text: "]."
                        - generic [ref=e14333]:
                          - text: Furthermore, AI-driven systems can continuously monitor atmospheric conditions using sensors and adjust system parameters like the transmission power, modulation schemes, and other parameters accordingly in real-time to maintain optimal performance. In this regard, recent advancements in deep learning (DL) have enabled the development of sophisticated models for processing FSO signals. These models can filter out noise, enhance signal clarity, and improve data rates [
                          - link "467" [ref=e14334] [cursor=pointer]:
                            - /url: "#B467-sensors-24-08036"
                          - text: "]. For example, FSO communication systems utilizing DL for various roles—including channel estimation, detection, joint constellation shaping, and as a combined channel estimator and detector—are discussed in ["
                          - link "475" [ref=e14335] [cursor=pointer]:
                            - /url: "#B475-sensors-24-08036"
                          - text: "]. In ["
                          - link "476" [ref=e14336] [cursor=pointer]:
                            - /url: "#B476-sensors-24-08036"
                          - text: "], a design of an optical feedback network employing ML techniques is presented, demonstrating its effectiveness in correcting the effects of turbulent propagation on optical modes. This artificial neural network (ANN) approach relies solely on measuring the intensity profile of the distorted modes, making it both simple and robust. Additionally, a novel joint AT detection and adaptive demodulation technique utilizing convolutional neural networks (CNNs) is proposed to enhance the reliability and flexibility of OAM-FSO communication ["
                          - link "469" [ref=e14337] [cursor=pointer]:
                            - /url: "#B469-sensors-24-08036"
                          - text: "]. An m-ary adaptive demodulator based on the maximum likelihood for light beams carrying OAM over FSO turbulence channels has also been proposed and demonstrated ["
                          - link "458" [ref=e14338] [cursor=pointer]:
                            - /url: "#B458-sensors-24-08036"
                          - text: "]. Also, in ["
                          - link "477" [ref=e14339] [cursor=pointer]:
                            - /url: "#B477-sensors-24-08036"
                          - text: "], a new turbo-coded 16-ary OAM-SK-FSO communication system is introduced, which incorporates a CNN-based adaptive demodulator designed for operation under strong AT. In ["
                          - link "465" [ref=e14340] [cursor=pointer]:
                            - /url: "#B465-sensors-24-08036"
                          - text: "], a method is proposed for demultiplexing OAM-carrying beams by capturing an image of their unique multiplexing intensity pattern and training a CNN to serve as a classifier. This CNN-based approach simplifies the demultiplexing process, as it eliminates the need for alignment, relaxes orthogonality constraints, and reduces the reliance on expensive optical hardware."
                        - generic [ref=e14341]:
                          - text: AI is being used to manage and optimize entire FSO networks. This includes tasks such as traffic routing, load balancing, and resource allocation, ensuring efficient and reliable network performance. The research presented in [
                          - link "474" [ref=e14342] [cursor=pointer]:
                            - /url: "#B474-sensors-24-08036"
                          - text: ","
                          - link "478" [ref=e14343] [cursor=pointer]:
                            - /url: "#B478-sensors-24-08036"
                          - text: "] utilizes the actor–critic method from reinforcement learning for power adaptation in SM FSO systems. Additionally, the study in ["
                          - link "466" [ref=e14344] [cursor=pointer]:
                            - /url: "#B466-sensors-24-08036"
                          - text: "] addresses the broader issue of resource allocation aimed at reducing channel fading effects in FSO communications. This resource allocation problem is framed within a constrained stochastic optimization framework, encompassing a range of FSO scenarios that involve power adaptation, relay selection, and their combined allocation. In a similar vein, ref. ["
                          - link "479" [ref=e14345] [cursor=pointer]:
                            - /url: "#B479-sensors-24-08036"
                          - text: "] explores optimal resource allocation in FSO fronthaul networks. This optimal allocation aims to maximize the average weighted sum-capacity while adhering to constraints related to power limitations and data congestion. The study takes into account both adaptive power assignment and node selection, leveraging the instantaneous CSI of the links. By parameterizing the resource allocation policy, the problem is framed as an unsupervised statistical learning challenge. Furthermore, the use of graph neural networks (GNN) for policy parameterization is proposed to effectively utilize the FSO network structure with a reduced number of training parameters."
                        - generic [ref=e14346]:
                          - text: Maintaining precise alignment between the Tx and Rx is crucial for FSO communication. AI algorithms can process data from various sensors to automatically adjust the alignment of the optical beam [
                          - link "480" [ref=e14347] [cursor=pointer]:
                            - /url: "#B480-sensors-24-08036"
                          - text: "]. This includes compensating for environmental factors such as wind-induced vibrations or the movement of mobile platforms. ML models can predict the best alignment strategies based on historical data and real-time feedback, ensuring the beam remains accurately directed towards the Rx even in dynamic conditions ["
                          - link "467" [ref=e14348] [cursor=pointer]:
                            - /url: "#B467-sensors-24-08036"
                          - text: ","
                          - link "481" [ref=e14349] [cursor=pointer]:
                            - /url: "#B481-sensors-24-08036"
                          - text: "]. For instance, sensor-less AO is among the most promising techniques for compensating significant wavefront disturbances in FSO. A backpropagation ANN can be utilized in sensor-less AO systems to create a distortion correction scheme. This approach requires only one or a few online measurements to correct wavefront distortion, unlike other model-based methods, thereby enhancing the system’s real-time capabilities ["
                          - link "473" [ref=e14350] [cursor=pointer]:
                            - /url: "#B473-sensors-24-08036"
                          - text: "]."
                        - generic [ref=e14351]:
                          - text: One of the mostly used DL algorithms in optical communication applications is a deep neural network (DNN). The DNN is an extension of the ANN [
                          - link "482" [ref=e14352] [cursor=pointer]:
                            - /url: "#B482-sensors-24-08036"
                          - text: "]. It is flexible and could be used for various applications, such as modulation format identification ["
                          - link "483" [ref=e14353] [cursor=pointer]:
                            - /url: "#B483-sensors-24-08036"
                          - text: ","
                          - link "484" [ref=e14354] [cursor=pointer]:
                            - /url: "#B484-sensors-24-08036"
                          - text: "], mitigating the fiber effects ["
                          - link "485" [ref=e14355] [cursor=pointer]:
                            - /url: "#B485-sensors-24-08036"
                          - text: "], optical amplifier control ["
                          - link "486" [ref=e14356] [cursor=pointer]:
                            - /url: "#B486-sensors-24-08036"
                          - text: "], optical performance monitoring ["
                          - link "50" [ref=e14357] [cursor=pointer]:
                            - /url: "#B50-sensors-24-08036"
                          - text: ","
                          - link "487" [ref=e14358] [cursor=pointer]:
                            - /url: "#B487-sensors-24-08036"
                          - text: "], along with various optical network applications such as quality of transmission (lightpaths) prediction ["
                          - link "488" [ref=e14359] [cursor=pointer]:
                            - /url: "#B488-sensors-24-08036"
                          - text: "] and an AI-driven routing framework for multi-domain optical networks ["
                          - link "489" [ref=e14360] [cursor=pointer]:
                            - /url: "#B489-sensors-24-08036"
                          - text: "]. For instance, a novel block-wise detection technique utilizing support vector machines (SVMs) to address scintillation noise in FSO links is proposed in ["
                          - link "471" [ref=e14361] [cursor=pointer]:
                            - /url: "#B471-sensors-24-08036"
                          - text: "]. Given that turbulence fading occurs on a millisecond scale, while signaling rates typically reach hundreds of Mbps, the SVM approach offers an exceptionally large data block proportional to the bit rates. Additionally, the SVM calculation is independent of the channel’s turbulence conditions and the received signal models, requiring no prior information or heuristic assumptions. Furthermore, ref. ["
                          - link "490" [ref=e14362] [cursor=pointer]:
                            - /url: "#B490-sensors-24-08036"
                          - text: "] introduces a new detection method for OOK-modulated signals using various DL models across different strengths of FSO turbulent channels, without needing prior knowledge of the channel parameters. The DL decoders enhance the performance of the FSO turbulent channel and reduce power consumption. Notably, these DL models also operate faster than maximum likelihood methods with perfect channel estimation, achieving slightly better performance under turbulent conditions, thus facilitating FSO communications over turbulent atmospheric channels."
                        - generic [ref=e14363]:
                          - text: In general, AI-driven FSO systems could enable autonomous vehicles, drones, and other robotic platforms to communicate seamlessly, even in challenging environments. This includes applications in disaster response, remote sensing, and smart cities. AI and ML could play a critical impact in the development of quantum FSO systems, optimizing the transmission and reception of quantum signals for ultra-secure communication. Also, AI-aided FSO systems can lead to the development of smart infrastructure, where buildings, streetlights, and other urban elements are equipped with FSO transceivers managed by AI, providing ubiquitous connectivity [
                          - link "2" [ref=e14364] [cursor=pointer]:
                            - /url: "#B2-sensors-24-08036"
                          - text: ","
                          - link "458" [ref=e14365] [cursor=pointer]:
                            - /url: "#B458-sensors-24-08036"
                          - text: ","
                          - link "469" [ref=e14366] [cursor=pointer]:
                            - /url: "#B469-sensors-24-08036"
                          - text: ","
                          - link "491" [ref=e14367] [cursor=pointer]:
                            - /url: "#B491-sensors-24-08036"
                          - text: "]. In this context, AI-driven FSO communication systems are transforming the field, offering innovative solutions to long-standing challenges and paving the way for new applications. By leveraging AI-driven algorithms for predicting atmospheric conditions, optimizing beam alignment, and enhancing error correction, FSO systems can achieve higher performance and reliability. As research and development in this area continue to advance, the potential applications of AI and ML in FSO communication are vast, promising a future where seamless, high-speed optical communication is a reality ["
                          - link "466" [ref=e14368] [cursor=pointer]:
                            - /url: "#B466-sensors-24-08036"
                          - text: ","
                          - link "479" [ref=e14369] [cursor=pointer]:
                            - /url: "#B479-sensors-24-08036"
                          - text: ","
                          - link "481" [ref=e14370] [cursor=pointer]:
                            - /url: "#B481-sensors-24-08036"
                          - text: ","
                          - link "492" [ref=e14371] [cursor=pointer]:
                            - /url: "#B492-sensors-24-08036"
                          - text: "]."
                    - generic [ref=e14372]:
                      - heading "6. Open Challenges, Future Prospects and Research Directions" [level=2] [ref=e14373]
                      - generic [ref=e14374]: FSO communication systems have developed into an innovative technology for high-speed wireless communication. Despite their potential, various challenges need to be overcome to fully harness their capabilities. This section explores the key open challenges, discusses future prospects, and outlines potential research directions in FSO communication. By identifying critical areas, such as AT mitigation, aperture averaging effects, and advanced modulation techniques, we aim to offer an in-depth overview of the current landscape, fostering a deeper understanding of where focused efforts and innovative solutions are needed. This discussion is crucial for guiding ongoing and future research, ensuring continued advancement and addressing the critical needs of the field.
                      - generic [ref=e14375]:
                        - heading "6.1. FSO Scalability and Reliability for 5G and Beyond Networks" [level=3] [ref=e14376]
                        - generic [ref=e14377]: The scalability and reliability of FSO systems are critical factors for their adoption in next-generation networks. As the world transitions to 5G and beyond, the demand for high-capacity, low-latency, and resilient communication networks is skyrocketing. This section assesses the potential of FSO to scale with the increasing demands of 5G and beyond, addressing key issues such as network architecture, deployment strategies, resource management, and system integration.
                        - generic [ref=e14378]:
                          - heading "6.1.1. Network Architecture" [level=4] [ref=e14379]
                          - generic [ref=e14380]: The architecture of a network determines its ability to scale and adapt to new demands. In the realm of FSO systems, several architectural considerations are crucial. FSO systems can complement existing RF networks by providing high-capacity backhaul links. Hybrid architectures that seamlessly integrate FSO with RF can offer improved redundancy, resilience, and bandwidth. Also, implementing mesh network topologies with multiple FSO nodes can enhance coverage and provide alternative pathways for data transmission, improving reliability and scalability.
                          - generic [ref=e14381]:
                            - text: Distributed control mechanisms can enhance the scalability of FSO networks by enabling more efficient resource management and reducing the load on central controllers. Also, integrating edge computing capabilities with FSO nodes can reduce latency and improve the performance of latency-sensitive applications, which is critical for 5G and beyond [
                            - link "478" [ref=e14382] [cursor=pointer]:
                              - /url: "#B478-sensors-24-08036"
                            - text: ","
                            - link "493" [ref=e14383] [cursor=pointer]:
                              - /url: "#B493-sensors-24-08036"
                            - text: "]."
                        - generic [ref=e14384]:
                          - heading "6.1.2. Deployment Strategies" [level=4] [ref=e14385]
                          - generic [ref=e14386]: Effective deployment strategies are essential for the successful scaling of FSO systems. In this regard, site selection and planning are very important. For example, thorough LoS analysis is required to identify optimal locations for FSO transceivers, minimizing the impact of physical obstructions. Also, installing FSO equipment on rooftops, towers, and other elevated structures can enhance coverage and reduce the likelihood of obstructions.
                          - generic [ref=e14387]: Additionally, FSO can be effectively used for backhauling small cell networks in dense urban areas, where laying fiber may be impractical or cost prohibitive. High-density deployment of FSO nodes can support the massive device connectivity required for 5G and beyond, providing high-capacity links in congested areas. Also, deploying mobile FSO units on vehicles or drones can provide temporary high-capacity links in emergency situations or during large events, offering flexibility and rapid deployment capabilities.
                        - generic [ref=e14388]:
                          - heading "6.1.3. Resource Management" [level=4] [ref=e14389]
                          - generic [ref=e14390]: Effective resource management is essential for the scalability and reliability of FSO systems. Dynamic resource allocation is an important aspect of resource management. In this regard, implementing AMC schemes can optimize the use of available bandwidth and maintain link quality under varying atmospheric conditions. Likewise, dynamic load balancing across multiple FSO links can enhance network performance and prevent congestion.
                          - generic [ref=e14391]: Utilizing WDM technology can significantly increase the capacity of FSO links by transmitting multiple data streams on different wavelengths over a single optical path. Efficient channel allocation strategies can minimize interference and maximize the utilization of available optical spectrum.
                          - generic [ref=e14392]: Furthermore, priority-based traffic management can facilitate network performance. For example, implementing QoS mechanisms that prioritize critical traffic can ensure reliable performance for latency-sensitive applications, such as real-time video and Internet of Things (IoT) services. Similarly, advanced error correction techniques can alleviate the impact of signal deterioration caused by atmospheric conditions, enhancing the reliability of FSO links.
                        - generic [ref=e14393]:
                          - heading "6.1.4. System Integration" [level=4] [ref=e14394]
                          - generic [ref=e14395]: Integrating FSO systems with existing network infrastructure and emerging technologies is vital for scalability. Key integration consideration include compatibility with existing networks. So, ensuring interoperability between FSO systems and existing network equipment, such as routers and switches, can facilitate seamless integration and operation. Also, adopting standardized protocols and interfaces can simplify the integration process and enhance compatibility across different vendors and technologies.
                          - generic [ref=e14396]: In addition, for effective integration with 5G and beyond technologies, FSO systems must be designed to support the requirements of 5G and future networks, including high data rates, ultra-low latency, and massive connectivity. Also, integrating FSO with IoT infrastructure and smart city applications can provide high-capacity, low-latency links for different use cases, such as smart lighting, traffic management, and environmental monitoring. Implementing centralized network management systems can provide real-time monitoring and control of FSO links, facilitating proactive maintenance and optimization. Also, leveraging AI and ML techniques can enhance network management by predicting and mitigating issues related to atmospheric conditions, traffic patterns, and potential obstructions.
                          - generic [ref=e14397]: In general, the potential of FSO communication systems to scale with the increasing demands of 5G and beyond is promising, provided that key challenges related to network architecture, deployment strategies, resource management, and system integration are addressed. By leveraging hybrid network architectures, adopting efficient deployment strategies, implementing dynamic resource management techniques, and ensuring seamless integration with existing and emerging technologies, FSO can be crucial in the next generation of high-capacity, reliable communication networks.
                      - generic [ref=e14398]:
                        - heading "6.2. Standardization and Regulatory Challenges" [level=3] [ref=e14399]
                        - generic [ref=e14400]: For FSO communication to achieve widespread adoption, it is essential to establish standardized protocols and address regulatory challenges. This section discusses the current state of FSO standardization efforts and the regulatory issues that need to be resolved to facilitate the deployment of FSO systems on a global scale. By analyzing the current state of FSO standardization, this section highlights the progress made, the challenges remaining, and the significance of these efforts in facilitating the growth and integration of FSO systems into global communication networks.
                        - generic [ref=e14401]:
                          - heading "6.2.1. Current State of FSO Standardization Efforts" [level=4] [ref=e14402]
                          - generic [ref=e14403]: The standardization of FSO systems is crucial for ensuring interoperability, reliability, and widespread adoption. This section explores the ongoing efforts to develop and implement standards for FSO technology. It examines the roles of various international bodies and industry groups in establishing guidelines and protocols that address key aspects such as performance metrics, safety regulations, and compatibility with the existing communication infrastructure.
                          - generic [ref=e14404]:
                            - heading "IEEE Standards" [level=5] [ref=e14405]
                            - generic [ref=e14406]:
                              - text: The Institute of Electrical and Electronics Engineers (IEEE) has been instrumental in developing standards for various communication technologies. For FSO, the IEEE 802.15.7-2018 standard focuses on OWCs, including FSO. This standard outlines the PHY layer and medium access control (MAC) layer specifications for short-range OWC, which can be adapted for FSO applications [
                              - link "494" [ref=e14407] [cursor=pointer]:
                                - /url: "#B494-sensors-24-08036"
                              - text: ","
                              - link "495" [ref=e14408] [cursor=pointer]:
                                - /url: "#B495-sensors-24-08036"
                              - text: ","
                              - link "496" [ref=e14409] [cursor=pointer]:
                                - /url: "#B496-sensors-24-08036"
                              - text: ","
                              - link "497" [ref=e14410] [cursor=pointer]:
                                - /url: "#B497-sensors-24-08036"
                              - text: "]. IEEE is also working on extending these standards to accommodate long-range FSO communication, which is crucial for bridging the gap between current capabilities and future needs."
                          - generic [ref=e14411]:
                            - heading "ITU Recommendations" [level=5] [ref=e14412]
                            - generic [ref=e14413]:
                              - text: It is important to note that the International Telecommunication Union (ITU) has recognized the potential of FSO systems, and through the ITU—Telecommunications Standardization Sector (ITU-T), it has approved Recommendation G.640 [
                              - link "498" [ref=e14414] [cursor=pointer]:
                                - /url: "#B498-sensors-24-08036"
                              - text: "], providing a procedure for enabling the interference-free coexistence of more than one p2p FSO communication system at a location. The Radio Communication Sector of ITU (ITU-R) has also issued a report on fixed service use cases using FSO links, defining device characteristics, possible applications, as well as technical and operational aspects of FSO systems ["
                              - link "499" [ref=e14415] [cursor=pointer]:
                                - /url: "#B499-sensors-24-08036"
                              - text: "]. Also, ITU has developed recommendations that cover aspects of optical communication, including FSO. ITU-T G.9991, for instance, deals with high-speed indoor OWC transceivers, which can inform FSO developments ["
                              - link "500" [ref=e14416] [cursor=pointer]:
                                - /url: "#B500-sensors-24-08036"
                              - text: ","
                              - link "501" [ref=e14417] [cursor=pointer]:
                                - /url: "#B501-sensors-24-08036"
                              - text: ","
                              - link "502" [ref=e14418] [cursor=pointer]:
                                - /url: "#B502-sensors-24-08036"
                              - text: "]. ITU-R P.1817 provides guidelines for the performance and availability of optical free-space links, addressing atmospheric effects and link budgets. These recommendations are critical for ensuring reliable FSO communication across different environments ["
                              - link "503" [ref=e14419] [cursor=pointer]:
                                - /url: "#B503-sensors-24-08036"
                              - text: ","
                              - link "504" [ref=e14420] [cursor=pointer]:
                                - /url: "#B504-sensors-24-08036"
                              - text: "]. The recommendation in ["
                              - link "505" [ref=e14421] [cursor=pointer]:
                                - /url: "#B505-sensors-24-08036"
                              - text: "] provides propagation prediction methods for planning terrestrial FSO systems. It includes methods to estimate attenuation in clear air, fog, and rain and snow precipitation. It also covers scintillation and impairments by sunlight."
                        - generic [ref=e14422]:
                          - heading "6.2.2. Regulatory Issues" [level=4] [ref=e14423]
                          - generic [ref=e14424]: The deployment of FSO communication systems faces several regulatory barriers that must be resolved to guarantee widespread adoption. Key issues include spectrum allocation, compliance with international standards, and the establishment of safety guidelines to prevent interference with other communication systems and ensure eye safety. This section explores these regulatory hurdles, discusses current policies and their implications, and outlines the necessary steps for creating a supportive regulatory framework that can facilitate the efficient and safe deployment of FSO systems.
                          - generic [ref=e14425]:
                            - heading "Spectrum Allocation" [level=5] [ref=e14426]
                            - generic [ref=e14427]: Unlike RF communication, which operates within regulated frequency bands, FSO communication utilizes unlicensed optical spectrum. While this provides a significant advantage in terms of deployment flexibility, it also raises concerns about potential interference and the need for global harmonization. Also, regulatory bodies need to establish guidelines for the use of optical spectrum, ensuring that FSO systems can operate without interference from other optical devices and across national borders.
                          - generic [ref=e14428]:
                            - heading "Safety Regulations" [level=5] [ref=e14429]
                            - generic [ref=e14430]:
                              - text: FSO communication involves high-powered lasers, which can pose safety risks to humans and animals if not properly regulated. The International Electrotechnical Commission (IEC) provides standards such as IEC 60825-1, refs. [
                              - link "3" [ref=e14431] [cursor=pointer]:
                                - /url: "#B3-sensors-24-08036"
                              - text: ","
                              - link "506" [ref=e14432] [cursor=pointer]:
                                - /url: "#B506-sensors-24-08036"
                              - text: "] which outlines safety requirements for laser products. Compliance with laser safety standards is critical for the safe deployment of FSO systems. Regulatory bodies must enforce these standards and conduct regular inspections to prevent accidents and ensure public safety."
                          - generic [ref=e14433]:
                            - heading "Deployment Permits and Zoning Laws" [level=5] [ref=e14434]
                            - generic [ref=e14435]: Installing FSO equipment, especially in urban areas, requires navigating complex zoning laws and obtaining necessary permits. Local regulations can vary significantly, impacting the speed and cost of FSO deployment. Streamlining the permitting process and creating uniform regulations can facilitate faster and more efficient deployment of FSO systems, particularly in densely populated regions.
                          - generic [ref=e14436]:
                            - heading "Cross-Border Coordination" [level=5] [ref=e14437]
                            - generic [ref=e14438]: For international FSO links, especially those connecting different countries, coordination between national regulatory bodies is essential. Issues such as signal interference, spectrum management, and compliance with safety standards must be harmonized to ensure seamless cross-border communication. International cooperation and agreements are necessary to address these challenges, fostering a regulatory environment conducive to global FSO deployment.
                          - generic [ref=e14439]:
                            - heading "Environmental Regulations" [level=5] [ref=e14440]
                            - generic [ref=e14441]: The deployment of FSO systems must also consider environmental regulations, particularly in sensitive areas such as wildlife reserves or historical sites. Ensuring that FSO infrastructure does not negatively impact the environment is a key regulatory concern. Regulatory frameworks should include provisions for environmental impact assessments and the implementation of mitigation measures to protect ecological and cultural heritage.
                            - generic [ref=e14442]: Moreover, to realize the full potential of FSO communication, stakeholders must collaborate to establish comprehensive standards and regulatory frameworks. By addressing these standardization and regulatory challenges, the FSO communication industry can pave the way for widespread adoption, enabling high-speed, secure, and reliable wireless communication on a global scale.
                      - generic [ref=e14443]:
                        - heading "6.3. Open Challenges" [level=3] [ref=e14444]
                        - generic [ref=e14445]: Despite the significant advancements in FSO technology, several open challenges remain that require further research. These include the development of more robust mitigation techniques for AT, the integration of FSO with emerging technologies like Light Fidelity (Li-Fi), and the exploration of new materials and devices for FSO systems. This section identifies the key areas where further future research is needed to fully realize the potential of FSO communication in next-generation networks.
                        - generic [ref=e14446]:
                          - heading "6.3.1. Mitigation Techniques for Atmospheric Turbulence" [level=4] [ref=e14447]
                          - generic [ref=e14448]: AT remains one of the primary obstacles in FSO communication, causing signal degradation and fluctuations in signal strength. Future research should focus on developing advanced AO systems that can dynamically adjust the optical beam in real-time to compensate for turbulence-induced distortions. Also, enhancing error correction techniques to effectively mitigate the impact of turbulence on data integrity is important. Likewise, extensive research on the utilization of ML algorithms to predict atmospheric conditions and adjust FSO parameters proactively to maintain optimal performance is required. Also, investigating hybrid systems that combine FSO with other technologies, such as RF, to provide redundancy and maintain connectivity in turbulent conditions is important to realize the full potential of FSO communication.
                        - generic [ref=e14449]:
                          - heading "6.3.2. Integration with Emerging Technologies" [level=4] [ref=e14450]
                          - generic [ref=e14451]:
                            - text: The integration of FSO communication with emerging technologies like Li-Fi and 5G/6G networks presents exciting opportunities and challenges. This involves exploring the seamless integration of FSO with Li-Fi to enable high-speed, high-capacity indoor and outdoor communication networks. This includes addressing handover issues between indoor Li-Fi and outdoor FSO links [
                            - link "201" [ref=e14452] [cursor=pointer]:
                              - /url: "#B201-sensors-24-08036"
                            - text: "]. Similarly, it entails investigating the role of FSO in supporting ultra-high-speed data rates and low-latency communication in 5G and future 6G networks. This involves the development of protocols and standards for FSO integration with existing and future wireless networks. This will facilitate the development of FSO-based solutions to support the growing demand for high-capacity, low-latency communication in IoT applications and smart city infrastructures ["
                            - link "378" [ref=e14453] [cursor=pointer]:
                              - /url: "#B378-sensors-24-08036"
                            - text: ","
                            - link "493" [ref=e14454] [cursor=pointer]:
                              - /url: "#B493-sensors-24-08036"
                            - text: "]."
                        - generic [ref=e14455]:
                          - heading "6.3.3. New Materials and Devices" [level=4] [ref=e14456]
                          - generic [ref=e14457]:
                            - text: Advancements in materials science and photonic devices are crucial for the evolution of FSO systems. Researching new materials and designs for high-performance photodetectors that offer higher sensitivity, faster response times, and better performance in diverse environmental conditions is essential. Also, developing low-loss optical components, such as lenses, mirrors, and modulators, to improve the efficiency and extend the range of FSO systems is highly imperative, as is investigating the use of quantum dots and other nanomaterials to create novel light sources and detectors that can operate efficiently under varying atmospheric conditions. Another important aspect is creating flexible and wearable FSO devices to expand the application scope of FSO communication in areas like personal area networks and medical devices [
                            - link "446" [ref=e14458] [cursor=pointer]:
                              - /url: "#B446-sensors-24-08036"
