                    - generic [ref=e7978]:
                      - heading "4. Enabling Technologies for FSO Communication" [level=2] [ref=e7979]
                      - generic [ref=e7980]:
                        - text: In the rapidly evolving field of FSO communication, various enabling technologies are pivotal in enhancing system performance and reliability. This section delves into key advancement such as AO, which corrects wavefront distortions; advanced modulation schemes that improve data throughput; and aperture averaging to reduce signal fading. Additionally, spatial diversity and cooperative relaying techniques are explored for their roles in mitigating adverse atmospheric effects. Adaptive transmission methods and robust ECC are also discussed, highlighting their contributions to maintaining signal integrity and optimizing communication efficiency in FSO systems. Methods for mitigating atmospheric turbulence are shown in
                        - link "Figure 8" [ref=e7981] [cursor=pointer]:
                          - /url: "#fig_body_display_sensors-24-08036-f008"
                        - text: .
                      - generic [ref=e7982]:
                        - generic [ref=e7984] [cursor=pointer]:
                          - img "Sensors 24 08036 g008" [ref=e7985]
                          - link [ref=e7986]:
                            - /url: "#fig_body_display_sensors-24-08036-f008"
                        - generic [ref=e7987]: Figure 8. Techniques for mitigating atmospheric turbulence.
                      - generic [ref=e7988]:
                        - heading "4.1. Robust Beam and Multi-Modulation Compatible System Design" [level=3] [ref=e7989]
                        - generic [ref=e7990]: The robust beam and multi-modulation compatible laser design focuses on enhancing optical communication systems by integrating a laser capable of supporting multiple modulation formats. This design improves signal integrity and system flexibility while reducing the complexity and size of the communication hardware. By enabling seamless switching between various modulation techniques, it optimizes performance for diverse communication scenarios, ensuring robust and efficient data transmission.
                        - generic [ref=e7991]:
                          - heading "4.1.1. Robust Beam Design" [level=4] [ref=e7992]
                          - generic [ref=e7993]:
                            - text: The propagation of laser beams through the atmosphere has been extensively studied both theoretically and experimentally. Recently, significant attention has been focused on laser beams with phase singularities moving through ideal atmospheric turbulence and non-Kolmogorov turbulence. Research indicates that partially coherent vortex beams are less impacted by atmospheric turbulence compared to partially coherent non-vortex beams, and that the topological charge of these beams can serve as an information carrier in optical communications [
                            - link "102" [ref=e7994] [cursor=pointer]:
                              - /url: "#B102-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e7995]:
                            - text: To mitigate the disturbances caused by turbulence, extensive research has focused on the effects of non-diffracting and pseudo-non-diffracting vortex beams in resisting turbulent disturbances. The findings indicate that these beams’ favorable characteristics can significantly reduce the impact of turbulence on the transmission of OAM modes [
                            - link "103" [ref=e7996] [cursor=pointer]:
                              - /url: "#B103-sensors-24-08036"
                            - text: ","
                            - link "104" [ref=e7997] [cursor=pointer]:
                              - /url: "#B104-sensors-24-08036"
                            - text: ","
                            - link "105" [ref=e7998] [cursor=pointer]:
                              - /url: "#B105-sensors-24-08036"
                            - text: ","
                            - link "106" [ref=e7999] [cursor=pointer]:
                              - /url: "#B106-sensors-24-08036"
                            - text: "]. Specifically, experimentalists are seeking laser beams that are either non-diffracting or possess a definite value of photon OAM along the propagation direction. These specialized laser beams have proven useful in various applications, including optical tweezers, optical trapping, laser radar, metrology, remote sensing, microlithography, image processing, astronomical imaging, medical imaging and surgery, as well as wireless, optical, and FSO communications ["
                            - link "107" [ref=e8000] [cursor=pointer]:
                              - /url: "#B107-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e8001]:
                            - text: In OAM-based underwater optical wireless communication (OWC), the OAM mode is influenced by the wavefront spatial structure of the carrier. As a result, absorption, ocean turbulence, and scattering inevitably distort the OAM mode and cause crosstalk between its energy states. To mitigate the perturbations caused by seawater turbulence, employing various beam structures has become a new trend in this field. These structures include the Gaussian Schell-model (GSM) vortex beam [
                            - link "102" [ref=e8002] [cursor=pointer]:
                              - /url: "#B102-sensors-24-08036"
                            - text: "], random frozen photons (RFP) beam ["
                            - link "108" [ref=e8003] [cursor=pointer]:
                              - /url: "#B108-sensors-24-08036"
                            - text: "], Hermite–Gauss (HG) vortex beam ["
                            - link "109" [ref=e8004] [cursor=pointer]:
                              - /url: "#B109-sensors-24-08036"
                            - text: "], perfect Laguerre–Gauss (PLG) beam ["
                            - link "110" [ref=e8005] [cursor=pointer]:
                              - /url: "#B110-sensors-24-08036"
                            - text: "], and several quasi-non-diffractive beams such as the Bessel–Gauss (BG) vortex beam ["
                            - link "111" [ref=e8006] [cursor=pointer]:
                              - /url: "#B111-sensors-24-08036"
                            - text: ","
                            - link "112" [ref=e8007] [cursor=pointer]:
                              - /url: "#B112-sensors-24-08036"
                            - text: "], Lommel–Gauss (LMG) beam ["
                            - link "113" [ref=e8008] [cursor=pointer]:
                              - /url: "#B113-sensors-24-08036"
                            - text: "], Airy circle (AiC) vortex beams, Airy ellipse (AiE) vortex beams ["
                            - link "114" [ref=e8009] [cursor=pointer]:
                              - /url: "#B114-sensors-24-08036"
                            - text: ","
                            - link "115" [ref=e8010] [cursor=pointer]:
                              - /url: "#B115-sensors-24-08036"
                            - text: ","
                            - link "116" [ref=e8011] [cursor=pointer]:
                              - /url: "#B116-sensors-24-08036"
                            - text: "], and Hypergeometric-Gaussian (HyGG) vortex beam ["
                            - link "103" [ref=e8012] [cursor=pointer]:
                              - /url: "#B103-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e8013]:
                            - text: "Meanwhile, most previous studies on OAM-based systems have concentrated on Laguerre–Gaussian (LG) beams in turbulent atmospheres. In contrast, non-diffraction BG beams exhibit clear advantages over traditional LG beams in reducing turbulence effects and enhancing the performance of OAM-based FSO communication links in such conditions. These benefits arise from two notable characteristics of BG beams: their ability to propagate without altering their intensity profile (non-diffraction nature), and their exceptional capacity to reconstruct after encountering an obstacle (self-healing mechanism) ["
                            - link "111" [ref=e8014] [cursor=pointer]:
                              - /url: "#B111-sensors-24-08036"
                            - text: ","
                            - link "117" [ref=e8015] [cursor=pointer]:
                              - /url: "#B117-sensors-24-08036"
                            - text: "]. The BG beam is essentially a Bessel beam (BB) truncated by a Gaussian profile, exhibiting nearly diffraction-free properties up to a specific distance known as the non-diffractive range (NDR). The primary advantage of BG beams over BBs is that the radial modulation tapers the aperture fields, thereby reducing the on-axis ripples caused by edge diffraction ["
                            - link "118" [ref=e8016] [cursor=pointer]:
                              - /url: "#B118-sensors-24-08036"
                            - text: "]. These characteristics are crucial for optical communications based on LoS operations. Consequently, for OAM-based FSO communication systems, the non-diffraction and self-recovery properties of BG beams make them highly valuable. The transmission characteristics of BG beams in free-space have been explored, and their non-obstruction properties in FSO communication systems are examined in ["
                            - link "117" [ref=e8017] [cursor=pointer]:
                              - /url: "#B117-sensors-24-08036"
                            - text: ","
                            - link "119" [ref=e8018] [cursor=pointer]:
                              - /url: "#B119-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e8019]:
                            - text: Moreover, structured light beams, particularly pin beams (PBs), exhibit reduced scintillations in free space compared to Gaussian beams. A novel class of optical beams has been introduced, characterized by a main lobe with a Bessel-like transverse profile and a width that gradually increases during propagation. These are termed inverted pin beams (IPBs). Numerical simulations demonstrate that IPBs have a significantly lower scintillation index than other beam classes such as PBs, BBs, collimated Gaussian beams (CGBs), and focused Gaussian beams (FGBs) in atmospheric turbulence regimes [
                            - link "120" [ref=e8020] [cursor=pointer]:
                              - /url: "#B120-sensors-24-08036"
                            - text: ","
                            - link "121" [ref=e8021] [cursor=pointer]:
                              - /url: "#B121-sensors-24-08036"
                            - text: "]. Also, IPBs carrying OAM can further mitigate intensity scintillations under moderate to strong irradiance fluctuation conditions ["
                            - link "122" [ref=e8022] [cursor=pointer]:
                              - /url: "#B122-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e8023]:
                            - text: As a member of the pseudo-non-diffracting OAM-carrying beam family, HyGG vortex beams exhibit self-reconstruction and abrupt autofocusing properties. Notably, HyGG vortex beams can be converted into Gaussian mode, modified BG (MBG) mode, modified exponential Gauss (MEG) mode, and modified LG (MLG) mode by setting specific parameters of the beam source. Due to these characteristics, HyGG beams hold significant potential for use in OWC [
                            - link "103" [ref=e8024] [cursor=pointer]:
                              - /url: "#B103-sensors-24-08036"
                            - text: ","
                            - link "104" [ref=e8025] [cursor=pointer]:
                              - /url: "#B104-sensors-24-08036"
                            - text: ","
                            - link "105" [ref=e8026] [cursor=pointer]:
                              - /url: "#B105-sensors-24-08036"
                            - text: ","
                            - link "106" [ref=e8027] [cursor=pointer]:
                              - /url: "#B106-sensors-24-08036"
                            - text: ","
                            - link "123" [ref=e8028] [cursor=pointer]:
                              - /url: "#B123-sensors-24-08036"
                            - text: "]."
                        - generic [ref=e8029]:
                          - heading "4.1.2. Multi-Modulation Compatible Miniaturization System" [level=4] [ref=e8030]
                          - generic [ref=e8031]:
                            - text: Free-space optical (FSO) communication has been extensively used to establish satellite-to-earth, inter-satellite, and deep-space links for purposes such as environmental monitoring, information transmission, and celestial exploration [
                            - link "124" [ref=e8032] [cursor=pointer]:
                              - /url: "#B124-sensors-24-08036"
                            - text: "]. The electro-optical conversion in FSO links typically relies on various modulation techniques, including intensity modulation (IM) and phase modulation (PM). IM is widely utilized due to its simple architecture and ease of operation ["
                            - link "125" [ref=e8033] [cursor=pointer]:
                              - /url: "#B125-sensors-24-08036"
                            - text: ","
                            - link "126" [ref=e8034] [cursor=pointer]:
                              - /url: "#B126-sensors-24-08036"
                            - text: "]. In contrast, PM is considered a more suitable solution for long-haul links, offering higher data rates and improved receiving sensitivity ["
                            - link "127" [ref=e8035] [cursor=pointer]:
                              - /url: "#B127-sensors-24-08036"
                            - text: ","
                            - link "128" [ref=e8036] [cursor=pointer]:
                              - /url: "#B128-sensors-24-08036"
                            - text: "]. Therefore, achieving compatibility between IM and PM within the same communication system is of practical significance."
                          - generic [ref=e8037]:
                            - text: Traditional IM and PM both rely on the Mach–Zehnder modulator (MZM) and its associated supporting devices [
                            - link "129" [ref=e8038] [cursor=pointer]:
                              - /url: "#B129-sensors-24-08036"
                            - text: ","
                            - link "130" [ref=e8039] [cursor=pointer]:
                              - /url: "#B130-sensors-24-08036"
                            - text: "]. As a result, an IM/PM-compatible system requires two independent sets of modulation modules along with numerous auxiliary devices, significantly increasing system complexity. However, the limited resources on satellites impose strict conditions on the size, weight, and power (SWaP) of laser communication terminals in practical applications. Therefore, solutions that enhance compatibility and allow for seamless IM/PM switching while maintaining optimal SWaP are highly desirable."
                          - generic [ref=e8040]: Multi-modulation-format compatible laser communication refers to a laser communication system designed to support and efficiently manage multiple modulation formats. This capability allows for seamless communication between different devices. Such a system can dynamically switch between or simultaneously support various modulation formats to optimize performance based on changing conditions, including channel conditions, data rate requirements, power efficiency, and compatibility with various systems and standards. By being adaptable to multiple modulation formats, a laser communication system enhances its flexibility, efficiency, and reliability across diverse applications and environments.
                          - generic [ref=e8041]:
                            - text: Since the intensity or phase change of an optical signal can be controlled by the input electrical level of a chirp-managed laser (CML) [
                            - link "131" [ref=e8042] [cursor=pointer]:
                              - /url: "#B131-sensors-24-08036"
                            - text: ","
                            - link "132" [ref=e8043] [cursor=pointer]:
                              - /url: "#B132-sensors-24-08036"
                            - text: "], the CML has emerged as a convenient solution for achieving IM/PM compatibility. This CML-based modulation technique eliminates the need for traditional Mach–Zehnder modulators (MZMs) and their supporting devices, thus reducing the size, weight, and power (SWaP) requirements and aiding in the miniaturization of optical communication terminals. In ["
                            - link "133" [ref=e8044] [cursor=pointer]:
                              - /url: "#B133-sensors-24-08036"
                            - text: "], a CML-based IM/PM compatible transmitter is designed, demonstrating the ability to switch seamlessly between On–Off Keying (OOK) and return-to-zero differential phase-shift keying (RZ-DPSK) using a single set of devices."
                      - generic [ref=e8045]:
                        - heading "4.2. Mode Diversity Reception" [level=3] [ref=e8046]
                        - generic [ref=e8047]:
                          - text: Using lasers as information carriers, FSO communication with fiber-based optical receivers presents an excellent solution for achieving high data rates, ultra-wide bandwidth, and low power consumption [
                          - link "134" [ref=e8048] [cursor=pointer]:
                            - /url: "#B134-sensors-24-08036"
                          - text: "]. However, atmospheric turbulence during free-space propagation induces refractive index disturbances. This results in laser signals experiencing beam spread, beam drift, intensity scintillation, and angle-of-arrival fluctuations. These effects reduce the coupling efficiency of the spatial optical beam to the fiber, leading to significant power fading and scintillation, which consequently degrades the performance of practical laser transmission systems ["
                          - link "135" [ref=e8049] [cursor=pointer]:
                            - /url: "#B135-sensors-24-08036"
                          - text: ","
                          - link "136" [ref=e8050] [cursor=pointer]:
                            - /url: "#B136-sensors-24-08036"
                          - text: "]."
                        - generic [ref=e8051]:
                          - text: Several methods have been investigated to mitigate the effects of atmospheric turbulence and enhance the performance of high-speed FSO communication systems. One of the most commonly used and effective technologies is the AO system, which improves the coupling efficiency of free-space light into a single-mode fiber (SMF) by correcting wavefront aberrations within the aperture [
                          - link "137" [ref=e8052] [cursor=pointer]:
                            - /url: "#B137-sensors-24-08036"
                          - text: ","
                          - link "138" [ref=e8053] [cursor=pointer]:
                            - /url: "#B138-sensors-24-08036"
                          - text: "]. However, AO FSO systems still face challenges in terms of reliability under strong turbulence. Due to the limited spatial resolution and response time of the optics, AO does not achieve perfect wavefront correction in these conditions ["
                          - link "139" [ref=e8054] [cursor=pointer]:
                            - /url: "#B139-sensors-24-08036"
                          - text: "]. Additionally, high-speed FSO communication with bandwidths on the order of GHz demands higher accuracy and faster response times from AO systems, which can result in slight deficiencies in communication system reliability under strong turbulence ["
                          - link "140" [ref=e8055] [cursor=pointer]:
                            - /url: "#B140-sensors-24-08036"
                          - text: "]."
                        - generic [ref=e8056]:
                          - text: Modes diversity offers a method to counteract wavefront distortion within the aperture, thereby enhancing the performance of FSO communication systems under atmospheric turbulence [
                          - link "139" [ref=e8057] [cursor=pointer]:
                            - /url: "#B139-sensors-24-08036"
                          - text: "]. To this end, mode diversity reception (MDR) has been proposed and examined as an effective strategy for improving the reception performance of high-speed FSO communication systems. This approach involves receiving optical signals using few-mode fibers (FMFs) or multimode fibers (MMFs) that support multiple orthogonal modes ["
                          - link "140" [ref=e8058] [cursor=pointer]:
                            - /url: "#B140-sensors-24-08036"
                          - text: ","
                          - link "141" [ref=e8059] [cursor=pointer]:
                            - /url: "#B141-sensors-24-08036"
                          - text: ","
                          - link "142" [ref=e8060] [cursor=pointer]:
                            - /url: "#B142-sensors-24-08036"
                          - text: "]. Furthermore, the distorted wavefront caused by atmospheric turbulence can be considered a combination of a fundamental mode and multiple high-order modes. MDR captures as many high-order mode optical signals as possible. Using mode demultiplexers, the turbulent light is effectively split into an array of SMFs. Different methods are then used to combine the outputs from the single-mode ends of the demultiplexers to enhance signal quality. The probability of all copies, which carry the same information in the SMF array, simultaneous experiencing deep fading is low. Thus, mode diversity technology effectively improves the quality of the received signal and can be applied to satellite-to-ground optical communication systems ["
                          - link "143" [ref=e8061] [cursor=pointer]:
                            - /url: "#B143-sensors-24-08036"
                          - text: "]."
                        - generic [ref=e8062]:
                          - text: "The atmospheric turbulence compensation scheme using MDR involves two key technologies: mode reception and signal combination. In fiber-based MDR systems, mode demultiplexers are essential for decomposing spatial light affected by turbulence into SMFs. The two common types of mode demultiplexers used in these systems are multi-plane light converters (MPLCs) and photonic lanterns (PLs). Additionally, there are three primary methods for combining multichannel signals: equal gain combining (EGC), selection combining (SC), and maximum ratio combining (MRC) ["
                          - link "140" [ref=e8063] [cursor=pointer]:
                            - /url: "#B140-sensors-24-08036"
                          - text: ","
                          - link "141" [ref=e8064] [cursor=pointer]:
                            - /url: "#B141-sensors-24-08036"
                          - text: ","
                          - link "142" [ref=e8065] [cursor=pointer]:
                            - /url: "#B142-sensors-24-08036"
                          - text: ","
                          - link "144" [ref=e8066] [cursor=pointer]:
                            - /url: "#B144-sensors-24-08036"
                          - text: "]. For different FSO communication scenarios, numerous studies have explored MDR using various mode demultiplexers and combining technologies to enhance system performance. For instance, ref. ["
                          - link "145" [ref=e8067] [cursor=pointer]:
                            - /url: "#B145-sensors-24-08036"
                          - text: "] proposes and verifies two simplified MDM schemes for FSO communication systems under moderate-to-strong turbulence conditions. These MDM schemes are designed and implemented for coherent detection in FSO communication systems using FMF coupling. The first scheme replaces the coherent receiver with a KK receiver (field reconstruction), significantly reducing the number of photodetectors and high-speed analog-to-digital converters by 75%. The second scheme achieves few-mode KK detection by employing a few-mode local oscillator and a single PD, thereby simplifying the MDM system to an extreme level. Experimental results indicate that an FSO communication system utilizing six-mode fiber demonstrates an average received power gain of approximately 6 dB over a system based on SMF under moderate-to-strong turbulence conditions. The two proposed MDRs exhibit similar performance, with an improvement of 5 dB to 6 dB compared to SMF-based heterodyne detection in the same turbulence conditions. Moreover, the simplified receiver schemes reduce both the volume and cost of the optical receiver, offering practical benefits for FSO communication systems."
                      - generic [ref=e8068]:
                        - heading "4.3. Modulation Schemes" [level=3] [ref=e8069]
                        - generic [ref=e8070]:
                          - text: Modulation schemes are fundamental to the robustness and efficiency of FSO communication systems. The choice of modulation technique directly impacts the data rate, power efficiency, and resilience of the communication link, particularly under varying atmospheric conditions. For instance, conventional modulation techniques such as OOK and Pulse-Position Modulation (PPM) are commonly used, but they often suffer from performance degradation under adverse atmospheric conditions. Also, advanced modulation schemes like QAM and Orthogonal Frequency-Division Multiplexing (OFDM) can be employed to improve data rates and resilience in FSO systems. In addition, the emerging optical spatial modulation (OSM) technique can address the previously mentioned problems associated with conventional modulation schemes and Multiple-Input Multiple-Output (MIMO) setups. This section delves into both conventional and advanced modulation schemes, examining their characteristics, advantages, and limitations in the context of FSO communication. A summary of the literature on various modulation formats and their associated metrics for FSO is presented in
                          - link "Table 3" [ref=e8071] [cursor=pointer]:
                            - /url: "#table_body_display_sensors-24-08036-t003"
                          - text: .
                        - generic [ref=e8072]:
                          - generic [ref=e8073]: Table 3. Literature summary on modulation formats and associated metrics for FSO.
                          - generic [ref=e8075] [cursor=pointer]:
                            - img [ref=e8076]
                            - link [ref=e8077]:
                              - /url: "#table_body_display_sensors-24-08036-t003"
                        - generic [ref=e8078]:
                          - heading "4.3.1. Traditional Modulation Techniques" [level=4] [ref=e8079]
                          - generic [ref=e8080]:
                            - text: The performance impairments caused by scintillation can be alleviated through various methods, including enhanced error control coding [
                            - link "10" [ref=e8081] [cursor=pointer]:
                              - /url: "#B10-sensors-24-08036"
                            - text: ","
                            - link "165" [ref=e8082] [cursor=pointer]:
                              - /url: "#B165-sensors-24-08036"
                            - text: "], advanced modulation schemes ["
                            - link "166" [ref=e8083] [cursor=pointer]:
                              - /url: "#B166-sensors-24-08036"
                            - text: "], and diversity techniques ["
                            - link "10" [ref=e8084] [cursor=pointer]:
                              - /url: "#B10-sensors-24-08036"
                            - text: ","
                            - link "167" [ref=e8085] [cursor=pointer]:
                              - /url: "#B167-sensors-24-08036"
                            - text: ","
                            - link "168" [ref=e8086] [cursor=pointer]:
                              - /url: "#B168-sensors-24-08036"
                            - text: "]. In modulation schemes, the three main optical signal parameters that can be adjusted to achieve high data transmission rates are phase, polarization, and intensity ["
                            - link "169" [ref=e8087] [cursor=pointer]:
                              - /url: "#B169-sensors-24-08036"
                            - text: "]. Choosing the appropriate modulation scheme is crucial for mitigating scintillation in FSO communications. Various FSO modulation techniques, such as PSK, OOK, PAM, and Frequency Shift Keying (FSK), have been extensively studied and analyzed over the years ["
                            - link "93" [ref=e8088] [cursor=pointer]:
                              - /url: "#B93-sensors-24-08036"
                            - text: ","
                            - link "147" [ref=e8089] [cursor=pointer]:
                              - /url: "#B147-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e8090]:
                            - text: Traditionally, OOK using IM/DD is the most commonly used modulation scheme due to its simplicity in design and implementation, as well as its cost effectiveness [
                            - link "170" [ref=e8091] [cursor=pointer]:
                              - /url: "#B170-sensors-24-08036"
                            - text: "]. However, OOK-based FSO systems are suboptimal in AT channels and provide a lower SE compared to PAM ["
                            - link "171" [ref=e8092] [cursor=pointer]:
                              - /url: "#B171-sensors-24-08036"
                            - text: "]. The high SE of the PAM scheme comes with a trade-off of considerable performance degradation, as higher-order PAM is highly sensitive to Rx noise and AT ["
                            - link "147" [ref=e8093] [cursor=pointer]:
                              - /url: "#B147-sensors-24-08036"
                            - text: "]. Consequently, PPM has been extensively employed in FSO systems, despite its poor bandwidth efficiency and requirement for symbol synchronization between transceivers, adding significant complexity to the system ["
                            - link "146" [ref=e8094] [cursor=pointer]:
                              - /url: "#B146-sensors-24-08036"
                            - text: "]. Phase modulation schemes, including standard and differential PSK (DPSK), are prone to phase noise ["
                            - link "172" [ref=e8095] [cursor=pointer]:
                              - /url: "#B172-sensors-24-08036"
                            - text: "]. For instance, DPSK is frequently employed but experiences fluctuations in the phase of the encoded signal as a result of scintillation. Differential Quadrature PSK (DQPSK) offers double the SE of binary modulations like DPSK and OOK, as it transmits two bits per symbol with four potential optical phase fluctuations in successive symbol periods ["
                            - link "169" [ref=e8096] [cursor=pointer]:
                              - /url: "#B169-sensors-24-08036"
                            - text: "]. Further advancements have utilized coherent digital modulation schemes such as QAM. While coherent modulations have shown improved data rates, their power efficiency limitations and complexity become more significant at higher data rates ["
                            - link "158" [ref=e8097] [cursor=pointer]:
                              - /url: "#B158-sensors-24-08036"
                            - text: "]."
                        - generic [ref=e8098]:
                          - heading "4.3.2. Advanced Modulation Techniques" [level=4] [ref=e8099]
                          - generic [ref=e8100]:
                            - text: Spectrally efficient QAM is widely used and preferred for various applications because it modulates both amplitude and phase. In fact, QAM encompasses a family of modulation techniques with different constellation types, each corresponding to distinct arrangements of the signal points [
                            - link "173" [ref=e8101] [cursor=pointer]:
                              - /url: "#B173-sensors-24-08036"
                            - text: "]. So, for spectrally efficient high-data rate transmission, higher-order modulation techniques like the QAM family—which includes rectangular QAM (RQAM), squared QAM (SQAM), hexagonal QAM (HQAM), and cross QAM (XQAM)—are gaining increased attention in wireless communication systems due to their high power and bandwidth efficiency. In SQAM, constellation points are positioned at the vertices of a square lattice, suitable only for constellations with even powers of 2. To better adapt to varying channel conditions and improve spectral efficiency, incorporating constellations with odd powers of 2 offers greater flexibility ["
                            - link "174" [ref=e8102] [cursor=pointer]:
                              - /url: "#B174-sensors-24-08036"
                            - text: ","
                            - link "175" [ref=e8103] [cursor=pointer]:
                              - /url: "#B175-sensors-24-08036"
                            - text: ","
                            - link "176" [ref=e8104] [cursor=pointer]:
                              - /url: "#B176-sensors-24-08036"
                            - text: "]. RQAM is typically preferred for these odd-power constellations, as it is a versatile modulation scheme, encompassing orthogonal binary FSK (OBFSK), QPSK, multilevel Amplitude Shift Keying (ASK), and SQAM as special cases. However, RQAM is not ideal for odd-power constellations; instead, a modified XQAM constellation is favored for its reduced peak-to-average-power ratio (PAPR) and enhanced power efficiency. XQAM constellations are formed by removing the outer corner points of RQAM constellations and arranging them in a cross shape, minimizing the average power of the constellation ["
                            - link "174" [ref=e8105] [cursor=pointer]:
                              - /url: "#B174-sensors-24-08036"
                            - text: ","
                            - link "177" [ref=e8106] [cursor=pointer]:
                              - /url: "#B177-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e8107]:
                            - text: Furthermore, the growing demand for high-data rates has led to the development of an optimal two-dimensional (2D) hexagonal-shaped constellation known as HQAM. HQAM features the densest 2D packing for a given optimal Euclidean distance between constellation points, resulting in improved power efficiency with lower peak and average powers as the constellation size (M) increases. Consequently, HQAM offers better BER/SER performance compared to other QAM schemes [
                            - link "174" [ref=e8108] [cursor=pointer]:
                              - /url: "#B174-sensors-24-08036"
                            - text: ","
                            - link "175" [ref=e8109] [cursor=pointer]:
                              - /url: "#B175-sensors-24-08036"
                            - text: ","
                            - link "177" [ref=e8110] [cursor=pointer]:
                              - /url: "#B177-sensors-24-08036"
                            - text: "]. Depending on the trade-off between detection complexity and power efficiency, HQAM constellations are classified as regular and irregular HQAM structures. While regular HQAM has simpler detection, its power efficiency and BER performance can be further enhanced for larger M values. Irregular HQAM provides superior power efficiency and optimal performance, though it comes with increased detection complexity ["
                            - link "174" [ref=e8111] [cursor=pointer]:
                              - /url: "#B174-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e8112]: Additionally, carrier recovery and automatic gain control (AGC) are necessary when using SQAM with differential coding, but these are challenging to implement in practice. Carrier recovery faces significant issues, including false locks. To eliminate the need for AGC and address the false lock problem, the star QAM constellation is introduced. Star QAM, a special case of circular amplitude PSK (APSK), outperforms SQAM in peak power-limited systems. It features multiple concentric PSK circles with equal constellation points and identical phase angles. The amplitude and phase of the constellation points are mutually independent, allowing for successful differential detection rather than coherent detection, thus removing the need for precise phase tracking and channel estimation at the Rx. Due to these advantageous characteristics, star QAM has been adopted in various satellite communication standards.
                          - generic [ref=e8113]:
                            - text: Conversely, the state of polarization is significantly less affected by turbulence-induced fading compared to phase and amplitude. Consequently, POLSK presents a viable alternative to optical intensity and phase modulation methods, owing to its resistance to phase noise and efficiency for long-distance operation [
                            - link "172" [ref=e8114] [cursor=pointer]:
                              - /url: "#B172-sensors-24-08036"
                            - text: "]. Based on this advantage, a non-coherent binary POLSK (BPOLSK) technique has been proposed, utilizing the state of polarization of a fully polarized beam with two orthogonal channels as the information-bearing parameter ["
                            - link "167" [ref=e8115] [cursor=pointer]:
                              - /url: "#B167-sensors-24-08036"
                            - text: ","
                            - link "178" [ref=e8116] [cursor=pointer]:
                              - /url: "#B178-sensors-24-08036"
                            - text: "]. In this context, POLSK-based schemes have been demonstrated to offer 3 dB better sensitivity than OOK. However, the effectiveness of POLSK in standard fibers is limited due to fiber birefringence. The polarization state changes unpredictably, making it difficult to track at the Rx. Conversely, POLSK does not encounter these issues in FSO communication systems. Theoretically, AT causes minimal depolarization, and there is negligible crosstalk between orthogonal polarization states during transmission. The polarization state of an optical wave is well preserved over distances of several kilometers, allowing reliable detection at the Rx ["
                            - link "179" [ref=e8117] [cursor=pointer]:
                              - /url: "#B179-sensors-24-08036"
                            - text: "]. Therefore, since turbulence only causes intensity distortion, while the polarization state remains stable in FSO channels ["
                            - link "160" [ref=e8118] [cursor=pointer]:
                              - /url: "#B160-sensors-24-08036"
                            - text: ","
                            - link "179" [ref=e8119] [cursor=pointer]:
                              - /url: "#B179-sensors-24-08036"
                            - text: "], the use of polarization modulation (PolM) is both feasible and attractive for enhancing system performance and reducing turbulence-induced fading in FSO systems ["
                            - link "167" [ref=e8120] [cursor=pointer]:
                              - /url: "#B167-sensors-24-08036"
                            - text: "]. Additionally, subtracting the two signals reduces common mode noise. PolM-DD FSO communication systems for OOK signals have been extensively studied and shown to achieve an approximate 3 dB sensitivity gain compared to IM ["
                            - link "155" [ref=e8121] [cursor=pointer]:
                              - /url: "#B155-sensors-24-08036"
                            - text: ","
                            - link "160" [ref=e8122] [cursor=pointer]:
                              - /url: "#B160-sensors-24-08036"
                            - text: ","
                            - link "180" [ref=e8123] [cursor=pointer]:
                              - /url: "#B180-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e8124]:
                            - text: Turbulence-induced scintillation can be significantly mitigated by utilizing redundancy offered by multiple Txs and/or Rxs. Consequently, POLSK is also employed in MIMO FSO systems, as demonstrated in [
                            - link "181" [ref=e8125] [cursor=pointer]:
                              - /url: "#B181-sensors-24-08036"
                            - text: ","
                            - link "182" [ref=e8126] [cursor=pointer]:
                              - /url: "#B182-sensors-24-08036"
                            - text: ","
                            - link "183" [ref=e8127] [cursor=pointer]:
                              - /url: "#B183-sensors-24-08036"
                            - text: "]. These systems typically investigate coherent BPOLSK or coherent multilevel POLSK (MPOLSK). However, the non-coherent BPOLSK system described in ["
                            - link "178" [ref=e8128] [cursor=pointer]:
                              - /url: "#B178-sensors-24-08036"
                            - text: "] has not been taken into account in a MIMO architecture. To address this, an innovative non-coherent MIMO optical modulation technique, termed PPM-BPOLSK, has been introduced. This approach integrates the implementation simplicity and performance benefits of non-coherent BPOLSK with the power efficiency of PPM. It has been shown that the proposed method offers enhanced error performance in AT channels compared to systems that rely solely on BPOLSK or PPM, establishing it as an effective alternative to other IM/DD techniques regarding power efficiency ["
                            - link "167" [ref=e8129] [cursor=pointer]:
                              - /url: "#B167-sensors-24-08036"
                            - text: "]. Also, assuming bandwidth is virtually unlimited, the main design emphasis in FSO systems has been on power efficiency instead of SE ["
                            - link "167" [ref=e8130] [cursor=pointer]:
                              - /url: "#B167-sensors-24-08036"
                            - text: ","
                            - link "184" [ref=e8131] [cursor=pointer]:
                              - /url: "#B184-sensors-24-08036"
                            - text: "]. Consequently, MIMO FSO systems are typically designed using Space–Time Coding (STC) or repetition coding (RC) on the transmission side (see"
                            - link "Section 4.6" [ref=e8132] [cursor=pointer]:
                              - /url: "#sec4dot6-sensors-24-08036"
                            - text: ), along with diversity combining or aperture averaging techniques on the reception side to address scintillation effects. Additionally, utilizing multiple Txs and Rxs helps prevent beam blockage and enables coverage over greater distances [
                            - link "184" [ref=e8133] [cursor=pointer]:
                              - /url: "#B184-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e8134]:
                            - text: OFDM is an extensively utilized method for broadband wireless communications, renowned for its inherent advantages such as enhanced resilience to frequency-selective fading, low cost, efficient implementation, narrow-band interference, and high spectral and power efficiency. As a result, OFDM has been incorporated into various high-speed digital communication standards and is being regarded as a potential solution for future mobile wireless systems [
                            - link "98" [ref=e8135] [cursor=pointer]:
                              - /url: "#B98-sensors-24-08036"
                            - text: ","
                            - link "185" [ref=e8136] [cursor=pointer]:
                              - /url: "#B185-sensors-24-08036"
                            - text: ","
                            - link "186" [ref=e8137] [cursor=pointer]:
                              - /url: "#B186-sensors-24-08036"
                            - text: ","
                            - link "187" [ref=e8138] [cursor=pointer]:
                              - /url: "#B187-sensors-24-08036"
                            - text: "]. Despite its disadvantages, such as sensitivity to phase noise and a high PAPR, OFDM can be optimized to maximize its benefits and mitigate its drawbacks for FSO channels through careful design ["
                            - link "186" [ref=e8139] [cursor=pointer]:
                              - /url: "#B186-sensors-24-08036"
                            - text: ","
                            - link "188" [ref=e8140] [cursor=pointer]:
                              - /url: "#B188-sensors-24-08036"
                            - text: "]. Coherent detection is another promising technique for FSO channels, significantly enhancing Rx sensitivity ["
                            - link "189" [ref=e8141] [cursor=pointer]:
                              - /url: "#B189-sensors-24-08036"
                            - text: "]. Therefore, combining OFDM with coherent detection presents considerable potential for future FSO communication systems ["
                            - link "186" [ref=e8142] [cursor=pointer]:
                              - /url: "#B186-sensors-24-08036"
                            - text: ","
                            - link "188" [ref=e8143] [cursor=pointer]:
                              - /url: "#B188-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e8144]:
                            - text: OFDM is a type of multicarrier transmission where high data rate streams are divided into lower rate streams and transmitted simultaneously over multiple narrow-band subcarriers. These subcarriers are modulated using PSK or QAM and are carried on a high-frequency carrier [
                            - link "98" [ref=e8145] [cursor=pointer]:
                              - /url: "#B98-sensors-24-08036"
                            - text: ","
                            - link "186" [ref=e8146] [cursor=pointer]:
                              - /url: "#B186-sensors-24-08036"
                            - text: ","
                            - link "187" [ref=e8147] [cursor=pointer]:
                              - /url: "#B187-sensors-24-08036"
                            - text: "]. For example, in OFDM-based coherent FSO systems using multilevel PSK (MPSK) or M-ary (multilevel) QAM (M-QAM), it is necessary to employ additional pilot tones or training sequences for channel estimation and equalization. This is to counteract the amplitude and phase variations resulting from turbulence in the channel and laser phase noise. Consequently, this increases system complexity and reduces SE. Conversely, multilevel DPSK (MDPSK) shows great potential for OFDM-based coherent FSO systems due to its strong resilience to amplitude fading and phase distortion. MDPSK can mitigate the disadvantages of OFDM’s sensitivity to phase noise and ensure good system performance without the need for equalization ["
                            - link "188" [ref=e8148] [cursor=pointer]:
                              - /url: "#B188-sensors-24-08036"
                            - text: ","
                            - link "190" [ref=e8149] [cursor=pointer]:
                              - /url: "#B190-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e8150]:
                            - text: In OFDM, the spacing between adjacent subcarriers is meticulously chosen so that each subcarrier aligns with the spectral nulls of all the others, allowing them to be packed as closely as possible. This careful arrangement ensures spectral orthogonality, meaning each subcarrier is orthogonal to the others. This orthogonality enables the subcarriers to be separated at the Rx using correlation techniques, thereby eliminating intersymbol interference between channels. The orthogonal carrier set is generated by applying the Inverse Fast Fourier Transform (IFFT) at the Tx and the Fast Fourier Transform (FFT) at the Rx, thus negating the need for equalization.
                            - link "Figure 9" [ref=e8151] [cursor=pointer]:
                              - /url: "#fig_body_display_sensors-24-08036-f009"
                            - text: illustrates the fundamental setup of OFDM signal transmission over an FSO link [
                            - link "98" [ref=e8152] [cursor=pointer]:
                              - /url: "#B98-sensors-24-08036"
                            - text: ","
                            - link "186" [ref=e8153] [cursor=pointer]:
                              - /url: "#B186-sensors-24-08036"
                            - text: ","
                            - link "187" [ref=e8154] [cursor=pointer]:
                              - /url: "#B187-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e8155]:
                            - generic [ref=e8157] [cursor=pointer]:
                              - img "Sensors 24 08036 g009" [ref=e8158]
                              - link [ref=e8159]:
                                - /url: "#fig_body_display_sensors-24-08036-f009"
                            - generic [ref=e8160]: "Figure 9. Basic setup for OFDM signal transmission. C: Collimator, PD: Photodetector, ADC: analog-to-digital converter, DAC: Digital-to-Analog Converter, FFT: Fast Fourier Transform, IFFT: Inverse Fast Fourier Transform, CP: Cyclic Prefix, S/P: Serial-to-Parallel, P/S: Parallel-to-Serial, L: Laser, Tx: Transmitter, Rx: Receiver."
                          - generic [ref=e8161]:
                            - text: The transmission of OFDM through an optical link is a specialized form of multiple-subcarrier modulation (MSM). In this method, multiple independent bit streams are modulated onto subcarriers at different frequencies, combined in the RF domain, and transmitted via high-capacity optical links employing IM/DD. The MSM signal undergoes minimal distortion and does not require equalization at the Rx. Each subcarrier functions as an individual narrow-band signal with a reduced symbol rate [
                            - link "98" [ref=e8162] [cursor=pointer]:
                              - /url: "#B98-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e8163]:
                            - text: The baseband OFDM signal is inherently complex and bipolar, but an IM/DD optical link requires a real and positive RF signal to drive the LD. To create a real OFDM signal, Hermitian symmetry is applied to the input vector of the Tx’s IFFT block. To convert the OFDM signal to unipolar, a DC bias is added (DC-OFDM), making the signal positive. This DC bias must be sufficiently large to avert clipping and distortion in the optical domain. However, the primary drawbacks of IM/DD MSM systems are the inefficiency in average optical power owing to the large DC bias and the distortions caused by the nonlinearities of the LD and optical channel. This issue holds particular significance for IM/DD DC-OFDM systems, where a significant number of subcarriers result in high PAPR [
                            - link "188" [ref=e8164] [cursor=pointer]:
                              - /url: "#B188-sensors-24-08036"
                            - text: "]. Additionally, the LD’s nonlinearity induces interference between subcarriers and broadens the overall signal spectrum. These factors create a complex scenario and impose strict demands on the linearity of optical devices to minimize distortion and ensure satisfactory performance ["
                            - link "98" [ref=e8165] [cursor=pointer]:
                              - /url: "#B98-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e8166]:
                            - text: Furthermore, one way to enhance SE is by using amplitude modulation techniques, such as PAM and QAM, with higher-order constellations [
                            - link "167" [ref=e8167] [cursor=pointer]:
                              - /url: "#B167-sensors-24-08036"
                            - text: ","
                            - link "184" [ref=e8168] [cursor=pointer]:
                              - /url: "#B184-sensors-24-08036"
                            - text: "]. However, these multilevel modulation methods come with increased hardware costs, as higher modulation levels lead to greater PAPR and increased sensitivity to noise and device nonlinearities ["
                            - link "83" [ref=e8169] [cursor=pointer]:
                              - /url: "#B83-sensors-24-08036"
                            - text: "]. High PAPR values can push Txs beyond their linear operating range, making large PAM constellations less desirable ["
                            - link "184" [ref=e8170] [cursor=pointer]:
                              - /url: "#B184-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e8171]:
                            - text: Moreover, systems utilizing subcarrier intensity modulation (SIM) can enhance SE [
                            - link "83" [ref=e8172] [cursor=pointer]:
                              - /url: "#B83-sensors-24-08036"
                            - text: ","
                            - link "167" [ref=e8173] [cursor=pointer]:
                              - /url: "#B167-sensors-24-08036"
                            - text: ","
                            - link "184" [ref=e8174] [cursor=pointer]:
                              - /url: "#B184-sensors-24-08036"
                            - text: ","
                            - link "191" [ref=e8175] [cursor=pointer]:
                              - /url: "#B191-sensors-24-08036"
                            - text: "]. Consequently, the performance of subcarrier binary PSK (BPSK) IM in FSO systems has been thoroughly examined ["
                            - link "92" [ref=e8176] [cursor=pointer]:
                              - /url: "#B92-sensors-24-08036"
                            - text: ","
                            - link "191" [ref=e8177] [cursor=pointer]:
                              - /url: "#B191-sensors-24-08036"
                            - text: ","
                            - link "192" [ref=e8178] [cursor=pointer]:
                              - /url: "#B192-sensors-24-08036"
                            - text: ","
                            - link "193" [ref=e8179] [cursor=pointer]:
                              - /url: "#B193-sensors-24-08036"
                            - text: ","
                            - link "194" [ref=e8180] [cursor=pointer]:
                              - /url: "#B194-sensors-24-08036"
                            - text: ","
                            - link "195" [ref=e8181] [cursor=pointer]:
                              - /url: "#B195-sensors-24-08036"
                            - text: "]. When compared to conventional SIM in FSO communication, BPSK-SIM demonstrates superior BER performance relative to other modulation schemes such as QPSK, MPSK, DPSK, and QAM ["
                            - link "83" [ref=e8182] [cursor=pointer]:
                              - /url: "#B83-sensors-24-08036"
                            - text: ","
                            - link "146" [ref=e8183] [cursor=pointer]:
                              - /url: "#B146-sensors-24-08036"
                            - text: ","
                            - link "192" [ref=e8184] [cursor=pointer]:
                              - /url: "#B192-sensors-24-08036"
                            - text: ","
                            - link "196" [ref=e8185] [cursor=pointer]:
                              - /url: "#B196-sensors-24-08036"
                            - text: "]. To further improve the BER performance of FSO systems utilizing BPSK-SIM, a hybrid modulation scheme called PPM-MSK-SIM, which integrates PPM and MSK SIM, has been proposed ["
                            - link "146" [ref=e8186] [cursor=pointer]:
                              - /url: "#B146-sensors-24-08036"
                            - text: "]. However, the complexities of both the Tx and Rx in SIM systems are considerably higher than those found in pulse-based optical communications. Additionally, SIM systems face the challenge of requiring a time-varying DC bias to restrain the transmitted signal from going negative ["
                            - link "83" [ref=e8187] [cursor=pointer]:
                              - /url: "#B83-sensors-24-08036"
                            - text: ","
                            - link "167" [ref=e8188] [cursor=pointer]:
                              - /url: "#B167-sensors-24-08036"
                            - text: ","
                            - link "184" [ref=e8189] [cursor=pointer]:
                              - /url: "#B184-sensors-24-08036"
                            - text: ","
                            - link "191" [ref=e8190] [cursor=pointer]:
                              - /url: "#B191-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e8191]:
                            - text: MIMO spatial multiplexing (SM) techniques are also taken into account when designing spectrally efficient FSO systems. However, these systems face several challenges, including inter-channel interference (ICI) from simultaneous transmissions, increased complexity in transceiver design to mitigate ICI, high computational complexity, the need for inter-antenna synchronization, and the need for numerous components to implement MIMO transceivers [
                            - link "152" [ref=e8192] [cursor=pointer]:
                              - /url: "#B152-sensors-24-08036"
                            - text: ","
                            - link "167" [ref=e8193] [cursor=pointer]:
                              - /url: "#B167-sensors-24-08036"
                            - text: ","
                            - link "184" [ref=e8194] [cursor=pointer]:
                              - /url: "#B184-sensors-24-08036"
                            - text: "]. SM, initially developed for antenna-based systems, marked a shift towards free inter-antenna synchronization (IAS) ["
                            - link "197" [ref=e8195] [cursor=pointer]:
                              - /url: "#B197-sensors-24-08036"
                            - text: ","
                            - link "198" [ref=e8196] [cursor=pointer]:
                              - /url: "#B198-sensors-24-08036"
                            - text: "]. In this approach, only one antenna is activated during each time slot, keeping the other transmission antennas inactive. This means SM requires just a single RF chain, making it a more cost-effective and less complex MIMO transmission structure that is resilient to IAS and ICI ["
                            - link "158" [ref=e8197] [cursor=pointer]:
                              - /url: "#B158-sensors-24-08036"
                            - text: "]."
                        - generic [ref=e8198]:
                          - heading "4.3.3. Advanced Optical Spatial Modulation Techniques" [level=4] [ref=e8199]
                          - generic [ref=e8200]: In light-based communication systems, LEDs have a relatively low modulation bandwidth, which greatly restricts their transmission rates. Additionally, conventional SISO techniques do not provide spatial diversity gains. To tackle these challenges, MIMO technology, similar to its use in RF communication, has been integrated into various OWC systems. A MIMO setup using SM can also enhance SE. However, as previously mentioned, the development of multiple antenna transmission schemes encounters several challenges.
                          - generic [ref=e8201]:
                            - text: The challenges associated with conventional modulation schemes and MIMO setups can be addressed by a novel technique known as OSM, where only a single transmit aperture (LED/laser) is active at any moment [
                            - link "158" [ref=e8202] [cursor=pointer]:
                              - /url: "#B158-sensors-24-08036"
                            - text: ","
                            - link "199" [ref=e8203] [cursor=pointer]:
                              - /url: "#B199-sensors-24-08036"
                            - text: ","
                            - link "200" [ref=e8204] [cursor=pointer]:
                              - /url: "#B200-sensors-24-08036"
                            - text: "]. In these configurations, light sources replace antennas, and optical chains substitute for RF chains. During transmission, information is transmitted through both the signal and antenna spaces simultaneously. Specifically, a portion of the incoming bits is utilized to select a LED/laser, while the remaining bits choose the symbols to be transmitted from the selected LED/laser. By incorporating the LED/laser index as part of the symbol, additional bits can be transmitted, enhancing the system’s SE without resorting to higher-order PAM or PPM. A particular case of OSM is optical space shift keying (OSSK), where transmit aperture indices alone are used to transfer information, simplifying the system compared to OSM. Since only one laser is active during each signaling period, issues related to ICI and antenna synchronization are completely avoided in OSM/OSSK, thereby reducing the design complexity of MIMO transceiver chains ["
                            - link "152" [ref=e8205] [cursor=pointer]:
                              - /url: "#B152-sensors-24-08036"
                            - text: ","
                            - link "167" [ref=e8206] [cursor=pointer]:
                              - /url: "#B167-sensors-24-08036"
                            - text: ","
                            - link "184" [ref=e8207] [cursor=pointer]:
                              - /url: "#B184-sensors-24-08036"
                            - text: "]. These inherent advantages make OSM/OSSK an ideal modulation technique for light-based communication systems such as underwater OWC (UOWC), visible-light communication (VLC), and FSO communication ["
                            - link "201" [ref=e8208] [cursor=pointer]:
                              - /url: "#B201-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e8209]:
                            - text: Furthermore, in OSM, the constellation size dictates the number of bits transmitted per symbol; larger constellation sizes can enhance SE but may also increase Rx complexity. Additionally, research indicates that the error performance of OSM surpasses that of alternative MIMO transmission techniques with equivalent SE, making it a viable option for FSO communication [
                            - link "152" [ref=e8210] [cursor=pointer]:
                              - /url: "#B152-sensors-24-08036"
                            - text: ","
                            - link "167" [ref=e8211] [cursor=pointer]:
                              - /url: "#B167-sensors-24-08036"
                            - text: ","
                            - link "184" [ref=e8212] [cursor=pointer]:
                              - /url: "#B184-sensors-24-08036"
                            - text: "]. OSM can reduce the number of required constellation levels for a given SE without compromising power efficiency and while simplifying Rx complexity in comparison with MIMO SM techniques. This requirement can be minimized even further by incorporating the polarization dimension. Moreover, utilizing polarization alongside the Tx index and symbol dimensions could enable a corresponding MIMO system with half the number of Txs and Rxs, enhancing space efficiency ["
                            - link "167" [ref=e8213] [cursor=pointer]:
                              - /url: "#B167-sensors-24-08036"
                            - text: "]. Consequently, researchers have begun exploring FSO-OSM systems in combination with coherent detection, capitalizing on the seamless integration of their advantages. This exploration has led to significant improvements in both SE and transmission capacity ["
                            - link "158" [ref=e8214] [cursor=pointer]:
                              - /url: "#B158-sensors-24-08036"
                            - text: "]. An innovative coherent MIMO OSM architecture, which integrates the spatial modulation (SM) principle with MPOLSK, termed SM-MPOLSK, has been proposed. By allocating one bit to the additional polarization dimension, this new OSM approach necessitates smaller constellations or fewer transmit apertures than previous methods. Additionally, due to POLSK’s inherent resilience to channel scintillation, this OSM method, which employs the polarization dimension along with multiple transmit/receive apertures, demonstrates enhanced error performance in AT conditions ["
                            - link "167" [ref=e8215] [cursor=pointer]:
                              - /url: "#B167-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e8216]:
                            - text: Researchers have recently created new OSM structures to enhance SE. This innovation enables the use of multiple Txs, leading to increased data rates and a flexible optical chain. This category of OSM is known as an advanced OSM system, which employs multiple light sources simultaneously for data transmission, resulting in higher data rates and more effective utilization of available spectrum bandwidths [
                            - link "158" [ref=e8217] [cursor=pointer]:
                              - /url: "#B158-sensors-24-08036"
                            - text: "]. Advanced techniques for OSM include Optically Enhanced SM (OESM), Optical Generalized SM (OGSM), and Optically Improved Quadrature SM (OIQSM) ["
                            - link "202" [ref=e8218] [cursor=pointer]:
                              - /url: "#B202-sensors-24-08036"
                            - text: ","
                            - link "203" [ref=e8219] [cursor=pointer]:
