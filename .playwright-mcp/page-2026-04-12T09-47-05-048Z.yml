                                  - generic [ref=e11592]: ≥
                                  - generic [ref=e11593]: "1"
                            - text: and at least one of M or N is greater than one. The outputs from the Rxs can be combined in various ways to generate the final observations, which are used to determine whether a 0 bit or a 1 bit is transmitted [
                            - link "91" [ref=e11594] [cursor=pointer]:
                              - /url: "#B91-sensors-24-08036"
                            - text: ","
                            - link "255" [ref=e11595] [cursor=pointer]:
                              - /url: "#B255-sensors-24-08036"
                            - text: "]. In various application scenarios, it is reasonable to assume that the Tx subapertures are spaced apart by more than a coherence length, which is particularly significant for ground-to-space links ["
                            - link "254" [ref=e11596] [cursor=pointer]:
                              - /url: "#B254-sensors-24-08036"
                            - text: ","
                            - link "255" [ref=e11597] [cursor=pointer]:
                              - /url: "#B255-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e11598]:
                            - generic [ref=e11600] [cursor=pointer]:
                              - img "Sensors 24 08036 g011" [ref=e11601]
                              - link [ref=e11602]:
                                - /url: "#fig_body_display_sensors-24-08036-f011"
                            - generic [ref=e11603]: Figure 11. Generic spatial diversity setup.
                          - generic [ref=e11604]:
                            - text: FSO links utilizing transmit and receive diversity can be effectively modeled as equivalent SISO systems by appropriately scaling the channel variance. In essence, spatial diversity leads to a reduction in channel variance. Additionally, the performance degradation resulting from spatial correlation can be significant, highlighting the importance of efficient separation between apertures and precise co-alignment to realize the expected diversity benefits from multiple Txs and Rxs [
                            - link "263" [ref=e11605] [cursor=pointer]:
                              - /url: "#B263-sensors-24-08036"
                            - text: "]. A key observation is that as the degree of diversity—whether spatial, temporal, or frequency—increases, performance improves significantly and rapidly ["
                            - link "47" [ref=e11606] [cursor=pointer]:
                              - /url: "#B47-sensors-24-08036"
                            - text: ","
                            - link "254" [ref=e11607] [cursor=pointer]:
                              - /url: "#B254-sensors-24-08036"
                            - text: "]."
                        - generic [ref=e11608]:
                          - heading "4.6.2. MISO, SIMO, and MIMO Free-Space Optical Systems" [level=4] [ref=e11609]
                          - generic [ref=e11610]: To improve the reliability and performance of FSO communication systems under varying atmospheric conditions, advanced configurations such as Multiple-Input Single-Output (MISO), SIMO, and MIMO are employed. This section delves into these configurations, exploring their architectures, benefits, and the unique challenges they address in the realm of FSO communications. By leveraging multiple Txs and/or Rxs, these systems aim to alleviate the impacts of AT and enhance link robustness and capacity.
                          - generic [ref=e11611]:
                            - heading "Transmit Diversity FSO Systems" [level=5] [ref=e11612]
                            - generic [ref=e11613]:
                              - text: Utilizing optical arrays, akin to antenna-array technology in microwave systems, is viewed as a strategy for addressing the fading effects of FSO channels. In particular, MISO (transmit diversity) FSO systems are based on spatial diversity methods with multiple lasers at the Tx end, all of which are pointed towards a distant photodetector. In these systems, the sources and the detector are positioned such that the Rx can simultaneously observe all Txs [
                              - link "264" [ref=e11614] [cursor=pointer]:
                                - /url: "#B264-sensors-24-08036"
                              - text: "]. Also, this diversity technique has been used to improve PLS in FSO systems ["
                              - link "60" [ref=e11615] [cursor=pointer]:
                                - /url: "#B60-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e11616]:
                              - text: In FSO systems utilizing IM/DD, heuristic STC designs, including RC and orthogonal space–time block codes (OSTBCs), have been suggested as simple alternatives to the MISO FSO diversity scheme [
                              - link "265" [ref=e11617] [cursor=pointer]:
                                - /url: "#B265-sensors-24-08036"
                              - text: ","
                              - link "266" [ref=e11618] [cursor=pointer]:
                                - /url: "#B266-sensors-24-08036"
                              - text: ","
                              - link "267" [ref=e11619] [cursor=pointer]:
                                - /url: "#B267-sensors-24-08036"
                              - text: "]. In the RC system, the same information signal is simultaneously transmitted from all the transmit apertures (laser sources). This is highly effective for reducing fading at the Rx ["
                              - link "1" [ref=e11620] [cursor=pointer]:
                                - /url: "#B1-sensors-24-08036"
                              - text: ","
                              - link "263" [ref=e11621] [cursor=pointer]:
                                - /url: "#B263-sensors-24-08036"
                              - text: "], and the superiority in RC performance has been shown in ["
                              - link "268" [ref=e11622] [cursor=pointer]:
                                - /url: "#B268-sensors-24-08036"
                              - text: "]. For instance, research indicates that the performance of Alamouti code is inferior to that of RC over FSO links ["
                              - link "266" [ref=e11623] [cursor=pointer]:
                                - /url: "#B266-sensors-24-08036"
                              - text: ","
                              - link "269" [ref=e11624] [cursor=pointer]:
                                - /url: "#B269-sensors-24-08036"
                              - text: ","
                              - link "270" [ref=e11625] [cursor=pointer]:
                                - /url: "#B270-sensors-24-08036"
                              - text: "]. Additionally, it has been demonstrated that OSTBC yields worse performance than RC in FSO systems utilizing IM/DD and OOK. Furthermore, studies have shown that RC outperforms OSTBC in a MIMO FSO system using SIM ["
                              - link "268" [ref=e11626] [cursor=pointer]:
                                - /url: "#B268-sensors-24-08036"
                              - text: ","
                              - link "269" [ref=e11627] [cursor=pointer]:
                                - /url: "#B269-sensors-24-08036"
                              - text: ","
                              - link "271" [ref=e11628] [cursor=pointer]:
                                - /url: "#B271-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e11629]:
                              - text: Additionally, when CSI is accessible at the Tx, a transmit diversity technique can be employed that selects the optical path with the highest scintillation value. Under IM/DD, this selection transmit diversity (STD) method, also referred to as transmit laser selection (TLS) can achieve full diversity while outperforming other alternatives, such as STCs and RCs. These alternatives implement transmit diversity without relying on CSI, meaning they do not require any feedback from the Rx to the Tx [
                              - link "264" [ref=e11630] [cursor=pointer]:
                                - /url: "#B264-sensors-24-08036"
                              - text: ","
                              - link "272" [ref=e11631] [cursor=pointer]:
                                - /url: "#B272-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e11632]:
                              - text: In scenarios where the Tx has imperfect CSI, various transmission strategies are explored by proposing an extension of the STD scheme to situations where a feedback with a limited number of bits is available [
                              - link "272" [ref=e11633] [cursor=pointer]:
                                - /url: "#B272-sensors-24-08036"
                              - text: "]. In this scheme, the transmit apertures are divided into various partition sizes, and one partition is selected for signal transmission based on feedback bits, utilizing RC. However, optimizing the partition selection is quite complex and necessitates the numerical solution of an infinite integral ["
                              - link "273" [ref=e11634] [cursor=pointer]:
                                - /url: "#B273-sensors-24-08036"
                              - text: "]. Additionally, more intricate signaling schemes can be employed to enhance coding gain alongside the benefits of diversity. For example, a combination of STD and space–time trellis coding (STTC) for MISO FSO communication systems using IM/DD over strong AT channels is analyzed in ["
                              - link "274" [ref=e11635] [cursor=pointer]:
                                - /url: "#B274-sensors-24-08036"
                              - text: "]. Additionally, since a feedback-based beamforming scheme enhances channel-adaptive signaling in wireless communication systems and significantly improves performance, an imperfect quantized feedback-based beamforming approach for a generalized MISO FSO system operating over"
                              - generic [ref=e11636]:
                                - generic [ref=e11642]:
                                  - generic [ref=e11643]: Γ
                                  - generic [ref=e11644]: Γ
                                - math [ref=e11645]:
                                  - generic [ref=e11647]:
                                    - generic [ref=e11648]: Γ
                                    - generic [ref=e11649]: Γ
                              - text: fading channels with PE is proposed in [
                              - link "275" [ref=e11650] [cursor=pointer]:
                                - /url: "#B275-sensors-24-08036"
                              - text: "]. Similarly, a simplified version of the STD scheme, which utilizes only one-bit feedback regarding the instantaneous CSI available at the Tx in a MIMO FSO system using SIM BPSK and functioning under"
                              - generic [ref=e11651]:
                                - generic [ref=e11657]:
                                  - generic [ref=e11658]: Γ
                                  - generic [ref=e11659]: Γ
                                - math [ref=e11660]:
                                  - generic [ref=e11662]:
                                    - generic [ref=e11663]: Γ
                                    - generic [ref=e11664]: Γ
                              - text: fading, is introduced to mitigate the high sensitivity to feedback errors associated with the STD method [
                              - link "273" [ref=e11665] [cursor=pointer]:
                                - /url: "#B273-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e11666]:
                              - text: The influence of MISO relay-assisted FSO systems on diversity order is being examined using the STD scheme, specifically in the context of
                              - generic [ref=e11667]:
                                - generic [ref=e11673]:
                                  - generic [ref=e11674]: Γ
                                  - generic [ref=e11675]: Γ
                                - math [ref=e11676]:
                                  - generic [ref=e11678]:
                                    - generic [ref=e11679]: Γ
                                    - generic [ref=e11680]: Γ
                              - text: fading channels that include PE. The findings indicate that the gain in diversity order is significantly influenced by the position of the relay. Furthermore, it is noted that this gain can significantly diminish when PEs affect the diversity order [
                              - link "276" [ref=e11681] [cursor=pointer]:
                                - /url: "#B276-sensors-24-08036"
                              - text: "]."
                          - generic [ref=e11682]:
                            - heading "Receive Diversity FSO Systems" [level=5] [ref=e11683]
                            - generic [ref=e11684]:
                              - text: A straightforward approach to mitigate the fading effect is to employ a larger lens at the Rx to average out intensity fluctuations. This method, commonly referred to as aperture averaging, can be regarded as a form of inherent receive diversity. Efficient fading reduction can also be achieved by utilizing multiple apertures at the Rx (SIMO). Specifically, instead of employing a single large aperture, several smaller apertures can be deployed at the Rx. This configuration allows each Rx aperture to experience some degree of aperture averaging, which is less than that of a single large aperture. Moreover, this approach benefits from spatial diversity by combining the signals from the different apertures. Assuming that the signals from the various apertures are subject to uncorrelated fading, the multiple aperture solution outperforms the single large aperture solution, given that both configurations have the same total effective aperture area. It is important to note that using multiple apertures is particularly advantageous in strong turbulence conditions [
                              - link "1" [ref=e11685] [cursor=pointer]:
                                - /url: "#B1-sensors-24-08036"
                              - text: ","
                              - link "233" [ref=e11686] [cursor=pointer]:
                                - /url: "#B233-sensors-24-08036"
                              - text: "]. Also, it is important to recognize that, from a practical perspective, utilizing an excessively large lens requires a photodetector with a larger active area to effectively capture the received photons at the lens’s focal plane. This, in turn, significantly constrains the system’s data rate due to the relatively high parasitic capacitance associated with such a component ["
                              - link "1" [ref=e11687] [cursor=pointer]:
                                - /url: "#B1-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e11688]:
                              - text: "In SIMO (Receive Diversity) FSO systems, diversity gain can be achieved by averaging multiple independent laser beams. At the receiving end, three techniques can be utilized: MRC, SC, and EGC. Among these, the MRC scheme provides a higher diversity gain, resulting in an optimal signal-to-interference-plus-noise ratio (SINR). In contrast, EGC is often favored over the other two methods due to its simplicity and lower installation costs ["
                              - link "245" [ref=e11689] [cursor=pointer]:
                                - /url: "#B245-sensors-24-08036"
                              - text: ","
                              - link "263" [ref=e11690] [cursor=pointer]:
                                - /url: "#B263-sensors-24-08036"
                              - text: ","
                              - link "277" [ref=e11691] [cursor=pointer]:
                                - /url: "#B277-sensors-24-08036"
                              - text: ","
                              - link "278" [ref=e11692] [cursor=pointer]:
                                - /url: "#B278-sensors-24-08036"
                              - text: ","
                              - link "279" [ref=e11693] [cursor=pointer]:
                                - /url: "#B279-sensors-24-08036"
                              - text: ","
                              - link "280" [ref=e11694] [cursor=pointer]:
                                - /url: "#B280-sensors-24-08036"
                              - text: "]."
                          - generic [ref=e11695]:
                            - heading "MIMO FSO Systems" [level=5] [ref=e11696]
                            - generic [ref=e11697]:
                              - text: A highly effective approach to address the dispersive nature of FSO channels involves utilizing multiple lasers and photodetectors, similar to the RF MIMO wireless communication systems. This configuration can enhance channel capacity linearly, scaling with the number of antennas [
                              - link "47" [ref=e11698] [cursor=pointer]:
                                - /url: "#B47-sensors-24-08036"
                              - text: ","
                              - link "148" [ref=e11699] [cursor=pointer]:
                                - /url: "#B148-sensors-24-08036"
                              - text: ","
                              - link "281" [ref=e11700] [cursor=pointer]:
                                - /url: "#B281-sensors-24-08036"
                              - text: "]. MIMO FSO systems are linked to either RC ["
                              - link "265" [ref=e11701] [cursor=pointer]:
                                - /url: "#B265-sensors-24-08036"
                              - text: ","
                              - link "268" [ref=e11702] [cursor=pointer]:
                                - /url: "#B268-sensors-24-08036"
                              - text: "] or TLS ["
                              - link "264" [ref=e11703] [cursor=pointer]:
                                - /url: "#B264-sensors-24-08036"
                              - text: ","
                              - link "272" [ref=e11704] [cursor=pointer]:
                                - /url: "#B272-sensors-24-08036"
                              - text: "]. In the case of RC, the same information symbol is sent from all apertures, allowing for implementation without CSI or feedback. Conversely, the TLS approach involves activating the laser that provides the highest irradiance at the Rx, necessitating both a feedback link and the acquisition of CSI ["
                              - link "241" [ref=e11705] [cursor=pointer]:
                                - /url: "#B241-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e11706]:
                              - text: MIMO FSO systems are particularly adept at mitigating AT fading by averaging its effects, thereby increasing the reliability of FSO links [
                              - link "91" [ref=e11707] [cursor=pointer]:
                                - /url: "#B91-sensors-24-08036"
                              - text: ","
                              - link "282" [ref=e11708] [cursor=pointer]:
                                - /url: "#B282-sensors-24-08036"
                              - text: "]. Furthermore, the arrangement of multiple sources and detectors can indirectly assist with pointing issues. For instance, a horizontal rooftop transmit/receive array is likely to experience cyclostationary fading rather than complete pointing loss in the event of significant sway ["
                              - link "265" [ref=e11709] [cursor=pointer]:
                                - /url: "#B265-sensors-24-08036"
                              - text: ","
                              - link "283" [ref=e11710] [cursor=pointer]:
                                - /url: "#B283-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e11711]:
                              - text: In a MIMO FSO system, the laser sources and photodetectors are arranged such that the fading encountered between source–detector pairs is statistically independent, allowing for the exploitation of diversity benefits from the MIMO channel [
                              - link "148" [ref=e11712] [cursor=pointer]:
                                - /url: "#B148-sensors-24-08036"
                              - text: ","
                              - link "244" [ref=e11713] [cursor=pointer]:
                                - /url: "#B244-sensors-24-08036"
                              - text: ","
                              - link "265" [ref=e11714] [cursor=pointer]:
                                - /url: "#B265-sensors-24-08036"
                              - text: "]. Additionally, because of the incoherence of the lasers across the array, their powers combine effectively at the Rx array. In practice, however, MIMO FSO systems may not consistently deliver the theoretical gains they promise. This limitation arises in situations where the assumption of independent channel fading across all links in the MIMO FSO system fails, often due to the proximity of the devices ["
