                            - text: ","
                            - link "243" [ref=e11505] [cursor=pointer]:
                              - /url: "#B243-sensors-24-08036"
                            - text: "]. The reduction in fading is commonly measured by the aperture averaging factor (refer to Equation ("
                            - link "43" [ref=e11506] [cursor=pointer]:
                              - /url: "#FD43-sensors-24-08036"
                            - text: )). Research indicates that a significant reduction in scintillation can be achieved, particularly under conditions of strong turbulence. Enhanced scintillation reduction might be possible by employing multiple beams at the Tx and/or multiple lenses at the Rx [
                            - link "233" [ref=e11507] [cursor=pointer]:
                              - /url: "#B233-sensors-24-08036"
                            - text: ","
                            - link "244" [ref=e11508] [cursor=pointer]:
                              - /url: "#B244-sensors-24-08036"
                            - text: ","
                            - link "245" [ref=e11509] [cursor=pointer]:
                              - /url: "#B245-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e11510]:
                            - text: Additionally, the quest for a distribution that can precisely model the PDF of irradiance data across all AT conditions while considering aperture averaging continues to inspire significant research efforts [
                            - link "238" [ref=e11511] [cursor=pointer]:
                              - /url: "#B238-sensors-24-08036"
                            - text: "]. To tackle this challenge, an alternative family of PDFs is presented to represent the PDF of received optical power in FSO communications, specifically the Weibull and EW distributions ["
                            - link "46" [ref=e11512] [cursor=pointer]:
                              - /url: "#B46-sensors-24-08036"
                            - text: ","
                            - link "246" [ref=e11513] [cursor=pointer]:
                              - /url: "#B246-sensors-24-08036"
                            - text: "]. Notably, the EW distribution demonstrates a remarkable fit to both simulation and experimental data across all aperture averaging scenarios, including weak and moderate turbulence regimes, and point-like apertures as well. Another appealing aspect of these distributions is the straightforward closed-form expressions for their corresponding PDF and cumulative distribution function (CDF) ["
                            - link "238" [ref=e11514] [cursor=pointer]:
                              - /url: "#B238-sensors-24-08036"
                            - text: ","
                            - link "247" [ref=e11515] [cursor=pointer]:
                              - /url: "#B247-sensors-24-08036"
                            - text: ","
                            - link "248" [ref=e11516] [cursor=pointer]:
