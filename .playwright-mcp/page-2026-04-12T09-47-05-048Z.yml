                            - link "212" [ref=e10083] [cursor=pointer]:
                              - /url: "#B212-sensors-24-08036"
                            - text: "]. These methods are categorized into two main types: spatial-domain techniques, which involve diversity detection using multiple Rxs, and time-domain techniques, which adaptively optimize the decision threshold based on the maximum likelihood criterion."
                          - generic [ref=e10084]: In temporal-domain techniques, a single Rx is employed. If the Rx knows the marginal fading distribution but lacks information about both the temporal fading correlation and the instantaneous fading state, a maximum-likelihood symbol-by-symbol detection technique can be utilized. Conversely, when the Rx is aware of the joint temporal fading distribution but not the instantaneous fading state, it can apply a maximum-likelihood sequence detection (MLSD) technique to counteract turbulence-induced fading.
                          - generic [ref=e10085]: Spatial-domain techniques necessitate at least two Rxs to capture signal light from various positions or angles. To optimize diversity reception gain, the Rxs should be positioned as far apart as possible to ensure that turbulence-induced fading remains uncorrelated between them. However, in practice, it may not always be feasible to place the Rxs at such a distance.
                          - generic [ref=e10086]:
                            - text: Although MLSD offers an optimal solution, it involves complex multidimensional integration and has a computational complexity that increases exponentially with the length of the transmitted bit sequence. To simplify MLSD, suboptimal implementations such as per-survivor processing (PSP) are often preferred in practice [
                            - link "186" [ref=e10087] [cursor=pointer]:
                              - /url: "#B186-sensors-24-08036"
                            - text: ","
                            - link "212" [ref=e10088] [cursor=pointer]:
                              - /url: "#B212-sensors-24-08036"
                            - text: "]. However, for BER below"
                            - generic [ref=e10089]:
                              - generic [ref=e10095]:
                                - generic [ref=e10096]: "10"
                                - generic [ref=e10098]: −6
                              - math [ref=e10099]:
                                - generic [ref=e10101]:
                                  - generic [ref=e10102]: "10"
                                  - generic [ref=e10103]:
                                    - generic [ref=e10104]: −
                                    - generic [ref=e10105]: "6"
                            - text: ", both MLSD and PSP require an electrical SNR exceeding 20 dB, even in weak turbulence conditions. Such high signal powers are impractical for many applications, necessitating the development of novel modulation techniques for IM/DD FSO systems. In response, various coding approaches have been proposed, including coded OFDM ["
                            - link "186" [ref=e10106] [cursor=pointer]:
                              - /url: "#B186-sensors-24-08036"
                            - text: "], coded MIMO ["
                            - link "213" [ref=e10107] [cursor=pointer]:
                              - /url: "#B213-sensors-24-08036"
                            - text: "], and rateless coding ["
                            - link "214" [ref=e10108] [cursor=pointer]:
                              - /url: "#B214-sensors-24-08036"
                            - text: ","
                            - link "215" [ref=e10109] [cursor=pointer]:
                              - /url: "#B215-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e10110]:
                            - text: The core idea behind the coded-OFDM method is to reduce the symbol rate through the use of OFDM. When combined with interleaving and low-density parity-check (LDPC) codes, this technique achieves high resilience to the deep fades characteristic of turbulent channels. However, OFDM is more susceptible to phase noise and has a comparatively high PAPR, necessitating meticulous design to maximize its benefits and mitigate its drawbacks. Given that OFDM in IM/DD systems may lack power efficiency, SSB clipped and unclipped OFDM schemes can be employed to enhance power efficiency [
                            - link "186" [ref=e10111] [cursor=pointer]:
                              - /url: "#B186-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e10112]:
                            - text: In a coded-MIMO approach, multiple optical sources and detectors are utilized, based on either repetition MIMO concepts or Space–Time Coding, along with LDPC codes, to enhance resistance to AT [
                            - link "213" [ref=e10113] [cursor=pointer]:
                              - /url: "#B213-sensors-24-08036"
                            - text: "]. Temporally correlated stochastic channels can benefit from rateless codes, which are ECC with adjustable rates to accommodate varying channel quality. Examples of such codes include punctured codes and fountain codes, with Raptor codes being a specific instance. Punctured codes vary the rate by dropping parity bits, thereby increasing the effective code rate. This method requires a base code with a minimum rate suitable for the worst-case channel condition. Puncturing schemes are typically defined and tested at each desired rate to ensure optimal performance. Conversely, Raptor codes adjust their rate by extending the codeword length, with the Tx generating coded bits continuously until the Rx decodes the transmitted word without error. Raptor codes have been previously proposed for the network layer of both wired and RF communication systems ["
                            - link "215" [ref=e10114] [cursor=pointer]:
                              - /url: "#B215-sensors-24-08036"
                            - text: "]. Demonstrations of Raptor and punctured codes in the PHY layer of an FSO link, under various turbulence conditions, have shown high tolerance to deep fades caused by AT ["
                            - link "214" [ref=e10115] [cursor=pointer]:
                              - /url: "#B214-sensors-24-08036"
                            - text: "]. However, the achievable information rates (lower bounds on channel capacity) indicate that these approaches are still several decibels below channel capacity, suggesting potential for further improvement ["
                            - link "216" [ref=e10116] [cursor=pointer]:
                              - /url: "#B216-sensors-24-08036"
                            - text: "]."
                        - generic [ref=e10117]:
                          - heading "4.4.2. Adaptive Transmission Techniques" [level=4] [ref=e10118]
                          - generic [ref=e10119]:
                            - text: Adaptive modulation and coding (AMC), which is already utilized in wireless channels, facilitates reliable and spectrally efficient transmission over channels that vary over time [
                            - link "217" [ref=e10120] [cursor=pointer]:
                              - /url: "#B217-sensors-24-08036"
                            - text: "]. The core concept involves estimating the channel conditions at the Rx and relaying this estimate back to the Tx via an RF feedback channel, allowing the Tx to adjust according to these conditions. Recently, adaptive transmission techniques have been integrated into FSO systems, showing promise as solutions to counteract AT and enhance FSO link performance ["
                            - link "150" [ref=e10121] [cursor=pointer]:
                              - /url: "#B150-sensors-24-08036"
                            - text: ","
                            - link "214" [ref=e10122] [cursor=pointer]:
                              - /url: "#B214-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e10123]:
                            - text: A prevalent assumption in the existing literature is that open-loop implementations are used, where the Tx lacks knowledge of the channel conditions. Such open-loop designs are beneficial in time-varying channels, where obtaining feedback on channel estimates can be challenging. However, in the case of quasi-static channels, reliable feedback is attainable, and having available CSI at the Tx can enable the design of adaptive transmission schemes that significantly enhance performance. AT causes slow fading in FSO systems, with the coherence time of the optical channel ranging from 1 to 100 ms. This means that fading can remain constant over hundreds of thousands to millions of sequential bits at standard transmission rates, allowing the channel to be modeled as a slow fading process [
                            - link "20" [ref=e10124] [cursor=pointer]:
                              - /url: "#B20-sensors-24-08036"
                            - text: "]. Consequently, adaptive transmission presents an attractive option for FSO systems."
                          - generic [ref=e10125]:
                            - link "Figure 10" [ref=e10126] [cursor=pointer]:
                              - /url: "#fig_body_display_sensors-24-08036-f010"
                            - text: illustrates a typical block diagram of an integrated power control and channel coding system in FSO communication. The feedback information needed for adaptive transmission can be relatively easily implemented in FSO systems, as commercially available FSO units typically support bidirectional (full-duplex) communication. A small fraction of the extensive available bandwidth can be assigned for feedback without significantly impacting data rates. For instance, in some hybrid RF/FSO systems, the RF channel can be utilized for CSI feedback. This makes reliable CSI accessible in FSO systems, which is crucial for developing adaptive transmission schemes. As a result, to improve communication reliability and throughput, the Tx can adjust its transmission parameters—such as code rate, transmit power, and modulation size—based on the estimated current CSI [
                            - link "218" [ref=e10127] [cursor=pointer]:
                              - /url: "#B218-sensors-24-08036"
                            - text: ","
                            - link "219" [ref=e10128] [cursor=pointer]:
                              - /url: "#B219-sensors-24-08036"
                            - text: ","
                            - link "220" [ref=e10129] [cursor=pointer]:
                              - /url: "#B220-sensors-24-08036"
                            - text: ","
                            - link "221" [ref=e10130] [cursor=pointer]:
                              - /url: "#B221-sensors-24-08036"
                            - text: ","
                            - link "222" [ref=e10131] [cursor=pointer]:
                              - /url: "#B222-sensors-24-08036"
                            - text: "]. Thus, various varieties of adaptive transmission systems have been suggested in the existing research on FSO communication, demonstrating their feasibility and advantages. For example, in ["
                            - link "223" [ref=e10132] [cursor=pointer]:
                              - /url: "#B223-sensors-24-08036"
                            - text: "], a straightforward rate-adaptive transmission technique is introduced that utilizes variable silence intervals and OOK formats with memory."
                          - generic [ref=e10133]:
                            - generic [ref=e10135] [cursor=pointer]:
                              - img "Sensors 24 08036 g010" [ref=e10136]
                              - link [ref=e10137]:
                                - /url: "#fig_body_display_sensors-24-08036-f010"
                            - generic [ref=e10138]: Figure 10. Block diagram of integrated power control and channel coding in an FSO communication system.
                          - generic [ref=e10139]:
                            - text: The study in [
                            - link "224" [ref=e10140] [cursor=pointer]:
                              - /url: "#B224-sensors-24-08036"
                            - text: "] presents a statistical-delay quality of service (QoS)-aware adaptive modulation and power allocation method for a dual-channel coherent OWC system facing AT fading. The findings indicate that this adaptive scheme significantly outperforms conventional adaptive transmission methods under strict statistical-delay constraints and highlights the benefits of joint channel optimization in conditions of strong turbulence fading and tight statistical-delay requirements. Additionally, in ["
                            - link "225" [ref=e10141] [cursor=pointer]:
                              - /url: "#B225-sensors-24-08036"
                            - text: "], a joint relaying link selection and power allocation strategy that is statistical delay QoS-aware is proposed for the uplink of a multichannel coherent FSO communication-based fronthaul network. The analysis shows that to maximize the overall end-to-end (e2e) effective capacity, it is essential to account for both the statistical delay QoS needs of the transmitted traffic and the channel gains of the transmission links. The results further demonstrate that this approach enhances the statistical delay QoS-aware throughput despite the challenges posed by AT fading and PE."
                          - generic [ref=e10142]:
                            - text: An adaptive symbol rate, where the symbol duration adjusts based on channel conditions, along with the simultaneous adaptation of both the symbol rate and power, has been proposed to mitigate the effects of scintillation in FSO links [
                            - link "20" [ref=e10143] [cursor=pointer]:
                              - /url: "#B20-sensors-24-08036"
                            - text: "]. In ["
                            - link "14" [ref=e10144] [cursor=pointer]:
                              - /url: "#B14-sensors-24-08036"
                            - text: "], the challenges of adaptive FSO transmission over AT channels are revisited, considering practical power constraints and modulation sizes. Two scenarios, (1) power adaptation with a fixed modulation size and (2) joint adaptation of power and modulation size, are explored. Also, an adaptive uncoded transmission algorithm that adjusts both transmit power and modulation size based on channel conditions is introduced. The optimization focuses on these adaptive parameters while adhering to peak power constraints. Simulation results indicate that these adaptive algorithms significantly enhance performance, particularly in conditions of intense turbulence."
                          - generic [ref=e10145]:
                            - text: In [
                            - link "222" [ref=e10146] [cursor=pointer]:
                              - /url: "#B222-sensors-24-08036"
                            - text: "], a coded FSO system utilizing a fixed code rate and M-ary PPM under an average power constraint is investigated. The simulation results show that the proposed adaptive scheme offers considerable performance enhancements in relation to non-adaptive alternatives. In ["
                            - link "226" [ref=e10147] [cursor=pointer]:
                              - /url: "#B226-sensors-24-08036"
                            - text: "], the study examines rate-adaptive FSO communication using experimental data collected from a 1.87 km terrestrial FSO link under various weather conditions. To address the fluctuations in channel gain caused by AT and weather changes, a rate-adaptive communication system is implemented that punctures LDPC codes in a rate-compatible manner. In addition to the standard random puncturing method, an optimized intentional puncturing technique is also utilized. The evaluation results indicate that, unlike uncoded OOK, the rate-adaptive method ensures reliable and efficient FSO communication across different weather conditions and scintillation indices. Furthermore, applying intentional puncturing enhances the system’s efficiency in terms of throughput."
                          - generic [ref=e10148]:
                            - text: Moreover, a novel adaptive transmission technique for FSO systems, designed to operate under AT and utilizing subcarrier PSK (S-PSK) intensity modulation, is introduced in [
                            - link "227" [ref=e10149] [cursor=pointer]:
                              - /url: "#B227-sensors-24-08036"
                            - text: "]. By leveraging the fixed envelope properties of S-PSK, this approach enhances the effective use of the FSO channel capacity by adjusting the modulation order of S-PSK in response to real-time turbulence-induced fading and a specified BER target. Numerical results demonstrate considerable gains in SE without increasing the average transmitted optical power or compromising BER, particularly in conditions of moderate to strong turbulence. Additionally, this variable-rate transmission technique is utilized in MIMO FSO systems, leading to further improvements in SE as the number of transmit and/or receive apertures increases. The performance of an FSO system for ground-to-satellite communication is examined in ["
                            - link "228" [ref=e10150] [cursor=pointer]:
                              - /url: "#B228-sensors-24-08036"
                            - text: "], focusing on the combined impacts of AT and beam wandering using MPSK. To enhance SE, an adaptive transmission strategy is implemented, optimizing channel capacity by adjusting the modulation order of the MPSK scheme based on the current channel conditions and the target BER. Additionally, a single-input multiple-output (SIMO) system employing MRC diversity is utilized to alleviate the impacts of AT and beam wandering."
                          - generic [ref=e10151]:
                            - text: Optical power allocation strategies for an adaptive Wavelength Division Multiplexing (WDM) radio over FSO (RoFSO) systems, utilizing variable wavelengths to reduce the impact of weather turbulence, are introduced in [
                            - link "220" [ref=e10152] [cursor=pointer]:
                              - /url: "#B220-sensors-24-08036"
                            - text: ","
                            - link "229" [ref=e10153] [cursor=pointer]:
                              - /url: "#B229-sensors-24-08036"
                            - text: "]. These strategies optimally distribute transmit power to maximize capacity and enhance the overall effectiveness of the WDM RoFSO system. Thus, within a total power constraint, varying optical powers can be assigned to selected wavelengths, leading to further enhancements in system performance ["
                            - link "16" [ref=e10154] [cursor=pointer]:
                              - /url: "#B16-sensors-24-08036"
                            - text: "]. A practical FSO system featuring an adaptive channel coding and power control scheme is examined in ["
                            - link "221" [ref=e10155] [cursor=pointer]:
                              - /url: "#B221-sensors-24-08036"
                            - text: "]. This approach allows for the simultaneous adjustment of both the coding rate and transmission power to minimize power consumption while adhering to practical constraints, such as the target OP, target BER, and transmit power limits imposed by eye-safety standards."
                          - generic [ref=e10156]:
                            - text: In [
                            - link "150" [ref=e10157] [cursor=pointer]:
                              - /url: "#B150-sensors-24-08036"
                            - text: "], an AMC scheme is introduced as an effective method for addressing severe AT. The study explores three distinct adaptive modulation scenarios: (i) channel inversion with a fixed rate, (ii) variable-rate variable-power adaptation, and (iii) truncated channel inversion with a fixed rate. Additionally, the potential enhancements from using adaptive LDPC coded modulation (CM) are examined. The findings indicate that, under strong turbulence conditions, it is possible to withstand significant fades of 30 dB and higher ["
                            - link "150" [ref=e10158] [cursor=pointer]:
                              - /url: "#B150-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e10159]:
                            - text: Additionally, the FSO channel can exhibit a significant level of reciprocity in axially aligned bidirectional systems, meaning that the fading experienced at each end can be closely correlated [
                            - link "230" [ref=e10160] [cursor=pointer]:
                              - /url: "#B230-sensors-24-08036"
                            - text: ","
                            - link "231" [ref=e10161] [cursor=pointer]:
                              - /url: "#B231-sensors-24-08036"
                            - text: "]. This characteristic allows for immediate access to CSI at the Tx, eliminating the need for a separate feedback channel. Consequently, it is justifiable to assume the availability of CSI at both the Tx and Rx, which is essential for adaptive transmission ["
                            - link "20" [ref=e10162] [cursor=pointer]:
                              - /url: "#B20-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e10163]: Many proposed adaptive transmission methods based on CSI in FSO communication aim to enhance the reliability and throughput of these systems. However, these methods often assume that turbulence conditions remain constant. In reality, varying turbulence intensities at the same SNR can significantly impact communication quality. This suggests that while adaptive schemes may perform well under stable turbulence, their effectiveness can diminish or even degrade when faced with changing turbulence conditions. For example, an AMC scheme designed for weak turbulence may struggle to maintain the required BER in moderate or strong turbulence, leading to reduced communication quality or interruptions. Conversely, applying an AMC scheme intended for strong turbulence in milder conditions might result in a less efficient coding and modulation choice, ultimately lowering channel utilization and bit rate. To address these challenges, it is essential to develop an enhanced AMC scheme capable of adapting to FSO channels with varying turbulence intensity. Accordingly, an enhanced AMC scheme is proposed, incorporating a hybrid switching standard for UAV-to-ground FSO communication to mitigate the adverse effects of turbulence variation. This approach incorporates a channel estimator based on Gated Recurrent Units (GRU) and utilizes a hybrid switching standard linked to the frame error rate (FER) of LDPC decoding, aiming to optimize bit efficiency across different turbulence conditions.
                      - generic [ref=e10164]:
                        - heading "4.5. Aperture Averaging" [level=3] [ref=e10165]
                        - generic [ref=e10166]: Aperture averaging is a crucial technique in FSO communication systems, employed to mitigate the adverse effects of AT. By averaging the optical signal over a larger aperture, this method effectively reduces signal fluctuations and enhances communication reliability. This section will explore the principles of aperture averaging, its advantages in mitigating the impacts of turbulence, and its implications for the future of FSO communication systems.
                        - generic [ref=e10167]:
                          - heading "4.5.1. Overview" [level=4] [ref=e10168]
                          - generic [ref=e10169]:
                            - text: A straightforward method to mitigate the fading effect is to employ a relatively large lens at the Rx to smooth out intensity fluctuations. This technique, commonly referred to as aperture averaging, serves as an inherent form of receive diversity. It involves adjusting the size of the detector or receive aperture to capture as much of the traversing optical field as possible. In FSO systems operating under strong and saturated conditions, aperture averaging is essential to address (1) signal scintillation or irradiance flux variations [
                            - link "232" [ref=e10170] [cursor=pointer]:
                              - /url: "#B232-sensors-24-08036"
                            - text: ","
                            - link "233" [ref=e10171] [cursor=pointer]:
                              - /url: "#B233-sensors-24-08036"
                            - text: "]; (2) address AoA fluctuations and boresight angle effects; and (3) to optimize the average signal power at the detector plane. Additionally, aperture averaging is a fundamental scheme that ensures spatial diversity ["
                            - link "46" [ref=e10172] [cursor=pointer]:
                              - /url: "#B46-sensors-24-08036"
                            - text: "]. In this context, aperture averaging can be considered a basic form of spatial diversity when the Rx lens aperture exceeds the fading correlation length ["
                            - link "47" [ref=e10173] [cursor=pointer]:
                              - /url: "#B47-sensors-24-08036"
                            - text: ","
                            - link "233" [ref=e10174] [cursor=pointer]:
                              - /url: "#B233-sensors-24-08036"
                            - text: ","
                            - link "234" [ref=e10175] [cursor=pointer]:
                              - /url: "#B234-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e10176]:
                            - text: Aperture averaging calculations are crucial in Rx design. The Rx needs to be large enough to gather adequate power and minimize scintillation effects at a specific distance, yet small enough to remain practical. Typically, the Rx does not require a significantly large diameter due to the nonlinear decrease in scintillation with increasing diameter. It is important to note that while aperture averaging becomes increasingly effective at reducing intensity variance as turbulence intensifies, this improvement is limited to a certain extent [
                            - link "233" [ref=e10177] [cursor=pointer]:
                              - /url: "#B233-sensors-24-08036"
                            - text: ","
                            - link "235" [ref=e10178] [cursor=pointer]:
                              - /url: "#B235-sensors-24-08036"
                            - text: "]."
                        - generic [ref=e10179]:
                          - heading "4.5.2. Advantages of Aperture Averaging" [level=4] [ref=e10180]
                          - generic [ref=e10181]:
                            - text: To achieve effective FSO communication through continuous transmission link establishment, it is crucial to maintain a larger aperture area, resulting in a wider FoV. A narrow FoV limits the coverage area, which is not ideal for FSO communication systems. Although a larger collection aperture increases ambient light background noise, this can be mitigated by various methods that allow the FSO Rx to capture a larger portion of the incoming optical beam. Conversely, a higher FoV provides a larger coverage area and eliminates the need for additional circuitry for pointing and tracking mechanisms, ensuring reliable wireless connectivity between transmission and reception apertures. Moreover, FSO systems with a larger FoV encounter reduced misalignment errors, reducing the impact of obstacles between the source and destination points and easing the alignment control mechanism [
                            - link "46" [ref=e10182] [cursor=pointer]:
                              - /url: "#B46-sensors-24-08036"
                            - text: "]."
