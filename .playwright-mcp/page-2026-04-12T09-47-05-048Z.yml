                        - heading "4.8. Cooperative Relaying" [level=3] [ref=e12574]
                        - generic [ref=e12575]: In this section, we present relay-assisted transmission as a method to enhance communication reliability and coverage. By utilizing intermediate relay nodes, this technique helps overcome obstacles and extend the range of transmission, ensuring more robust and efficient communication links. We will explore the principles, advantages, and implementation strategies of relay-assisted systems in various communication scenarios.
                        - generic [ref=e12576]:
                          - heading "4.8.1. Relay-Assisted Transmission" [level=4] [ref=e12577]
                          - generic [ref=e12578]:
                            - text: In contrast to the localized diversity techniques used in MIMO systems, relay-assisted solutions provide distributed spatial diversity methods, where neighboring nodes (or relays) support communication between a source node and a destination node. Moreover, cooperative communication is a dynamic area of research because of its potential to improve reliability and broaden the reach of wireless networks without the need for a new infrastructure [
                            - link "323" [ref=e12579] [cursor=pointer]:
                              - /url: "#B323-sensors-24-08036"
                            - text: "]. It has also become a viable method for achieving spatial diversity benefits ["
