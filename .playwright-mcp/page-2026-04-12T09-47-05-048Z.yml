                    - generic [ref=e273]:
                      - heading "1. Introduction" [level=2] [ref=e274]
                      - generic [ref=e275]:
                        - text: Free-space optical (FSO) communication systems are gaining significant attention due to their potential to offer high data rates, secure communication, and immunity to electromagnetic interference. Unlike traditional radio frequency (RF) systems, FSO utilizes light to transmit data through the atmosphere, making it an attractive solution for a variety of applications. The growing demand for higher bandwidth and the limitations of existing wireless communication technologies drive the exploration and development of FSO systems [
                        - link "1" [ref=e276] [cursor=pointer]:
                          - /url: "#B1-sensors-24-08036"
                        - text: ","
                        - link "2" [ref=e277] [cursor=pointer]:
                          - /url: "#B2-sensors-24-08036"
                        - text: "]. This section provides an overview of the fundamental principles, key advantages, and challenges associated with FSO communication, setting the stage for a deeper understanding of its potential and the ongoing research in this field."
                      - generic [ref=e278]:
                        - heading "1.1. Background and Motivation" [level=3] [ref=e279]
                        - generic [ref=e280]:
                          - text: With the growing demand for high-speed, low-latency communication in the era of 5G and beyond, and the huge capital expenditures associated with public works (such as trench digging and site restoration) limiting the widespread installation of optical fiber infrastructure, FSO communication has emerged as a potent technology poised to meet these demands [
                          - link "3" [ref=e281] [cursor=pointer]:
                            - /url: "#B3-sensors-24-08036"
                          - text: "]. FSO communication, which involves the transmission of data through the atmosphere using optical beam, offers an attractive alternative to traditional RF communication due to its potential for low latency, noise immunity, electromagnetic interference immunity, spatial reusability, ease of deployment, being license free, high security, reduced spectrum congestion, and the capability to deliver transmissions at extremely high data rates between two terminals ["
                          - link "4" [ref=e282] [cursor=pointer]:
                            - /url: "#B4-sensors-24-08036"
                          - text: ","
                          - link "5" [ref=e283] [cursor=pointer]:
                            - /url: "#B5-sensors-24-08036"
                          - text: "], whether they are just a few meters apart or separated by thousands of kilometers (long operational range) ["
                          - link "6" [ref=e284] [cursor=pointer]:
                            - /url: "#B6-sensors-24-08036"
                          - text: "]. FSO systems are especially advantageous for line-of-sight (LoS) communication, bridging gaps where traditional fiber optics or RF systems may not be feasible. For instance, FSO systems utilize narrow laser beams with directional properties. This spatial confinement allows for a high degree of spatial reuse and makes eavesdropping difficult, inherently enhancing security. Utilizing light as the carrier in FSO communications ensures immunity to electromagnetic interference. Additionally, FSO systems are easy to deploy and can be reinstalled without incurring the costs associated with dedicated fiber optic connections. Moreover, the frequency used by FSO technology exceeds 300 GHz, which is unlicensed globally, thus eliminating the need for license fees ["
                          - link "1" [ref=e285] [cursor=pointer]:
                            - /url: "#B1-sensors-24-08036"
                          - text: ","
                          - link "2" [ref=e286] [cursor=pointer]:
                            - /url: "#B2-sensors-24-08036"
                          - text: ","
                          - link "7" [ref=e287] [cursor=pointer]:
                            - /url: "#B7-sensors-24-08036"
                          - text: "]."
                        - generic [ref=e288]:
                          - text: Frequencies in FSO communications are significantly higher than those in RF communications. Consequently, FSO communications can achieve much higher data rates compared to RF communications, and they require antennas that take up less space. Additionally, the coherence of laser light in FSO links can decrease geometrical loss, allowing the transmission of high data rates over long distances [
                          - link "7" [ref=e289] [cursor=pointer]:
                            - /url: "#B7-sensors-24-08036"
                          - text: "]."
                          - link "Figure 1" [ref=e290] [cursor=pointer]:
                            - /url: "#fig_body_display_sensors-24-08036-f001"
                          - text: illustrates various FSO applications along with their respective communication ranges. The capability to transmit data over long distances without the need for physical infrastructure makes FSO a suitable candidate for supporting next-generation wireless networks, including 5G and beyond [
                          - link "8" [ref=e291] [cursor=pointer]:
                            - /url: "#B8-sensors-24-08036"
                          - text: "]. In this context, the absence of a need for optical fibers between communication nodes allows for flexible application across various use cases and high-speed applications including unmanned aerial vehicles (UAVs), intra- and inter-datacenter connections, inter-building links, high-speed trains, 5G fronthaul and backhaul for wireless cellular networks, indoor and outdoor local- and wide-area networks, metropolitan area network extensions, urban connectivity, last-mile connectivity, inter-chip connectivity, fiber backup, satellite communications, deep-space communications, underwater communication, disaster recovery, video surveillance, and redundant link ["
                          - link "2" [ref=e292] [cursor=pointer]:
                            - /url: "#B2-sensors-24-08036"
                          - text: ","
                          - link "9" [ref=e293] [cursor=pointer]:
                            - /url: "#B9-sensors-24-08036"
                          - text: ","
                          - link "10" [ref=e294] [cursor=pointer]:
                            - /url: "#B10-sensors-24-08036"
                          - text: "]. Additionally, it is regarded as a promising solution for addressing the significant traffic demands of sixth-generation (6G) systems ["
                          - link "11" [ref=e295] [cursor=pointer]:
                            - /url: "#B11-sensors-24-08036"
                          - text: ","
                          - link "12" [ref=e296] [cursor=pointer]:
                            - /url: "#B12-sensors-24-08036"
                          - text: "]. These use cases can be classified into two main categories, terrestrial and outer space FSO communications, as illustrated in"
                          - link "Figure 2" [ref=e297] [cursor=pointer]:
                            - /url: "#fig_body_display_sensors-24-08036-f002"
                          - text: . Given its benefits, FSO is being explored as a solution for last-mile connectivity in situations where fiber deployment is challenging and RF systems fall short of meeting bandwidth needs. Additionally, these advantages position FSO as a highly promising solution for space communications. In this context, by leveraging its strengths, FSO can address many of the challenges associated with traditional communication methods, providing a more efficient and reliable means of data transmission between spacecraft, satellites, and ground stations [
                          - link "13" [ref=e298] [cursor=pointer]:
                            - /url: "#B13-sensors-24-08036"
                          - text: "]."
                        - generic [ref=e299]:
                          - generic [ref=e301] [cursor=pointer]:
                            - img "Sensors 24 08036 g001" [ref=e302]
                            - link [ref=e303]:
                              - /url: "#fig_body_display_sensors-24-08036-f001"
                          - generic [ref=e304]: Figure 1. Potential applications of FSO systems based on the operational distance between transceivers.
                        - generic [ref=e305]:
                          - generic [ref=e307] [cursor=pointer]:
                            - img "Sensors 24 08036 g002" [ref=e308]
                            - link [ref=e309]:
                              - /url: "#fig_body_display_sensors-24-08036-f002"
                          - generic [ref=e310]: "Figure 2. Categorization of FSO communication systems based on their applications. B2B: Building-to-Building, D2D: Device-to-Device, C2C: Chip-to-Chip, V2V: Vehicle-to-Vehicle, V2G: Vehicle-to-Ground, G2V: Ground-to-Vehicle, S2S: Satellite-to-Satellite, S2G: Satellite-to-Ground, and G2S: Ground-to-Satellite."
                        - generic [ref=e311]:
                          - text: Although FSO technology offers undeniable advantages and has a broad range of potential applications, significant technical challenges impede its widespread adoption [
                          - link "14" [ref=e312] [cursor=pointer]:
                            - /url: "#B14-sensors-24-08036"
                          - text: "]. For terrestrial applications, atmospheric conditions such as rain, fog, and turbulence can significantly degrade the signal, leading to reduced performance. Furthermore, for general applications, alignment issues and the need for precise beam pointing add to the complexity of FSO system deployment. Addressing these challenges requires the development of enabling technologies and innovative strategies to ensure the reliable performance of FSO systems in diverse environments ["
                          - link "2" [ref=e313] [cursor=pointer]:
                            - /url: "#B2-sensors-24-08036"
                          - text: ","
                          - link "15" [ref=e314] [cursor=pointer]:
                            - /url: "#B15-sensors-24-08036"
                          - text: "]."
                      - generic [ref=e315]:
                        - heading "1.2. Objectives and Scope of the Paper" [level=3] [ref=e316]
                        - generic [ref=e317]: "This paper aims to provide a comprehensive survey of the enabling technologies, challenges, trends, and future prospects of FSO communication in the context of 5G and beyond. The key objectives include the following:"
                        - generic [ref=e319]:
                          - term [ref=e320]: (i)
                          - definition [ref=e321]:
                            - generic [ref=e322]: "Analysis of Current Challenges: examination of the major challenges faced by FSO systems, including atmospheric turbulence (AT), weather-induced signal degradation, and alignment issues."
                          - term [ref=e323]: (ii)
                          - definition [ref=e324]:
                            - generic [ref=e325]: "Review of Enabling Technologies: exploration of critical technologies such as adaptive optics (AO), advanced modulation schemes, aperture averaging, spatial diversity, cooperative relaying, hybrid FSO system, and error correction codes (ECCs) that are instrumental in overcoming the challenges associated with FSO communication."
                          - term [ref=e326]: (iii)
                          - definition [ref=e327]:
                            - generic [ref=e328]: "Exploration of Emerging Trends: discussion of emerging trends, such as the integration of FSO with RF, millimeter-wave (mmWave), and Terahertz (THz) technologies, as well as the use of artificial intelligence (AI) and machine learning (ML) to optimize FSO performance."
                          - term [ref=e329]: (iv)
                          - definition [ref=e330]:
                            - generic [ref=e331]: "Prospects for 5G and Beyond: assessment of the potential of FSO communication to meet the demands of next-generation networks, including its scalability, reliability, and deployment strategies."
                          - term [ref=e332]: (v)
                          - definition [ref=e333]:
                            - generic [ref=e334]: "Future Research Directions: identification of open challenges and future research directions necessary to realize the full potential of FSO in the evolving landscape of communication technologies."
                        - generic [ref=e335]: The aforementioned objectives highlight the involvement of numerous phenomena in FSO communication, which must be meticulously analyzed to ensure a reliable communication system.
                      - generic [ref=e336]:
                        - heading "1.3. Contributions" [level=3] [ref=e337]
                        - generic [ref=e338]: "There have been considerable contributions in the literature to FSO communications. Nevertheless, the usual space constraints for publications prevented comprehensive research work in which assiduous efforts towards FSO communications development can be presented. Therefore, an all-inclusive survey in which the trends in FSO communication systems can be studied is highly imperative. Based on this, apart from being a good complement to contributions of the existing work, this paper also offers in-depth clarifications regarding different related concepts and architectures. In this regard, the main contributions of this tutorial paper are as follows:"
                        - generic [ref=e340]:
                          - term [ref=e341]: (i)
                          - definition [ref=e342]:
                            - generic [ref=e343]: "Comprehensive Survey: The paper provides an extensive review of the enabling technologies critical to advancing FSO communication systems, including AO, modulation schemes, and error correction codes. This thorough examination aids in understanding how these technologies address the unique challenges of FSO links."
                          - term [ref=e344]: (ii)
                          - definition [ref=e345]:
                            - generic [ref=e346]: "Identification of Challenges: It identifies and discusses significant challenges that hinder the deployment of FSO systems, such as atmospheric turbulence, weather-induced signal degradation, and alignment issues. This highlights the need for targeted solutions and informs future research directions."
                          - term [ref=e347]: (iii)
                          - definition [ref=e348]:
                            - generic [ref=e349]: "Integration of Hybrid Solutions: The paper explores the integration of FSO with radio frequency, millimeter-wave, and Terahertz technologies, emphasizing how hybrid approaches can enhance reliability and coverage in next-generation networks."
                          - term [ref=e350]: (iv)
                          - definition [ref=e351]:
                            - generic [ref=e352]: "Emerging Trends: The research highlights emerging trends in FSO communication, particularly the integration of artificial intelligence and machine learning techniques. This focus on AI-driven optimization provides insights into how these technologies can enhance the performance of FSO systems in dynamic environments."
                          - term [ref=e353]: (v)
                          - definition [ref=e354]:
                            - generic [ref=e355]: "Assessment of Future Prospects: The paper evaluates the potential of FSO to meet the increasing demands for high-speed, low-latency communication in the context of 5G and beyond. It provides a forward-looking perspective on scalability, reliability, and deployment strategies that can support the evolution of FSO communication systems."
                          - term [ref=e356]: (vi)
                          - definition [ref=e357]:
                            - generic [ref=e358]: "Research Directions: Finally, the paper identifies open challenges and outlines future research directions critical to maximizing the effectiveness of FSO technology. This contributes to the broader understanding of the role FSO can play in the future of wireless communication systems."
                      - generic [ref=e359]:
                        - heading "1.4. Article Structure" [level=3] [ref=e360]
                        - generic [ref=e361]:
                          - text: The paper is organized into sections to provide a comprehensive overview of FSO communication systems in the context of 5G and beyond. Having introduced the background and motivation along with the objectives and scope of the paper,
                          - link "Section 2" [ref=e362] [cursor=pointer]:
