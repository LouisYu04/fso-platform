                            - link "326" [ref=e12582] [cursor=pointer]:
                              - /url: "#B326-sensors-24-08036"
                            - text: "]. The core concept of cooperative diversity (parallel relaying) is founded on the observation that, in a wireless RF channel, the signal sent by the source node is received by other nodes known as partners or relays. These partners, along with the source, can collaboratively manage and convey their information, forming a virtual antenna array despite each node having only one antenna. Another relay-assisted transmission scheme is multihop transmission (serial relaying), which employs relays arranged in a sequential configuration ["
                            - link "327" [ref=e12583] [cursor=pointer]:
                              - /url: "#B327-sensors-24-08036"
                            - text: ","
                            - link "328" [ref=e12584] [cursor=pointer]:
                              - /url: "#B328-sensors-24-08036"
                            - text: ","
                            - link "329" [ref=e12585] [cursor=pointer]:
                              - /url: "#B329-sensors-24-08036"
                            - text: ","
                            - link "330" [ref=e12586] [cursor=pointer]:
                              - /url: "#B330-sensors-24-08036"
                            - text: ","
                            - link "331" [ref=e12587] [cursor=pointer]:
                              - /url: "#B331-sensors-24-08036"
                            - text: "]. This approach is typically employed to extend the coverage area for Txs with limited power. It does not enhance performance against fading influences in wireless RF environments, which means it does not improve the diversity order ["
                            - link "332" [ref=e12588] [cursor=pointer]:
                              - /url: "#B332-sensors-24-08036"
                            - text: "]. Also, cooperative techniques are extensively researched in FSO communication systems to counteract the adverse effects of turbulence-induced atmospheric scintillation ["
                            - link "323" [ref=e12589] [cursor=pointer]:
                              - /url: "#B323-sensors-24-08036"
                            - text: ","
                            - link "332" [ref=e12590] [cursor=pointer]:
                              - /url: "#B332-sensors-24-08036"
                            - text: ","
                            - link "333" [ref=e12591] [cursor=pointer]:
                              - /url: "#B333-sensors-24-08036"
                            - text: ","
                            - link "334" [ref=e12592] [cursor=pointer]:
                              - /url: "#B334-sensors-24-08036"
                            - text: ","
                            - link "335" [ref=e12593] [cursor=pointer]:
                              - /url: "#B335-sensors-24-08036"
                            - text: ","
                            - link "336" [ref=e12594] [cursor=pointer]:
                              - /url: "#B336-sensors-24-08036"
                            - text: "]."
                            - link "Table 5" [ref=e12595] [cursor=pointer]:
                              - /url: "#table_body_display_sensors-24-08036-t005"
                            - text: presents some of the related work in this area.
                          - generic [ref=e12596]:
                            - text: "Current research in cooperative FSO communications primarily focuses on two approaches: all-active relaying, which is used when CSI is unavailable, and selective relaying, which is applied when CSI is present. All-active relaying is a straightforward and efficient two-slot scheme. In the first slot, the source (S) sends the information packet to the relays (Rs). The relays then decode (or amplify) the received symbols and, in the second slot, forward the processed signals to the destination (D). In this setup, no priority is given to any relay, irrespective of the strengths of the source-relay and relay-destination links ["
                            - link "323" [ref=e12597] [cursor=pointer]:
                              - /url: "#B323-sensors-24-08036"
                            - text: ","
                            - link "332" [ref=e12598] [cursor=pointer]:
                              - /url: "#B332-sensors-24-08036"
                            - text: ","
                            - link "334" [ref=e12599] [cursor=pointer]:
                              - /url: "#B334-sensors-24-08036"
                            - text: ","
                            - link "335" [ref=e12600] [cursor=pointer]:
                              - /url: "#B335-sensors-24-08036"
                            - text: "]. In selective relaying, either direct transmissions occur, or one relay is selected from the pool of available relays to forward the information symbols to the destination based on the channel state ["
                            - link "336" [ref=e12601] [cursor=pointer]:
                              - /url: "#B336-sensors-24-08036"
                            - text: ","
                            - link "337" [ref=e12602] [cursor=pointer]:
                              - /url: "#B337-sensors-24-08036"
                            - text: ","
                            - link "338" [ref=e12603] [cursor=pointer]:
                              - /url: "#B338-sensors-24-08036"
                            - text: "]. This approach prioritizes the transmission along the strongest e2e link. Instead of distributing power across multiple relays, the power is concentrated and directed to the best relay to improve signal reconstruction quality at this relay. The criteria for selecting the optimal path involve minimizing the conditional error probability for quantum-limited systems without background noise ["
                            - link "337" [ref=e12604] [cursor=pointer]:
                              - /url: "#B337-sensors-24-08036"
                            - text: "], and minimizing the OP for systems with Gaussian noise ["
                            - link "336" [ref=e12605] [cursor=pointer]:
                              - /url: "#B336-sensors-24-08036"
                            - text: "]. While all-active relaying is simple and does not require any CSI, selective relaying provides better performance but comes with increased system complexity. This complexity arises from the need to acquire complete CSI for all intermediate channels and to establish feedback links between the communicating nodes ["
                            - link "241" [ref=e12606] [cursor=pointer]:
                              - /url: "#B241-sensors-24-08036"
                            - text: ","
                            - link "323" [ref=e12607] [cursor=pointer]:
                              - /url: "#B323-sensors-24-08036"
                            - text: ","
                            - link "339" [ref=e12608] [cursor=pointer]:
                              - /url: "#B339-sensors-24-08036"
                            - text: "]. Furthermore, it has been observed that the strength of the two-hop source–relay–destination (S-R-D) link depends on its weakest hop. This protocol shows that both all-active and selective relaying methods can achieve full diversity gains, with the selective method offering an improved coding gain. Recently, inter-relay cooperation has been introduced to enhance the reliability of FSO networks, especially in scenarios where FSO links are established between the relays ["
                            - link "340" [ref=e12609] [cursor=pointer]:
                              - /url: "#B340-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e12610]:
                            - generic [ref=e12611]: Table 5. Literature on cooperative hybrid FSO.
                            - generic [ref=e12613] [cursor=pointer]:
                              - img [ref=e12614]
                              - link [ref=e12615]:
                                - /url: "#table_body_display_sensors-24-08036-t005"
                          - generic [ref=e12616]:
                            - text: In multi-node scenarios, cooperative communication acts as a unique variant of MIMO by utilizing relay nodes to improve the link quality between the source and destination nodes. This approach not only offers a novel method to boost transmission reliability in FSO systems but also provides a viable solution for FSO networking [
                            - link "332" [ref=e12617] [cursor=pointer]:
                              - /url: "#B332-sensors-24-08036"
                            - text: ","
                            - link "338" [ref=e12618] [cursor=pointer]:
                              - /url: "#B338-sensors-24-08036"
                            - text: ","
                            - link "360" [ref=e12619] [cursor=pointer]:
                              - /url: "#B360-sensors-24-08036"
                            - text: "]. One benefit of this virtual multiple-aperture system, as opposed to MIMO FSO systems, is that the multiple paths are spatially separated, which guarantees the independence of the associated fading channels ["
                            - link "336" [ref=e12620] [cursor=pointer]:
                              - /url: "#B336-sensors-24-08036"
                            - text: "]. Also, compared to the conventional MIMO FSO system, the cooperative FSO system allows for the flexible selection of relay nodes, which helps to diversify transmission paths and effectively eliminate channel correlation. Thus, in cooperative FSO communication systems, data are transmitted through a direct link from a source node to a destination node, as well as through one or more relay nodes. These relay nodes aid in enhancing signal strength and reliability, particularly in adverse atmospheric conditions ["
                            - link "284" [ref=e12621] [cursor=pointer]:
                              - /url: "#B284-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e12622]:
                            - text: Additionally, several cooperative protocols have been suggested for use in relay-assisted FSO links. The traditional methods include amplify-and-forward (AF) [
                            - link "331" [ref=e12623] [cursor=pointer]:
                              - /url: "#B331-sensors-24-08036"
                            - text: ","
                            - link "332" [ref=e12624] [cursor=pointer]:
                              - /url: "#B332-sensors-24-08036"
                            - text: ","
                            - link "334" [ref=e12625] [cursor=pointer]:
                              - /url: "#B334-sensors-24-08036"
                            - text: ","
                            - link "361" [ref=e12626] [cursor=pointer]:
                              - /url: "#B361-sensors-24-08036"
                            - text: ","
                            - link "362" [ref=e12627] [cursor=pointer]:
                              - /url: "#B362-sensors-24-08036"
                            - text: ","
                            - link "363" [ref=e12628] [cursor=pointer]:
                              - /url: "#B363-sensors-24-08036"
                            - text: ","
                            - link "364" [ref=e12629] [cursor=pointer]:
                              - /url: "#B364-sensors-24-08036"
                            - text: ","
                            - link "365" [ref=e12630] [cursor=pointer]:
                              - /url: "#B365-sensors-24-08036"
                            - text: "] and DF ["
                            - link "331" [ref=e12631] [cursor=pointer]:
                              - /url: "#B331-sensors-24-08036"
                            - text: ","
                            - link "363" [ref=e12632] [cursor=pointer]:
                              - /url: "#B363-sensors-24-08036"
                            - text: "] protocols. In AF relaying, optical-to-electrical (OE) conversion is performed at each relay, followed by electrical amplification and modulation of a laser source. The electrical amplifier gain at each relay is established based on the CSI of the previous hop, necessitating continuous estimation of the channel fading amplitude. As with all AF systems, the noise introduced at each relay accumulates along the transmission path, limiting the maximum transmission distance ["
                            - link "331" [ref=e12633] [cursor=pointer]:
                              - /url: "#B331-sensors-24-08036"
                            - text: ","
                            - link "361" [ref=e12634] [cursor=pointer]:
                              - /url: "#B361-sensors-24-08036"
                            - text: ","
                            - link "363" [ref=e12635] [cursor=pointer]:
                              - /url: "#B363-sensors-24-08036"
                            - text: ","
                            - link "364" [ref=e12636] [cursor=pointer]:
                              - /url: "#B364-sensors-24-08036"
                            - text: ","
                            - link "366" [ref=e12637] [cursor=pointer]:
                              - /url: "#B366-sensors-24-08036"
                            - text: ","
                            - link "367" [ref=e12638] [cursor=pointer]:
                              - /url: "#B367-sensors-24-08036"
                            - text: "]. DF FSO systems, on the other hand, involve additional electrical processing steps after OE conversion. To mitigate the propagation of background noise, the received electrical signal at each relay is decoded and re-encoded before retransmission in DF systems. While DF significantly enhances performance, it introduces considerable encoding/decoding delays and requires more complex hardware ["
                            - link "88" [ref=e12639] [cursor=pointer]:
                              - /url: "#B88-sensors-24-08036"
                            - text: ","
                            - link "332" [ref=e12640] [cursor=pointer]:
                              - /url: "#B332-sensors-24-08036"
                            - text: ","
                            - link "366" [ref=e12641] [cursor=pointer]:
                              - /url: "#B366-sensors-24-08036"
                            - text: ","
                            - link "367" [ref=e12642] [cursor=pointer]:
                              - /url: "#B367-sensors-24-08036"
                            - text: ","
                            - link "368" [ref=e12643] [cursor=pointer]:
                              - /url: "#B368-sensors-24-08036"
                            - text: ","
                            - link "369" [ref=e12644] [cursor=pointer]:
                              - /url: "#B369-sensors-24-08036"
                            - text: "]. The need for more processors results in higher component error rates and increased costs ["
                            - link "370" [ref=e12645] [cursor=pointer]:
                              - /url: "#B370-sensors-24-08036"
                            - text: ","
                            - link "371" [ref=e12646] [cursor=pointer]:
                              - /url: "#B371-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e12647]:
                            - text: The modified versions of the DF strategy, such as Bit Detect and Forward, Adaptive Bit Detect and Forward, and Adaptive Decode and Forward, have been considered [
                            - link "372" [ref=e12648] [cursor=pointer]:
                              - /url: "#B372-sensors-24-08036"
                            - text: "]. Additionally, FSO DF relaying techniques have progressed from buffer-free (BF) relaying to buffer-aided (BA) relaying ["
                            - link "324" [ref=e12649] [cursor=pointer]:
                              - /url: "#B324-sensors-24-08036"
                            - text: ","
                            - link "333" [ref=e12650] [cursor=pointer]:
                              - /url: "#B333-sensors-24-08036"
                            - text: "]. These FSO BA relaying methods are inspired by their RF counterparts ["
                            - link "373" [ref=e12651] [cursor=pointer]:
                              - /url: "#B373-sensors-24-08036"
                            - text: ","
                            - link "374" [ref=e12652] [cursor=pointer]:
                              - /url: "#B374-sensors-24-08036"
                            - text: ","
                            - link "375" [ref=e12653] [cursor=pointer]:
                              - /url: "#B375-sensors-24-08036"
                            - text: "]. In mixed RF/FSO systems, buffers play a significant role by queuing data collected from mobile RF users before they are multiplexed along the backhaul FSO link ["
                            - link "376" [ref=e12654] [cursor=pointer]:
                              - /url: "#B376-sensors-24-08036"
                            - text: "]. Implementing BA relay selection strategies requires the acquisition of CSI and/or buffer state information (BSI). CSI knowledge can be either full or partial ["
                            - link "373" [ref=e12655] [cursor=pointer]:
                              - /url: "#B373-sensors-24-08036"
                            - text: ","
                            - link "375" [ref=e12656] [cursor=pointer]:
                              - /url: "#B375-sensors-24-08036"
                            - text: ","
                            - link "377" [ref=e12657] [cursor=pointer]:
                              - /url: "#B377-sensors-24-08036"
                            - text: "]. BSI involves acquiring the number of packets stored in the relays’ buffers, which enhances performance but increases system complexity. Recently, deep reinforcement learning (DRL) has been applied to maximize the throughput of RF BA networks, and a relay clustering approach has been suggested to improve performance in asymmetrical RF networks ["
                            - link "373" [ref=e12658] [cursor=pointer]:
                              - /url: "#B373-sensors-24-08036"
                            - text: ","
                            - link "374" [ref=e12659] [cursor=pointer]:
                              - /url: "#B374-sensors-24-08036"
                            - text: ","
                            - link "375" [ref=e12660] [cursor=pointer]:
                              - /url: "#B375-sensors-24-08036"
                            - text: "]."
                        - generic [ref=e12661]:
                          - heading "4.8.2. Cooperative FSO Transmission Schemes" [level=4] [ref=e12662]
                          - generic [ref=e12663]: In this section, we explore the synchronous and asynchronous cooperative FSO transmission schemes. These schemes represent critical strategies for enhancing the performance and reliability of FSO systems. Synchronous cooperative transmission involves the precise coordination of multiple transmitting sources, ensuring that their signals reach the Rx in a well-aligned manner. This alignment can significantly improve signal quality and reduce error rates. Conversely, asynchronous cooperative transmission schemes do not require such strict timing coordination, offering greater flexibility and robustness in environments where perfect synchronization is challenging. By comparing these two approaches, we aim to highlight their respective advantages, limitations, and potential applications in various FSO communication scenarios.
                          - generic [ref=e12664]:
                            - heading "Synchronous Transmission Scheme" [level=5] [ref=e12665]
                            - generic [ref=e12666]:
                              - text: Synchronous transmission, a fundamental technique, has been utilized since the introduction of cooperative communication in radio systems. In this method, the source node transmits identical data on both the relay links and the direct link, enabling the destination node to combine the received signals synchronously, resulting in a stronger SNR. In this regard, all nodes involved in the cooperative FSO system transmit their signals in a coordinated manner, ensuring that the signals arrive at the destination simultaneously. This coordination requires precise timing synchronization among the source and relay nodes. This approach aims to enhance the reliability of the communication by providing multiple copies of the same signal. The destination node combines these received signals to improve signal quality and mitigate errors caused by AT and path loss. While cooperative communication has been extensively investigated in FSO systems, the redundancy inherent in synchronous transmission persists. Consequently, the FSO system must address the challenge of channel underutilization to achieve spatial diversity through cooperative communication [
                              - link "284" [ref=e12667] [cursor=pointer]:
                                - /url: "#B284-sensors-24-08036"
                              - text: "]."
                          - generic [ref=e12668]:
                            - heading "Asynchronous Transmission Scheme" [level=5] [ref=e12669]
                            - generic [ref=e12670]:
                              - text: An asynchronous transmission scheme is designed to minimize the substantial link redundancy in cooperative FSO systems (typically seen in synchronous transmission). In contrast to synchronous transmission, the asynchronous scheme enables the source node to send different data over both the direct and relay links, facilitating more flexible and independent data transmission. To leverage the diversity gain from these links, which carry distinct data, a squared signal combination method can be utilized to merge the signals received from multiple links. By jointly processing the signals before and after the squaring operation, the data on each link can be accurately recovered. As a result, asynchronous transmission provides diversity gain for cooperative FSO systems, improves channel utilization, and ultimately increases the effective data rate compared to synchronous transmission [
                              - link "284" [ref=e12671] [cursor=pointer]:
                                - /url: "#B284-sensors-24-08036"
                              - text: "]."
