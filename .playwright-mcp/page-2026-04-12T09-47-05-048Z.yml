                            - generic [ref=e13897]: Both synchronous and asynchronous transmission schemes have their advantages and challenges. Synchronous transmission ensures coordinated signal arrival, which simplifies signal processing at the destination node. However, it requires precise timing synchronization, which can be challenging in practical implementations. On the other hand, asynchronous transmission offers more flexibility and reduces link redundancy by allowing independent data transmission on different links. The squared signal combination method in asynchronous transmission provides diversity gain, enhancing data recovery. Consequently, the choice between synchronous and asynchronous transmission schemes in cooperative FSO systems is contingent upon the specific requirements and limitations of the application. Asynchronous transmission, with its reduced redundancy and flexibility, presents a promising approach for enhancing the performance and reliability of FSO communication systems.
                        - generic [ref=e13898]:
                          - heading "4.8.4. Hybrid Satellite–Terrestrial FSO Cooperative System" [level=4] [ref=e13899]
                          - generic [ref=e13900]:
                            - text: In [
                            - link "378" [ref=e13901] [cursor=pointer]:
                              - /url: "#B378-sensors-24-08036"
                            - text: "], it is demonstrated that portable cooperative relaying ground stations can be utilized to offer broadband access in disaster-stricken areas. These ground stations receive signals from a satellite and relay them to a hidden destination node via an FSO link. These hybrid satellite–terrestrial FSO cooperative schemes are not only cost effective but also can be deployed rapidly. In ["
                            - link "341" [ref=e13902] [cursor=pointer]:
                              - /url: "#B341-sensors-24-08036"
                            - text: "], an AF protocol-based hybrid satellite–terrestrial FSO cooperative system is analyzed. In this system, the satellite-to-relay link follows the shadowed-Rician land mobile satellite model, while the relay-to-destination FSO link follows the"
                            - generic [ref=e13903]:
                              - generic [ref=e13909]:
                                - generic [ref=e13910]: Γ
                                - generic [ref=e13911]: Γ
                              - math [ref=e13912]:
                                - generic [ref=e13914]:
                                  - generic [ref=e13915]: Γ
                                  - generic [ref=e13916]: Γ
                            - text: fading model. This hybrid system is distinct from a typical tandem RF/FSO link, where the RF link follows simpler fading statistics. The moment generating function (m.g.f.) for the hybrid link is derived, and this m.g.f. is used to approximate the average symbol error rate (SER) of the cooperative system. Additionally, the analytical diversity order of the AF-based hybrid cooperative system is determined.
                      - generic [ref=e13917]:
                        - heading "4.9. Adaptive Optics" [level=3] [ref=e13918]
                        - generic [ref=e13919]:
                          - text: AO is a crucial technology in FSO communication systems, designed to counteract the negative impacts of AT [
                          - link "8" [ref=e13920] [cursor=pointer]:
                            - /url: "#B8-sensors-24-08036"
                          - text: ","
                          - link "379" [ref=e13921] [cursor=pointer]:
                            - /url: "#B379-sensors-24-08036"
                          - text: "]. Turbulence can cause phase distortions in the optical wavefront, leading to beam spreading and signal degradation. AO systems utilize real-time feedback to adjust the shape of the optical wavefront, compensating for these distortions and thereby enhancing signal quality ["
                          - link "277" [ref=e13922] [cursor=pointer]:
                            - /url: "#B277-sensors-24-08036"
                          - text: "]. Consequently, through advanced wavefront sensing, real-time correction, and continuous innovation, the reliability and quality of FSO communication links can be improved significantly by AO systems, enabling more widespread and efficient deployment of this promising communication technology. This section explores the principles of AO, its implementation in FSO systems, and the current advancements in AO technology, highlighting its significance in enhancing signal quality and reliability."
                        - generic [ref=e13923]:
                          - heading "4.9.1. Principles of Adaptive Optics" [level=4] [ref=e13924]
                          - generic [ref=e13925]:
                            - text: AO systems are designed to correct phase distortions in the optical wavefront caused by AT. These distortions, resulting from variations in air temperature and pressure, can lead to beam spreading, scintillation, and other forms of signal degradation. The application of AO in turbulent conditions mitigates optical wavefront distortion, resulting in notable performance enhancements. Initially developed for astronomy and medical science, AO have gained prominence in imaging, FSO communications, and various military uses. In a turbulent medium, the AO correction process acts as a multiplicative spatial filter on the power spectrum. As defined in [
                            - link "380" [ref=e13926] [cursor=pointer]:
                              - /url: "#B380-sensors-24-08036"
                            - text: "], AT causes specific aberrations and wavefront distortions, which are statistically characterized. The use of AO for correction is further analyzed through the Zernike polynomials representation in ["
                            - link "8" [ref=e13927] [cursor=pointer]:
                              - /url: "#B8-sensors-24-08036"
                            - text: ","
                            - link "381" [ref=e13928] [cursor=pointer]:
                              - /url: "#B381-sensors-24-08036"
                            - text: "]. Studies on AO correction with a deformable mirror (DM) as a spatial filter and the associated fitting errors are documented in ["
                            - link "382" [ref=e13929] [cursor=pointer]:
                              - /url: "#B382-sensors-24-08036"
                            - text: ","
                            - link "383" [ref=e13930] [cursor=pointer]:
                              - /url: "#B383-sensors-24-08036"
                            - text: "]. Research on the outer scale effect on wavefront distortion reveals significant impacts on AO systems ["
                            - link "384" [ref=e13931] [cursor=pointer]:
                              - /url: "#B384-sensors-24-08036"
                            - text: "]. Regarding communication systems, investigations have explored the decrease in the scintillation index for Gaussian beams in non-Kolmogorov turbulent atmospheres and the BER of IM systems with AO ["
                            - link "385" [ref=e13932] [cursor=pointer]:
                              - /url: "#B385-sensors-24-08036"
                            - text: ","
                            - link "386" [ref=e13933] [cursor=pointer]:
                              - /url: "#B386-sensors-24-08036"
                            - text: "]. These findings collectively demonstrate the efficacy of AO in mitigating turbulence effects."
                            - link "Figure 13" [ref=e13934] [cursor=pointer]:
                              - /url: "#fig_body_display_sensors-24-08036-f013"
                            - text: illustrates a simplified AO system from the perspective of FSO. The key principles of AO include the following [
                            - link "277" [ref=e13935] [cursor=pointer]:
                              - /url: "#B277-sensors-24-08036"
                            - text: ","
                            - link "387" [ref=e13936] [cursor=pointer]:
                              - /url: "#B387-sensors-24-08036"
                            - text: "]:"
                          - generic [ref=e13937]:
                            - generic [ref=e13939] [cursor=pointer]:
                              - img "Sensors 24 08036 g013" [ref=e13940]
                              - link [ref=e13941]:
                                - /url: "#fig_body_display_sensors-24-08036-f013"
                            - generic [ref=e13942]: Figure 13. Depiction of an adaptive optics system.
                          - generic [ref=e13944]:
                            - term [ref=e13945]: (i)
                            - definition [ref=e13946]:
                              - generic [ref=e13947]: "Wavefront Sensing:"
                              - list [ref=e13948]:
                                - listitem [ref=e13949]:
                                  - generic [ref=e13950]:
                                    - text: "Shack–Hartmann Wavefront Sensor: One of the most common devices used in AO systems is the Shack–Hartmann wavefront sensor. It comprises a series of lenslets that focus portions of the incoming wavefront onto a detector. The displacements of the focal spots on the detector are used to reconstruct the wavefront distortions ["
                                    - link "387" [ref=e13951] [cursor=pointer]:
                                      - /url: "#B387-sensors-24-08036"
                                    - text: ","
                                    - link "388" [ref=e13952] [cursor=pointer]:
                                      - /url: "#B388-sensors-24-08036"
                                    - text: ","
                                    - link "389" [ref=e13953] [cursor=pointer]:
                                      - /url: "#B389-sensors-24-08036"
                                    - text: "]."
                                - listitem [ref=e13954]:
                                  - generic [ref=e13955]:
                                    - text: "Other Sensors: There are various other wavefront sensors, including curvature sensors and pyramid sensors, each with specific advantages depending on the application ["
                                    - link "390" [ref=e13956] [cursor=pointer]:
                                      - /url: "#B390-sensors-24-08036"
                                    - text: "]."
                            - term [ref=e13957]: (ii)
                            - definition [ref=e13958]:
                              - generic [ref=e13959]: "Wavefront Correction:"
                              - list [ref=e13960]:
                                - listitem [ref=e13961]:
                                  - generic [ref=e13962]:
                                    - text: "Deformable Mirrors: These mirrors have surfaces that can be precisely shaped using actuators to counteract the detected wavefront distortions. The most commonly used DMs are based on piezoelectric or micro-electro-mechanical systems (MEMS) technology ["
                                    - link "391" [ref=e13963] [cursor=pointer]:
                                      - /url: "#B391-sensors-24-08036"
                                    - text: ","
                                    - link "392" [ref=e13964] [cursor=pointer]:
                                      - /url: "#B392-sensors-24-08036"
                                    - text: ","
                                    - link "393" [ref=e13965] [cursor=pointer]:
                                      - /url: "#B393-sensors-24-08036"
                                    - text: "]."
                                - listitem [ref=e13966]:
                                  - generic [ref=e13967]:
                                    - text: "Spatial Light Modulators (SLMs): These devices modulate the phase of the light passing through them and can also be used for wavefront correction ["
                                    - link "394" [ref=e13968] [cursor=pointer]:
                                      - /url: "#B394-sensors-24-08036"
                                    - text: ","
                                    - link "395" [ref=e13969] [cursor=pointer]:
                                      - /url: "#B395-sensors-24-08036"
                                    - text: ","
                                    - link "396" [ref=e13970] [cursor=pointer]:
                                      - /url: "#B396-sensors-24-08036"
                                    - text: ","
                                    - link "397" [ref=e13971] [cursor=pointer]:
                                      - /url: "#B397-sensors-24-08036"
                                    - text: ","
                                    - link "398" [ref=e13972] [cursor=pointer]:
                                      - /url: "#B398-sensors-24-08036"
                                    - text: ","
                                    - link "399" [ref=e13973] [cursor=pointer]:
                                      - /url: "#B399-sensors-24-08036"
                                    - text: "]."
                            - term [ref=e13974]: (iii)
                            - definition [ref=e13975]:
                              - generic [ref=e13976]: "Real-Time Feedback:"
                              - list [ref=e13977]:
                                - listitem [ref=e13978]:
                                  - generic [ref=e13979]:
                                    - text: The AO system continuously monitors the wavefront distortions and adjusts the DM or SLM in real time to compensate for these distortions. This real-time feedback loop is crucial for maintaining high signal quality [
                                    - link "277" [ref=e13980] [cursor=pointer]:
                                      - /url: "#B277-sensors-24-08036"
                                    - text: ","
                                    - link "395" [ref=e13981] [cursor=pointer]:
                                      - /url: "#B395-sensors-24-08036"
                                    - text: ","
                                    - link "397" [ref=e13982] [cursor=pointer]:
                                      - /url: "#B397-sensors-24-08036"
                                    - text: "]."
                        - generic [ref=e13983]:
                          - heading "4.9.2. Implementation in FSO Systems" [level=4] [ref=e13984]
                          - generic [ref=e13985]:
                            - text: FSO technology has been explored for applications involving both stationary and mobile nodes. In 6G mobile networks, it is anticipated that many antennas utilizing high-frequency bands (such as THz) will be installed on a variety of stationary nodes like traffic lights and signboards, as well as mobile nodes like trains and drones [
                            - link "400" [ref=e13986] [cursor=pointer]:
                              - /url: "#B400-sensors-24-08036"
                            - text: "]. FSO presents a promising solution to deliver high-capacity mobile fronthaul connections for these antennas ["
                            - link "9" [ref=e13987] [cursor=pointer]:
                              - /url: "#B9-sensors-24-08036"
                            - text: ","
                            - link "12" [ref=e13988] [cursor=pointer]:
                              - /url: "#B12-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e13989]:
                            - text: In scenarios where FSO is used with moving nodes, an FSO node must adjust its output beam to ensure the FSO signal power surpasses the minimum Rx sensitivity at the receiving node’s aperture [
                            - link "9" [ref=e13990] [cursor=pointer]:
                              - /url: "#B9-sensors-24-08036"
                            - text: "]. In these FSO communication applications, a significant technical challenge is the PAT. Optical beam steering is a crucial function in PAT ["
                            - link "401" [ref=e13991] [cursor=pointer]:
                              - /url: "#B401-sensors-24-08036"
                            - text: "]. This involves tracking the position of the paired FSO node and adjusting the beam direction accordingly as the paired node moves. The position is monitored using a position detection method, such as a position-sensitive detector. The beam direction is then altered using a rotating mechanism ["
                            - link "9" [ref=e13992] [cursor=pointer]:
                              - /url: "#B9-sensors-24-08036"
                            - text: "]. Traditionally, this has been achieved through mechanical mechanisms such as fast steering mirrors (FSMs), two-axis gimbals, and MEMS mirrors. While effective, these methods are often heavy, bulky, slow to adjust, and prone to mechanical failure ["
                            - link "402" [ref=e13993] [cursor=pointer]:
                              - /url: "#B402-sensors-24-08036"
                            - text: ","
                            - link "403" [ref=e13994] [cursor=pointer]:
                              - /url: "#B403-sensors-24-08036"
                            - text: ","
                            - link "404" [ref=e13995] [cursor=pointer]:
                              - /url: "#B404-sensors-24-08036"
                            - text: ","
                            - link "405" [ref=e13996] [cursor=pointer]:
                              - /url: "#B405-sensors-24-08036"
                            - text: "]. Alternative non-mechanical approaches, such as those using optical phased arrays or liquid crystals, have also been explored. However, optical phased arrays are complicated in terms of control and calibration, and liquid crystals offer a limited steering range. Furthermore, these non-mechanical methods are not yet sufficiently advanced for use in FSO communication systems ["
                            - link "401" [ref=e13997] [cursor=pointer]:
                              - /url: "#B401-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e13998]:
                            - text: Furthermore, to maintain allowable PE, one approach is to use a beam Rx with a larger radius. However, this is challenging to mount on a moving FSO node due to severe constraints on size, weight, and power consumption. Another approach is to utilize a beam with a larger divergence angle at the Tx. Nevertheless, fixing the divergence angle at a larger value reduces the maximum FSO link distance [
                            - link "9" [ref=e13999] [cursor=pointer]:
                              - /url: "#B9-sensors-24-08036"
                            - text: "]. Recent proposals and demonstrations of adaptive beam divergence control have shown its effectiveness in improving PAT despite PE. By adjusting the beam divergence angle according to channel conditions, this method counteracts the negative impacts of PE. Studies have demonstrated that adaptive beam divergence control can enhance the range of an FSO link and reduce OP in comparison to systems utilizing fixed beam control ["
                            - link "9" [ref=e14000] [cursor=pointer]:
                              - /url: "#B9-sensors-24-08036"
                            - text: ","
                            - link "401" [ref=e14001] [cursor=pointer]:
                              - /url: "#B401-sensors-24-08036"
                            - text: "]."
                        - generic [ref=e14002]:
                          - heading "4.9.3. Pointing, Acquisition, and Tracking" [level=4] [ref=e14003]
                          - generic [ref=e14004]:
                            - text: In FSO communication systems, PAT mechanisms can reduce or minimize PE through the continuous monitoring of performance metrics like the Strehl ratio and received signal power. The Strehl ratio is defined as the ratio of the intensity along the optical axis of an aberrated or corrected point spread function (PSF) to the intensity of the diffraction-limited PSF on the optical axis. These metrics help in adjusting correction elements, including mirrors, gimbals, or AO [
                            - link "7" [ref=e14005] [cursor=pointer]:
                              - /url: "#B7-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e14006]:
                            - text: "The PAT mechanism has several key tasks: orienting the Tx towards the Rx, capturing the incoming light signal, and ensuring the FSO link remains stable by monitoring the position of the remote FSO terminal ["
                            - link "81" [ref=e14007] [cursor=pointer]:
                              - /url: "#B81-sensors-24-08036"
                            - text: "]. Pointing involves adjusting the Tx to align with the FoV of the Rx. Signal acquisition refers to aligning the Rx with the direction from which the beam arrives. Tracking entails continuously maintaining both pointing and signal acquisition during the optical communication between terminals ["
                            - link "7" [ref=e14008] [cursor=pointer]:
                              - /url: "#B7-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e14009]:
                            - text: Alongside PAT mechanisms, choosing the right beam divergence can help reduce PE. Specifically, as the beam footprint at the Rx increases, the PE decreases. However, increasing the divergence angle also leads to higher geometric path loss, which is the spread of transmitted power over the communication distance. This loss is influenced by the distance between stations, the divergence angle of the beam, and the size of the Rx aperture. Various optimization models have been proposed to determine the optimal beam width to minimize the BER and OP of an optical wireless link, taking into account PE and SNR [
                            - link "7" [ref=e14010] [cursor=pointer]:
                              - /url: "#B7-sensors-24-08036"
                            - text: ","
                            - link "23" [ref=e14011] [cursor=pointer]:
                              - /url: "#B23-sensors-24-08036"
                            - text: ","
                            - link "406" [ref=e14012] [cursor=pointer]:
                              - /url: "#B406-sensors-24-08036"
                            - text: ","
                            - link "407" [ref=e14013] [cursor=pointer]:
                              - /url: "#B407-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e14014]:
                            - text: Moreover, due to the increased geometric path loss associated with greater beam divergence, FSO communications typically use a narrow beam with a divergence angle no larger than 1 milliradian (mrad). This narrow beam enhances received power density and boosts link margin under various weather conditions. However, it also necessitates precise alignment between the transceivers due to the beam’s small footprint at the Rx. Achieving this alignment becomes more challenging when at least one of the parties involved in communication is mobile [
                            - link "7" [ref=e14015] [cursor=pointer]:
                              - /url: "#B7-sensors-24-08036"
                            - text: ","
                            - link "408" [ref=e14016] [cursor=pointer]:
                              - /url: "#B408-sensors-24-08036"
                            - text: ","
                            - link "409" [ref=e14017] [cursor=pointer]:
                              - /url: "#B409-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e14018]:
                            - text: PAT mechanisms are typically utilized in stationary and mobile FSO communication systems when employing a narrow beam. The primary motivations for using such beams include the high data rate associated with concentrated light intensity and the extended reach they provide. However, utilizing a wide beam can potentially reduce or even eliminate the performance demands on the PAT mechanism. Certain FSO applications have been proposed to take advantage of a wide beam to ease the requirements of PAT mechanisms. For example, utilizing the divergence angle of a wide beam can reduce the required steering speed of the FSM, a crucial component of the PAT mechanism in an FSO transceiver. It has been shown that a wide beam’s divergence angle offers a greater link range and more effective coverage length compared to a narrow beam, making it advantageous for applications such as high-speed train communications [
                            - link "410" [ref=e14019] [cursor=pointer]:
                              - /url: "#B410-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e14020]:
                            - text: PAT mechanisms in FSO communication systems can be categorized based on their principles of operation, including mirror-based, gimbal-based, gimbal–mirror hybrid, liquid crystal, AO, and RF-FSO hybrid methods [
                            - link "411" [ref=e14021] [cursor=pointer]:
                              - /url: "#B411-sensors-24-08036"
