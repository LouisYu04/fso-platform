                          - generic [ref=e688]:
                            - heading "Jamming" [level=5] [ref=e689]
                            - generic [ref=e690]:
                              - text: The wireless medium’s inherent openness renders it vulnerable to both intentional and unintentional interference. A significant source of unintentional interference is interference from neighboring cells. Conversely, intentional interference, like jamming attacks, represents adversarial actions targeting a victim Rx [
                              - link "74" [ref=e691] [cursor=pointer]:
                                - /url: "#B74-sensors-24-08036"
                              - text: "]. Therefore, as wireless links, the reliability and security of the entire FSO system are susceptible to intentional jamming. This threat is particularly significant in military platforms or other security-sensitive communication protocols controlled by FSO networks, which can be targeted and disrupted by adversaries ["
                              - link "75" [ref=e692] [cursor=pointer]:
                                - /url: "#B75-sensors-24-08036"
                              - text: "]. The impact of jamming on RF systems, including wireless multihop networks, has been extensively studied from various perspectives ["
                              - link "74" [ref=e693] [cursor=pointer]:
                                - /url: "#B74-sensors-24-08036"
                              - text: ","
                              - link "76" [ref=e694] [cursor=pointer]:
                                - /url: "#B76-sensors-24-08036"
                              - text: ","
                              - link "77" [ref=e695] [cursor=pointer]:
                                - /url: "#B77-sensors-24-08036"
                              - text: ","
                              - link "78" [ref=e696] [cursor=pointer]:
                                - /url: "#B78-sensors-24-08036"
                              - text: ","
                              - link "79" [ref=e697] [cursor=pointer]:
                                - /url: "#B79-sensors-24-08036"
                              - text: "]. FSO systems are also vulnerable to jamming because the spectral width of the laser light in FSO communications is typically confined to specific wavelengths to ensure compatibility with optical fiber communication. Usually, FSO communication operates within very narrow wavelength ranges, such as 1300 nm or 1550 nm. Consequently, the operating frequency of a legitimate user link is readily accessible in FSO systems, making them highly susceptible to jamming attacks ["
                              - link "75" [ref=e698] [cursor=pointer]:
                                - /url: "#B75-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e699]:
                              - text: Additionally, in an FSO system, it is crucial to optimize the field-of-view (FoV) based on the specific application. The FoV is defined as the solid angle through which a detector can receive an incoming optical signal. As illustrated in
                              - link "Figure 7" [ref=e700] [cursor=pointer]:
                                - /url: "#fig_body_display_sensors-24-08036-f007"
                              - text: a, the optical signal emitted by a jammer is captured when it falls within the FoV; otherwise, it passes through unobstructed. Typically, the FoV of the receiving aperture is kept wide to maximize signal reception, mitigate the effects of fading due to AT and PE, address aperture misalignment issues, and prevent communication link failures caused by obstacles in the FSO system [
                              - link "75" [ref=e701] [cursor=pointer]:
                                - /url: "#B75-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e702]:
                              - generic [ref=e704] [cursor=pointer]:
                                - img "Sensors 24 08036 g007" [ref=e705]
                                - link [ref=e706]:
                                  - /url: "#fig_body_display_sensors-24-08036-f007"
                              - generic [ref=e707]: Figure 7. FSO detector with (a) a narrow FoV and (b) a wide FoV.
                            - generic [ref=e708]:
                              - text: In tracking-based FSO communication systems, a wide FoV of up to
                              - generic [ref=e709]:
                                - generic [ref=e715]:
                                  - generic [ref=e716]: "60"
                                  - generic [ref=e717]: ∘
                                - math [ref=e718]:
                                  - generic [ref=e720]:
                                    - generic [ref=e721]: "60"
                                    - generic [ref=e722]: ∘
                              - text: is employed to increase the tracking range and reduce optical aberrations [
                              - link "80" [ref=e723] [cursor=pointer]:
                                - /url: "#B80-sensors-24-08036"
                              - text: "]. Additionally, coarse PAT (CPAT) systems consider FoVs up to 70° ["
                              - link "7" [ref=e724] [cursor=pointer]:
                                - /url: "#B7-sensors-24-08036"
                              - text: ","
                              - link "81" [ref=e725] [cursor=pointer]:
                                - /url: "#B81-sensors-24-08036"
                              - text: "]. Due to the inherent fluctuations of UAVs, the optimal FoVs for UAV-based FSO links are significantly larger than those for ground-based FSO links ["
                              - link "82" [ref=e726] [cursor=pointer]:
                                - /url: "#B82-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e727]:
                              - text: Moreover, aperture averaging is an essential technique in FSO systems, as the unpredictable nature of the received signal caused by fading imposes severe constraints on system performance. Aperture averaging is a technique used to control and define the size of the detector or receiving aperture needed to capture the traversing optical field as effectively as possible. This process is particularly crucial for FSO systems operating in strong and saturated regimes. Aperture averaging helps to mitigate signal scintillation or irradiance flux variations (reducing fade probability), minimize the impacts of angle of arrival (AoA) fluctuations and boresight angle, and optimize the average signal power at the detector plane. Additionally, it serves as a primary method to ensure spatial diversity [
                              - link "46" [ref=e728] [cursor=pointer]:
                                - /url: "#B46-sensors-24-08036"
                              - text: ","
                              - link "83" [ref=e729] [cursor=pointer]:
                                - /url: "#B83-sensors-24-08036"
                              - text: "]. A comprehensive discussion on aperture averaging is provided in"
                              - link "Section 4.9" [ref=e730] [cursor=pointer]:
                                - /url: "#sec4dot9-sensors-24-08036"
                              - text: . Therefore, to maintain effective FSO communication through the continuous establishment of transmission links, it is crucial to have a larger aperture diameter, which consequently results in a wide FoV [
                              - link "46" [ref=e731] [cursor=pointer]:
                                - /url: "#B46-sensors-24-08036"
                              - text: ","
                              - link "82" [ref=e732] [cursor=pointer]:
                                - /url: "#B82-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e733]:
                              - text: A narrow FoV restricts the operational coverage area, making it less ideal for FSO systems. Conversely, a wider FoV increases ambient light background noise, which can be mitigated through various methods to capture a larger portion of the incoming optical beam at the FSO Rx [
                              - link "82" [ref=e734] [cursor=pointer]:
                                - /url: "#B82-sensors-24-08036"
                              - text: ","
                              - link "84" [ref=e735] [cursor=pointer]:
                                - /url: "#B84-sensors-24-08036"
                              - text: "]. Also, a higher FoV offers a broader coverage area and improved signal reception. For instance, a larger aperture diameter (8 inches) significantly reduces error probability in comparison with a smaller aperture diameter (2 inches) ["
                              - link "46" [ref=e736] [cursor=pointer]:
                                - /url: "#B46-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e737]:
                              - text: Moreover, implementing a higher FoV does not necessitate additional circuitry for pointing and tracking mechanisms, thereby guaranteeing reliable wireless connectivity between the transmitting and receiving apertures. As a result, FSO systems with a higher FoV are less susceptible to misalignment errors, which helps to mitigate the blocking probability caused by obstacles between the source and destination points. This reduces the need for stringent alignment control mechanisms. However, the extensive FoV essential for effective signal reception, coupled with the multiple receiving nodes required in cooperative networks, renders FSO links susceptible to jamming attacks at any node. The detector can easily capture the jamming signal, as illustrated in
                              - link "Figure 7" [ref=e738] [cursor=pointer]:
                                - /url: "#fig_body_display_sensors-24-08036-f007"
                              - text: b, creating a significant challenge in differentiating the transmitted signal from unwanted jamming signals [
                              - link "46" [ref=e739] [cursor=pointer]:
                                - /url: "#B46-sensors-24-08036"
                              - text: ","
                              - link "82" [ref=e740] [cursor=pointer]:
                                - /url: "#B82-sensors-24-08036"
                              - text: "]. Moreover, in a dual-hop link, an attack that blocks either node will result in the failure of the entire source–relay–destination link."
                            - generic [ref=e741]:
                              - text: Jamming in point-to-point (p2p) FSO communication is studied in [
                              - link "75" [ref=e742] [cursor=pointer]:
                                - /url: "#B75-sensors-24-08036"
                              - text: ","
                              - link "85" [ref=e743] [cursor=pointer]:
                                - /url: "#B85-sensors-24-08036"
                              - text: "], while a similar scenario for cooperative relaying is explored in ["
                              - link "86" [ref=e744] [cursor=pointer]:
                                - /url: "#B86-sensors-24-08036"
                              - text: ","
                              - link "87" [ref=e745] [cursor=pointer]:
                                - /url: "#B87-sensors-24-08036"
                              - text: "]. In ["
                              - link "75" [ref=e746] [cursor=pointer]:
                                - /url: "#B75-sensors-24-08036"
                              - text: "], the impact of jamming, where the jammer aims to congest the Rx with unwanted noise, is investigated for FSO communication systems to analyze the outage probability (OP) and bit-error rate (BER) expressions of the system. However, none of these studies address the issue of jamming in the context of aperture averaging and phase error impairment in Exponentiated Weibull (EW) statistics. In ["
                              - link "75" [ref=e747] [cursor=pointer]:
                                - /url: "#B75-sensors-24-08036"
                              - text: "], it is demonstrated that jamming can severely degrade the performance of single-input single-output (SISO) FSO systems. In ["
                              - link "46" [ref=e748] [cursor=pointer]:
                                - /url: "#B46-sensors-24-08036"
                              - text: "], the threat to security-constrained reliable FSO communications due to jamming over an exponentially weighted fading channel is examined, taking into account various AT conditions, aperture averaging, and PE. Analytical expressions for the average BER (ABER) and OP are derived for the FSO system under the influence of a random jammer. In ["
                              - link "88" [ref=e749] [cursor=pointer]:
                                - /url: "#B88-sensors-24-08036"
                              - text: "], jamming for cooperative relaying is further investigated. To address the impact of jamming in FSO communication networks, a buffer-aided relaying approach is proposed. This method employs a relay node with a finite-size buffer and assumes that both relay and destination nodes are susceptible to jamming. Comparisons with a non-buffer-aided (NBA) cooperative FSO system impacted by jamming show that the proposed buffer-aided FSO system considerably outperforms its NBA counterparts."
