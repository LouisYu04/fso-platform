                        - generic [ref=e14475]:
                          - heading "6.3.5. Network Architecture and Protocols" [level=4] [ref=e14476]
                          - generic [ref=e14477]:
                            - text: "The development of new network architectures and protocols is essential to support the deployment and scalability of FSO systems. In this regard, certain areas such as designing network topologies that can adjust dynamically to varying conditions and optimize FSO link performance require further research: creating efficient routing and handover protocols to manage the transition between FSO and other communication technologies, ensuring seamless connectivity, and leveraging software-defined networking to enable flexible and programmable FSO networks that can be easily managed and optimized for different applications and environments ["
                            - link "75" [ref=e14478] [cursor=pointer]:
                              - /url: "#B75-sensors-24-08036"
                            - text: ","
                            - link "340" [ref=e14479] [cursor=pointer]:
                              - /url: "#B340-sensors-24-08036"
                            - text: ","
                            - link "478" [ref=e14480] [cursor=pointer]:
                              - /url: "#B478-sensors-24-08036"
                            - text: ","
                            - link "508" [ref=e14481] [cursor=pointer]:
                              - /url: "#B508-sensors-24-08036"
                            - text: ","
                            - link "509" [ref=e14482] [cursor=pointer]:
                              - /url: "#B509-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e14483]: Addressing the previously mentioned key areas of research is essential for realizing the complete capabilities of FSO communication in next-generation networks. By developing robust mitigation techniques for AT, integrating FSO with emerging technologies, exploring new materials and devices, enhancing security, and innovating network architectures and protocols, researchers can pave the way for more reliable, efficient, and versatile FSO communication systems. These advancements will enable FSO to play a pivotal role in meeting the growing need for high-speed, high-capacity wireless communication in the future.
                      - generic [ref=e14484]:
                        - heading "6.4. Future Directions" [level=3] [ref=e14485]
                        - generic [ref=e14486]:
                          - text: This section explores future directions in optical communication technologies, focusing on several key advancements. It delves into novel modulation schemes, adaptive transmission techniques, and aperture averaging methods to enhance signal quality. The discussion extends to spatial diversity and cooperative relaying strategies aimed at improving communication reliability. Additionally, the integration of AO and ADTs is examined for their potential to mitigate atmospheric distortions. The potential of hybrid FSO systems, along with advanced ECC and modulated signal optimization, is also highlighted, underscoring the continuous evolution of this field. The future directions are highlighted in
                          - link "Figure 16" [ref=e14487] [cursor=pointer]:
                            - /url: "#fig_body_display_sensors-24-08036-f016"
                          - text: and explored in detail in the following subsections.
                        - generic [ref=e14488]:
                          - generic [ref=e14490] [cursor=pointer]:
                            - img "Sensors 24 08036 g016" [ref=e14491]
                            - link [ref=e14492]:
                              - /url: "#fig_body_display_sensors-24-08036-f016"
                          - generic [ref=e14493]: "Figure 16. Schematic of the tutorial organization with related content. AMS-SEC: Advanced Modulation Schemes in conjunction with Sophisticated Error Correction, OptSM-AI/ML: Optimized Spatial Modulation with AI and ML, ML-Aided-ORA: ML-Aided Optimization and Resource Allocation, AMC: Adaptive modulation and coding, AAA: Advanced Adaptive Algorithms, ECC-MS: Error Correction Codes and Modulated Signal, EPRT: Enhanced Performance in Real-Time, PAS: Probabilistic Amplitude Shaping, xFT: Extensive Field Trials, WS-DM: Wavefront Sensors and Deformable Mirrors, NI: Noise and Interference, NG: Next-Generation, mMTC: Massive Machine-Type Communications, ADT: Adaptive Detection Thresholds, AMBS: Adaptive Modulation and Beam Steering, CCTRX: Compact and Cost-Effective Transceivers."
                        - generic [ref=e14494]:
                          - heading "6.4.1. Modulation Schemes" [level=4] [ref=e14495]
                          - generic [ref=e14496]: The future of FSO communications is poised for considerable advancements through the continuous enhancement and integration of various modulation schemes. These advancements will enable FSO systems to achieve higher capacities, enhanced reliability, and greater resilience against atmospheric challenges. Several key directions in the enhancement and integration of traditional, advanced, and SM techniques promise to significantly improve the performance of FSO communication networks.
                          - generic [ref=e14497]:
                            - heading "Adaptive Modulation" [level=5] [ref=e14498]
                            - generic [ref=e14499]:
                              - text: Traditional modulation techniques, while foundational, are being complemented and surpassed by more advanced methods. Among these, adaptive modulation stands out. Consequently, adaptive modulation techniques will be essential in future FSO systems. These techniques adjust the modulation parameters in real-time based on the current channel conditions. For instance, during periods of favorable atmospheric conditions, higher-order modulation schemes such as 64-QAM can be used to enhance data rates. Conversely, during periods of high turbulence or fog, the system can switch to more robust modulation schemes like BPSK to maintain link reliability. The dynamic nature of adaptive modulation ensures that FSO systems can optimize their performance under a diverse array of environmental conditions [
                              - link "93" [ref=e14500] [cursor=pointer]:
                                - /url: "#B93-sensors-24-08036"
                              - text: "]."
                          - generic [ref=e14501]:
                            - heading "Advanced Modulation Schemes in Conjunction with Sophisticated Error Correction" [level=5] [ref=e14502]
                            - generic [ref=e14503]:
                              - text: Advanced error correction techniques are also playing a crucial role. By correcting errors that occur during data transmission, these methods enhance the reliability and efficiency of the systems, even in the presence of atmospheric disturbances like fog, rain, and turbulence. Thus, future modulation schemes will also incorporate advanced error correction methods to alleviate the impact of channel impairments. Techniques such as LDPC codes and Turbo codes will be integrated into the modulation process to detect and correct errors in the transmitted data. These error correction methods will enhance the reliability of FSO communications, ensuring that data are accurately received even amid interference and noise [
                              - link "93" [ref=e14504] [cursor=pointer]:
                                - /url: "#B93-sensors-24-08036"
                              - text: "]."
                          - generic [ref=e14505]:
                            - heading "Optimizing Spatial Modulation with AI and ML" [level=5] [ref=e14506]
                            - generic [ref=e14507]: SM techniques, which exploit multiple spatial channels, are proving essential in increasing data rates and system capacity without requiring additional bandwidth. Also, AI and ML are emerging as transformative technologies in this domain. The application of AI and ML algorithms can further optimize SM schemes. AI and ML can analyze large volumes of data to predict channel conditions and dynamically adjust modulation parameters in real-time. For instance, ML models can predict periods of high turbulence and preemptively switch to more robust modulation schemes, reducing the risk of data loss. These predictive capabilities will ensure that FSO systems maintain optimal performance in real-time, enhancing their overall efficiency and reliability.
                        - generic [ref=e14508]:
                          - heading "6.4.2. Adaptive Transmission" [level=4] [ref=e14509]
                          - generic [ref=e14510]: Future research on adaptive transmission schemes for FSO communication systems promises to bring substantial advancements to the field. In this context, adaptive transmission schemes in FSO communication systems are crucial for overcoming the inherent challenges posed by atmospheric conditions and ensuring robust, high-quality data transmission. So, as FSO technology advances, several promising directions for future research and development can significantly advance adaptive transmission techniques, enhancing their reliability, efficiency, and overall performance.
                          - generic [ref=e14511]:
                            - heading "Dynamic Real-Time Adjustments" [level=5] [ref=e14512]
                            - generic [ref=e14513]: One primary focus is the development of more sophisticated algorithms capable of dynamically adjusting to real-time channel conditions. These algorithms will leverage advanced signal processing techniques to continuously monitor and respond to changes in the atmospheric environment, such as fog, rain, or turbulence. By doing so, they will ensure that the communication link remains robust and efficient, regardless of external conditions. In this regard, future research will likely focus on the creation of more sophisticated algorithms capable of making dynamic adjustments to transmission parameters in real-time. These algorithms will analyze the present condition of the communication channel, including factors such as AT, alignment errors, and environmental changes, and adjust modulation schemes, power levels, beam steering, and/or other transmission parameters accordingly, all performed in real-time. By doing so, they will maintain optimal communication performance and minimize errors and data loss.
                          - generic [ref=e14514]:
                            - heading "Adaptive Modulation and Coding" [level=5] [ref=e14515]
                            - generic [ref=e14516]: Advances in AMC techniques will be pivotal. Algorithms that can switch between different modulation formats and ECC based on real-time channel assessments will enhance the resilience of FSO systems. For instance, during periods of high turbulence, the system could switch to a more robust modulation scheme to ensure data integrity, while reverting to higher data rate schemes when conditions are favorable.
                          - generic [ref=e14517]:
                            - heading "ML-Driven Predictive Adaptation" [level=5] [ref=e14518]
                            - generic [ref=e14519]: The integration of ML and AI techniques represents another promising direction. These technologies can be used to develop predictive adaptation methods that preemptively mitigate the effects of adverse conditions. In this context, ML techniques hold significant promise for enhancing adaptive transmission in FSO systems. By leveraging vast amounts of historical and real-time data, ML models can predict atmospheric conditions and channel states, allowing FSO systems to preemptively adjust their transmission parameters. Predictive adaptation allows the system to prepare for potential disruptions before they occur and can mitigate adverse effects such as signal fading and scattering, ensuring a more stable and reliable communication link.
                          - generic [ref=e14520]:
                            - heading "ML-Aided Optimization and Resource Allocation" [level=5] [ref=e14521]
                            - generic [ref=e14522]: ML algorithms can also optimize resource allocation within FSO networks. By analyzing usage patterns and channel conditions, these algorithms can allocate bandwidth and power resources more efficiently, enhancing overall network performance. For example, during periods of peak demand, the system could dynamically allocate more resources to critical communication links, ensuring consistent service quality.
                        - generic [ref=e14523]:
                          - heading "6.4.3. Aperture Averaging" [level=4] [ref=e14524]
                          - generic [ref=e14525]: As FSO communication systems advance, exploring new developments in aperture averaging offers several promising directions that can significantly enhance system performance. Aperture averaging, which mitigates the impact of AT by averaging the received optical signal over a larger aperture, is critical for improving signal quality and reliability in FSO systems. Future research in this area can explore several innovative approaches to optimize and advance aperture averaging techniques.
                          - generic [ref=e14526]:
                            - heading "Optimized Aperture Designs" [level=5] [ref=e14527]
                            - generic [ref=e14528]: One promising direction is the optimization of aperture designs. By refining the size, shape, and configuration of optical apertures, researchers can further reduce the impacts of turbulence and enhance the quality of the received signal. In this regard, they can identify designs that minimize the scattering and diffraction of optical signals as they travel through the atmosphere. Optimized aperture designs can effectively average out the scintillations caused by atmospheric variations, leading to more stable and reliable communication links. This can involve the use of novel materials and engineering approaches to create apertures that are more efficient and effective in mitigating turbulence.
                          - generic [ref=e14529]:
                            - heading "Adaptive Aperture Configurations" [level=5] [ref=e14530]
                            - generic [ref=e14531]: Innovations in AO and dynamic aperture configurations also hold significant potential for real-time performance enhancement. AO systems, which use DMs and other technologies to adjust the optical path in real-time, can be integrated with aperture averaging to dynamically counteract turbulence effects. This real-time adjustment capability allows the FSO system to maintain high performance under varying environmental conditions. Thus, dynamic aperture configurations, where the aperture size, shape and/or arrangement can be altered on-the-fly, can also adapt to changing turbulence conditions. This adaptability will help maintain signal integrity and reduce errors in data transmission.
                          - generic [ref=e14532]:
                            - heading "Integrating Machine Learning Algorithms" [level=5] [ref=e14533]
                            - generic [ref=e14534]:
                              - text: The integration of ML algorithms into aperture averaging techniques is another exciting avenue for future research. ML can be employed to develop predictive models that anticipate the effects of AT. Also, ML can also facilitate more intelligent decision-making within FSO systems [
                              - link "400" [ref=e14535] [cursor=pointer]:
                                - /url: "#B400-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e14536]: "Predictive Modeling of Turbulence Effects: The integration of ML algorithms into aperture averaging techniques can revolutionize how FSO systems handle atmospheric disturbances. ML models can analyze historical and real-time data to predict turbulence patterns and their effects on optical signals. By employing predictive modeling, FSO systems can proactively adjust their aperture configurations or signal processing parameters, enhancing resilience against turbulence-related challenges."
                            - generic [ref=e14537]: "Smart Decision-Making: ML can also enable smarter decision-making within FSO systems. For example, algorithms could assess the current atmospheric conditions and determine the optimal aperture configuration or modulation technique to employ, ensuring that the system adapts to real-time changes. This capability will improve link reliability and enhance overall system performance, particularly in dynamic environments where conditions fluctuate rapidly."
                          - generic [ref=e14538]:
                            - heading "Exploring Hybrid Systems" [level=5] [ref=e14539]
                            - generic [ref=e14540]: Investigating hybrid systems that integrate aperture averaging with other diversity techniques—such as spatial or temporal diversity—holds promise for further improving FSO communication. By integrating these diversity techniques with aperture averaging, researchers can create hybrid systems that offer enhanced resilience against turbulence and other atmospheric disturbances.
                            - generic [ref=e14541]: "Spatial Diversity Techniques: By leveraging the strengths of various approaches, hybrid systems can provide enhanced link reliability and greater overall communication efficiency. For example, spatial diversity techniques can be combined with aperture averaging to exploit multiple paths for signal transmission, mitigating the effect of turbulence and improving the robustness of the communication link."
                            - generic [ref=e14542]: "Temporal Diversity Techniques: Temporal diversity, which involves transmitting signals over different time slots, can also be effectively integrated with aperture averaging. By employing adaptive transmission schemes that adjust the timing of signal transmission based on atmospheric conditions, FSO systems can minimize the risk of signal degradation. This combination could lead to a more resilient system designed to sustain high data rates even under challenging weather conditions."
                          - generic [ref=e14543]:
                            - heading "Addressing the Service Demand" [level=5] [ref=e14544]
                            - generic [ref=e14545]: Advancements in aperture averaging will be pivotal in meeting the high-capacity demands of 5G and future networks.
                            - generic [ref=e14546]: "Meeting Communication Needs: As the demand for high-capacity optical communication solutions grows—driven by applications such as 5G, remote sensing, and satellite communications—the advancements in aperture averaging will play a crucial role. Enhanced signal quality and link reliability achieved through optimized aperture designs and innovative adaptive techniques will ensure that FSO systems can support the increasing data traffic and diverse application requirements in both urban and remote settings."
                            - generic [ref=e14547]: "Scalability and Implementation: Future research should also focus on ensuring that these advancements in aperture averaging are scalable and practical for deployment in various environments. Developing cost-effective solutions and robust implementation strategies will be vital for the widespread adoption of FSO systems. This includes creating standardized protocols for the design and deployment of aperture averaging techniques, ensuring interoperability across different platforms and applications."
                        - generic [ref=e14548]:
                          - heading "6.4.4. Spatial Diversity" [level=4] [ref=e14549]
                          - generic [ref=e14550]: Spatial diversity techniques in FSO communication, specifically MISO, SIMO, and MIMO systems, are becoming increasingly essential in addressing the difficulties presented by AT and signal degradation. Future research in these areas is set to explore several key avenues aimed at enhancing performance, reliability, and applicability of FSO systems.
                          - generic [ref=e14551]:
                            - heading "Development of Advanced Adaptive Algorithms" [level=5] [ref=e14552]
                            - generic [ref=e14553]: Adaptive approaches will greatly improve link reliability and data throughput, especially in dynamic environments, where the atmospheric conditions can vary rapidly.
                            - generic [ref=e14554]: "Real-Time Optimization of Beamforming: One of the promising research directions is the development of advanced adaptive algorithms that optimize beamforming and Rx diversity in real-time. By flexibly adjusting the transmission and reception parameters depending on current environmental conditions, these algorithms can significantly improve link reliability and quality. For instance, algorithms that can assess atmospheric conditions—such as turbulence and scatter—will allow for intelligent adjustments in beam alignment and power levels, ensuring that the optical signal remains robust even in challenging situations. Also, adaptive beamforming techniques can direct the optical beams in real-time to the most favorable paths."
                            - generic [ref=e14555]: "Enhanced Rx Diversity Techniques: In addition to beamforming, enhancing Rx diversity techniques is critical for mitigating the effects of multipath propagation caused by atmospheric disturbances. Rx diversity algorithms can combine signals from multiple Rxs to maximize signal quality. Future algorithms may incorporate feedback mechanisms that evaluate signal quality across multiple Rxs, allowing systems to select the optimal Rx in real-time. Such adaptive diversity strategies will ensure a more stable communication link and minimize the potential for signal dropouts."
                          - generic [ref=e14556]:
                            - heading "Integration of Machine Learning Techniques" [level=5] [ref=e14557]
                            - generic [ref=e14558]: Integrating ML techniques into FSO communication offers another exciting research avenue for spatial diversity systems.
                            - generic [ref=e14559]: "Predictive Analytics for Turbulence Mitigation: Integrating ML techniques into spatial diversity systems presents a significant opportunity for improved performance. ML models can analyze vast amounts of historical and real-time data to predict turbulence patterns and their potential impact on signal quality. By leveraging predictive analytics, FSO systems can preemptively adjust transmission parameters, such as modulation schemes and power levels, thereby enhancing turbulence mitigation strategies and resource allocation."
                            - generic [ref=e14560]: "Optimizing Resource Allocation: ML can assist in resource allocation by determining the most efficient use of available communication channels and transceivers based on real-time and historical data. This predictive capability can greatly improve the resilience and efficiency of FSO systems. For instance, ML can play a pivotal role in optimizing resource allocation in MIMO systems. By intelligently managing the distribution of available bandwidth and power across multiple transmission paths, these algorithms can enhance throughput and efficiency, especially in dense urban environments where interference is prevalent. The ability to dynamically allocate resources based on real-time conditions will be crucial for maintaining high-quality communication links."
                          - generic [ref=e14561]:
                            - heading "Advancements in Photonic Technologies" [level=5] [ref=e14562]
                            - generic [ref=e14563]: Advancements in photonic technologies and materials will be essential for the development of more efficient, compact, and cost-effective transceivers in spatial diversity systems. This can lead to the development of FSO systems that are easier to deploy and maintain.
                            - generic [ref=e14564]:
                              - text: "Efficient and Compact Transceivers: Research should focus on miniaturizing components, integrating multiple functionalities into single devices, and improving energy efficiency. Innovations in photonic integration, such as the use of photonic integrated circuits (PICs), have the potential to decrease the size and power consumption of FSO devices while enhancing their performance. These innovative designs will facilitate the creation of lightweight transceivers that can be deployed in a diverse array of applications, from small-scale IoT devices to large-scale urban infrastructure ["
                              - link "510" [ref=e14565] [cursor=pointer]:
                                - /url: "#B510-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e14566]: "Cost-Effective Solutions: Reducing the cost of these technologies will be crucial for enabling the widespread adoption of advanced spatial diversity systems. By streamlining manufacturing processes and exploring new materials that offer improved performance at lower costs, researchers can ensure that these technologies are accessible for various applications, including broadband access in underserved areas. Additionally, new materials with superior optical properties can improve the efficiency and reliability of FSO transceivers."
                          - generic [ref=e14567]:
                            - heading "Extensive Field Trials and Standardized Protocols" [level=5] [ref=e14568]
                            - generic [ref=e14569]: Extensive field trials are essential not only for the widespread adoption of advanced FSO systems but also for validating the performance of advanced spatial diversity systems and their associated new technologies and algorithms in real-world environments. This process will provide essential data for further refinement to enhance system performance. In this regard, the trials will provide valuable insights into system behavior under various atmospheric conditions and help refine algorithms and protocols for optimal performance. By conducting tests in diverse settings—rural, urban, and coastal—researchers can assess the adaptability and reliability of FSO systems across different scenarios.
                        - generic [ref=e14570]:
                          - heading "6.4.5. Error Correction Codes and Modulated Signal Optimization" [level=4] [ref=e14571]
                          - generic [ref=e14572]: The future directions for ECC and modulated signal optimization in FSO communication are promising and diverse, encompassing advancements in algorithm development, integrated coding and modulation techniques, and innovative approaches like capacity-approaching PAS.
                          - generic [ref=e14573]:
                            - heading "Error Correction Codes" [level=5] [ref=e14574]
                            - generic [ref=e14575]: Research in ECC will likely focus on creating more efficient algorithms capable of handling higher data rates and more complex error patterns, especially in real-time use cases.
                            - generic [ref=e14576]: "Efficient Algorithm Development: The development of these algorithms will be driven by the need to correct errors introduced by AT, scattering, and absorption, which can significantly degrade the quality of FSO links. Future ECC will need to be adaptive, adjusting to the varying error characteristics of the FSO channel in real-time. This could involve ML techniques to predict and correct errors dynamically, thereby improving the efficiency and reliability of data transmission."
                            - generic [ref=e14577]: "Enhanced Performance in Real-Time Applications: As real-time applications like video streaming and online gaming become more prevalent, ECC must evolve to provide low-latency error correction. Research will focus on reducing the computational complexity and latency of these codes while maintaining high error correction performance. This could involve the use of parallel processing techniques and hardware accelerators to achieve faster error correction without compromising the integrity of the data."
                          - generic [ref=e14578]:
                            - heading "Coded Modulation" [level=5] [ref=e14579]
                            - generic [ref=e14580]: Future work in CM will aim to further integrate coding and modulation techniques. Additionally, efforts will focus on developing adaptive CM schemes.
                            - generic [ref=e14581]: "Integration of Coding and Modulation Techniques: Coding and modulation techniques will be combined to optimize SE and enhance resilience against interference. This integration is crucial for FSO systems, where SE is paramount due to the limited available bandwidth. By combining coding and modulation, these systems can transmit more information over the same bandwidth while enhancing resistance to errors caused by atmospheric disturbances."
                            - generic [ref=e14582]: "Adaptive Coded Modulation Schemes: Future research will likely focus on developing adaptive CM schemes that can adjust to changing channel conditions in real-time. These schemes will use feedback from the Rx to adapt the modulation order and coding rate, optimizing the trade-off between the error resilience and data rate based on current channel conditions. This adaptability will be essential for maintaining high performance in the variable and unpredictable FSO environment."
                          - generic [ref=e14583]:
                            - heading "Capacity-Approaching Probabilistic Amplitude Shaping" [level=5] [ref=e14584]
                            - generic [ref=e14585]: Future research in capacity-approaching PAS will aim to further optimize PAS implementation, enhance adaptability, and reduce computational complexity. The work will focus on ensuring efficient use of the communication channel by aligning the signal’s amplitude distribution with the channel’s capacity.
                            - generic [ref=e14586]: "Optimization of PAS Implementation: Future research will focus on optimizing PAS implementation in practical systems, ensuring that it can be deployed effectively in real-world FSO networks. This will involve developing efficient algorithms for shaping and decoding that minimize computational complexity while maximizing performance."
                            - generic [ref=e14587]: "Enhancing Adaptability: Efforts will also be directed at enhancing the adaptability of PAS to different channel conditions. This adaptability is crucial for FSO systems, where channel conditions can change rapidly due to weather and other environmental factors. Researchers will work on creating PAS schemes that can dynamically adjust the signal shaping based on real-time feedback from the channel, ensuring optimal performance under all conditions."
                            - generic [ref=e14588]: "Reducing Computational Complexity: Reducing the computational complexity of PAS is another critical area of focus. While PAS offers significant benefits in terms of SE and robustness, its implementation can be computationally intensive. Future research will aim to streamline the algorithms used for PAS, making them more efficient and practical for deployment in FSO systems. This could involve leveraging advanced hardware, such as Field-Programmable Gate Arrays and Graphics Processing Units, to accelerate the necessary computations."
                        - generic [ref=e14589]:
                          - heading "6.4.6. Cooperative Relaying" [level=4] [ref=e14590]
                          - generic [ref=e14591]: The future directions of cooperative relaying in FSO communication are centered on enhancing network performance, reliability, and efficiency to address the requirements of increasingly demanding use cases. This involves advancements in relay selection algorithms, integration with emerging technologies, energy-efficient designs, and innovative cooperative relaying strategies.
                          - generic [ref=e14592]:
                            - heading "Intelligent Relay Selection Algorithms" [level=5] [ref=e14593]
                            - generic [ref=e14594]: One of the key areas of future research is the development of intelligent relay selection algorithms that utilize ML to dynamically optimize the selection of relay nodes based on real-time network conditions. These algorithms can analyze data such as signal quality, node locations, and atmospheric conditions to make informed decisions on the best relay nodes to use at any given time. This dynamic optimization helps to maintain robust communication links, reduce latency, and improve overall network performance. ML techniques like reinforcement learning and neural networks can be particularly effective in predicting and adapting to changing conditions in real-time, ensuring optimal relay performance.
                          - generic [ref=e14595]:
                            - heading "Integration with Emerging Technologies" [level=5] [ref=e14596]
                            - generic [ref=e14597]: Future research also focuses on integrating relay-assisted transmission with innovative technologies like 5G and future advancements. This integration will enable ultra-reliable low-latency communication (uRLLC) and massive machine-type communications (mMTC), which are crucial for applications like autonomous vehicles, smart cities, and industrial automation. By combining the low-latency and high data rates of 5G with the robust, high-capacity links provided by FSO, these hybrid systems can deliver seamless and reliable connectivity. This approach also supports the dense deployment of IoT devices and ensures that critical applications maintain connectivity even in challenging environments.
                          - generic [ref=e14598]:
                            - heading "Energy-Efficient Relay Designs" [level=5] [ref=e14599]
                            - generic [ref=e14600]: Energy efficiency is gaining increasing importance in communication networks. Consequently, future research is expected to concentrate on exploring sustainable network operations and the development of green communication protocols.
                            - generic [ref=e14601]:
                              - text: "Sustainable Network Operations: Future research will explore energy-efficient relay designs to extend network coverage and improve energy sustainability. This includes the development of low-power relays and the utilization of renewable energy sources like solar power for relay nodes. Energy-efficient algorithms that minimize power consumption while maintaining high performance will be critical for ensuring the sustainability of large-scale FSO networks. These advancements are crucial for lowering the carbon footprint of communication networks and for deploying FSO systems in remote or off-grid locations ["
                              - link "511" [ref=e14602] [cursor=pointer]:
                                - /url: "#B511-sensors-24-08036"
                              - text: ","
                              - link "512" [ref=e14603] [cursor=pointer]:
                                - /url: "#B512-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e14604]:
                              - text: "Green Communication Protocols: The development of green communication protocols that prioritize energy efficiency without compromising performance will be another focus area. These protocols can manage the power usage of relay nodes and optimize data transmission to reduce energy consumption, contributing to the overall sustainability of the network ["
                              - link "511" [ref=e14605] [cursor=pointer]:
                                - /url: "#B511-sensors-24-08036"
                              - text: ","
                              - link "512" [ref=e14606] [cursor=pointer]:
                                - /url: "#B512-sensors-24-08036"
                              - text: "]."
                          - generic [ref=e14607]:
                            - heading "Cooperative Relaying Strategies" [level=5] [ref=e14608]
                            - generic [ref=e14609]: Innovative cooperative relaying strategies will be investigated to extend network coverage and enhance connectivity. This will encompass the real-time adaptation of relay nodes.
                            - generic [ref=e14610]: "Extended Coverage and Robust Connectivity: Cooperative relaying involves multiple relay nodes working together to transmit data, which can significantly improve the robustness and reliability of communication links. By leveraging spatial diversity, these strategies can alleviate the impacts of AT and ensure consistent performance across the network. Future research will investigate new cooperative techniques, such as network coding and relay selection diversity, to maximize the benefits of cooperative relaying."
                            - generic [ref=e14611]: "Real-Time Adaptation: The ability of relay nodes to adapt in real-time to changing network conditions will be a key focus. This includes developing protocols that allow relay nodes to switch roles dynamically, share resources, and balance the load efficiently. Real-time adaptation will ensure that the network can handle varying traffic demands and maintain high performance even under challenging conditions."
                          - generic [ref=e14612]:
                            - heading "Supporting Demanding Applications" [level=5] [ref=e14613]
                            - generic [ref=e14614]: The advancements in cooperative relaying are aimed at supporting increasingly demanding applications such as autonomous vehicles and IoT networks. Autonomous vehicles require ultra-reliable, low-latency communication to ensure safety and efficient operation. Similarly, IoT networks involve a vast number of connected devices that need robust and seamless connectivity. The future research directions in cooperative relaying will ensure that FSO systems can meet these demands, providing high-capacity, reliable, and efficient communication links.
                        - generic [ref=e14615]:
                          - heading "6.4.7. Adaptive Optics" [level=4] [ref=e14616]
                          - generic [ref=e14617]: Future research in AO for FSO communication is poised to significantly enhance system reliability and performance by addressing the challenges posed by AT and environmental variability. Key areas of focus include the development of advanced wavefront sensors, DMs, the integration of ML algorithms, miniaturization of AO components, and the exploration of hybrid AO techniques.
                          - generic [ref=e14618]:
                            - heading "Advanced Wavefront Sensors and Deformable Mirrors" [level=5] [ref=e14619]
                            - generic [ref=e14620]: The development of more advanced wavefront sensors is critical for improving the ability of AO systems to detect and correct for atmospheric distortions in real-time.
                            - generic [ref=e14621]: "Enhanced Wavefront Sensing: Future research will likely explore new sensor technologies that offer higher sensitivity, faster response times, and greater accuracy. Innovations in wavefront sensing could include the use of novel materials and designs that improve performance while reducing power consumption and cost. These sensors will be essential for detecting subtle changes in the optical wavefront caused by turbulence, allowing for more precise corrections."
                            - generic [ref=e14622]: "High-Precision Deformable Mirrors: DMs are central to the operation of AO systems, as they physically adjust to correct distortions in the optical wavefront. Future advancements will focus on developing high-precision DMs that can respond more quickly and accurately to detected distortions. This includes the exploration of new actuator technologies and mirror materials that offer improved performance characteristics. Additionally, research will aim to increase the number of actuators on DMs, providing finer control over the mirror surface and enabling better correction of complex wavefront distortions."
                          - generic [ref=e14623]:
                            - heading "Integration of Machine Learning Algorithms" [level=5] [ref=e14624]
                            - generic [ref=e14625]: ML algorithms are anticipated to be pivotal in developing predictive and dynamic AO systems with real-time optimization.
                            - generic [ref=e14626]:
                              - text: "Predictive and Dynamic AO Systems: ML algorithms are anticipated to play a significant role in optimizing AO systems by predicting and compensating for dynamic environmental changes. ML can be used to analyze historical and real-time data to predict atmospheric conditions and preemptively adjust the AO system. For example, neural networks can be trained to recognize patterns in AT and optimize the response of wavefront sensors and DMs accordingly. This predictive capability will enhance the robustness and efficiency of FSO communication by reducing latency and improving correction accuracy ["
                              - link "389" [ref=e14627] [cursor=pointer]:
                                - /url: "#B389-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e14628]: "Real-Time Optimization: ML algorithms can also be employed for the real-time optimization of AO systems. By continuously learning from the incoming data and adjusting system parameters on-the-fly, these algorithms can ensure optimal performance under varying conditions. This dynamic adaptation will be particularly valuable for mobile FSO platforms, such as UAVs, where environmental conditions can change rapidly."
                          - generic [ref=e14629]:
                            - heading "Miniaturization of AO Components" [level=5] [ref=e14630]
                            - generic [ref=e14631]: The miniaturization of AO components is essential for integrating these systems into a variety of use cases.
                            - generic [ref=e14632]: "Compact and Mobile Platforms: Miniaturizing AO components is crucial for integrating these systems into compact and mobile platforms, such as UAVs, satellites, and portable ground stations. Future research will focus on developing smaller, lighter, and more energy-efficient wavefront sensors and DMs without compromising performance. This involves leveraging progress in MEMS technology and nanotechnology to create miniaturized components that can be easily integrated into various platforms."
                            - generic [ref=e14633]: "Scalable AO Systems: The miniaturization of AO components will also enable the development of scalable AO systems that can be deployed across a broad spectrum of applications, from small handheld devices to large-scale ground stations. Scalable systems will offer greater flexibility and adaptability, making AO technology accessible for diverse FSO communication scenarios."
                          - generic [ref=e14634]:
                            - heading "Hybrid Adaptive Optics Techniques" [level=5] [ref=e14635]
                            - generic [ref=e14636]: Investigating hybrid AO techniques can offer more comprehensive solutions for FSO communication systems.
                            - generic [ref=e14637]: "Combining Traditional and Novel Approaches: Exploring hybrid AO techniques that combine traditional methods with novel approaches, such as digital holography, can further enhance the robustness and efficiency of FSO communication. Digital holography involves capturing and reconstructing the wavefront information using digital sensors and processing algorithms. Integrating this technique with conventional AO methods can enhance the system’s ability to correct for complex distortions and improve overall performance."
                            - generic [ref=e14638]: "Enhanced Turbulence Mitigation: Hybrid AO techniques can provide more comprehensive solutions for mitigating turbulence effects by leveraging the strengths of different approaches. For instance, digital holography can offer high-resolution wavefront reconstruction, while traditional AO methods can provide real-time correction. Combining these techniques can result in more effective turbulence mitigation and better communication link stability."
                        - generic [ref=e14639]:
                          - heading "6.4.8. Adaptive Detection Thresholds" [level=4] [ref=e14640]
                          - generic [ref=e14641]: The future of ADT schemes in FSO communication presents a wealth of opportunities aimed at improving system performance, reliability, and adaptability. As the demand for high-capacity and resilient communication networks continues to grow, the development of advanced ADT strategies will be critical. The following sections elaborate on the key avenues for future research and development in ADT schemes.
                          - generic [ref=e14642]:
                            - heading "Integration of Machine Learning Techniques" [level=5] [ref=e14643]
                            - generic [ref=e14644]: One of the most promising directions for ADT schemes is the integration of ML techniques to enhance the adaptability and precision of detection thresholds.
                            - generic [ref=e14645]: "Predictive Threshold Optimization: By leveraging real-time data, ML algorithms can predict the optimal thresholds required for different conditions, including varying noise levels and interference patterns. This predictive capability allows for proactive adjustments to the detection thresholds, ensuring that the system can maintain optimal performance even in dynamic environments."
                            - generic [ref=e14646]: "Adaptive Learning Models: Implementing adaptive learning models that continuously refine their predictions based on incoming data will be essential. These models can be trained using historical data to recognize patterns in environmental changes and system performance, allowing them to adjust thresholds dynamically. Over time, the algorithms will improve their accuracy and responsiveness, making the communication link more reliable and efficient."
                          - generic [ref=e14647]:
                            - heading "Development of Sophisticated Algorithms" [level=5] [ref=e14648]
                            - generic [ref=e14649]: Future research should concentrate on creating more sophisticated algorithms that can dynamically adjust detection thresholds in response to environmental changes.
                            - generic [ref=e14650]: "Dynamic Threshold Adjustment: This involves creating algorithms that monitor various parameters, such as ambient light levels, atmospheric conditions, and interference sources, in real-time. By correlating these parameters with the performance metrics of the communication system, the algorithms can adapt the thresholds to optimize detection sensitivity and minimize false positives or negatives."
                            - generic [ref=e14651]: "Robustness Against Noise and Interference: The ability to adjust detection thresholds based on the specific characteristics of noise and interference is crucial for improving system robustness. Advanced statistical methods, including Bayesian inference and stochastic modeling, can be employed to develop thresholds that are not only reactive but also proactive, enabling the system to anticipate potential performance degradation before it occurs. Such algorithms would be particularly beneficial in urban environments where interference from multiple sources is common."
                          - generic [ref=e14652]:
                            - heading "Exploration of Hybrid ADT Schemes" [level=5] [ref=e14653]
                            - generic [ref=e14654]: Exploring hybrid ADT schemes that combine multiple detection strategies will be another key area for future research.
                            - generic [ref=e14655]: "Combining Detection Strategies: By integrating different detection approaches, such as energy detection, matched filtering, and decision feedback techniques, hybrid schemes can achieve improved performance across a broader range of operating conditions. This approach can leverage the strengths of each method while mitigating their weaknesses, leading to a more robust overall detection mechanism."
                            - generic [ref=e14656]: "Adaptive Feedback Mechanisms: Hybrid ADT schemes can also include adaptive feedback mechanisms that allow for the real-time adjustment of detection strategies based on performance outcomes. For example, if one detection method is underperforming due to a sudden increase in noise, the system can switch to another method that may be more suitable under the current conditions. This flexibility will enhance the system’s overall reliability and efficiency."
                          - generic [ref=e14657]:
                            - heading "Broadening the Application of ADT Schemes" [level=5] [ref=e14658]
                            - generic [ref=e14659]: Expanding the application of ADT schemes to emerging communication technologies, such as 5G and beyond, will ensure their relevance and effectiveness in next-generation networks.
                            - generic [ref=e14660]: "Relevance in Next-Generation Networks: As FSO communication is increasingly integrated into 5G architectures for high-speed data transmission, ADTs will play a crucial role in managing the complexities of multi-user environments, varying signal quality, and high data rates."
                            - generic [ref=e14661]: "Support for Massive Machine-Type Communications: The rise in mMTC and the IoT presents unique challenges for detection schemes. ADT strategies will need to adapt to the high density of devices and the potential for increased interference. The research will focus on developing ADT mechanisms that can efficiently manage these challenges, ensuring that each device can maintain reliable communication despite the presence of numerous concurrent transmissions."
                        - generic [ref=e14662]:
                          - heading "6.4.9. Hybrid FSO Systems" [level=4] [ref=e14663]
                          - generic [ref=e14664]: Hybrid FSO systems are poised to revolutionize optical communication by leveraging the unique strengths of FSO alongside other complementary technologies. These systems address individual limitations, offering enhanced performance in various environmental conditions. The future of hybrid FSO systems will revolve around several key research areas aimed at optimizing integration, enhancing reliability, and supporting the next generation of communication technologies.
                          - generic [ref=e14665]:
                            - heading "Exploring Seamless Communication Solutions" [level=5] [ref=e14666]
                            - generic [ref=e14667]: The exploration of hybrid FSO-RF systems offers a promising avenue for ensuring seamless communication across diverse environments. By combining the high-capacity and low-latency characteristics of FSO with the robustness and reliability of RF technologies, these systems can maintain connectivity even in the face of adverse atmospheric conditions. Future research should prioritize the development of intelligent algorithms that can determine the most suitable transmission medium based on environmental assessments, user demands, and application requirements.
                          - generic [ref=e14668]:
                            - heading "Optimizing Technology Integration" [level=5] [ref=e14669]
                            - generic [ref=e14670]: The synergy between FSO and alternative technologies will allow for redundancy and resilience in communication networks. This flexibility will be vital in applications requiring uninterrupted service, such as critical communications for emergency services and real-time data transmission for autonomous vehicles. One way to achieve this is by implementing advanced handover protocols and algorithms to enhance the reliability of hybrid systems.
                            - generic [ref=e14671]: "Seamless Handover Mechanisms: Future research will focus on developing seamless handover mechanisms between hybrid FSO systems and complementary communication technologies, such as RF and microwave links. Achieving smooth transitions between different transmission mediums is critical for maintaining continuous connectivity, particularly in mobile scenarios. By implementing advanced handover protocols and algorithms, hybrid systems can automatically switch between FSO and RF links based on real-time assessments of signal quality, distance, and atmospheric conditions. This ensures uninterrupted service, even in challenging environments."
                            - generic [ref=e14672]: "Enhanced Reliability and Resilience: Improving the reliability of hybrid systems is essential, especially in the face of AT and link blockages. Future studies will explore the integration of robust error correction methods and adaptive modulation techniques that can respond dynamically to environmental fluctuations. The use of intelligent algorithms to assess real-time conditions and adjust transmission parameters accordingly will be crucial. For instance, adaptive modulation schemes can vary the modulation format and coding rate based on current channel conditions, enhancing data throughput while minimizing errors."
                          - generic [ref=e14673]:
                            - heading "Innovations in Adaptive Modulation and Beam Steering" [level=5] [ref=e14674]
                            - generic [ref=e14675]: Innovations in adaptive modulation are crucial for maximizing the performance of hybrid FSO systems. Beam steering technology is another critical area of development.
                            - generic [ref=e14676]: "Adaptive Modulation Techniques: By employing techniques that can dynamically adjust modulation schemes depending on the quality of the communication link, these systems can optimize data rates and reliability. Future research may focus on integrating ML algorithms to predict optimal modulation schemes based on historical and real-time data, enabling systems to adapt more effectively to varying conditions."
                            - generic [ref=e14677]: "Advanced Beam Steering Solutions: Future hybrid FSO systems will benefit from advanced beam steering mechanisms that enhance the alignment of the optical beam, compensating for the effects of turbulence and movement. Techniques such as phased array systems and smart optics can be employed to achieve high-precision steering, ensuring that the optical signal remains focused on the intended Rx. The integration of intelligent beam steering algorithms will allow these systems to respond to environmental changes dynamically, further improving performance."
                          - generic [ref=e14678]:
                            - heading "Intelligent Network Management" [level=5] [ref=e14679]
                            - generic [ref=e14680]: As hybrid FSO systems become more prevalent, intelligent network management will be essential to optimize resource allocation and enhance overall network performance. Also, ensuring QoS is paramount in hybrid FSO systems, especially as user demands for high-speed, low-latency communication increase.
                            - generic [ref=e14681]: "Smart Network Orchestration: Future research will likely focus on developing advanced orchestration algorithms that can analyze network traffic, device connectivity, and environmental conditions to optimize the distribution of data across different transmission mediums. This will involve the employment of AI and ML techniques to create predictive models that facilitate efficient network management and minimize latency."
                            - generic [ref=e14682]: "Quality-of-Service Enhancements: Future research will explore QoS management techniques that prioritize traffic based on application requirements, ensuring that critical applications such as real-time video conferencing and remote surgery receive the necessary bandwidth and reliability. These enhancements will be vital for supporting a diverse range of applications across hybrid communication networks."
                          - generic [ref=e14683]:
                            - heading "Development of Compact and Cost-Effective Transceivers" [level=5] [ref=e14684]
                            - generic [ref=e14685]: The development of compact, low-power, and cost-effective transceivers will be pivotal in making hybrid FSO systems more accessible and practical for widespread deployment. Also, addressing the cost barriers associated with deploying hybrid FSO systems will also be a significant area of focus.
                            - generic [ref=e14686]: "Miniaturization and Integration: Future research will focus on miniaturizing optical components and integrating them into single packages, reducing the overall footprint and power requirements. Advances in photonics and microfabrication technologies will facilitate the creation of lightweight and energy-efficient transceivers that can be easily installed in various environments, from urban infrastructures to remote rural areas."
                            - generic [ref=e14687]: "Cost Effectiveness for Broad Deployment: Research will aim to streamline manufacturing processes and explore innovative funding models to make these technologies affordable for various applications, including municipal networks, broadband access, and IoT infrastructures. The availability of cost-effective solutions will accelerate the adoption of hybrid FSO systems across different market segments."
                          - generic [ref=e14688]:
                            - heading "Supporting Emerging Applications" [level=5] [ref=e14689]
                            - generic [ref=e14690]: With the advancement of hybrid FSO systems, they will possess significant potential to support emerging applications.
                            - generic [ref=e14691]: "5G/6G Networks and IoT Integration: As hybrid FSO systems evolve, their potential to support emerging applications like 5G and 6G networks, as well as the IoT, will be significant. The integration of hybrid systems into these next-generation networks will enable uRLLC, and facilitate advanced applications such as autonomous vehicles, smart cities, and augmented reality. By providing high-capacity links that can dynamically adapt to varying conditions, hybrid FSO systems will be integral in meeting the demands of an increasingly connected world."
                            - generic [ref=e14692]: "Satellite Communications Synergy: Furthermore, hybrid FSO systems will play a crucial role in enhancing satellite communications by offering high-speed, low-latency links between satellites and ground stations. By combining FSO with traditional RF communication, satellite systems can achieve greater resilience and capacity, addressing the challenges of high-speed data transfer in diverse atmospheric conditions."
                            - generic [ref=e14693]: Moreover, hybrid free-space optical communication systems hold significant promise for the future of Space–Air–Ground–Sea Integrated Networks (SAGSINs). These systems offer high bandwidth, low latency, and secure data transmission, making them ideal for enhancing connectivity in SAGSINs. Future advancements are expected to focus on improving link reliability, atmospheric compensation techniques, and seamless integration with existing RF systems to ensure robust, high-speed communication across diverse environments.
                    - generic [ref=e14694]:
                      - heading "7. Conclusions" [level=2] [ref=e14695]
                      - generic [ref=e14696]: In conclusion, FSO communication represents a transformative technology poised to address the escalating demands for high-speed, low-latency communication in the 5G and beyond era. This survey has highlighted the critical enabling technologies, such as adaptive optics, advanced modulation schemes, and robust error correction codes, that are essential for overcoming the inherent challenges associated with FSO systems, including atmospheric disturbances and alignment issues. The exploration of hybrid solutions integrating FSO with radio frequency, millimeter-wave, and Terahertz technologies demonstrates the potential for enhancing network reliability and coverage. Moreover, the incorporation of artificial intelligence and machine learning techniques marks a significant trend toward optimizing FSO performance in dynamic environments, paving the way for smarter and more resilient communication systems. By systematically analyzing current trends and challenges, this paper underscores the capacity of FSO to not only meet but exceed the communication requirements of future networks. Looking ahead, several open challenges remain, particularly concerning scalability, deployment strategies, and real-time adaptive capabilities in diverse atmospheric conditions. Addressing these challenges will be pivotal in realizing the full potential of FSO technology. Future research should focus on developing innovative solutions to enhance the robustness and efficiency of FSO systems, ensuring their successful integration into next-generation communication infrastructures. Ultimately, the insights presented in this paper contribute to a deeper understanding of the role of FSO in revolutionizing wireless communication and set the stage for ongoing advancements in this promising field.
