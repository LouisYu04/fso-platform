                            - link "412" [ref=e14022] [cursor=pointer]:
                              - /url: "#B412-sensors-24-08036"
                            - text: "]. Additionally, their operating principles and mechanics allow for classification based on dimensionality (i.e., 2D or 3D) as illustrated in"
                            - link "Figure 14" [ref=e14023] [cursor=pointer]:
                              - /url: "#fig_body_display_sensors-24-08036-f014"
                            - text: "["
                            - link "7" [ref=e14024] [cursor=pointer]:
                              - /url: "#B7-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e14025]:
