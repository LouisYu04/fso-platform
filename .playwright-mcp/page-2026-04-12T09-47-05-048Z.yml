                    - generic [ref=e375]:
                      - heading "2. FSO Communication System" [level=2] [ref=e376]
                      - generic [ref=e377]:
                        - text: FSO communication systems are a vital part of modern telecommunication technologies, offering a LoS data transmission method through the atmosphere [
                        - link "16" [ref=e378] [cursor=pointer]:
                          - /url: "#B16-sensors-24-08036"
                        - text: "] and space telecommunications ["
                        - link "17" [ref=e379] [cursor=pointer]:
                          - /url: "#B17-sensors-24-08036"
                        - text: "]. As illustrated in"
                        - link "Figure 4" [ref=e380] [cursor=pointer]:
                          - /url: "#fig_body_display_sensors-24-08036-f004"
                        - text: ", an FSO system primarily consists of three fundamental components: the transmitter (Tx-source), the channel, and the receiver (Rx-destination). Each of these components plays a critical role in ensuring the successful transmission of optical signals across free space. For instance, information waveforms are generated by a source and then modulated onto an optical carrier. This optical signal is transmitted through the atmosphere, or free-space, towards a remote destination. Along the way, the optical power emitted by the Tx is influenced by various factors before it reaches the Rx. As a result, the information received might not be an exact copy of the originally transmitted information. At the Rx, the optical signal is collected and converted into an electrical current by a photodetector. The Rx then processes this electrical current to retrieve the originally transmitted information ["
                        - link "1" [ref=e381] [cursor=pointer]:
                          - /url: "#B1-sensors-24-08036"
                        - text: ","
                        - link "3" [ref=e382] [cursor=pointer]:
                          - /url: "#B3-sensors-24-08036"
                        - text: "]. So, the FSO communication system’s efficiency and performance hinge on the seamless integration and alignment of these three components. The Tx initiates the communication by sending out the optical signal, the channel serves as the medium through which the signal travels, and the Rx completes the process by decoding the transmitted information at the destination. This section outlines the various processes involved in transmitting signals from the source to the destination in an FSO communication system."
                      - generic [ref=e383]:
                        - generic [ref=e385] [cursor=pointer]:
                          - img "Sensors 24 08036 g004" [ref=e386]
                          - link [ref=e387]:
                            - /url: "#fig_body_display_sensors-24-08036-f004"
                        - generic [ref=e388]: Figure 4. A typical block diagram of an FSO system.
                      - generic [ref=e389]:
                        - heading "2.1. Transmitter Side" [level=3] [ref=e390]
                        - generic [ref=e391]: The Tx is responsible for generating and encoding the optical signal that carries the data. It typically comprises a light source, such as a laser diode (LD) or Light-Emitting Diode (LED), which converts electrical data signals into optical signals. The Tx also includes optics to focus and direct the light beam towards the Rx. The FSO Tx operates by encoding and modulating data, amplifying the modulated signal if necessary, and then precisely directing the laser beam through beam-forming optics for transmission across the optical channel.
                        - generic [ref=e392]:
                          - link "Figure 5" [ref=e393] [cursor=pointer]:
                            - /url: "#fig_body_display_sensors-24-08036-f005"
                          - text: "provides a depiction of a typical FSO Tx. This system comprises several essential components: an optical source, a modulator (in case of external modulation), an optical amplifier (used as needed), and beam-forming optics. Initially, the data bits generated from the information source undergo channel coding, an optional step performed before the modulation process. This coding step enhances the reliability and performance of the communication by adding redundancy to the data. Following this, the encoded data are modulated onto an optical carrier generated by the optical source. This modulated signal is a laser beam that carries the information through the optical channel. To ensure the signal’s strength and maintain the quality of transmission over long distances or through adverse conditions, the modulated laser beam may be amplified using an optical amplifier. This amplification process boosts the optical intensity of the beam, making it more robust against attenuation and interference. Once the laser beam is sufficiently amplified, it is then passed through the beam-forming optics. These optics play a critical role in collecting the amplified light and refocusing it into a precise and well-collimated beam. This process ensures that the light beam maintains its integrity and alignment as it travels through free space to reach the Rx ["
                          - link "1" [ref=e394] [cursor=pointer]:
                            - /url: "#B1-sensors-24-08036"
                          - text: ","
                          - link "3" [ref=e395] [cursor=pointer]:
                            - /url: "#B3-sensors-24-08036"
                          - text: ","
                          - link "18" [ref=e396] [cursor=pointer]:
                            - /url: "#B18-sensors-24-08036"
                          - text: "]."
                        - generic [ref=e397]:
                          - generic [ref=e399] [cursor=pointer]:
                            - img "Sensors 24 08036 g005" [ref=e400]
                            - link [ref=e401]:
                              - /url: "#fig_body_display_sensors-24-08036-f005"
                          - generic [ref=e402]: Figure 5. A typical block diagram of an FSO Tx.
                        - generic [ref=e403]:
                          - heading "2.1.1. Transmission Wavelength" [level=4] [ref=e404]
                          - generic [ref=e405]:
                            - text: FSO systems are predominantly designed to function in the near-infrared (near-IR) spectrum, specifically within the 750 to 1600 nm wavelength range. While the clear atmosphere is generally highly transparent to near-IR wavelengths, certain atmospheric molecules can cause significant absorption at specific wavelengths within this range. Also, there are particular wavelength windows around 850 nm, 1060 nm, 1250 nm, and 1550 nm, where the atmospheric attenuation is notably low, measuring less than 0.2 dB/km. Notably, the 850 nm and 1550 nm wavelengths align with the standard transmission windows used in fiber optic communication systems [
                            - link "16" [ref=e406] [cursor=pointer]:
                              - /url: "#B16-sensors-24-08036"
                            - text: "]. This compatibility allows FSO systems to leverage existing fiber optic components, which are readily available on the market, thereby reducing costs and improving system integration ["
                            - link "1" [ref=e407] [cursor=pointer]:
                              - /url: "#B1-sensors-24-08036"
                            - text: ","
                            - link "3" [ref=e408] [cursor=pointer]:
                              - /url: "#B3-sensors-24-08036"
                            - text: ","
                            - link "18" [ref=e409] [cursor=pointer]:
                              - /url: "#B18-sensors-24-08036"
                            - text: ","
                            - link "19" [ref=e410] [cursor=pointer]:
                              - /url: "#B19-sensors-24-08036"
                            - text: ","
                            - link "20" [ref=e411] [cursor=pointer]:
                              - /url: "#B20-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e412]:
                            - text: In addition to near-IR wavelengths, recent research has explored other spectral regions for FSO applications. Wavelengths around 10 μm have been identified for their superior performance in foggy conditions, offering better transmission characteristics. Ultraviolet (UV) wavelengths have also been considered due to their robustness against pointing errors (PEs) and beam blockages. Furthermore, UV wavelengths exhibit lower sensitivity to solar and other background interferences, making them a promising alternative for certain FSO applications [
                            - link "1" [ref=e413] [cursor=pointer]:
                              - /url: "#B1-sensors-24-08036"
                            - text: ","
                            - link "21" [ref=e414] [cursor=pointer]:
                              - /url: "#B21-sensors-24-08036"
                            - text: ","
                            - link "22" [ref=e415] [cursor=pointer]:
                              - /url: "#B22-sensors-24-08036"
                            - text: "]. A detailed discussion of these promising wavelengths is provided in"
                            - link "Section 5.2" [ref=e416] [cursor=pointer]:
                              - /url: "#sec5dot2-sensors-24-08036"
                            - text: .
                        - generic [ref=e417]:
                          - heading "2.1.2. Transmission Safety" [level=4] [ref=e418]
                          - generic [ref=e419]:
                            - text: In FSO communication systems, the primary optical source is typically a semiconductor LD. However, some manufacturers opt for high-power LEDs equipped with beam collimators as an alternative. The chosen optical source must be capable of delivering relatively high optical power across a wide range of temperatures. Additionally, it should feature a long mean time between failures (MTBF), ensuring reliable performance over extended periods. The components associated with the optical source should also have a small physical footprint and consume minimal power [
                            - link "1" [ref=e420] [cursor=pointer]:
                              - /url: "#B1-sensors-24-08036"
                            - text: ","
                            - link "3" [ref=e421] [cursor=pointer]:
                              - /url: "#B3-sensors-24-08036"
                            - text: ","
                            - link "18" [ref=e422] [cursor=pointer]:
                              - /url: "#B18-sensors-24-08036"
                            - text: "]. To meet these stringent requirements, Vertical-Cavity Surface-Emitting Lasers (VCSELs) are predominantly used for operations around the 850 nm wavelength. For operations at the 1550 nm wavelength, Fabry–Pérot (FP) and Distributed Feedback (DFB) lasers are commonly employed. These types of lasers are selected for their efficiency, reliability, and suitability for the specified wavelengths, ensuring optimal performance of the FSO systems ["
                            - link "1" [ref=e423] [cursor=pointer]:
                              - /url: "#B1-sensors-24-08036"
                            - text: ","
                            - link "18" [ref=e424] [cursor=pointer]:
                              - /url: "#B18-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e425]:
                            - text: Safety considerations are critical when dealing with laser Txs, with the primary concern being the potential risk to the eyes from laser exposure. To mitigate these risks, various safety standards have been established that regulate the transmitted optical power of lasers. These standards take into account factors such as the intensity of the laser beam, its wavelength, proximity to the laser source, peak power in a pulse, and the average power over extended periods [
                            - link "1" [ref=e426] [cursor=pointer]:
                              - /url: "#B1-sensors-24-08036"
                            - text: ","
                            - link "3" [ref=e427] [cursor=pointer]:
                              - /url: "#B3-sensors-24-08036"
                            - text: ","
                            - link "18" [ref=e428] [cursor=pointer]:
                              - /url: "#B18-sensors-24-08036"
                            - text: ","
                            - link "23" [ref=e429] [cursor=pointer]:
                              - /url: "#B23-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e430]:
                            - text: Lasers emit light at different wavelengths, and only certain wavelengths, particularly those in the near-IR (between approximately 400 nm and 1550 nm), have the potential to penetrate the eye with enough energy to harm the retina. Light outside this range is generally absorbed by the cornea and lens before reaching the retina, making it less likely to cause damage. The eye’s tolerance to laser power varies with wavelength, primarily due to the differential absorption of light by water, which is a major component of the eye. Specifically, the absorption coefficient at the front of the eye is significantly higher for longer wavelengths (greater than 1400 nm) compared to shorter wavelengths. Consequently, lasers operating at 1550 nm can have a higher allowable transmission power, which makes them suitable for long-distance applications [
                            - link "1" [ref=e431] [cursor=pointer]:
                              - /url: "#B1-sensors-24-08036"
                            - text: ","
                            - link "3" [ref=e432] [cursor=pointer]:
                              - /url: "#B3-sensors-24-08036"
                            - text: ","
                            - link "18" [ref=e433] [cursor=pointer]:
                              - /url: "#B18-sensors-24-08036"
                            - text: ","
                            - link "19" [ref=e434] [cursor=pointer]:
                              - /url: "#B19-sensors-24-08036"
                            - text: ","
                            - link "23" [ref=e435] [cursor=pointer]:
                              - /url: "#B23-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e436]:
                            - text: Additionally, the risk associated with laser exposure differs between high-power pulses and low-power continuous beams. A single high-power laser pulse, even if it lasts less than a microsecond, can cause irreversible damage if it directly enters the eye. In contrast, lower-power continuous beams are hazardous primarily with prolonged exposure. Furthermore, the risk of eye damage diminishes with increased distance from the laser source, as the power density of the laser beam decreases with distance [
                            - link "23" [ref=e437] [cursor=pointer]:
                              - /url: "#B23-sensors-24-08036"
                            - text: "]. So, when selecting the operating wavelength for FSO, it is crucial to consider eye-safety regulations and standards. This means that the chosen wavelength must ensure that the optical signals used in the FSO system do not pose a risk to human eyes, either through direct exposure or accidental reflections. Compliance with eye-safety requirements helps prevent potential health hazards and ensures the safe deployment and operation of the FSO system in various environments ["
                            - link "21" [ref=e438] [cursor=pointer]:
                              - /url: "#B21-sensors-24-08036"
                            - text: "]."
                      - generic [ref=e439]:
                        - heading "2.2. Channel" [level=3] [ref=e440]
                        - generic [ref=e441]: In the FSO communication system, the channel is defined as the free space or atmospheric pathway through which the optical signal is transmitted. Unlike conventional fiber optic systems that use physical cables to guide the light signals, FSO systems depend on a direct LoS between the transmitting and receiving devices. This LoS requirement makes the FSO channel highly susceptible to various environmental influences.
                        - generic [ref=e442]:
                          - text: The quality and reliability of the FSO channel can be significantly impacted by several external factors. For terrestrial applications, weather conditions such as fog, rain, and snow can cause attenuation of the signal, reducing its strength as it travels through the atmosphere. Additionally, AT, which includes variations in air density and temperature, can cause the light beam to scatter, further degrading signal quality. Physical obstacles that obstruct the LoS can also interrupt the signal transmission. These environmental factors pose considerable challenges to the stability and performance of FSO communication systems. A comprehensive discussion on these challenges, including detailed analyses of how different conditions affect the FSO channel, is provided in
                          - link "Section 3" [ref=e443] [cursor=pointer]:
                            - /url: "#sec3-sensors-24-08036"
                          - text: . The section elaborates on the mechanisms of signal degradation and the strategies employed to mitigate these adverse effects, ensuring more reliable FSO communication.
                      - generic [ref=e444]:
                        - heading "2.3. Receiver Side" [level=3] [ref=e445]
                        - generic [ref=e446]: "The role of the Rx is to capture the transmitted optical signal and convert it back into an electrical signal. It typically includes a photodetector, which senses the incoming light, and various electronic components to amplify and process the received signal. The Rx must be aligned precisely with the Tx to ensure accurate signal detection and minimize data loss. FSO systems are generally classified into two main types based on their detection mechanisms: non-coherent and coherent systems. Although coherent systems typically offer enhanced performance by effectively rejecting background noise, reducing the effects of AT, and achieving higher sensitivity at the Rx, Intensity Modulation with Direct Detection (IM/DD) systems are more prevalent in terrestrial FSO applications. This is due to their simpler design and lower cost. This section will delve into the details of both IM/DD and coherent FSO systems. Also, alternative solutions to conventional coherent Rxs are presented, involving simpler transmission schemes based on direct detection (DD) systems."
                        - generic [ref=e447]:
                          - heading "2.3.1. Non-Coherent FSO Systems" [level=4] [ref=e448]
                          - generic [ref=e449]:
                            - text: Non-coherent FSO systems, also known as IM/DD systems, rely on the intensity of light to transmit information. At the Rx, changes in light intensity are directly detected by a photodetector without the need for a local oscillator (LO) to mix the optical fields. The Rx front-end in IM/DD FSO systems, depicted in
                            - link "Figure 6" [ref=e450] [cursor=pointer]:
                              - /url: "#fig_body_display_sensors-24-08036-f006"
                            - text: b, comprises optical filters and a lens. The primary function of the lens is to gather and focus the incoming light beam onto the photodiode (PD). Commercial FSO systems predominantly use solid-state PDs made from materials such as Indium Gallium Arsenide (InGaAs), Silicon (Si), or Germanium (Ge). These materials are chosen due to their high quantum efficiency and their sensitivity to the commonly utilized wavelengths in FSO systems. Furthermore, these PDs possess very short transit times, resulting in high bandwidth and fast response times, making them ideal for FSO applications [
                            - link "1" [ref=e451] [cursor=pointer]:
                              - /url: "#B1-sensors-24-08036"
                            - text: ","
                            - link "18" [ref=e452] [cursor=pointer]:
                              - /url: "#B18-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e453]:
                            - generic [ref=e455] [cursor=pointer]:
                              - img "Sensors 24 08036 g006" [ref=e456]
                              - link [ref=e457]:
                                - /url: "#fig_body_display_sensors-24-08036-f006"
                            - generic [ref=e458]: "Figure 6. Block diagram of (a) coherent and (b) IM/DD FSO Rxs. TLNA: Trans-Impedance Low-Noise Amplifier, AGC: Automatic Gain Control, LPF: Low-Pass Filter."
                          - generic [ref=e459]:
                            - text: Solid-state PDs can either be Positive–Intrinsic–Negative (PIN) diodes or avalanche PDs (APDs), each offering distinct advantages and disadvantages. PIN diodes are known for their simple structure and reliability, while APDs provide internal gain, enhancing their sensitivity but also introducing higher noise and requiring higher operating voltages. The current output from the PD is converted into a voltage using a Trans-Impedance Amplifier (TIA), typically a low-noise Operational Amplifier (Op-Amp) with a load resistor. The selection of this load resistor is crucial and depends on factors such as the transmission rate, the dynamic range of the converted electrical signal, the thermal noise generated by the Rx, and the need to match impedance with other components in the Rx. Finally, the voltage signal from the TIA is passed through a Low-Pass Filter to reduce thermal and background noise, ensuring a cleaner signal for further processing [
                            - link "1" [ref=e460] [cursor=pointer]:
                              - /url: "#B1-sensors-24-08036"
                            - text: "]."
                        - generic [ref=e461]:
                          - heading "2.3.2. Coherent FSO Systems" [level=4] [ref=e462]
                          - generic [ref=e463]:
                            - text: Commercial FSO communication systems traditionally use IM/DD techniques due to their lower implementation complexity and cost effectiveness [
                            - link "24" [ref=e464] [cursor=pointer]:
                              - /url: "#B24-sensors-24-08036"
                            - text: "]. However, there is a growing shift towards coherent FSO systems. This trend is driven by recent advancements in the fabrication of integrated coherent Rxs and high-speed digital signal processing (DSP) integrated circuits, which have significantly enhanced the practicality of coherent detection for wired and wireless communications. Fortunately, the suitable bands for FSO transmission coincide with the wavelengths used in fiber optics, specifically the C band, which lowers the cost of optical and optoelectronic components due to mass production ["
                            - link "25" [ref=e465] [cursor=pointer]:
                              - /url: "#B25-sensors-24-08036"
                            - text: ","
                            - link "26" [ref=e466] [cursor=pointer]:
                              - /url: "#B26-sensors-24-08036"
                            - text: ","
                            - link "27" [ref=e467] [cursor=pointer]:
                              - /url: "#B27-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e468]:
                            - text: In coherent FSO systems, information is encoded using modulation techniques such as amplitude and phase modulation. When the signal reaches the Rx, it is optically combined with a locally generated reference signal (LO, optical oscillator, usually a laser with the same wavelength of the received optical signal). This mixing process is crucial for detecting and decoding the information carried by the signal [
                            - link "25" [ref=e469] [cursor=pointer]:
                              - /url: "#B25-sensors-24-08036"
                            - text: ","
                            - link "26" [ref=e470] [cursor=pointer]:
                              - /url: "#B26-sensors-24-08036"
                            - text: ","
                            - link "27" [ref=e471] [cursor=pointer]:
                              - /url: "#B27-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e472]:
                            - text: Coherent detection in FSO systems retrieves the complete electric field of a signal by measuring both of its field quadratures (i.e., its magnitude and phase) in two polarizations. This approach maximizes the degrees of freedom (DoF) available in the optical channel for carrying information. At the Rx, the incoming signal beam is combined with a LO beam, which provides a phase reference for downconversion as illustrated in
                            - link "Figure 6" [ref=e473] [cursor=pointer]:
                              - /url: "#fig_body_display_sensors-24-08036-f006"
                            - text: a. This mixing process with the LO amplifies the received signal, making the detection process primarily limited by shot noise. As a result, coherent detection is often viewed as a method for enhancing Rx sensitivity in FSO systems. Furthermore, coherent detection is effective in rejecting background noise, thermal noise of the TIA and intentional interferences [
                            - link "28" [ref=e474] [cursor=pointer]:
                              - /url: "#B28-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e475]:
                            - text: An intriguing aspect of coherent systems is the ability to send information via the phase, amplitude, or polarization of the optical field, significantly increasing the system’s spectral efficiency (SE). Typical modulation schemes in coherent systems include multilevel Phase-Shift Keying (PSK), Quadrature Amplitude Modulation (QAM), and multilevel Polarization Shift Keying (POLSK). These advanced modulation techniques contribute to the robust and efficient performance of coherent FSO communication systems [
                            - link "1" [ref=e476] [cursor=pointer]:
                              - /url: "#B1-sensors-24-08036"
                            - text: ","
                            - link "27" [ref=e477] [cursor=pointer]:
                              - /url: "#B27-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e478]:
                            - text: "In the realm of coherent Rxs, there exist two primary methodologies for signal detection: homodyne detection and heterodyne detection. Homodyne detection is known for its superior detection sensitivity, making it highly effective in accurately capturing weak signals. However, this approach necessitates the use of an exceptionally precise optical phase-locked loop (PLL). The implementation of such a highly accurate PLL is technologically demanding and incurs significant costs, rendering it economically challenging to realize on a large scale ["
                            - link "27" [ref=e479] [cursor=pointer]:
                              - /url: "#B27-sensors-24-08036"
                            - text: "]. As a result of these constraints, heterodyne detection has garnered more widespread attention and consideration in the academic and research literature. While heterodyne detection may not match the sensitivity levels of homodyne detection, it offers a more practical and cost-effective solution. This is because heterodyne systems do not require the same degree of precision in their PLLs, thereby reducing both complexity and expense. Consequently, researchers and engineers have favored heterodyne detection in many applications where the balance of performance, feasibility, and cost is a critical consideration ["
                            - link "1" [ref=e480] [cursor=pointer]:
                              - /url: "#B1-sensors-24-08036"
                            - text: ","
                            - link "27" [ref=e481] [cursor=pointer]:
                              - /url: "#B27-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e482]:
                            - text: Moreover, the application of DSP techniques to coherent receivers has facilitated the transmission of spectrally efficient advanced modulation formats and effective compensation for impairments. A significant challenge in coherent detection is the synchronization of the optical carrier. To circumvent the need for phase-locked-loop systems, homodyne phase-diversity architectures can operate with free-running (unsynchronized) LO lasers. This approach addresses synchronization issues and additional impairments through the further processing of in-phase (I) and quadrature (Q) baseband signals. This receiver concept, known as the “Intradyne Receiver”, presents a viable alternative. In this phase-diversity scheme, it is crucial for the optical frequencies of the Tx and LO lasers to remain as close as possible to avoid detection penalties [
                            - link "29" [ref=e483] [cursor=pointer]:
                              - /url: "#B29-sensors-24-08036"
                            - text: ","
                            - link "30" [ref=e484] [cursor=pointer]:
                              - /url: "#B30-sensors-24-08036"
                            - text: ","
                            - link "31" [ref=e485] [cursor=pointer]:
                              - /url: "#B31-sensors-24-08036"
                            - text: "]. Frequency offset and phase noise compensation are managed by DSP after the optical front-end in this scheme ["
                            - link "31" [ref=e486] [cursor=pointer]:
                              - /url: "#B31-sensors-24-08036"
                            - text: "]. Recently, this concept has garnered renewed interest, as advancements in digital signal processors and analog-to-digital converters (ADCs) are achieving speeds that make the hardware implementation of such receivers feasible for higher data rates, such as 10 GBaud ["
                            - link "32" [ref=e487] [cursor=pointer]:
                              - /url: "#B32-sensors-24-08036"
                            - text: "]."
                        - generic [ref=e488]:
                          - heading "2.3.3. Self-Coherent FSO Systems" [level=4] [ref=e489]
                          - generic [ref=e490]:
                            - text: Coherent optical transmission systems facilitate efficient information encoding, resulting in improved SE and extended network reach for both digital and analog channels. These systems are especially well suited for medium-to-long-reach links. However, the practical application of full-coherent FSO systems may be limited due to their high power consumption, large physical footprint, and elevated system costs, primarily driven by optical components such as
                            - generic [ref=e491]:
                              - generic [ref=e497]:
                                - generic [ref=e498]: "90"
                                - generic [ref=e499]: ∘
                              - math [ref=e500]:
                                - generic [ref=e502]:
                                  - generic [ref=e503]: "90"
                                  - generic [ref=e504]: ∘
                            - text: optical hybrids, LO laser, and high-speed DSP [
                            - link "24" [ref=e505] [cursor=pointer]:
                              - /url: "#B24-sensors-24-08036"
                            - text: ","
                            - link "26" [ref=e506] [cursor=pointer]:
                              - /url: "#B26-sensors-24-08036"
                            - text: ","
                            - link "28" [ref=e507] [cursor=pointer]:
                              - /url: "#B28-sensors-24-08036"
                            - text: ","
                            - link "33" [ref=e508] [cursor=pointer]:
                              - /url: "#B33-sensors-24-08036"
                            - text: "]. To tackle these challenges, several quasi-coherent approaches with reduced complexity have been proposed to strike an optimal balance between achievable bit-rate and hardware complexity. In this context, various high-capacity DD transmission techniques, which offer notable advantages such as a a smaller footprint, lower power consumption, and significantly reduced costs, have been extensively explored. Despite these benefits, DD systems are susceptible to linear propagation impairments like chromatic dispersion. These include single-polarization intensity modulation (IM) using high-order Pulse-Amplitude Modulation (PAM), such as PAM-4, and discrete multi-tone (DMT) ["
                            - link "34" [ref=e509] [cursor=pointer]:
                              - /url: "#B34-sensors-24-08036"
                            - text: ","
                            - link "35" [ref=e510] [cursor=pointer]:
                              - /url: "#B35-sensors-24-08036"
                            - text: ","
                            - link "36" [ref=e511] [cursor=pointer]:
                              - /url: "#B36-sensors-24-08036"
                            - text: ","
                            - link "37" [ref=e512] [cursor=pointer]:
                              - /url: "#B37-sensors-24-08036"
                            - text: ","
                            - link "38" [ref=e513] [cursor=pointer]:
                              - /url: "#B38-sensors-24-08036"
                            - text: ","
                            - link "39" [ref=e514] [cursor=pointer]:
                              - /url: "#B39-sensors-24-08036"
                            - text: "]. Other techniques under investigation include Stokes vector transceivers ["
                            - link "40" [ref=e515] [cursor=pointer]:
                              - /url: "#B40-sensors-24-08036"
                            - text: ","
                            - link "41" [ref=e516] [cursor=pointer]:
                              - /url: "#B41-sensors-24-08036"
                            - text: ","
                            - link "42" [ref=e517] [cursor=pointer]:
                              - /url: "#B42-sensors-24-08036"
                            - text: "], and Single-Sideband (SSB) DD. Notably, the SSB DD scheme employs self-coherent detection, which can be realized through Signal–Signal Beat Interference (SSBI) cancellation or Kramers–Kronig (KK) field reconstruction. Among the various DD-based transmission systems, the SSB DD scheme stands out for its superior performance in terms of network reach ["
                            - link "25" [ref=e518] [cursor=pointer]:
                              - /url: "#B25-sensors-24-08036"
                            - text: ","
                            - link "26" [ref=e519] [cursor=pointer]:
                              - /url: "#B26-sensors-24-08036"
                            - text: ","
                            - link "28" [ref=e520] [cursor=pointer]:
                              - /url: "#B28-sensors-24-08036"
                            - text: ","
                            - link "43" [ref=e521] [cursor=pointer]:
                              - /url: "#B43-sensors-24-08036"
                            - text: ","
                            - link "44" [ref=e522] [cursor=pointer]:
                              - /url: "#B44-sensors-24-08036"
                            - text: ","
                            - link "45" [ref=e523] [cursor=pointer]:
                              - /url: "#B45-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e524]:
                            - text: Moreover, achieving optimal performance in DD systems necessitates intricate manipulation of the optical field at both the Tx and Rx ends. For example, SSB techniques have been investigated to capture amplitude and phase information using DD. However, SSB transmission schemes often suffer from inherent signal-to-signal beating noise (SSBN) in DD systems. Although a Stokes vector Rx could potentially address this issue, its practical use is hindered by sensitivity degradation and increased hardware complexity. A more promising and practical solution for SSB DD transmission is the self-coherent, minimum phase signal-based KK field reconstruction algorithm, which significantly reduces SSBN and enhances system performance [
                            - link "26" [ref=e525] [cursor=pointer]:
                              - /url: "#B26-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e526]:
                            - text: The KK algorithm allows the employment of a single PD and ADC per polarization, while maintaining compatibility with phase-preserving Rx-side post-processing and supporting advanced modulation formats. Also, it enables the reconstruction of the complex-valued electric field at the Rx using only intensity measurements, allowing for digital compensation of propagation effects similar to those achieved with more complex coherent Rxs [
                            - link "26" [ref=e527] [cursor=pointer]:
                              - /url: "#B26-sensors-24-08036"
                            - text: ","
                            - link "43" [ref=e528] [cursor=pointer]:
                              - /url: "#B43-sensors-24-08036"
                            - text: "]. Despite the significant complexity reduction offered by the self-coherent-based KK FSO (KK-FSO) system, several challenges remain. For example, the nonlinear operations (logarithmic and exponential) in the KK method require the DSP to operate at much higher speeds than the Nyquist sampling rate to handle spectral broadening. A potential solution to reduce the sampling rate is to bypass these nonlinear operations. For instance, an upsampling-free KK method employs a Taylor expansion approximation for these operations. However, these approximations generally require a higher carrier-to-signal power ratio (CSPR), leading to a sensitivity penalty. To meet the demands for an increased tone power and high sampling rate of both the traditional KK and the upsampling-free KK methods, a DC-Value (DC-V) method can be used ["
                            - link "26" [ref=e529] [cursor=pointer]:
                              - /url: "#B26-sensors-24-08036"
                            - text: ","
                            - link "27" [ref=e530] [cursor=pointer]:
                              - /url: "#B27-sensors-24-08036"
                            - text: ","
                            - link "33" [ref=e531] [cursor=pointer]:
                              - /url: "#B33-sensors-24-08036"
                            - text: "]. This method leverages the SSB and DC-V properties of the minimum phase signal, offering an upsampling-free phase reconstruction process with low tone power operation."
                          - generic [ref=e532]:
                            - text: Additionally, a significant challenge in the KK implementation is the necessity for a mandatory carrier tone at the edge of the information spectrum to mitigate the effects of SSBN [
                            - link "27" [ref=e533] [cursor=pointer]:
                              - /url: "#B27-sensors-24-08036"
                            - text: "]. This carrier tone can be introduced in the optical domain, RF domain, or digital domain. Both optical and RF methods, however, increase the hardware requirements and complexity. Thus, inserting the virtual carrier in the digital domain is a simpler alternative that avoids these additional resource demands. However, this approach increases the signal’s dynamic range, which leads to a quantization noise penalty owing to the finite resolution of the Digital-to-Analog Converter (DAC) ["
                            - link "26" [ref=e534] [cursor=pointer]:
                              - /url: "#B26-sensors-24-08036"
                            - text: ","
                            - link "27" [ref=e535] [cursor=pointer]:
                              - /url: "#B27-sensors-24-08036"
                            - text: ","
                            - link "43" [ref=e536] [cursor=pointer]:
                              - /url: "#B43-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e537]:
                            - text: A digital resolution enhancer (DRE) method has been introduced to mitigate the impacts of quantization noise in low-resolution DACs. Unlike traditional rounding-off quantizers, the DRE employs a dynamic quantization method that efficiently minimizes in-band quantization noise and enhances transmission performance. Building on this DRE technique, a novel self-coherent FSO scheme has been proposed, further simplifying the KK-FSO system. In this new system, the optical carrier is substituted with a virtual carrier, which is directly incorporated into the signal within the digital domain. This approach eliminates the need for additional hardware to generate and synchronize the optical carrier. Additionally, the DRE method allows the use of extremely low-resolution DACs with just three physical numbers of bits, leading to significant reductions in both power consumption and cost. On the Rx side, the KK transform is replaced with the DC-V method, enhancing power efficiency by lowering the requirements for oversampling and CSPR [
                            - link "33" [ref=e538] [cursor=pointer]:
                              - /url: "#B33-sensors-24-08036"
                            - text: "]. Key distinctions among non-coherent (IM/DD), coherent, and self-coherent FSO systems are presented in"
                            - link "Table 1" [ref=e539] [cursor=pointer]:
                              - /url: "#table_body_display_sensors-24-08036-t001"
                            - text: . Also, a thorough analysis of optical transceivers is available in [
                            - link "27" [ref=e540] [cursor=pointer]:
                              - /url: "#B27-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e541]:
                            - generic [ref=e542]: Table 1. Fundamental differences between non-coherent (IM/DD), coherent, and self-coherent FSO systems.
                            - generic [ref=e544] [cursor=pointer]:
                              - img [ref=e545]
                              - link [ref=e546]:
                                - /url: "#table_body_display_sensors-24-08036-t001"
                    - generic [ref=e547]:
                      - heading "3. Challenges in FSO Communication" [level=2] [ref=e548]
                      - generic [ref=e549]: Following the introduction of fundamental concepts in FSO communication systems, this section explores the challenges primarily arising from atmospheric channel effects. Subsequently, we discuss various FSO systems and channel models that can be utilized to assess performance.
                      - generic [ref=e550]:
                        - heading "3.1. Atmospheric Channel Effects Phenomena" [level=3] [ref=e551]
                        - generic [ref=e552]: FSO communication is a promising technology with notable benefits, yet it encounters several hurdles that impede its broad implementation. This section examines the primary challenges in FSO communication, such as atmospheric interference, alignment and pointing precision, range restrictions, and security issues. Addressing and overcoming these obstacles is essential for creating robust FSO communication systems that deliver reliable and efficient wireless communication across diverse applications.
                        - generic [ref=e553]:
                          - heading "3.1.1. Atmospheric Interference" [level=4] [ref=e554]
                          - generic [ref=e555]:
                            - text: Atmospheric interference poses a major challenge to FSO communication. Various atmospheric conditions, such as weather, aerosols, and particles, can impact the propagation of optical signals. For instance, FSO communication is heavily influenced by weather conditions such as snow, rain, sleet, fog, and haze. These atmospheric phenomena can attenuate, scatter, or absorb optical signals, resulting in significant signal attenuation and weakened signal strength, which degrade performance. Additionally, aerosols and particles in the atmosphere greatly affect FSO signal propagation. These tiny solid or liquid particles can scatter and absorb the optical beams used in FSO communication, causing signal degradation [
                            - link "1" [ref=e556] [cursor=pointer]:
                              - /url: "#B1-sensors-24-08036"
                            - text: ","
                            - link "7" [ref=e557] [cursor=pointer]:
                              - /url: "#B7-sensors-24-08036"
                            - text: ","
                            - link "20" [ref=e558] [cursor=pointer]:
                              - /url: "#B20-sensors-24-08036"
                            - text: "]. The transmit power can be increased to compensate for these losses, but the maximum permissible power is constrained by eye-safety standards ["
                            - link "2" [ref=e559] [cursor=pointer]:
                              - /url: "#B2-sensors-24-08036"
                            - text: ","
                            - link "20" [ref=e560] [cursor=pointer]:
                              - /url: "#B20-sensors-24-08036"
                            - text: "]. To counteract the negative impacts of weather on FSO communication, several strategies such as AO, wavelength selection, hybrid FSO systems, air quality monitoring, redundancy, and diversity techniques can be employed. Further details on atmospheric attenuation models are presented in"
                            - link "Section 3.2" [ref=e561] [cursor=pointer]:
                              - /url: "#sec3dot2-sensors-24-08036"
                            - text: .
                        - generic [ref=e562]:
                          - heading "3.1.2. Atmospheric Turbulence" [level=4] [ref=e563]
                          - generic [ref=e564]:
                            - text: AT arises from irregularities in air temperature, humidity, and pressure, which cause random variations in the atmosphere’s refractive index. This results in turbulent eddies of different sizes and strengths, presenting significant challenges for the propagation of FSO signals. Such turbulence leads to detrimental effects like beam wander, beam spreading, scintillation, and phase distortion, all of which can degrade FSO communication system performance [
                            - link "2" [ref=e565] [cursor=pointer]:
                              - /url: "#B2-sensors-24-08036"
                            - text: ","
                            - link "15" [ref=e566] [cursor=pointer]:
                              - /url: "#B15-sensors-24-08036"
                            - text: ","
                            - link "20" [ref=e567] [cursor=pointer]:
                              - /url: "#B20-sensors-24-08036"
                            - text: "]. To develop reliable and efficient FSO systems, it is essential to understand and mitigate these effects. Promising solutions include advances in AO, diversity techniques, ECC, and beam steering technologies."
                            - link "Section 4" [ref=e568] [cursor=pointer]:
                              - /url: "#sec4-sensors-24-08036"
                            - text: provides further details on these mitigation strategies.
                          - generic [ref=e569]:
                            - text: Several mathematical models are developed and analyzed to accurately characterize the probability density function (PDF) of random irradiance fluctuations under various turbulent conditions, such as weak, moderate, strong, and saturation. Examples of these models include the log-normal (LN), Gamma–Gamma (
                            - generic [ref=e570]:
                              - generic [ref=e576]:
                                - generic [ref=e577]: Γ
                                - generic [ref=e578]: Γ
                              - math [ref=e579]:
                                - generic [ref=e581]:
                                  - generic [ref=e582]: Γ
                                  - generic [ref=e583]: Γ
                            - text: ), K-distribution, and negative exponential (NE) models [
                            - link "15" [ref=e584] [cursor=pointer]:
                              - /url: "#B15-sensors-24-08036"
                            - text: ","
                            - link "46" [ref=e585] [cursor=pointer]:
                              - /url: "#B46-sensors-24-08036"
                            - text: ","
                            - link "47" [ref=e586] [cursor=pointer]:
                              - /url: "#B47-sensors-24-08036"
                            - text: "]."
                            - link "Section 3.2" [ref=e587] [cursor=pointer]:
                              - /url: "#sec3dot2-sensors-24-08036"
                            - text: discusses several AT models for the FSO system.
                        - generic [ref=e588]:
                          - heading "3.1.3. Alignment and Pointing Accuracy" [level=4] [ref=e589]
                          - generic [ref=e590]:
                            - text: In FSO communication, maintaining accurate alignment and pointing between the Tx and Rx is crucial. Misalignments, which can occur along both vertical and horizontal axes, are often modeled using Hoyt and Rayleigh distributions [
                            - link "8" [ref=e591] [cursor=pointer]:
                              - /url: "#B8-sensors-24-08036"
                            - text: "]. Such misalignments can cause PE that diminish the performance of the FSO system. These errors are quantified as the Euclidean distance between the centers of the photodetector and the beam footprint at the Rx. In addition to causing signal degradation, PE can lead to intermittent or complete signal loss. These errors may arise from various factors, including the movement of mobile stations, platform vibrations, building sway, transceiver sway, seismic activity, inaccuracies in the tracking system, or stress in the system’s mechanical or electronic components. An alternative form of PE, known as beam wandering, is due to AT, where large-scale atmospheric eddies cause the transmitted beam to deviate from its intended trajectory ["
                            - link "2" [ref=e592] [cursor=pointer]:
                              - /url: "#B2-sensors-24-08036"
                            - text: ","
                            - link "7" [ref=e593] [cursor=pointer]:
                              - /url: "#B7-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e594]:
                            - text: Dynamic environments pose considerable challenges for the propagation and stability of optical signals. These environments are marked by ongoing changes in position, orientation, or atmospheric conditions, which can affect the alignment, signal integrity, and overall performance of FSO systems. Therefore, in mobile applications, continuous realignment is essential to sustain a stable connection, necessitating advanced tracking and control systems. A thorough review of pointing, acquisition, and tracking (PAT) mechanisms employed in FSO communication systems is provided in [
                            - link "7" [ref=e595] [cursor=pointer]:
                              - /url: "#B7-sensors-24-08036"
                            - text: "]."
                        - generic [ref=e596]:
                          - heading "3.1.4. Reliability and Security Concerns" [level=4] [ref=e597]
                          - generic [ref=e598]:
                            - text: FSO communication inherently benefits from enhanced security due to its highly directional and narrow optical beams, making interception challenging without direct physical access to the LoS path. However, security concerns in FSO communication, such as eavesdropping, jamming, and physical obstruction, can significantly impact the propagation and reliability of optical signals [
                            - link "2" [ref=e599] [cursor=pointer]:
                              - /url: "#B2-sensors-24-08036"
                            - text: "]. These challenges must be addressed through a combination of advanced encryption, AO, dynamic beam management, and robust system design. By mitigating these security risks, FSO communication can offer a secure and efficient alternative to traditional RF-based systems, particularly in applications where high data rates and secure transmission are paramount. This section provides a detailed discussion of these FSO security concerns."
                          - generic [ref=e600]:
                            - heading "Eavesdropping" [level=5] [ref=e601]
                            - generic [ref=e602]:
                              - text: Similar to wired links, wireless optical transmission is inherently more secure than RF transmission due to the high directionality of optical beams as opposed to the almost broadcast nature of RF signals, making them significantly harder to intercept, though not impossible [
                              - link "48" [ref=e603] [cursor=pointer]:
                                - /url: "#B48-sensors-24-08036"
                              - text: "]. However, there are scenarios where the threat of eavesdropping from one or more malicious actors may arise. Eavesdropping in FSO communication involves intercepting the optical beam to gain unauthorized access to the transmitted data. This can happen because of AT, optical beam divergence, channel scattering, and PE. Consequently, adversaries might access information through scattering over a non-LoS (NLoS) channel and scattering over a LoS channel caused by aerosol particles. Eavesdropping may be feasible if both the legitimate and the adversary Rxs are positioned close to each other within the FSO links ["
                              - link "48" [ref=e604] [cursor=pointer]:
                                - /url: "#B48-sensors-24-08036"
                              - text: ","
                              - link "49" [ref=e605] [cursor=pointer]:
                                - /url: "#B49-sensors-24-08036"
                              - text: ","
                              - link "50" [ref=e606] [cursor=pointer]:
                                - /url: "#B50-sensors-24-08036"
                              - text: "]. Additionally, eavesdropping is possible when part of the beam radiation is reflected by small particles and detected by an external observer not in the LoS of either communication peer. However, the power received by the eavesdropper in such cases will be significantly less than in an equivalent RF scenario. An alternative scenario involves the eavesdropper blocking the laser beam to collect more power. In this case, the legitimate Rx would notice a significant decrease in the average received power, prompting the communication to be stopped for security reasons ["
                              - link "48" [ref=e607] [cursor=pointer]:
                                - /url: "#B48-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e608]:
                              - text: Traditionally, upper-layer cryptographic algorithms, which assume a limited computational capability of eavesdroppers, have been sufficient to protect confidential messages. However, due to the complexity of key generation and allocation, along with the current advanced hardware available to eavesdroppers, these cryptographic algorithms may not meet future wireless network security requirements. In addition to these upper-layer algorithms, physical (PHY) layer key generation and encryption methods, which exploit channel reciprocity to generate key packets [
                              - link "51" [ref=e609] [cursor=pointer]:
                                - /url: "#B51-sensors-24-08036"
                              - text: "], and PHY layer wiretap coding, which leverages the difference in channel quality between the Tx-to-Rx and Tx-to-eavesdropper channels to protect confidential messages ["
                              - link "52" [ref=e610] [cursor=pointer]:
                                - /url: "#B52-sensors-24-08036"
                              - text: ","
                              - link "53" [ref=e611] [cursor=pointer]:
                                - /url: "#B53-sensors-24-08036"
                              - text: "], can be employed to secure confidential messages in the FSO-RF relay network ["
                              - link "50" [ref=e612] [cursor=pointer]:
                                - /url: "#B50-sensors-24-08036"
                              - text: "]."
                            - generic [ref=e613]:
                              - text: The challenge of ensuring secure communications in the presence of external eavesdroppers is a well-known issue in digital communications. There is increasing interest in the PHY layer secrecy performance over fading channels, leading the research community to focus on PHY layer security (PLS) as a means to avoid eavesdropping without relying on complex encryption techniques in the upper layers [
                              - link "54" [ref=e614] [cursor=pointer]:
                                - /url: "#B54-sensors-24-08036"
                              - text: "]. Consequently, the PLS of FSO links has been studied over"
