                          - generic [ref=e9856]:
                            - text: The quantity of switches needed for OGSM, OESM, and OIQSM is significantly lower than that for OSM at a given SE and M-ary modulation scheme. Consequently, the power consumption and switch costs are much lower for higher SEs in OESM, OGSM, and OIQSM. As SE increases, the number of switches in OSM grows exponentially, while in the other schemes, the growth is linear. This results in the total power consumption of OSM exceeding that of the advanced OSM schemes because of the high switch demand. It is important to note that the modest rise in power consumption due to multiple optical chains in advanced OSM schemes is balanced by the significantly higher power consumption of switches in OSM at extremely high SE levels. Additionally, the overall cost of OSM exceeds that of other advanced OSM schemes when achieving such high SE values. Therefore, as SE increases, advanced OSM schemes outperform OSM in both cost and power consumption [
                            - link "199" [ref=e9857] [cursor=pointer]:
                              - /url: "#B199-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e9858]: In general, modulation schemes have a vital impact on the performance of FSO communication systems. However, the choice of modulation scheme in FSO communication systems involves trade-offs between simplicity, data rate, power efficiency, and resilience to atmospheric conditions. Conventional schemes such as PPM and OOK are easier to implement and more cost-effective but offer lower data rates and are more susceptible to adverse weather conditions. Advanced schemes like QAM and OFDM provide higher data rates and better resilience to AT but come with increased complexity and implementation costs. Also, the issues associated with conventional modulation schemes and MIMO setups can be addressed by OSM and its variants. Ongoing research and development in these advanced techniques are essential to overcoming the inherent challenges of FSO communication and unlocking its full potential in various applications.
                      - generic [ref=e9859]:
                        - heading "4.4. Adaptive Transmission" [level=3] [ref=e9860]
                        - generic [ref=e9861]: This section presents adaptive transmission methods that dynamically adjust transmission parameters including, code rate, transmit power, and modulation size, to optimize communication performance. By adapting these parameters in real-time, these methods aim to maintain reliable and efficient data transmission even under varying channel conditions and interference levels. Also, by employing these adaptive transmission techniques, wireless communication systems can significantly enhance their performance, achieving a balance between reliability, efficiency, and speed. This dynamic adjustment capability is crucial for modern communication systems, including cellular networks, satellite communications, and emerging technologies like UAV-to-ground FSO systems, where varying conditions are the norm.
