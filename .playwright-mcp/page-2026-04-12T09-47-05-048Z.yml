                      - generic [ref=e11849]:
                        - heading "4.7. Error Correction Codes and Modulated Signal Optimization" [level=3] [ref=e11850]
                        - generic [ref=e11851]: ECC are crucial in reducing the impact of signal degradation in FSO communication. By detecting and correcting errors in transmitted data, ECC improves the reliability and robustness of FSO links, ensuring consistent data transmission even in challenging atmospheric conditions. However, Forward Error Correction (FEC) alone cannot meet the capacity demands of optical wireless systems. Incorporating high-order modulations, such as PAM and QAM, can enhance channel capacity. Despite this, a gap still exists between the Shannon limit and the capacity of uniform symbols. This section presents advanced schemes designed to enhance communication reliability and efficiency. It also outlines the essential requirements that transceivers must meet to approach channel capacity. We explore ECC, which improves data integrity by detecting and correcting errors. CM techniques are introduced to increase SE by combining coding and modulation processes. Lastly, we delve into capacity-approaching Probabilistic Amplitude Shaping (PAS), a cutting-edge method that optimizes data transmission rates close to the channel capacity limit. Each scheme contributes uniquely to advancing communication technologies, ensuring robust and high-performance data transfer.
                        - generic [ref=e11852]:
                          - heading "4.7.1. Requirements for Channel Capacity-Approaching Transceivers" [level=4] [ref=e11853]
                          - generic [ref=e11854]:
                            - text: To develop transceivers that approach the channel capacity in terms of transmission rate, three key requirements must be met. First, the symbol distribution should align with the channel’s capacity-achieving distribution. Second, optimal, adequately long channel codes are necessary. Third, the transmission rate must be finely adjusted according to the channel conditions, meaning the encoder should support a wide range of transmission modes across various SNRs. However, designing efficient CM systems that meet these criteria is challenging. Typically, the input distribution does not match the capacity-achieving distribution, resulting in a shaping gap. Additionally, practical implementations use finite-length Forward Error Correction (FEC) codes, leading to a coding gap. Lastly, the number of modulation orders and coding rates available is restricted by system complexity, resulting in only partially adaptive systems [
                            - link "296" [ref=e11855] [cursor=pointer]:
                              - /url: "#B296-sensors-24-08036"
                            - text: ","
                            - link "297" [ref=e11856] [cursor=pointer]:
                              - /url: "#B297-sensors-24-08036"
                            - text: ","
                            - link "298" [ref=e11857] [cursor=pointer]:
                              - /url: "#B298-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e11858]:
                            - text: Concerning the shaping gap, optimizing the shape of the modulated signal constellation can reduce the discrepancy between the Shannon’s limit and transmission rate. The primary methods of constellation shaping are geometric shaping and probabilistic shaping (PS). In geometric shaping, the constellation symbols are equiprobable but unevenly spaced. Conversely, a probabilistically shaped constellation features uniformly spaced symbols with differing probabilities assigned to each symbol. The latter has garnered significant attention in recent years owing to its rate adaptability, higher shaping gain, and the feasibility of employing Gray code for symbol labeling [
                            - link "296" [ref=e11859] [cursor=pointer]:
                              - /url: "#B296-sensors-24-08036"
                            - text: ","
                            - link "297" [ref=e11860] [cursor=pointer]:
                              - /url: "#B297-sensors-24-08036"
                            - text: ","
                            - link "299" [ref=e11861] [cursor=pointer]:
                              - /url: "#B299-sensors-24-08036"
                            - text: "]."
                        - generic [ref=e11862]:
                          - heading "4.7.2. Coded Modulation and Error Correction Codes" [level=4] [ref=e11863]
                          - generic [ref=e11864]:
                            - text: As previously mentioned, the performance of an FSO system regarding availability and reliability is greatly influenced by unpredictable variations resulting from AT, which is the primary factor hindering transmission performance [
                            - link "300" [ref=e11865] [cursor=pointer]:
                              - /url: "#B300-sensors-24-08036"
                            - text: "]. Higher laser powers are essential to extend transmission distances. However, the free-space, optical IM/DD channel presents modem designers with unique challenges. Most practical FSO systems utilize LEDs or LDs as Txs, along with PIN PDs or APDs as Rxs, creating a relatively straightforward communication system. These devices are designed to modulate and detect only the intensity of the carrier wave, rather than its phase, meaning that all transmitted signal intensities must be non-negative. Additionally, considerations for biological safety (specifically eye safety) restrict the average optical power emitted, which in turn restricts the average signal amplitude. The effects of multipath distortion in signal propagation, along with the limited response times of optoelectronic components, impose significant restrictions on the channel bandwidth. Standard signal-space models and CM techniques for electrical channels cannot be directly applied to this scenario because they do not account for the constraints on signal amplitude ["
                            - link "301" [ref=e11866] [cursor=pointer]:
                              - /url: "#B301-sensors-24-08036"
                            - text: ","
                            - link "302" [ref=e11867] [cursor=pointer]:
                              - /url: "#B302-sensors-24-08036"
                            - text: "]. Consequently, there is a need for power-efficient modulation schemes ["
                            - link "148" [ref=e11868] [cursor=pointer]:
                              - /url: "#B148-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e11869]:
                            - text: As highlighted in
                            - link "Section 4.3" [ref=e11870] [cursor=pointer]:
                              - /url: "#sec4dot3-sensors-24-08036"
                            - text: ", modulation schemes like PAM and QAM, often employed in wireless communications, offer high SE but lack power efficiency, making them less suitable for certain applications. In contrast, Q-ary PPM presents a compelling power-efficient alternative for FSO links ["
                            - link "244" [ref=e11871] [cursor=pointer]:
                              - /url: "#B244-sensors-24-08036"
                            - text: ","
                            - link "265" [ref=e11872] [cursor=pointer]:
                              - /url: "#B265-sensors-24-08036"
                            - text: ","
                            - link "303" [ref=e11873] [cursor=pointer]:
                              - /url: "#B303-sensors-24-08036"
                            - text: ","
                            - link "304" [ref=e11874] [cursor=pointer]:
                              - /url: "#B304-sensors-24-08036"
                            - text: "]. The significant bandwidth of FSO links, when contrasted with RF links, mitigates concerns regarding the low SE of PPM ["
                            - link "302" [ref=e11875] [cursor=pointer]:
                              - /url: "#B302-sensors-24-08036"
                            - text: "]. Additionally, as the number of slots in Q-ary PPM increases, the impact of background radiation diminishes, largely due to the shorter PD integration interval ["
                            - link "244" [ref=e11876] [cursor=pointer]:
                              - /url: "#B244-sensors-24-08036"
                            - text: ","
                            - link "265" [ref=e11877] [cursor=pointer]:
                              - /url: "#B265-sensors-24-08036"
                            - text: "]. To enhance the performance of FSO systems utilizing PPM, various FEC strategies have been introduced, such as convolutional codes, Reed–Solomon (RS) codes, turbo codes, and trellis-CM (TCM) ["
                            - link "302" [ref=e11878] [cursor=pointer]:
                              - /url: "#B302-sensors-24-08036"
                            - text: ","
                            - link "305" [ref=e11879] [cursor=pointer]:
                              - /url: "#B305-sensors-24-08036"
                            - text: ","
                            - link "306" [ref=e11880] [cursor=pointer]:
                              - /url: "#B306-sensors-24-08036"
                            - text: "]. While RS and convolutional codes provide adequate coding gains in conditions of weak turbulence and without fog, their effectiveness declines under strong turbulence or in deep fog scenarios. In such cases, more sophisticated FEC solutions, including turbo and LDPC codes, become necessary ["
                            - link "302" [ref=e11881] [cursor=pointer]:
                              - /url: "#B302-sensors-24-08036"
                            - text: ","
                            - link "307" [ref=e11882] [cursor=pointer]:
                              - /url: "#B307-sensors-24-08036"
                            - text: "]. A power-efficient CM scheme employing multilevel coding with LDPC codes as component codes has been proposed for implementation in repetition MIMO FSO systems with Q-ary PPM ["
                            - link "148" [ref=e11883] [cursor=pointer]:
                              - /url: "#B148-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e11884]:
                            - text: Moreover, FEC techniques, such as polar codes and LDPC codes, are extensively utilized in FSO to counteract turbulence, achieving substantial coding gains under varying turbulence conditions [
                            - link "164" [ref=e11885] [cursor=pointer]:
                              - /url: "#B164-sensors-24-08036"
                            - text: ","
                            - link "186" [ref=e11886] [cursor=pointer]:
                              - /url: "#B186-sensors-24-08036"
                            - text: ","
                            - link "307" [ref=e11887] [cursor=pointer]:
                              - /url: "#B307-sensors-24-08036"
                            - text: ","
                            - link "308" [ref=e11888] [cursor=pointer]:
                              - /url: "#B308-sensors-24-08036"
                            - text: "]. For instance, LDPC-coded optical OFDM has been shown to vastly outperform LDPC-coded OOK in AT channels in terms of both SE and coding gain. In strong turbulence conditions at a BER of"
                            - generic [ref=e11889]:
                              - generic [ref=e11895]:
                                - generic [ref=e11896]: "10"
                                - generic [ref=e11898]: −5
                              - math [ref=e11899]:
                                - generic [ref=e11901]:
                                  - generic [ref=e11902]: "10"
                                  - generic [ref=e11903]:
                                    - generic [ref=e11904]: −
                                    - generic [ref=e11905]: "5"
                            - text: ", the enhancement in coding gain of the LDPC-coded single-side band unclipped-OFDM system with 64 subcarriers exceeds that of the LDPC-coded OOK system by 20.2 dB for QPSK and by 23.4 dB for BPSK ["
                            - link "186" [ref=e11906] [cursor=pointer]:
                              - /url: "#B186-sensors-24-08036"
                            - text: "]. Additionally, the combination of FEC and spatial diversity has been demonstrated to mitigate fading ["
                            - link "186" [ref=e11907] [cursor=pointer]:
                              - /url: "#B186-sensors-24-08036"
                            - text: ","
                            - link "213" [ref=e11908] [cursor=pointer]:
                              - /url: "#B213-sensors-24-08036"
                            - text: ","
                            - link "285" [ref=e11909] [cursor=pointer]:
                              - /url: "#B285-sensors-24-08036"
                            - text: "]. The LDPC-coded MIMO FSO communication system, which employs LDPC codes and spatial diversity reception to combat turbulence fading when sub-channels are independent, has been examined ["
                            - link "186" [ref=e11910] [cursor=pointer]:
                              - /url: "#B186-sensors-24-08036"
                            - text: "]. In practice, deterioration due to spatially correlated fading is considerable, especially in moderate to strong turbulence channels ["
                            - link "290" [ref=e11911] [cursor=pointer]:
                              - /url: "#B290-sensors-24-08036"
                            - text: "]. Polar codes, a novel FEC technique, are the only ones proven to achieve the Shannon limit with low encoding and decoding complexity and have been selected for the 5G channel coding standard because of their distinctive benefits ["
                            - link "309" [ref=e11912] [cursor=pointer]:
                              - /url: "#B309-sensors-24-08036"
                            - text: ","
                            - link "310" [ref=e11913] [cursor=pointer]:
                              - /url: "#B310-sensors-24-08036"
                            - text: "]. Polar-coded MIMO-FSO systems with spatially correlated fading using OOK modulations are introduced in ["
                            - link "285" [ref=e11914] [cursor=pointer]:
                              - /url: "#B285-sensors-24-08036"
                            - text: "], where polar codes outperform LDPC codes under the same conditions. However, OOK modulations cannot satisfy the capacity demands of future optical communication. Unipolar M-ary PAM (M-PAM) is a candidate for achieving near capacity in FSO systems ["
                            - link "311" [ref=e11915] [cursor=pointer]:
                              - /url: "#B311-sensors-24-08036"
                            - text: "], and the non-uniform distributions of M-PAM can significantly increase the capacity of FSO systems ["
                            - link "297" [ref=e11916] [cursor=pointer]:
                              - /url: "#B297-sensors-24-08036"
                            - text: ","
                            - link "312" [ref=e11917] [cursor=pointer]:
                              - /url: "#B312-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e11918]:
                            - text: Furthermore, efficient FSO communications can be realized by integrating higher-order modulation schemes with channel coding, a method referred to in the literature as CM [
                            - link "217" [ref=e11919] [cursor=pointer]:
                              - /url: "#B217-sensors-24-08036"
                            - text: ","
                            - link "313" [ref=e11920] [cursor=pointer]:
                              - /url: "#B313-sensors-24-08036"
                            - text: "]. This approach improves system reliability by combining high-order modulations with FEC codes and offers flexible data rates through adjustments in modulation schemes or code rates ["
                            - link "164" [ref=e11921] [cursor=pointer]:
                              - /url: "#B164-sensors-24-08036"
                            - text: ","
                            - link "308" [ref=e11922] [cursor=pointer]:
                              - /url: "#B308-sensors-24-08036"
                            - text: "]."
                        - generic [ref=e11923]:
                          - heading "4.7.3. Probabilistic Shaping" [level=4] [ref=e11924]
                          - generic [ref=e11925]:
                            - text: PS with non-uniform probabilities has been shown to reduce capacity gaps and facilitate fine-grained rate adaptation [
                            - link "296" [ref=e11926] [cursor=pointer]:
                              - /url: "#B296-sensors-24-08036"
                            - text: "]. This approach has become a significant topic in optical communications. By adjusting the signal probability distribution, PS can modify the entropy and improve system performance ["
                            - link "314" [ref=e11927] [cursor=pointer]:
                              - /url: "#B314-sensors-24-08036"
                            - text: "]. Additionally, it can be used in bit-interleaved CM (BICM) systems utilizing PAS, whose advantages have been experimentally confirmed ["
                            - link "308" [ref=e11928] [cursor=pointer]:
                              - /url: "#B308-sensors-24-08036"
                            - text: ","
                            - link "314" [ref=e11929] [cursor=pointer]:
                              - /url: "#B314-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e11930]:
                            - text: PAS integrates CM with PS [
                            - link "296" [ref=e11931] [cursor=pointer]:
                              - /url: "#B296-sensors-24-08036"
                            - text: ","
                            - link "315" [ref=e11932] [cursor=pointer]:
                              - /url: "#B315-sensors-24-08036"
                            - text: "]. This technique has been utilized in coherent communications to enhance SNR in AWGN channels, providing greater flexibility and precise control over bitrate. Recently, time-adaptive PAS has been presented for FSO links, leading to significant capacity improvements under time-varying power fading conditions ["
                            - link "316" [ref=e11933] [cursor=pointer]:
                              - /url: "#B316-sensors-24-08036"
                            - text: ","
                            - link "317" [ref=e11934] [cursor=pointer]:
                              - /url: "#B317-sensors-24-08036"
                            - text: "]. Nevertheless, the PAS cannot be directly applied to FSO communications because it relies on the symmetry of bipolar signals, whereas FSO systems use unipolar (asymmetric) signals. To address this limitation, the modified Maxwell–Boltzmann distribution based on PAS (PAS-MMB) can be utilized; however, its distribution remains pairwise, which is not ideal for unipolar symbols ["
                            - link "309" [ref=e11935] [cursor=pointer]:
                              - /url: "#B309-sensors-24-08036"
                            - text: ","
                            - link "311" [ref=e11936] [cursor=pointer]:
                              - /url: "#B311-sensors-24-08036"
                            - text: "]. Additionally, unipolar M-PAM are promising candidates for achieving near-capacity in FSO systems ["
                            - link "311" [ref=e11937] [cursor=pointer]:
                              - /url: "#B311-sensors-24-08036"
                            - text: "]. The non-uniform distributions of M-PAM can further enhance the capacity of these systems. Research in ["
                            - link "297" [ref=e11938] [cursor=pointer]:
                              - /url: "#B297-sensors-24-08036"
                            - text: ","
                            - link "300" [ref=e11939] [cursor=pointer]:
                              - /url: "#B300-sensors-24-08036"
                            - text: "] has introduced numerical simulations of LDPC and polar-coded PS PAM schemes to optimize the capacity of FSO channels with unipolar signals. In this context, pairwise distributions have proven effective for PAM8, resulting in only minor performance losses ["
                            - link "308" [ref=e11940] [cursor=pointer]:
                              - /url: "#B308-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e11941]:
                            - heading "Hybrid Constellation Shaping" [level=5] [ref=e11942]
                            - generic [ref=e11943]:
                              - text: In addition to PAS, another approach utilizing PS is Sparse–Dense Transmission (SDT). Research indicates that SDT-based OOK modulation can achieve approximately 1 dB of shaping gain in AWGN channels [
                              - link "309" [ref=e11944] [cursor=pointer]:
                                - /url: "#B309-sensors-24-08036"
                              - text: "]. Furthermore, the capacity can be enhanced through entropy-loading DMT systems based on PS. Entropy-loading is a robust and adaptable method for capacity enhancement, allowing continuous adjustments to the source entropy for each subcarrier. However, implementing entropy-loading DMT presents a trade-off between optimization complexity and achievable capacity ["
                              - link "318" [ref=e11945] [cursor=pointer]:
                                - /url: "#B318-sensors-24-08036"
                              - text: ","
                              - link "319" [ref=e11946] [cursor=pointer]:
                                - /url: "#B319-sensors-24-08036"
                              - text: "]. In comparison, Hybrid Constellation Shaping (HCS) offers a lower-complexity solution that yields greater shaping gains by combining PS with geometric shaping (GS), particularly for non-Gray mapped QAM ["
                              - link "315" [ref=e11947] [cursor=pointer]:
                                - /url: "#B315-sensors-24-08036"
                              - text: ","
                              - link "320" [ref=e11948] [cursor=pointer]:
                                - /url: "#B320-sensors-24-08036"
