                            - text: ","
                            - link "507" [ref=e14463] [cursor=pointer]:
                              - /url: "#B507-sensors-24-08036"
                            - text: "]."
                        - generic [ref=e14464]:
                          - heading "6.3.4. Security Enhancements" [level=4] [ref=e14465]
                          - generic [ref=e14466]:
                            - text: Ensuring the security of FSO communication is vital, especially for sensitive applications. Developing advanced encryption techniques tailored for the high data rates and unique characteristics of FSO links is vital to ensure robust FSO systems. Also, researching methods to enhance PLS, such as beamforming and spatial diversity, to protect against eavesdropping and jamming is important, especially in applications for finance and healthcare. In this regard, exploring the use of QKD over FSO links to provide unbreakable encryption keys for secure communication require further research [
