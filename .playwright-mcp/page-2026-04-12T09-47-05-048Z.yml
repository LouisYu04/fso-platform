                          - generic [ref=e11502]:
                            - text: The concept of aperture averaging to mitigate scintillation effects has been extensively studied both in theoretical research and practical applications [
                            - link "232" [ref=e11503] [cursor=pointer]:
                              - /url: "#B232-sensors-24-08036"
                            - text: ","
                            - link "234" [ref=e11504] [cursor=pointer]:
