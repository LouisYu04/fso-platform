                              - text: "] explores the PLS of a LoS FSO link employing Orbital Angular Momentum (OAM) multiplexing. The information security risks of an FSO communication system with an eavesdropper outside the laser beam, who could obtain information through a non-LoS scattering channel, are examined in ["
