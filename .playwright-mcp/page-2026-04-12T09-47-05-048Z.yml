                            - text: "]."
                      - generic [ref=e11520]:
                        - heading "4.6. Spatial Diversity" [level=3] [ref=e11521]
                        - generic [ref=e11522]: Spatial diversity is a key technique employed in FSO systems to enhance communication reliability and performance. By utilizing multiple transmission and/or reception points, spatial diversity effectively mitigates the effects of AT, scattering, and signal fading, which are prevalent challenges in FSO communications. This section explores the principles of spatial diversity, its implementation strategies, and the associated benefits, including improved signal quality and increased system robustness. Through a detailed examination of various spatial diversity configurations, we aim to highlight their significance in achieving more resilient FSO links, particularly in dynamic and unpredictable environmental conditions.
                        - generic [ref=e11523]:
                          - heading "4.6.1. Overview" [level=4] [ref=e11524]
                          - generic [ref=e11525]:
                            - text: It has been shown that the performance of SISO FSO links is significantly impacted by strong turbulence, falling short of the typical BER targets for FSO applications within practical SNR ranges. This highlights the need for the implementation of robust fading-mitigation techniques [
                            - link "252" [ref=e11526] [cursor=pointer]:
                              - /url: "#B252-sensors-24-08036"
                            - text: "]. Historically, various techniques have been employed in FSO systems to address the detrimental effects of the atmospheric channel. These include error control coding combined with interleaving ["
                            - link "165" [ref=e11527] [cursor=pointer]:
                              - /url: "#B165-sensors-24-08036"
                            - text: ","
                            - link "253" [ref=e11528] [cursor=pointer]:
                              - /url: "#B253-sensors-24-08036"
                            - text: "] and multiple-symbol detection through MLSD ["
                            - link "47" [ref=e11529] [cursor=pointer]:
                              - /url: "#B47-sensors-24-08036"
                            - text: ","
                            - link "212" [ref=e11530] [cursor=pointer]:
                              - /url: "#B212-sensors-24-08036"
                            - text: "]. However, both methods present certain practical challenges ["
                            - link "252" [ref=e11531] [cursor=pointer]:
                              - /url: "#B252-sensors-24-08036"
                            - text: "]. For example, relying solely on an ECC is not an effective strategy for mitigating fades, as it necessitates a significantly large interleaver, around 100 Gb for a 10 Gb/s channel ["
                            - link "245" [ref=e11532] [cursor=pointer]:
                              - /url: "#B245-sensors-24-08036"
                            - text: ","
                            - link "254" [ref=e11533] [cursor=pointer]:
                              - /url: "#B254-sensors-24-08036"
                            - text: ","
                            - link "255" [ref=e11534] [cursor=pointer]:
                              - /url: "#B255-sensors-24-08036"
                            - text: "]. Moreover, when the link functions as the PHY layer of a data network, the upper layer protocols struggle to perform optimally in the presence of these fades and the prolonged delays associated with interleaving and deinterleaving, resulting in reduced throughput and poor efficiency ["
                            - link "233" [ref=e11535] [cursor=pointer]:
                              - /url: "#B233-sensors-24-08036"
                            - text: ","
                            - link "254" [ref=e11536] [cursor=pointer]:
                              - /url: "#B254-sensors-24-08036"
                            - text: "]. It has also been noted that channel coding is effective primarily in weak turbulence conditions or when a large aperture size is utilized. In reality, coding is not efficient in countering fading. Its advantages become more pronounced only in low fading channels or when the effects of turbulence are significantly mitigated, for instance, through techniques like aperture averaging, AO, or spatial diversity ["
                            - link "233" [ref=e11537] [cursor=pointer]:
                              - /url: "#B233-sensors-24-08036"
                            - text: "]. Conversely, MLSD is hindered by high computational complexity ["
                            - link "47" [ref=e11538] [cursor=pointer]:
                              - /url: "#B47-sensors-24-08036"
                            - text: ","
                            - link "252" [ref=e11539] [cursor=pointer]:
                              - /url: "#B252-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e11540]:
                            - text: Another promising approach is the implementation of spatial diversity, a well-established technique in RF systems. By utilizing multiple apertures at either the Tx or Rx, spatial diversity can significantly enhance performance by introducing additional DoF in the spatial dimension. This method is particularly appealing for reducing the frequency and duration of signal fades [
                            - link "256" [ref=e11541] [cursor=pointer]:
                              - /url: "#B256-sensors-24-08036"
                            - text: "]. It is especially critical in strong turbulence channels, where SISO links demonstrate extremely poor performance (i.e., exceeding"
                            - generic [ref=e11542]:
                              - generic [ref=e11548]:
                                - generic [ref=e11549]: "10"
                                - generic [ref=e11551]: −3
                              - math [ref=e11552]:
                                - generic [ref=e11554]:
                                  - generic [ref=e11555]: "10"
                                  - generic [ref=e11556]:
                                    - generic [ref=e11557]: −
                                    - generic [ref=e11558]: "3"
                            - text: in the SNR range of 30–50 dB) [
                            - link "252" [ref=e11559] [cursor=pointer]:
                              - /url: "#B252-sensors-24-08036"
                            - text: "]. Furthermore, spatial diversity minimizes the likelihood of temporal blockage of laser beams caused by obstructions, enabling communication over longer distances even in challenging weather conditions ["
                            - link "252" [ref=e11560] [cursor=pointer]:
                              - /url: "#B252-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e11561]:
                            - text: Furthermore, unlike spatial diversity in wireless systems, spatial diversity in atmospheric optical systems can be implemented compactly, as the coherence length is typically on the order of centimeters. This means that multiple Txs or Rxs can be positioned just centimeters apart to experience nearly independent channel fades [
                            - link "245" [ref=e11562] [cursor=pointer]:
                              - /url: "#B245-sensors-24-08036"
                            - text: ","
                            - link "254" [ref=e11563] [cursor=pointer]:
                              - /url: "#B254-sensors-24-08036"
                            - text: ","
                            - link "255" [ref=e11564] [cursor=pointer]:
                              - /url: "#B255-sensors-24-08036"
                            - text: "]. Consequently, effective fading reduction can be achieved through spatial diversity techniques, such as employing multiple beams at the Tx (MISO) ["
                            - link "257" [ref=e11565] [cursor=pointer]:
                              - /url: "#B257-sensors-24-08036"
                            - text: ","
                            - link "258" [ref=e11566] [cursor=pointer]:
                              - /url: "#B258-sensors-24-08036"
                            - text: "], using multiple apertures at the Rx (SIMO) ["
                            - link "233" [ref=e11567] [cursor=pointer]:
                              - /url: "#B233-sensors-24-08036"
                            - text: ","
                            - link "245" [ref=e11568] [cursor=pointer]:
                              - /url: "#B245-sensors-24-08036"
                            - text: ","
                            - link "259" [ref=e11569] [cursor=pointer]:
                              - /url: "#B259-sensors-24-08036"
                            - text: "], or utilizing a combination of both (MIMO) ["
                            - link "244" [ref=e11570] [cursor=pointer]:
                              - /url: "#B244-sensors-24-08036"
                            - text: ","
                            - link "260" [ref=e11571] [cursor=pointer]:
                              - /url: "#B260-sensors-24-08036"
                            - text: ","
                            - link "261" [ref=e11572] [cursor=pointer]:
                              - /url: "#B261-sensors-24-08036"
                            - text: "]. Among these approaches, using multiple lenses at the Rx is the simplest, offering a balance between gain and system complexity in achieving spatial diversity ["
                            - link "233" [ref=e11573] [cursor=pointer]:
                              - /url: "#B233-sensors-24-08036"
                            - text: ","
                            - link "262" [ref=e11574] [cursor=pointer]:
                              - /url: "#B262-sensors-24-08036"
                            - text: "]."
                          - generic [ref=e11575]:
                            - text: The overall spatial diversity system configuration, illustrated in
                            - link "Figure 11" [ref=e11576] [cursor=pointer]:
                              - /url: "#fig_body_display_sensors-24-08036-f011"
                            - text: ", consists of M Txs and N Rxs, where"
                            - generic [ref=e11577]:
                              - generic [ref=e11583]:
                                - text: 𝑀,
                                - generic [ref=e11584]: 𝑁
                                - text: ≥1
                              - math [ref=e11586]:
