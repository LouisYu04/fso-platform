                    - generic [ref=e250]:
                      - heading "Abstract" [level=2] [ref=e251]
                      - text: INTRODUCTION. Recent neuroimaging studies suggest that dental loss replacements induce changes in neuroplasticity as well as in correlated connectivity between brain networks. However, as the typical temporal delay in detecting brain activity by neuroimaging cannot account for the influence one neural system exerts over another in a context of real activation (“effective” connectivity), it seems of interest to approach this dynamic aspect of brain networking in the time frame of milliseconds by exploiting electroencephalographic (EEG) data. MATERIAL AND METHODS. The present study describes one subject who received a new prosthodontic provisional implant in substitution for previous dental repairs. Two EEG sessions led with a portable device were recorded before and after positioning the new dental implant. By following MATLAB-EEGLAB processing supported by the plugins FIELDTRIP and SIFT, the independent component analysis (ICA) derived from EEG raw signals was rendered as current density fields and interpolated with the dipoles generated by each electrode for a dynamic study of the effective connectivity. One more recording session was undertaken six months after the placement of the final implant. RESULTS. Compared to the baseline, the new prosthodontic implant induced a novel modulation of the neuroplasticity in sensory-motor areas which was maintained following the definitive implant after six months, as revealed by changes in the effective connectivity from the basal strong enslavement of a single brain area over the others, to an equilibrate inter-related connectivity evenly distributed along the frontotemporal regions of both hemispheres. CONCLUSIONS. The rapid shift of the effective connectivity after positioning the new prosthodontic implant and its substantial stability after six months suggest the possibility that synaptic modifications, induced by novel sensory motor conditions, modulate the neuroplasticity and reshape the final dynamic frame of the interarea connectivity. Moreover, given the viability of the EEG practice, this approach could be of some interest in assessing the association between oral pathophysiology and neuronal networking.
                    - generic [ref=e253]:
