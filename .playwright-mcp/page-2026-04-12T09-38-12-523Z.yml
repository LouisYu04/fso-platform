                  - paragraph
                - generic [ref=e257]:
                  - generic [ref=e258]:
                    - generic [ref=e259]:
                      - heading "1. Introduction" [level=2] [ref=e260]
                      - generic [ref=e261]:
                        - text: Oral health is a worldwide challenge that is reflected by several organized social actions involving adult and senior subjects both in developing and in western countries [
                        - link "1" [ref=e262] [cursor=pointer]:
                          - /url: "#B1-signals-03-00033"
                        - text: ","
                        - link "2" [ref=e263] [cursor=pointer]:
                          - /url: "#B2-signals-03-00033"
                        - text: "]. According to systematic studies which investigate the global burden of diseases (GBD) with the disability-adjusted life-years (DALYs), the conditions of oral disability including tooth loss pay a toll of 224 years per 100,000 population, as severe tooth loss has been associated with a compromised quality of life which encompasses the ability in speaking, chewing, sensory alteration of oral proprioception and pain ["
                        - link "3" [ref=e264] [cursor=pointer]:
                          - /url: "#B3-signals-03-00033"
                        - text: "]. Recently, experimental studies led with structural magnetic resonance imaging (sMRI), by comparing sham operation with tooth extraction and their replacement in rodent models, showed a modification of regional and voxel-wise volumes in cortical regions involved in somatosensory and motor integration ["
                        - link "4" [ref=e265] [cursor=pointer]:
                          - /url: "#B4-signals-03-00033"
                        - text: "]. An interesting consideration addressed by these studies deals with the correlations between the worsening of oral health conditions in the context of a population aging health and impaired cognitive functions ["
                        - link "5" [ref=e266] [cursor=pointer]:
                          - /url: "#B5-signals-03-00033"
                        - text: ","
                        - link "6" [ref=e267] [cursor=pointer]:
                          - /url: "#B6-signals-03-00033"
                        - text: "]. Indeed, though tooth loss might be induced/co-caused by random variables in habits, culture and individual lifestyle, studies in animals and humans show that mastication maintains cognitive function in the hippocampus, a crucial hub for learning and memory, given that altered dental functions seem to impair spatial memory as certain hippocampal neural assemblies deteriorate their pattern in experimental aged animals; moreover, efficient mastication seems to improve cognitive performances along with the neuronal activity in both hippocampal and prefrontal areas which show increased cognitive and spatial learning ability ["
                        - link "7" [ref=e268] [cursor=pointer]:
                          - /url: "#B7-signals-03-00033"
                        - text: ","
                        - link "8" [ref=e269] [cursor=pointer]:
                          - /url: "#B8-signals-03-00033"
                        - text: "]. These considerations suggest that, despite several studies addressing the relationships between neuroplasticity, percentage of tooth loss and prosthetic options adopted ["
                        - link "9" [ref=e270] [cursor=pointer]:
                          - /url: "#B9-signals-03-00033"
                        - text: ","
                        - link "10" [ref=e271] [cursor=pointer]:
                          - /url: "#B10-signals-03-00033"
                        - text: "], more work is still needed to investigate whether tooth replacement would reflect a new remodeling modality of brain networks. Indeed, the approach to this problem is of relevance since neuroimages, though positively supporting the correlation between changes in neuroplasticity and tooth replacement by prosthetic devices, fall short in explaining the dynamic correlations between the brain areas involved in sensory-motor changing conditions, given the delay between real neuronal signals and image acquisition. Thus, though optimally suited for showing the iconic representation of anatomical and functional inter-area connectivity, these studies are still unable to point at the “effective” connectivity ["
                        - link "11" [ref=e272] [cursor=pointer]:
                          - /url: "#B11-signals-03-00033"
                        - text: "], intended as the influence one neural system exerts over another in the context of a rapid activation ["
                        - link "12" [ref=e273] [cursor=pointer]:
                          - /url: "#B12-signals-03-00033"
                        - text: "]. Together, the study of the effective connectivity in tooth replacement might represent substantial support in understanding the relationships between dynamic aspects of neuroplasticity with oral impairment and prosthodontic procedures."
                    - generic [ref=e274]:
                      - heading "2. Material and Methods" [level=2] [ref=e275]
                      - generic [ref=e276]:
                        - text: A 45-year-old right-handed male was selected for this study. His family and personal medical history were unremarkable, while his dental condition showed severe tooth loss which has been treated over time with different extemporary repairs. The deteriorating functionality of the prosthodontic repairs suggests a de novo complete replacement of the old implants. The project for a rational replacement was led with a computer-assisted 3D oral scanner (Carestream Dental
                        - superscript [ref=e277]: ®
                        - text: ", Atlanta, GA, USA) which assessed the dynamics of the maxillary and mandibular pressure between the superior and inferior dental arch ("
                        - link "Figure 1" [ref=e278] [cursor=pointer]:
                          - /url: "#fig_body_display_signals-03-00033-f001"
                        - text: A). The dynamic analysis of the inter arch dental pressure allows for planning a new prosthodontic replacement whose architecture was tested by building a provisional methacrylate-based implant according to the recommendations of the International Association for Testing and Materials [
                        - link "13" [ref=e279] [cursor=pointer]:
                          - /url: "#B13-signals-03-00033"
                        - text: "]. In addition to previous reports ["
                        - link "4" [ref=e280] [cursor=pointer]:
                          - /url: "#B4-signals-03-00033"
                        - text: ","
                        - link "9" [ref=e281] [cursor=pointer]:
                          - /url: "#B9-signals-03-00033"
                        - text: ","
                        - link "10" [ref=e282] [cursor=pointer]:
                          - /url: "#B10-signals-03-00033"
                        - text: "], in the present study, we intended to investigate the variations of neuroplasticity between the old and the new prosthodontic implants following electroencephalograms (EEG) recorded three hours before and after the provisional implant and assessed after six months when the definitive prosthesis was perfectly adapted. As EEG signals operate at the millisecond time scale, this approach, in comparison with voxel-based neuroimages, would carry a more time strength account in the dynamics correlated with ongoing inter-areas changes induced by new sensory-motor conditions brought about by the updated dental prosthesis. This study was led with the portable wireless MUSE headband EEG system (InterAxon Inc., Toronto, ON, Canada) in order to collect data that would yield quantifiable EEG tracings ["
                        - link "14" [ref=e283] [cursor=pointer]:
                          - /url: "#B14-signals-03-00033"
                        - text: "] eventually available for further study by MATLAB The MathWorks, Inc., Natick, Massachusetts, United States (2021 version) and EEGLAB (2019 version) ["
                        - link "15" [ref=e284] [cursor=pointer]:
                          - /url: "#B15-signals-03-00033"
                        - text: "]. The recording data were collected with preset AD at a 256 Hz sampling rate ("
                        - link "http://developer.choosemuse.com/hardware-firmware/hardware" [ref=e285] [cursor=pointer]:
                          - /url: http://developer.choosemuse.com/hardware-firmware/hardware
                        - text: specifications for full technical information, accessed on 1 May 2022). The MUSE EEG system has electrodes located analogous to Fpz, 97 AF7, AF8, TP9, and TP10 with electrode Fpz utilized as the reference electrode. Given that, the inter-electrode distances are now detailed by the referring system which is the 10-10 Electrode Placement System. A thin layer of water was applied to the dry electrodes for the frontal metallic sensors and the conductive silicone rubber mastoid sensors behind the ears to decrease the impedance and increase the quality signal.
                      - generic [ref=e286]:
                        - generic [ref=e288] [cursor=pointer]:
                          - img "Signals 03 00033 g001a 550" [ref=e289]
                          - img "Signals 03 00033 g001b 550" [ref=e290]
                          - link [ref=e291]:
                            - /url: "#fig_body_display_signals-03-00033-f001"
                        - generic [ref=e292]: Figure 1. Pre-implant condition. (A) 3D oral scanner study. Points of dental inter arch pressure by color-coded depiction (red as maximum altered dental pressure, green as minimal) show several spots of dental abnormal pressure. (B) Representation of the frontal-parietal current density dipole field estimated by the low-resolution brain electrographic tomography (LORETA). Red color indicates maximum current density while deep blue coded the minimum, shows a strong asymmetry between the distribution field of the left frontal-parietal areas. (C) Granger causality for four component dipoles localized to the right, left frontal gyrus and the temporal–parietal regions. Dimensions of blue circles and thin lines indicates lower causality, while red indicate high causality. Causality image at baseline occurring at 6310 of 8000 ms of EEG recording. The effective connectivity (high causality) was depicted by the color-coded (full red circle) asymmetry index with the right dominant frontal-parietal hub and by the red color of the direction of the edge originating from these areas.
                      - generic [ref=e293]:
                        - text: The data obtained were streamed from the MUSE EEG system to MATLAB EEGLAB and read by an in-built EEGLAB program. The possible contamination of the signals recorded by noise was assessed by the EEGLab plugin ASR [
                        - link "16" [ref=e294] [cursor=pointer]:
                          - /url: "#B16-signals-03-00033"
                        - text: "]. From about 30 min of eyes closed continuous recording we select for each study a continuous artifact-free part of 8000 ms, a time length sufficient to optimize the estimated functional connectivity ["
                        - link "17" [ref=e295] [cursor=pointer]:
                          - /url: "#B17-signals-03-00033"
                        - text: "]. All the data considered in the study pertain to a continuous recording set. In more detail, this simple flowchart about the different stages of data collection has been followed: stage 1 and stage 2 were recorded on the same day, respectively, when the patient was assessed for the functionality of the old dental implant and three hours after positioning the new provisional prosthodontic support; stage 3 is referred to the EEG recording taken after 6 months from the positioning of the definitive implant. Though the choice of these stages has been arbitrarily decided and several intermediate periods of recording could have been investigated, the adopted solution can indicate a clear-cut continuity of results over a time frame during which the stability of the implant has been assessed. An independent component analysis (ICA) of the selected EEG recording was interpolated with the spherical splines which allow for the tri-dimensional location of the dipole generated by each electrode location by using the EEG LAB plugin FIELDTRIP and SIFT; these procedures can analyze several aspects of brain connectivity as the first estimates the current densities of vector field distribution, while the latter exploits the “effective” connectivity intended as the influence one neural system exerts over another ["
                        - link "18" [ref=e296] [cursor=pointer]:
                          - /url: "#B18-signals-03-00033"
                        - text: "]. In order to obtain validated data accordingly, the current density field was estimated with the low-resolution brain electrographic tomography algorithm (LORETA) ["
                        - link "19" [ref=e297] [cursor=pointer]:
                          - /url: "#B19-signals-03-00033"
                        - text: "], while the normalized directed transfer function (DTF), a variant of the Granger causality algorithm, was used for assessing the effective connectivity which assumes that the information in a cause’s past “must improve the prediction of the effect above and beyond the information contained in the collective past of all other measured variables” ["
                        - link "12" [ref=e298] [cursor=pointer]:
                          - /url: "#B12-signals-03-00033"
                        - text: "]. The data obtained are graphically rendered by plotting a series of distributed color-coded source reconstruction inside 2D slices in a standardized stereotactic space scale (for LORETA) and, during the time course selected by the simulated brain visualization of the effective connectivity, by the asymmetry index between areas of maximum activity and pathways of connection (hub and edges, respectively), rendered by a 3D DTF color-coded graph (red maximum, blue minimum) projected in a template brain model."
                    - generic [ref=e299]:
                      - heading "3. Results" [level=2] [ref=e300]
                      - generic [ref=e301]:
                        - text: After the replacement of the old implant, the pathologic pressure exerted inside the dental arch is estimated by the computer-assisted 3D virtual rendering oral scanner and calculated as the weight differences in the distribution of opposing forces. The evolution between the basal condition and the positioning of the provisional prosthodontic implant is summarized by the comparison between
                        - link "Figure 1" [ref=e302] [cursor=pointer]:
                          - /url: "#fig_body_display_signals-03-00033-f001"
                        - text: A and
                        - link "Figure 2" [ref=e303] [cursor=pointer]:
                          - /url: "#fig_body_display_signals-03-00033-f002"
                        - text: A. The figures show the substantial modification of the strength exerted by the inter arch forces of occlusion in the conditions above described. Furthermore, these results are exploited in their neurophysiological outcome obtained by challenging the functional changes between the electric neuronal distribution (investigated with the LORETA procedure) between the basal and the provisional prosthodontic implant. As the LORETA method relies on a peculiar visualization of an inverse solution of the source localization, the recording EEG is particularly useful when the correspondent ICA has been founded and settled. In the present case report, this method offers a further advantage, since the 3D distribution of electrical activity reported in
                        - link "Figure 1" [ref=e304] [cursor=pointer]:
                          - /url: "#fig_body_display_signals-03-00033-f001"
                        - text: B and
                        - link "Figure 2" [ref=e305] [cursor=pointer]:
                          - /url: "#fig_body_display_signals-03-00033-f002"
                        - text: B consists of a high and a small number of sensors, a condition which already fits with this study. The theoretical implication is explained and reported in
                        - link "Figure 1" [ref=e306] [cursor=pointer]:
                          - /url: "#fig_body_display_signals-03-00033-f001"
                        - text: B and
                        - link "Figure 2" [ref=e307] [cursor=pointer]:
                          - /url: "#fig_body_display_signals-03-00033-f002"
                        - text: B which show the difference in both orientation and strength between the neural populations in neighboring neuronal assemblies. Furthermore, the differences between
                        - link "Figure 1" [ref=e308] [cursor=pointer]:
                          - /url: "#fig_body_display_signals-03-00033-f001"
                        - text: B and
                        - link "Figure 2" [ref=e309] [cursor=pointer]:
                          - /url: "#fig_body_display_signals-03-00033-f002"
                        - text: B show, in a limited but significant brain area, the changes in the standardized current density as an instantaneous distributed discrete image of the EEG [
                        - link "19" [ref=e310] [cursor=pointer]:
                          - /url: "#B19-signals-03-00033"
                        - text: "] and account for the equalization of the current density between the frontal-parietal regions after positioning the new implant. A further refinement of the complex changes in neuronal dynamics accounted by the study of the current density is represented by the results of the investigation on the dynamic expression of the effective connectivity obtained by the study of the DTF."
                        - link "Figure 1" [ref=e311] [cursor=pointer]:
                          - /url: "#fig_body_display_signals-03-00033-f001"
                        - text: C (basal conditions), compared to
                        - link "Figure 2" [ref=e312] [cursor=pointer]:
                          - /url: "#fig_body_display_signals-03-00033-f002"
                        - text: C,D (3 h after positioning the provisional implant and 6 months after the definitive implant, respectively), show the dynamic interdependence calculated according to an “asymmetry” bioelectrical flow parameter between the areas recorded. It is worth mentioning that the DTF algorithm, similarly to the LORETA procedure, relies upon the transformation of the EEG signal in ICA and that their virtual projection in an MR template can be considered only from a perspective of the best approximation of the eventual localization of a stationary dominant dipole. The evolution in the DFT interdependence between
                        - link "Figure 1" [ref=e313] [cursor=pointer]:
                          - /url: "#fig_body_display_signals-03-00033-f001"
                        - text: C and
                        - link "Figure 2" [ref=e314] [cursor=pointer]:
                          - /url: "#fig_body_display_signals-03-00033-f002"
                        - text: C,D can be thus estimated as the virtual expression of the interhemispheric reshaping in the local dynamics of these neural assemblies.
                      - generic [ref=e315]:
                        - generic [ref=e317] [cursor=pointer]:
                          - img "Signals 03 00033 g002a 550" [ref=e318]
                          - img "Signals 03 00033 g002b 550" [ref=e319]
                          - link [ref=e320]:
                            - /url: "#fig_body_display_signals-03-00033-f002"
                        - generic [ref=e321]: "Figure 2. (A) 3D oral scanner study performed after positioning the provisional new implant. Points of dental inter arch pressure by color-coded depiction (red as maximum altered dental pressure, green as minimal) show the strong reduction of the spots of dental abnormal pressure as a shift of the red points towards green colors. (B) Three hours after positioning the provisional implant: LORETA assessed current density dipole field evenly distributed between the frontal-parietal areas. Red color indicates maximum current density, deep blue the minimum. The distribution of the current fields between the frontal-parietal areas now appears evenly distributed. (C,D) (after provisional and definitive implant, respectively). Granger causality exploited by the normalized directed transfer function (DTF) at 6290 of 8000 ms. of EEG recording. The effective connectivity rendering is represented by the anterior full red circle which correlates with the almost symmetric distribution of causality between the frontal-parietal hubs, represented by the red circles (hubs) and the yellow lines of connections (edges)."
                    - generic [ref=e322]:
                      - heading "4. Discussion" [level=2] [ref=e323]
                      - generic [ref=e324]:
                        - text: The results obtained in the present case study suggest that changes in brain neuroplasticity can be related to rapid improvements in sensory-motor functions induced by the new prosthodontic implant. Indeed, previous studies suggest that under such conditions, the diverse “ossiperception” mediated by periodontal mechanoreceptors and temporo-mandibular joints prompts a new oral kinesthesis which leads to a novel integration of regional neuroplasticity [
                        - link "20" [ref=e325] [cursor=pointer]:
                          - /url: "#B20-signals-03-00033"
                        - text: "]. Moreover, the observation that tactile and discriminative functions improved after tooth loss replacement ["
                        - link "9" [ref=e326] [cursor=pointer]:
                          - /url: "#B9-signals-03-00033"
                        - text: ","
                        - link "20" [ref=e327] [cursor=pointer]:
                          - /url: "#B20-signals-03-00033"
                        - text: "], suggests the possibility of a new brain “readout” of different sensory-motor neuroplasticity. Furthermore, in line with, and extending these observations, the present report shows that the dynamic relationships of neuroplasticity expressed by the effective connectivity show more balanced inter-area changes after the new tooth replacement. It is worth noting that our results exploit an as yet scarcely investigated aspect of the dynamic neuroplasticity, which in the pre-implant conditions clearly showed the rupture of the regional modularity with the global hierarchical organization, as reflected by the strong “enslavement” that the left frontal-parietal area engages over the contralateral ("
                        - link "Figure 1" [ref=e328] [cursor=pointer]:
                          - /url: "#fig_body_display_signals-03-00033-f001"
                        - text: B,C). The net result of such altered neural dynamic shows that the frontal-parietal circuitry is “forced” to downplay the role of the contralateral region in the process of sensory-motor integration which, instead of interacting with flexible reciprocity [
                        - link "21" [ref=e329] [cursor=pointer]:
                          - /url: "#B21-signals-03-00033"
                        - text: "] and that, in doing so, impairs the modular connectivity between the frontoparietal areas and the chain of the potential motor effectors. Moreover, according to the expected theoretical previsions derived by these studies, after positioning the provisional implant and following new kinesthetic conditions the connectivity between the frontal areas and the distribution of the natural wiring pressure showed more balanced interarea relations ("
                        - link "Figure 2" [ref=e330] [cursor=pointer]:
                          - /url: "#fig_body_display_signals-03-00033-f002"
                        - text: B,C). However, the short time interval between removing the old implants and positioning the new provisional prosthesis cannot be explained by parallel clinical benefits [
                        - link "4" [ref=e331] [cursor=pointer]:
                          - /url: "#B4-signals-03-00033"
                        - text: ","
                        - link "9" [ref=e332] [cursor=pointer]:
                          - /url: "#B9-signals-03-00033"
                        - text: ","
                        - link "10" [ref=e333] [cursor=pointer]:
                          - /url: "#B10-signals-03-00033"
                        - text: "]. Thus, though the relationships between positioning the new prosthodontic implant and the deep modulation of effective cortical connectivity appear strongly correlated, an eventual clinical improvement would have been grounded in neuroplasticity after a longer interval ["
                        - link "10" [ref=e334] [cursor=pointer]:
                          - /url: "#B10-signals-03-00033"
                        - text: ","
                        - link "22" [ref=e335] [cursor=pointer]:
                          - /url: "#B22-signals-03-00033"
                        - text: "] than the one observed after three hours only. However, dealing with a different hypothesis one should relate the novel neuroplasticity occurring as a rapid modification in the effective connectivity with the fact that the new implant, by redrafting the original conditions of nociceptive and proprioceptive afferents in multiple brain regions, could eventually induce rapid changes in inter-area brain connectivity by a quick reframing of extensive small and micro-scale events. Indeed, rapid changes operated by early genes could account for synaptic changes which eventually reverberate along brain networks. In support of such a hypothesis, seminal studies ["
                        - link "23" [ref=e336] [cursor=pointer]:
                          - /url: "#B23-signals-03-00033"
                        - text: "] indicate the early gene c-fos, expressed in several neural populations, as a possible candidate for shifting synaptic conditions in response to significant changes induced by sensory-motor depolarizations. Furthermore, this mechanism could play a crucial role in inducing a remodulation of long-term neuroplasticity ["
                        - link "24" [ref=e337] [cursor=pointer]:
                          - /url: "#B24-signals-03-00033"
                        - text: "] in their dynamic expression, here represented by the reshaping of the effective connectivity."
                    - generic [ref=e338]:
                      - heading "5. Conclusions" [level=2] [ref=e339]
                      - generic [ref=e340]: The results of this study support previous investigations on tooth replacement and neuroplasticity and add novel features by describing the dynamic correlations of the latter in crucial sensory-motor brain networks.
                      - generic [ref=e341]:
                        - text: Recent advancements in the application of the Virtual, Augmented and/or Mixed Realities in dental and prosthodontic practice, such as the holographic projection of internal dental conditions and the use of interactive simulators have opened new vistas in the study of the digital dental models [
                        - link "25" [ref=e342] [cursor=pointer]:
                          - /url: "#B25-signals-03-00033"
                        - text: ","
                        - link "26" [ref=e343] [cursor=pointer]:
                          - /url: "#B26-signals-03-00033"
                        - text: "]. These new technologies can support the assessment of the investigations of the cortical responses and can improve the monitoring of prosthodontic procedures."
                      - generic [ref=e344]: "Though the present results address new aspects of prosthodontic-related neuroplasticity, it is worth considering some critical aspects of this study as summarized by the following points: (i) the estimated connectivity has been incompletely defined, given the paucity of the electrode arrays used; (ii) the impact of the term “effective connectivity” exploited by the Granger causality could downplay the real time-frame of the bioelectrical activity, as this method cannot take into account the typical vector changing in EEG signals which is instead deduced on the basis of an artifactual stationary algorithm; (iii) though the results cover a short and medium period of observation, long monitoring punctuating more extensive periods, could be potentially useful in supporting eventual continuity or revealing different phases played by the dynamic aspects of effective connectivity."
                      - generic [ref=e345]: Aside from these caveats, our report suggests that the study of brain connectivity represents a new approach to testing prosthodontic implants and can be potentially extended in monitoring the treatment of several distressing oral conditions.
