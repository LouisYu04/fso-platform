    - link "Transporting CDMA signals over an analog optical link IEEE Transactions on Vehicular Technology, 1999 We have investigated transmitting wireless code division multiple-access (CDMA) signals from a remote antenna to a centralized base station over an analog optical link. We present specifications for transmission of standard (IS.95) CDMA signals and demonstrate that unisolated uncooled lasers can meet these requirements. Tests were conducted using both a 1.3-/spl mu/m Fabry-Perot laser and a 1.55-/spl mu/m distributed-feedback laser (DFB)." [ref=e360] [cursor=pointer]:
