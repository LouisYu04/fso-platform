    - link "Demonstration of incoherent wavelength-encoding/time-spreading optical CDMA using chirped moire gratings IEEE Photonics Technology Letters, 2000 We demonstrate a wavelength-encoding/time-spreading optical code-division multiple-access system that uses in-fiber chirped moire gratings for encoding/decoding. We present results for a system comprising four users, one desired and three interfering, and operating at the OC-12 transmission speed (622.08 Mbit/s). Our measurements verify the principle of encoding/decoding and the rejection of multiuser interference." [ref=e356] [cursor=pointer]:
