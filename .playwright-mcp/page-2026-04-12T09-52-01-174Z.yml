          - region "Article content" [ref=e84]:
            - generic [ref=e85]:
              - generic [ref=e86]:
                - heading "SUMMARY" [level=2] [ref=e87]: SUMMARY
                - generic [ref=e88]:
                  - heading "INTRODUCTION:" [level=3] [ref=e89]
                  - paragraph [ref=e90]: In addition to reproductive purposes, human sexuality and sexual health are matters of great importance in the medical office. Despite this, there is still a deficiency in the training of Brazilian medical students regarding sexual medicine and gender issues.
                - generic [ref=e91]:
                  - heading "OBJECTIVE:" [level=3] [ref=e92]
                  - paragraph [ref=e93]: The objective of this study was to analyze the perception of fifth- and sixth-year students in relation to the teaching of sexual medicine and gender issues in medical courses.
                - generic [ref=e94]:
                  - heading "METHODS:" [level=3] [ref=e95]
                  - paragraph [ref=e96]: This is a descriptive and cross-sectional study with students from the last 2 years of medical schools in the State of Santa Catarina (internship classes), through the application of a self-administered, semi-structured online questionnaire.
                - generic [ref=e97]:
                  - heading "RESULTS:" [level=3] [ref=e98]
                  - paragraph [ref=e99]: A total of 164 students answered the questionnaire, with 83.5% (137/164) saying they had taken classes on sexual medicine and 47% (77/164) saying they had taken classes on gender issues. The participants judged the teaching inadequate in most of the topics addressed, and there was no significant difference between students from public and private schools. Notably, 79.9% (131/164) of the students considered the teaching of sexual medicine insufficient or inadequate, while 87.8% (144/164) considered the teaching of gender issues insufficient or inadequate.
                - generic [ref=e100]:
                  - heading "CONCLUSION:" [level=3] [ref=e101]
                  - paragraph [ref=e102]: The vast majority of students consider the teaching of sexual medicine and gender issues insufficient and inadequate.
                - paragraph [ref=e104]:
                  - strong [ref=e105]: "KEYWORDS:"
                  - text: Sexual health, Sexuality, Sexual and gender minorities, Students, Medical, Personal satisfaction
              - generic [ref=e106]:
                - heading "INTRODUCTION" [level=2] [ref=e107]: INTRODUCTION
                - paragraph [ref=e108]:
                  - text: Sexual health was conceptualized in 1975 by the World Health Organization (WHO), which was included in the definition of reproductive health only 20 years later
                  - superscript [ref=e109]:
                    - link "1" [ref=e110] [cursor=pointer]:
                      - /url: "#B1"
                  - text: . Beyond reproductive purposes and within the scope of human rights, the understanding of the dimension of human sexuality is fundamental
                  - superscript [ref=e111]:
                    - link "2" [ref=e112] [cursor=pointer]:
                      - /url: "#B2"
                  - text: . The importance of this translates into the fact that most gender and sex minorities report of having experienced harassment and discrimination when seeking health services
                  - superscript [ref=e113]:
                    - link "3" [ref=e114] [cursor=pointer]:
                      - /url: "#B3"
                  - text: .
                - paragraph [ref=e115]:
                  - text: In a multi-country survey, it was shown that only 30% of medical schools include sexual health in the curriculum. When they do, the main focus is on reproductive biology and not on the diversity of behaviors and sexual expressions
                  - superscript [ref=e116]:
                    - link "4" [ref=e117] [cursor=pointer]:
                      - /url: "#B4"
                  - text: . In Canada and the United States, only 22% of general practitioners regularly ask patients about their sexual health, making clear the gap in medical training
                  - superscript [ref=e118]:
                    - link "5" [ref=e119] [cursor=pointer]:
                      - /url: "#B5"
                  - text: .
                - paragraph [ref=e120]:
                  - text: In a Brazilian study, most students reported that the classes on sexual medicine were insufficient or nonexistent. Issues such as gender identity and expression, as well as sexual orientation are not addressed
                  - superscript [ref=e121]:
                    - link "6" [ref=e122] [cursor=pointer]:
                      - /url: "#B6"
                  - text: . A survey with gynecologists, obstetricians, urologists, psychiatrists, and general practitioners showed that more than half of them do not regularly investigate the sexual health of patients, due to deficient knowledge in sexual health
                  - superscript [ref=e123]:
                    - link "7" [ref=e124] [cursor=pointer]:
                      - /url: "#B7"
                  - text: .
                - paragraph [ref=e125]:
                  - text: Countering the deficiency in medical education, there is an increase in complaints related to sexual dysfunctions among the population
                  - superscript [ref=e126]:
                    - link "8" [ref=e127] [cursor=pointer]:
                      - /url: "#B8"
                  - text: . Among females, dysfunction of orgasm and sexual arousal are the most prevalent
                  - superscript [ref=e128]:
                    - link "9" [ref=e129] [cursor=pointer]:
                      - /url: "#B9"
                  - text: ", and in males, erectile dysfunction is pointed out as predominant"
                  - superscript [ref=e130]:
                    - link "10" [ref=e131] [cursor=pointer]:
                      - /url: "#B10"
                  - text: .
                - paragraph [ref=e132]:
                  - text: One strategy to improve sexual health care and care for sex and gender minority populations would be to improve academic training
                  - superscript [ref=e133]:
                    - link "11" [ref=e134] [cursor=pointer]:
                      - /url: "#B11"
                  - text: . Assessing the level of satisfaction of medical students at the end of the course can be an instrument for a diagnosis of their training in this area.
                - paragraph [ref=e135]: This study aimed to analyze the perception of medical internship students regarding the teaching of sexual medicine and gender issues during the medical course.
              - generic [ref=e136]:
                - heading "METHODS" [level=2] [ref=e137]: METHODS
                - paragraph [ref=e138]: This is a descriptive, cross-sectional study. The study questionnaire was applied during the first semester of 2022 to students in the last 2 years of medical schools in the State of Santa Catarina, Brazil (internship classes).
                - paragraph [ref=e139]:
                  - text: The final sample size calculation was done using values from the mirror article
                  - superscript [ref=e140]:
                    - link "11" [ref=e141] [cursor=pointer]:
                      - /url: "#B11"
                  - text: ", which referred to the outcome: “My college’s current curriculum adequately prepared me to comfortably and competently serve sex and gender minorities,” which were applied to OpenEpi at the 95% confidence interval plus 20% to have a margin of safety. A total of 154 questionnaires were then needed in order to have a satisfactory sample of the population."
                - paragraph [ref=e142]: The project was submitted to the Research Ethics Committee, and the questionnaires were applied after the Consent Opinion was released and approved under number 54431521.4.0000.5369.
                - paragraph [ref=e143]: Participants were approached by the researchers via electronic means. A link was sent that directed the participant to complete the questionnaire online, through the Google Forms platform. The participants were assured of secrecy and confidentiality. This is a self-administered, semi-structured questionnaire with open and closed questions. The self-answer instrument was applied in a single moment, and only one answer per participant was accepted. The participant could stop filling it out at any time, without being identified or suffering any embarrassment.
                - paragraph [ref=e144]: The dependent variable of the study was the teaching of sexual medicine and gender issues in medical courses. The independent variables included the types of teaching institution (public or private); subjects that offered these topics; topics covered in the classes; students’ comfort and safety when dealing with sexual medicine and gender issues; and their satisfaction with the teaching of sexual medicine and gender issues.
                - paragraph [ref=e145]:
                  - text: The data were tabulated using descriptive statistics to obtain frequency distributions, with the use of the Windows Excel software. Later, the data were exported to the SPSS 16.0 program (IBM Corp., Armonk, NY, USA). Qualitative variables were described using absolute and relative frequencies, while quantitative variables were described as means and standard deviations for descriptive analysis. The chi-square (
                  - superscript [ref=e146]:
                    - link "2" [ref=e147] [cursor=pointer]:
                      - /url: "#B2"
                  - text: ) or Fisher’s exact test was used to test the homogeneity of proportions. The t-test for independent samples and the Mann-Whitney U test were used to compare parametric and nonparametric variables. The established significance level was p<0.05.
                - paragraph [ref=e148]: The study is based on Resolutions 510/2016 and 466/12 of the National Health Council, which, from the perspective of the individual and collectivities, incorporate bioethical references, such as autonomy, non-maleficence, beneficence, justice, and equity.
                - paragraph [ref=e149]: Before answering the questionnaire, the participant had to read and agree with the informed consent form. The researchers declare no conflict of interest.
              - generic [ref=e150]:
                - heading "RESULTS" [level=2] [ref=e151]: RESULTS
                - paragraph [ref=e152]: A total of 164 completed forms were obtained [33 (20.1%) students from public universities and 131 (79.9%) from private universities]. Of the total of 1680 internal students contacted, 9.8% responded to the questionnaire. There was a prevalence of female participants (68.3%).
                - paragraph [ref=e153]: When asked about the teaching of sexual medicine, 83.5% (137/164) stated that they had been taught about this subject. There was no difference between the types of school (PR 1.02; 95%CI 0.87–1.20; p=0.820). As for gender issues, 47% (77/164) stated that this subject was addressed during medical school, and there was no difference between types of school (PR 1.12; 95%CI 0.77–1.64; p=0.557).
                - paragraph [ref=e154]:
                  - link "Table 1" [ref=e155] [cursor=pointer]:
                    - /url: "#t1"
                  - text: shows which course subjects addressed the themes of this study. Gynecology, urology, and psychiatry stood out, and bioethics was the discipline that least addressed the theme. Gender issues were less addressed in all disciplines.
