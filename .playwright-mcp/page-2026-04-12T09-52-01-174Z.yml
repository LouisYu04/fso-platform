                  - paragraph [ref=e344]: "PR: prevalence ratio; CI: confidence interval; STI: sexually transmitted infections."
                - paragraph [ref=e345]: "When asked about patient care, they answered to feel comfort and security to attend: sexual minorities in 100/164 (61%); gender minorities, 63/164 (38.4%); cases of sexual dysfunctions, 75/164 (45.7%); questions of sexual practices with patients of minorities of sex or gender, 34/164 (20.7%); and questions of gender identity, 34/164 (20.7%)."
                - paragraph [ref=e346]: As for the opportunities to attend cases involving sexual and gender minorities, 63% (104/164) of the students stated that they were insufficient or non-existent during the course.
                - paragraph [ref=e347]: In general, 79.9% (131/164) of students considered the teaching of sexual medicine insufficient or inadequate in their schools, while 87.8% (144/164) evaluated the teaching of gender issues insufficient or inadequate.
              - generic [ref=e348]:
                - heading "DISCUSSION" [level=2] [ref=e349]: DISCUSSION
                - paragraph [ref=e350]:
                  - text: In 2014, the National Curriculum Guidelines (DCN) instituted the inclusion of gender and sexuality themes in medical curricula, explaining the need and importance of the approach of both
                  - superscript [ref=e351]:
                    - link "12" [ref=e352] [cursor=pointer]:
                      - /url: "#B12"
                  - text: . Despite this, 8 years after the implementation of these guidelines, our study showed that there is still a lack in the teaching of these themes in the medical courses of SC, both public and private. This finding comes to add to similar studies carried out in other regions of Brazil
                  - superscript [ref=e353]:
                    - link "6" [ref=e354] [cursor=pointer]:
                      - /url: "#B6"
                    - text: ","
                    - link "7" [ref=e355] [cursor=pointer]:
                      - /url: "#B7"
                  - text: and in Europe
                  - superscript [ref=e356]:
                    - link "11" [ref=e357] [cursor=pointer]:
                      - /url: "#B11"
                    - text: –
                    - link "14" [ref=e358] [cursor=pointer]:
                      - /url: "#B14"
                  - text: .
                - paragraph [ref=e359]:
                  - text: When asked about the teaching of sexual medicine, 83.5% (137/164) said they had taken classes on this subject, and similar numbers were found in the study of Rufino et al. (95.2%)
                  - superscript [ref=e360]:
                    - link "7" [ref=e361] [cursor=pointer]:
                      - /url: "#B7"
                  - text: . However, when it comes to gender issues, only 47% of students reported having taken classes on the subject. This disparity between the themes is in line with what was observed in the study by Zelin et al., where 92.7% of the participants felt comfortable treating sex minority patients, but only 31.7% felt comfortable serving gender minorities
                  - superscript [ref=e362]:
                    - link "11" [ref=e363] [cursor=pointer]:
                      - /url: "#B11"
                  - text: .
                - paragraph [ref=e364]:
                  - text: Analyzing the medical curricula of Brazil, we noticed that it is more focused on sexual medicine, leaving gender in the background
                  - superscript [ref=e365]:
                    - link "7" [ref=e366] [cursor=pointer]:
                      - /url: "#B7"
                    - text: ","
                    - link "15" [ref=e367] [cursor=pointer]:
                      - /url: "#B15"
                    - text: ","
                    - link "16" [ref=e368] [cursor=pointer]:
                      - /url: "#B16"
                  - text: . Sexuality is considered to have a greater relationship with the physical body and stigmas of diseases that can be acquired by expressing it
                  - superscript [ref=e369]:
                    - link "16" [ref=e370] [cursor=pointer]:
                      - /url: "#B16"
                  - text: ", leading to a “selective visibility” for the health care of this population with a focus on the genital organs, reproduction, and sexually transmitted infections (STIs), disregarding the complexity and subjectivity of these individuals"
                  - superscript [ref=e371]:
                    - link "16" [ref=e372] [cursor=pointer]:
                      - /url: "#B16"
                  - text: ", and perpetuating the cisnormative and binary pattern of the Brazilian health system, where minorities of sex and gender still suffer from the lack of competence, negligence, and frequent denial of their health rights"
                  - superscript [ref=e373]:
                    - link "17" [ref=e374] [cursor=pointer]:
                      - /url: "#B17"
                  - text: .
                - paragraph [ref=e375]:
                  - text: According to the interviewees, the subjects that most addressed the theme of sexual medicine were gynecology (77.4%), urology (51.2%), and psychiatry (15.2%), while gender issues were most addressed only in gynecology (32.9%). Similar results were found in other studies
                  - superscript [ref=e376]:
                    - link "6" [ref=e377] [cursor=pointer]:
                      - /url: "#B6"
                    - text: ","
                    - link "7" [ref=e378] [cursor=pointer]:
                      - /url: "#B7"
                    - text: ","
                    - link "14" [ref=e379] [cursor=pointer]:
                      - /url: "#B14"
                  - text: ", reiterating a punctual approach to these themes, focusing on reproductive and pathological themes or on “risk behaviors” related to these groups, such as cancer, abortion, psychiatric diseases, and STIs"
                  - superscript [ref=e380]:
                    - link "7" [ref=e381] [cursor=pointer]:
                      - /url: "#B7"
                    - text: ","
                    - link "15" [ref=e382] [cursor=pointer]:
                      - /url: "#B15"
                  - text: .
                - paragraph [ref=e383]:
                  - text: Reinforcing the aforementioned findings, the themes evaluated as having the most appropriate education were the prevention of STIs, abortion, sexual dysfunctions, sexual violence, and sexual response cycle, whereas the most inadequate were intersexuality, effect of acute and chronic diseases on sexual response, and gender incongruity. There was no statistical significance (p<0.05) among students from public and private schools. Similar findings were found in the study by Rufino et al
                  - superscript [ref=e384]:
                    - link "7" [ref=e385] [cursor=pointer]:
                      - /url: "#B7"
                  - text: .
                - paragraph [ref=e386]:
                  - text: Due to this reality, it is common for people who fit into minorities of gender and sex and/or with sexual issues in their broadest significance, to stop seeking medical care for fear of being treated badly, suffering discrimination and homophobia
                  - superscript [ref=e387]:
                    - link "3" [ref=e388] [cursor=pointer]:
                      - /url: "#B3"
                  - text: . This leads to a greater risk of developing diseases and a consequent delay in diagnoses and initiation of treatments
                  - superscript [ref=e389]:
                    - link "18" [ref=e390] [cursor=pointer]:
                      - /url: "#B18"
                  - text: .
                - paragraph [ref=e391]: This contrast between the low teaching and approach of medical schools with a high practical demand for such professional skills makes us critically rethink the medical curricula not only in SC and Brazil but also in most medical schools around the world.
              - generic [ref=e392]:
                - heading "CONCLUSION" [level=2] [ref=e393]: CONCLUSION
                - paragraph [ref=e394]: The findings presented here reinforce the lack in the teaching of sexual medicine and gender issues in the medical courses of Santa Catarina. The vast majority of students consider the teaching of sexual medicine and gender issues insufficient and inadequate.
                - paragraph [ref=e395]: It was observed that, throughout the course, several topics were addressed in a timely manner, usually focusing on biological and pathological aspects and avoiding themes such as intersexuality.
                - paragraph [ref=e396]: The results indicate that medical schools should reassess the format of the teaching of sexual medicine and gender issues.
