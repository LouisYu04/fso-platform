                    - generic [ref=e15786]:
                      - heading "5. Conclusions" [level=2] [ref=e15787]
                      - generic [ref=e15788]:
                        - text: In this paper, with the consideration of practical factors such as atmospheric loss, atmospheric turbulence, weather conditions, RF channel fading, pointing errors, and relay-assisted structure, we derive mathematical expressions of the BER and outage probability of the hybrid FSO/RF direct link and the UAV-assisted hybrid system, respectively. We, firstly, analyze the impact of different modulation schemes on the BER of both the hybrid direct link and the UAV-assisted hybrid system and conclude that the BER performance can achieve an optimum when adopting the CBPSK modulation scheme under any atmospheric environment and system conditions. Through simulation analyses, we have that the light fog condition has the most severe impact on system performance, while the clear air condition has the least impact on the system. Although the impact of light rain on both FSO and RF sublinks exist, the system performance is still better than that in haze and light fog conditions. More receiver aperture and RF fading parameter
                        - generic [ref=e15789]:
                          - generic [ref=e15795]:
                            - generic [ref=e15796]: 𝑚
                            - generic [ref=e15798]: 𝑥,𝑦
                          - math [ref=e15799]:
                            - generic [ref=e15801]:
                              - generic [ref=e15802]: m
                              - generic [ref=e15803]:
                                - generic [ref=e15804]: x
                                - generic [ref=e15805]: ","
                                - generic [ref=e15806]: "y"
                        - text: m can further improve the performance of the hybrid direct link and the UAV-assisted hybrid system under any weather conditions. Compared with the hybrid direct link, the UAV-assisted hybrid system can significantly improve system communication performance. For the UAV-assisted hybrid system, increasing the number of transmission paths will improve communication performance, while fewer hops in each path will contribute to the performance. This work also demonstrates that combining multiple technologies can effectively improve the communication performance of hybrid direct links and UAV-assisted hybrid systems in any weather environment.
