                            - generic [ref=e282]: 𝜅
                            - math [ref=e284]:
                              - generic [ref=e286]: κ
                          - text: distributions are commonly used to simulate strong turbulent states. Andrews et al. proposed a modified Rytov theory, which led to the derivation of the Gamma–Gamma turbulence model. Due to its ability to simulate the changes from weak turbulence to strong turbulence, it has been widely used in the performance analysis of FSO systems. The Málaga distribution unifies most irradiance statistical models, including the LN distribution,
                          - generic [ref=e287]:
                            - generic [ref=e293]: 𝜅
                            - math [ref=e295]:
                              - generic [ref=e297]: κ
                          - text: distribution, and Gamma–Gamma distribution and is therefore considered a generalized turbulence model. Under all aperture averaging conditions, the EW distribution can provide good consistency with the probability density function (PDF) of light irradiance for simulation and experimental data in weak to strong turbulence and is commonly used to analyze the impact of aperture averaging technology on FSO system performance.
                        - generic [ref=e298]:
                          - text: In order to mitigate the impact of atmospheric environment on the performance of ground FSO communication systems and improve the reliability and availability of wireless optical communication links, a mixed FSO/RF transmission system combining FSO links and millimeter wave radio frequency (MMW-RF) links has been proposed. Mixed FSO/RF communication systems are generally divided into mixed FSO/RF dual-hop systems and hybrid FSO/RF parallel transmission systems. The mixed FSO/RF dual-hop system is an asymmetric dual-hop relay system that can effectively expand coverage and reduce the impact of atmospheric environment on the FSO system [
                          - link "13" [ref=e299] [cursor=pointer]:
                            - /url: "#B13-sensors-23-07638"
                          - text: "]. Wang et al. ["
                          - link "14" [ref=e300] [cursor=pointer]:
                            - /url: "#B14-sensors-23-07638"
                          - text: "] derived and analyzed the end-to-end average bit error rate (BER) expression for hybrid FSO/RF dual-hop systems based on the decode and forwarddecoding forwarding (DF) scheme under Exponential Weibull turbulence channels with nonzero boresight pointing error (PE) and Nakagami-m fading channels. The hybrid FSO/RF parallel transmission system is a cooperative communication system that can effectively improve communication system performance ["
                          - link "15" [ref=e301] [cursor=pointer]:
                            - /url: "#B15-sensors-23-07638"
                          - text: "]. Odeyemi et al. ["
                          - link "16" [ref=e302] [cursor=pointer]:
                            - /url: "#B16-sensors-23-07638"
                          - text: "] derived closed-form expressions of the bit error rate and outage probability of hybrid FSO/RF parallel systems based on a selective combination under Málaga turbulence with pointing errors and"
                          - generic [ref=e303]:
                            - generic [ref=e309]: 𝜂−𝜇
                            - math [ref=e310]:
                              - generic [ref=e312]:
                                - generic [ref=e313]: η
                                - generic [ref=e314]: −
                                - generic [ref=e315]: μ
                          - text: fading RF channels.
                        - generic [ref=e316]:
                          - text: Due to the influence of turbulence, the performance of FSO communication systems deteriorates rapidly with the increase of transmission distance. A cooperative communication network based on multi-hop transmission (multi-hop relay-assisted network) is considered an effective solution to solve the problem [
                          - link "17" [ref=e317] [cursor=pointer]:
                            - /url: "#B17-sensors-23-07638"
                          - text: "]. Wang et al. ["
                          - link "18" [ref=e318] [cursor=pointer]:
                            - /url: "#B18-sensors-23-07638"
                          - text: "] derived mathematical expressions of the end-to-end average bit error rate and outage probability of parallel multi-hop FSO systems under Exponential Weibull turbulence with nonzero boresight pointing errors. Zhang et al. ["
                          - link "19" [ref=e319] [cursor=pointer]:
                            - /url: "#B19-sensors-23-07638"
                          - text: "] deduced the expression of the end-to-end average bit error rate and outage probability of the parallel multi-hop relay FSO system under Gamma–Gamma turbulence with a pointing error and different weather conditions and analyzed the impact of plane wave and spherical wave beams on the performance of parallel multi-hop relay FSO system."
                        - generic [ref=e320]:
                          - text: In recent years, the development of unmanned aerial vehicle (UAV) technology has made UAV-assisted FSO communication a research hotspot for scientists [
                          - link "20" [ref=e321] [cursor=pointer]:
                            - /url: "#B20-sensors-23-07638"
                          - text: ","
                          - link "21" [ref=e322] [cursor=pointer]:
                            - /url: "#B21-sensors-23-07638"
                          - text: ","
                          - link "22" [ref=e323] [cursor=pointer]:
                            - /url: "#B22-sensors-23-07638"
                          - text: ","
                          - link "23" [ref=e324] [cursor=pointer]:
                            - /url: "#B23-sensors-23-07638"
                          - text: "]. UAV-assisted FSO communication is achieved by installing laser transmitters, receivers, and other devices on the UAV to communicate with ground terminals. The UAV has strong flexibility, convenient deployment, and wide coverage, which can effectively alleviate signal transmission problems in wireless optical communication and improve communication quality and reliability ["
                          - link "24" [ref=e325] [cursor=pointer]:
                            - /url: "#B24-sensors-23-07638"
                          - text: "]. In practical applications, UAV-assisted FSO communication can be used in fields such as remote communication, monitoring data transmission, and disaster rescue. Lu et al. ["
                          - link "25" [ref=e326] [cursor=pointer]:
                            - /url: "#B25-sensors-23-07638"
                          - text: "] analyzed and derived the outage probability of a UAV-based FSO dual-hop decode-and-forward system with multiple sources. Xu et al. ["
                          - link "26" [ref=e327] [cursor=pointer]:
                            - /url: "#B26-sensors-23-07638"
                          - text: "] established and investigated a UAV-assisted mixed RF/FSO dual-hop communication system under the amplified-and-forward protocol with variable gain and derived the system metrics."
                      - generic [ref=e328]:
                        - heading "1.2. Motivation and Contributions" [level=4] [ref=e329]
                        - generic [ref=e330]: "In order to simultaneously improve the communication performance, transmission distance, and coverage range of the communication system, this paper analyzes the performance of a UAV-assisted multi-hop parallel hybrid FSO/RF communication system (abbreviated as UAV-assisted hybrid system) that combines a hybrid FSO/RF parallel transmission system and a parallel multi-hop relay cooperative communication system by the UAV relay. Our main contributions in this work are pointed out as follows:"
                        - list [ref=e332]:
                          - listitem [ref=e333]:
                            - generic [ref=e334]: To our knowledge, we, firstly, propose a multi-hop parallel hybrid FSO/RF communication system architecture with and without PE based on the UAV relay.
                          - listitem [ref=e335]:
                            - generic [ref=e336]: New mathematical expressions for the end-to-end system in terms of average bit error rate and outage probability are derived under EW turbulence and Nakagami fading channels for four binary subcarrier modulation schemes.
                          - listitem [ref=e337]:
                            - generic [ref=e338]: The effects of different weather environments, modulation methods, receiver apertures, RF fading parameters, pointing errors, and relay structures on the performance of our considered systems are analyzed through numerical evaluationnumerical simulations. As far as we know, no existing work considered the impact of weather environments and aperture averaging on UAV-assisted FSO communication.
                        - generic [ref=e339]:
                          - text: "The rest of the paper is structured as follows: in"
                          - link "Section 2" [ref=e340] [cursor=pointer]:
                            - /url: "#sec2-sensors-23-07638"
                          - text: ", the system model is presented."
                          - link "Section 3" [ref=e341] [cursor=pointer]:
                            - /url: "#sec3-sensors-23-07638"
                          - text: analyzes the average bit error rate and outage probability. The performance of the hybrid FSO/RF direct link and UAV-assisted hybrid FSO/RF communication system is analyzed by system simulation in
                          - link "Section 4" [ref=e342] [cursor=pointer]:
                            - /url: "#sec4-sensors-23-07638"
                          - text: . Finally, conclusions are given in
                          - link "Section 5" [ref=e343] [cursor=pointer]:
                            - /url: "#sec5-sensors-23-07638"
                          - text: .
