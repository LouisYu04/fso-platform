                      - generic [ref=e249]:
                        - text: With the emergence of thousands of terminals, more communication resources are needed to demand users’ applications, such as interactive gaming, VR, etc. Traditional radio frequency (RF) communication methods will not satisfy those new demands anymore. Free space optical (FSO) communication systems are commonly used as one of telecommunications’ ‘last mile’ or next-generation mobile communication technology [
                        - link "1" [ref=e250] [cursor=pointer]:
                          - /url: "#B1-sensors-23-07638"
                        - text: "] because the characteristics of large capacity, fast network construction, license-free, and high security of free space optical (FSO) communication systems. However, the performance of ground FSO communication systems is greatly affected by atmospheric channels, such as the scattering effect of atmospheric particles (such as clouds, fog, rain, snow, aerosols, etc.) on the beam of light, causing attenuation of the light intensity on the receiver plane ["
                        - link "2" [ref=e251] [cursor=pointer]:
                          - /url: "#B2-sensors-23-07638"
                        - text: "]. Atmospheric turbulence can cause scintillation, phase fluctuation, beam expansion, and beam wander on the receiver plane ["
                        - link "3" [ref=e252] [cursor=pointer]:
                          - /url: "#B3-sensors-23-07638"
                        - text: "]. These all lead to limitations in the FSO communication, such as poor visibility and short transmission distance."
