                        - text: "]. In any hop and direct link, the hybrid FSO/RF communication method based on DF relay protocol, subcarrier intensity modulation, and selective combination scheme are adopted. To avoid interferences, only one node is selected to relay and forward the signal to a next node at any hop. In order to improve the reliability of the communication system, the max–min path selection criterion is adopted ["
