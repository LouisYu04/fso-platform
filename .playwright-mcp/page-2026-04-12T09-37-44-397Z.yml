                  - generic [ref=e233]:
                    - generic [ref=e234]:
                      - heading "Abstract" [level=2] [ref=e235]
                      - text: Nowadays, unmanned aerial vehicle (UAV) communication systems are commonly considered as one of the key enabling technologies for 6G. The hybrid free space optical (FSO)/radio frequency (RF) system has the advantages of both FSO and RF links to improve communication system performance, and the relay-assisted system adopts multi-hop transmission and cooperative diversity methods to extend communication coverage. Thus, a joint consideration of UAV-assistedUAV assisted relay in hybrid FSO/RF transmission is meaningful. In this paper, we aim to analyze the performance of UAV-assisted multi-hop parallel hybrid FSO/RF communication systems with and without pointing errors (PE) in terms of Bit Error Rate (BER) and outage probability. In our considered system, the FSO sub-link adopts the Exponential Weibull turbulence model and the RF sub-link suffers the Nakagami fading model. With these, new mathematical formulas of both BER and outage probability are derived under the UAV-assisted hybrid FSO/RF with different modulation methods. Through numerical evaluationnumerical simulations, the performances of UAV-assisted hybrid FSO/RF systems are analyzed under different weather conditions, modulation methods, optical receiver aperture, RF fading parameters, pointing errors, and relay structures. The results demonstrate that (1) compared to hybrid FSO/RF direct links, UAV-assisted hybrid FSO/RF systems can further improve system performance; (2) the performance of UAV-assisted hybrid FSO/RF systems varies with different relay structures; (3) large receiver aperture and RF fading parameters can further improve the communication performance of hybrid FSO/RF direct links and UAV-assisted hybrid FSO/RF systems.
