      - generic [ref=e359]: The transmission of real-time images and video over wireless communication channels is a challenging problem. Digital compressed images are sensitive to bit errors which are typical in wireless communications. Moreover, the bandwidth at the air interface is currently a limiting factor because the first and second generation of mobile phone standards mainly support voice communications. We present a study of real-time image traffic over a radio link-the aim of this research is for videophone applications....
    - link "Transmission of 112-Gb/s&#x002B; DMT over 80-km SMF enabled by twin-SSB technique at 1550nm 2015 European Conference on Optical Communication (ECOC), 2015 We experimentally demonstrate 112-Gb/s DMT transmission over 80-km SMF using low-cost direct-detection architecture based on a novel twin-SSB-DMT technique. High capacities up to 146Gb/s, 138Gb/s and 130Gb/s are achieved with BER at 4.5×1 0−3 for BTB, 40-km and 80-km SMF transmissions, respectively." [ref=e360] [cursor=pointer]:
