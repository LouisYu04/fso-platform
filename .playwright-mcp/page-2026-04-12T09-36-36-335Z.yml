                      - generic [ref=e1457]:
                        - heading "4.1. Physical Layer" [level=3] [ref=e1458]
                        - generic [ref=e1459]:
                          - text: The physical layer class works in coordination with the channel model class, the SNR models, the error models, and propagation loss models for packet reception. The propagation loss class works closely with the mobility model to calculate the channel gain from Tx power, user device’s FoV, optical concentrator gain, and filter gain. The total received power is calculated from the channel gain and the noise from the thermal and ambient light sources. The SNR and the corresponding bit error are computed based on [
                          - link "27" [ref=e1460] [cursor=pointer]:
                            - /url: "#B27-sensors-21-02485"
                          - text: "]. Once the packet is received in the destination device, the error model is applied to determine if it can be passed to the upper layer successfully or dropped otherwise. Lastly, we also provide traces for a packet received and changes in SNR due to user mobility."
                        - generic [ref=e1461]: The LiFi channel class implements the actual transmission on the physical medium. It maintains a list of pointers to the physical layer objects of the AP and the user devices. The channel has a send method, which is activated by the sending device’s physical layer object.
                      - generic [ref=e1462]:
                        - heading "4.2. LiFi Mobility" [level=3] [ref=e1463]
                        - generic [ref=e1464]:
                          - text: "In LiFi networks, the user movement and device orientation changes can significantly fluctuate the receiver gain. Therefore, to accurately accommodate for the optical fluctuations, we have adopted three different mobility models: (1) Random waypoint mobility model (RWP) with orientation changes; (2) constant velocity mobility modeling; and (3) constant position mobility model. These three models cover most of the mobility either due to user or device ["
                          - link "20" [ref=e1465] [cursor=pointer]:
                            - /url: "#B20-sensors-21-02485"
                          - text: "]. Nevertheless, users can implement their unique mobility patterns."
                        - generic [ref=e1466]:
                          - text: In this work, we particularly focus on the implementation of the random waypoint mobility model, which allows a user to move around with random receiver orientations. For each movement, we calculate the angle along the direction of movement and vertical angle between the user device and AP based on the discussion in
                          - link "Section 2" [ref=e1467] [cursor=pointer]:
                            - /url: "#sec2-sensors-21-02485"
                          - text: . The current position, angle of the user’s direction of movement, and the vertical angle are stored as a single measurement of mobility. During the propagation loss calculation, these measurements are used to calculate the receiver gain. In the constant velocity mobility model, the user movement along a straight line with constant speed is modeled. The current position, as well as the polar angle, is returned as a single sample of data. Lastly, the constant position mobility model can be trivially supported using the existing ns-3 constant position mobility model.
                      - generic [ref=e1468]:
                        - heading "4.3. LiFi MAC Layer" [level=3] [ref=e1469]
                        - generic [ref=e1470]:
                          - text: Based on the discussion in
                          - link "Section 3.3" [ref=e1471] [cursor=pointer]:
                            - /url: "#sec3dot3-sensors-21-02485"
                          - text: ", we have implemented the TDMA MAC layer functionalities. Overall implementation of the MAC layer is divided into three layers along with the analogy of the WiFi ns-3 module: A higher layer, a middle layer, and a lower layer. These classes are further customized to provide the AP and the user device-specific behaviors. The primary function of the higher layer classes is to provide resource distribution and user association. In the LiFi AP, the higher layer class is customized in the access point in the form of AP_Mac that provides a resource sharing algorithm. The resource-sharing algorithm schedule users on the downlink and uplink slots and send control frames. Here we provide a heuristic resource sharing algorithm that shares a common pool of data slots between the uplink and the downlink users according to their QoS requirements. As previously said, the resource sharing algorithm reserves slots for control purposes including beacon generation for user registration. To register users, the AP_Mac sends beacon (control) frames at the end of each super-frame consisting of AP’s IP address, T"
                          - subscript [ref=e1472]: x
                          - text: power, and its MAC address. The higher layer MAC class, named as Mac_Rx, in the LiFi user device is provided with a receive method that parses beacon frames, and if the SNR is above a certain threshold, it sends a response containing its MAC address and the QoS requirements. Upon reception of the user response, the AP_Mac adds them to the connected users. A scheduling algorithm then uses this information to allocate slots. A complete description of the resource sharing algorithm is provided in Algorithm 1. The middle layer queues and dequeues packets before forwarding them up or down the protocol stack. In the LiFi AP, the customized middle layer class is referred to as Mac_AP_Middle, and in the user device, it is named Mac_Rx_Middle. Both these classes are added as pointers to the net devices in the ns-3 AP and user device’s nodes. The net devices transmit method queue data received from the upper protocol stacks. The Mac_AP_Middle and Mac_Rx_Middle transmit method dequeue on the allocated slot and forward it down to the MAC low layer. For both LiFi AP and user devices, we provide a generic MAC layer called Mac_Low, responsible for managing access to the LiFi channel. It hosts a pointer to the middle layer mac and the physical layer objects of the AP. The Mac_Low class has a method for packet transmission and reception. In the transmission method, a header is put on the outgoing frame and sent down the channel. The header is removed from the frame in the receive method and checked for a control or a data frame and passed to the upper layer accordingly.
