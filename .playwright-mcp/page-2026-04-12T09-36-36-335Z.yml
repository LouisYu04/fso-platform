                      - /url: mailto:?&subject=From%20MDPI%3A%20%22A%20Comprehensive%20Open-Source%20Simulation%20Framework%20for%20LiFi%20Communication"&body=https://www.mdpi.com/1059146%3A%0A%0AA%20Comprehensive%20Open-Source%20Simulation%20Framework%20for%20LiFi%20Communication%0A%0AAbstract%3A%20Light%20Fidelity%20%28LiFi%29%20is%20a%20new%20candidate%20for%20wireless%20networking%20that%20utilizes%20the%20visible%20light%20spectrum%20and%20exploits%20the%20existing%20lighting%20infrastructure%20in%20the%20form%20of%20light-emitting%20diodes%20%28LEDs%29.%20It%20provides%20point-to-point%20and%20point-to-multipoint%20communication%20on%20a%20bidirectional%20channel%20at%20very%20high%20data%20rates.%20However%2C%20the%20LiFi%20has%20small%20coverage%2C%20and%20its%20optical%20gain%20is%20closely%20related%20to%20the%20receiver%E2%80%99s%20directionality%20vis-%C3%A0-vis%20the%20transmitter%2C%20therefore%20it%20can%20experience%20frequent%20service%20outages.%20To%20provide%20reliable%20coverage%2C%20the%20LiFi%20is%20integrated%20with%20other%20networking%20technologies%20such%20as%20wireless%20fidelity%20%28WiFi%29%20thus%20forming%20a%20hybrid%20system.%20The%20hybrid%20LiFi%2FWiFi%20system%20faces%20many%20challenges%20including%20but%20not%20limited%20to%20seamless%20integration%20with%20the%20WiFi%2C%20support%20for%20mobility%2C%20handover%20management%2C%20resource%20sharing%2C%20and%20load%20balancing.%20The%20existing%20literature%20has%20addressed%20one%20or%20the%20other%20aspect%20of%20the%20issues%20facing%20LiFi%20systems.%20There%20are%20limited%20free%20source%20tools%20available%20to%20holistically%20address%20these%20challenges%20in%20a%20scalable%20manner.%20To%20this%20end%2C%20we%20have%20developed%20an%20open-source%20simulation%20framework%20based%20on%20the%20network%20simulator%203%20%28ns-3%29%2C%20which%20realizes%20critical%20aspects%20of%20the%20LiFi%20wireless%20network.%20Our%20developed%20ns-3%20LiFi[...]
