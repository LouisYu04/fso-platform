                        - text: . The integration between LiFi and WiFi systems including the handover process is discussed in
                        - link "Section 5" [ref=e328] [cursor=pointer]:
                          - /url: "#sec5-sensors-21-02485"
                        - text: and
                        - link "Section 6" [ref=e329] [cursor=pointer]:
                          - /url: "#sec6-sensors-21-02485"
                        - text: ", respectively. The evaluation metrics are discussed in"
                        - link "Section 7" [ref=e330] [cursor=pointer]:
                          - /url: "#sec7-sensors-21-02485"
                        - text: .
                      - generic [ref=e331]:
                        - link "Section 8" [ref=e332] [cursor=pointer]:
