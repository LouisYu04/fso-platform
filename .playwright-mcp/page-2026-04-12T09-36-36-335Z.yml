                      - generic [ref=e1578]:
                        - heading "5.3. Symmetric LiFi and WiFi Integration" [level=3] [ref=e1579]
                        - generic [ref=e1580]:
                          - text: In the symmetric hybrid system, we use LiFi to provide bidirectional communication. The downlink is provided through VLC while the uplink is supported using infrared technology. The symmetric systems can be trivially supported on the existing framework discussed in
                          - link "Section 4" [ref=e1581] [cursor=pointer]:
                            - /url: "#sec4-sensors-21-02485"
                          - text: . The physical layer including the channel class remains the same; however, at the MAC layer, we allow for a resource scheduling scheme to reserve slots for the uplink communication and downlink communication. This arrangement allows users to be associated with one network or another, thus allowing both networks to be used to their full capability. It reduces the WiFi uplink’s contention, thus easing several challenges such as delayed feedback to the centralized controller that can result in outdated decisions in the network.
                    - generic [ref=e1582]:
                      - heading "6. Handover between LiFi and WiFi" [level=2] [ref=e1583]
                      - generic [ref=e1584]: "The LiFi users are vulnerable to frequent service outages, especially when they are mobile; thus without a backup network, the standalone LiFi network can only support static users. To provide seamless connectivity to mobile users, an adequate handover mechanism is necessary that can land users on an appropriate AP/network. During the handover process, the current access point releases the share of resources allocated to the user, and the new network has to allocate resources to the users according to its service requirements. There are two broad categories of handovers in the LiF/WiFi hybrid systems: Horizontal handover (HHO) and vertical handover (VHO). In horizontal handover, the user is switched to AP of the same networking technology (e.g., LiFi to LiFi, WiFi to WiFi). On the other hand, in the vertical handover, users are associated with APs of different networking technology (e.g., LiFi to WiFi). In this work, we consider the vertical handover in which users are initially hosted by LiFi APs, and during connection, drop or are handed over to the WiFi. The horizontal handover can also be trivially supported on this framework and has been left for future work."
                      - generic [ref=e1585]:
                        - heading "6.1. Handover Parameters" [level=3] [ref=e1586]
                        - generic [ref=e1587]: The decision to perform a handover is dictated by the performance metrics of the user device. Performance can be measured at the physical layer in terms of the packet error rate (PER), received signal strength (RSS), signal-to-noise ratio (SNR), and instantaneous throughput. The traditional approach is to monitor the threshold of the received signal strength, or any of the other metrics, from the current AP for a certain duration D. If during this duration the signal strength drops below a certain handover threshold, the handover process starts with disconnection from the serving AP, and connects to a new AP. This switching process takes a certain time that accounts for the network procedures to connect the user device to the target AP, and in the process, it can incur some packet loss.
                      - generic [ref=e1588]:
