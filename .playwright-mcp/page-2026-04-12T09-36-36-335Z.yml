                      - generic [ref=e2044]:
                        - text: In the third scenario, we evaluate the overall performance gain of the hybrid LiFi and WiFi network. We consider an indoor network consisting of multiple users with Flows ranging from 1 to 35. Flows are unique TCP/UDP connections and are widely used in the literature to represent users; therefore, users and flows are exchangeable. We have limited one flow to one physical user. However, multiple flows can originat from a single user and it will have the same effect. The throughput of the hybrid system is shown in
                        - link "Figure 8" [ref=e2045] [cursor=pointer]:
                          - /url: "#fig_body_display_sensors-21-02485-f008"
                        - text: ", which shows significant performance gain over the WiFi-only system as the contention over WiFi channels decreased due to traffic offloads to LiFi. In"
                        - link "Figure 9" [ref=e2046] [cursor=pointer]:
                          - /url: "#fig_body_display_sensors-21-02485-f009"
                        - text: ", similar performance gains can be observed for per-user delay vis-à-vis increase in the number of flows."
                        - link "Figure 10" [ref=e2047] [cursor=pointer]:
                          - /url: "#fig_body_display_sensors-21-02485-f010"
                        - text: shows that the fairness index remains stable with an increase in the number of flows in the hybrid network. Lastly, PDR results show that the hybrid system can avoid congestion due to multiple contending stations for the network resources, as shown in
                        - link "Figure 11" [ref=e2048] [cursor=pointer]:
                          - /url: "#fig_body_display_sensors-21-02485-f011"
                        - text: . As the number of users increases, the WiFi-only system starts dropping packets, while in comparison, the hybrid system delivers much more of the packets successfully to the network end users. The difference in PDR becomes more pronounced as the number of users increases beyond 15.
