                          - /url: "#sec2-sensors-21-02485"
                        - text: starts with a conceptual overview of the framework.
                        - link "Section 3" [ref=e326] [cursor=pointer]:
                          - /url: "#sec3-sensors-21-02485"
                        - text: provides a brief discussion about the mathematical foundations of the LiFi system. The ns-3 design of the LiFi framework is presented in
                        - link "Section 4" [ref=e327] [cursor=pointer]:
