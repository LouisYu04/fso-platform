                      - heading "8. Simulations" [level=2] [ref=e1997]
                      - generic [ref=e1998]: The LiFi framework has been evaluated for user’s mobility and the resulting handovers from it. Besides, the integrated LiFi/WiFi system is evaluated for a large number of users and its performance gains are measured in terms of throughput, delay, fair sharing, and PDR.
                      - generic [ref=e1999]:
                        - text: Three simulation scenarios are designed to demonstrate the potential usage of the LiFi ns-3 framework. The first two scenarios are related to mobility and the handover capability, and the third one is related to the scalability aspect of the framework. In the first scenario, we consider a mobile user connected only to the LiFi network with no other network available for the handover. In the second scenario, we consider the static user and mobile users. The second-scenario users are first connected to the LiFi but can be dynamically associated with the WiFi based on the handover algorithm, presented in Algorithm 4. In the third simulation scenario, we demonstrate the improvements achieved for a LiFi/WiFi hybrid system in terms of system-wide performance metrics such as delay, fairness, and throughput. The parameters in
                        - link "Table 2" [ref=e2000] [cursor=pointer]:
                          - /url: "#table_body_display_sensors-21-02485-t002"
                        - text: are used to setup LiFi and WiFi hybrid systems.
