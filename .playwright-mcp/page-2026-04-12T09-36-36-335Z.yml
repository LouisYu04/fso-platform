                      - generic [ref=e2073]:
                        - text: We have only evaluated certain aspects of the framework, but researchers can add several research applications such as handover optimization, comparison between symmetric and asymmetric systems, advanced optimization algorithms for the MAC layer, and admission control schemes. The source code of the simulation framework can be found in [
                        - link "14" [ref=e2074] [cursor=pointer]:
                          - /url: "#B14-sensors-21-02485"
                        - text: "]."
                    - generic [ref=e2075]:
                      - heading "9. Conclusions" [level=2] [ref=e2076]
                      - generic [ref=e2077]: We have developed an open-source LiFi framework in ns-3 to simulate an indoor LiFi/WiFi network in this work. Our simulation modules provide an implementation of the physical and MAC layers. It also allows for multiuser access with QoS-based resource sharing and provides mobility support and dynamic user association. More importantly, it monitors critical performance metrics to trigger handover between LiFi and WiFi. We have simulated the handover capability, the homogeneous WiFi, and the hybrid LiFi/WiFi system for critical network parameters such as throughput, delay, fairness, and PDR. The source code is made available to the research community, which can be modified and extended as per their requirement. The availability of source code would facilitate new researchers to analyze the hybrid LiFI system holistically.
