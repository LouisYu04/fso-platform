                        - text: ","
                        - link "20" [ref=e304] [cursor=pointer]:
                          - /url: "#B20-sensors-21-02485"
                        - text: "]. Most of the existing work utilizes bespoke simulation platforms to evaluate and analyze their protocols and research work ["
                        - link "3" [ref=e305] [cursor=pointer]:
                          - /url: "#B3-sensors-21-02485"
                        - text: "]. Moreover, these studies have focused on evaluating their solutions in limited environments containing few access points, thereby lacking the scalability aspect. On the other hand, it is expected that the addition of LiFi to the hybrid systems will increase the number of APs making it necessary to evaluate any new algorithm or protocol on simulation platforms that can provide scalability. In this regard, many modern-day simulators, such as ns-2 ns-3, OMNET++, and GloMoSim are equipped with tools that allow for the simulation of large-scale networks that can be easily reproduced in the real-world environment. The capabilities offered by these tools are not fully exploited to provide a comprehensive simulation platform for LiFi. Among the available networking simulators, we choose ns-3 for developing our framework for the following reasons:"
                      - list [ref=e307]:
                        - listitem [ref=e308]:
                          - generic [ref=e309]:
                            - text: The ns-3 has a vibrant research community in terms of researchers, developers, and users [
                            - link "22" [ref=e310] [cursor=pointer]:
                              - /url: "#B22-sensors-21-02485"
                            - text: "]."
                        - listitem [ref=e311]:
                          - generic [ref=e312]:
                            - text: It is memory efficient compared to other networking simulators such as OMNET ++, GloMoSim and ns-2 [
                            - link "23" [ref=e313] [cursor=pointer]:
                              - /url: "#B23-sensors-21-02485"
                            - text: "]."
                        - listitem [ref=e314]:
                          - generic [ref=e315]:
                            - text: Protocols from ns-3 could be easily reflected in and integrated with real networks [
                            - link "24" [ref=e316] [cursor=pointer]:
                              - /url: "#B24-sensors-21-02485"
                            - text: "]."
                        - listitem [ref=e317]:
                          - generic [ref=e318]:
                            - text: It has native modules for LTE and WiFi, making it easy to develop a hybrid system with LiFi [
                            - link "25" [ref=e319] [cursor=pointer]:
                              - /url: "#B25-sensors-21-02485"
                            - text: "]. There are many third part 5G new radio (NR) modules that could be integrated with LiFi to help simulate heterogeneous 5G networks ["
                            - link "26" [ref=e320] [cursor=pointer]:
                              - /url: "#B26-sensors-21-02485"
                            - text: "]."
                      - generic [ref=e321]:
                        - text: To harness the above advantages, this work provides a comprehensive implementation in ns-3 for the LiFi networking technology, including its integration with WiFi. To the best of the author’s knowledge, the closest simulation tool in this regard is reported in [
                        - link "27" [ref=e322] [cursor=pointer]:
                          - /url: "#B27-sensors-21-02485"
                        - text: "], which consists of the VLC module for ns-3. The proposed work provides point-to-point communication, error, and SNR models. However, it cannot provide fully functional LiFi APs capable of providing multiuser access, offer bidirectional communication, support for user mobility with orientation changes, handover facility, and integration with WiFi. Our developed open-source framework implements all the critical features of a scalable LiFi-WiFi system. It provides a physical layer, a MAC layer implementation in the form of TDMA, the ability to associate users with the AP, mobility modeling, a handover scheme between LiFi and WiFi APs, and a centralized controller to store information about the networking devices. To validate our simulation framework, we have evaluated the LiFi system’s performance in terms of throughput, delay, and fair sharing of mobile users. The proposed simulation framework has been made available as an open-source code to increase the LiFi researchers’ productivity ["
                        - link "28" [ref=e323] [cursor=pointer]:
                          - /url: "#B28-sensors-21-02485"
                        - text: "]."
                      - generic [ref=e324]:
                        - text: "The rest of the paper is organized as follows:"
