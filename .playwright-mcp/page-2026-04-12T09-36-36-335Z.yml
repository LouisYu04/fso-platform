                        - heading "3.2. Mobility Modeling" [level=3] [ref=e1019]
                        - generic [ref=e1020]: The LiFi is expected to support mobile devices with strict QoS requirements in terms of delay, reliability, and throughput. Since the LiFi channel gain fluctuates significantly with changes in user movement or with device orientation changes. These changes in channel gain can be significant enough to cause service outages and can, therefore, negatively affect critical QoS metrics. Therefore, it is of paramount importance to provide accurate mobility models that can be used as a basis to associate users with an accurate network and perform handovers in case of the service outage. Fortunately, in this regard, most modern mobile devices are equipped with the necessary hardware in the form of a gyroscope and accelerometer to assess user mobility.
