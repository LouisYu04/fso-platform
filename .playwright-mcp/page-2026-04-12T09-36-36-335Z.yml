                        - text: ","
                        - link "14" [ref=e298] [cursor=pointer]:
                          - /url: "#B14-sensors-21-02485"
                        - text: ","
                        - link "15" [ref=e299] [cursor=pointer]:
                          - /url: "#B15-sensors-21-02485"
                        - text: ","
