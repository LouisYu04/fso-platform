                          - /url: "#B16-sensors-21-02485"
                        - text: ","
                        - link "17" [ref=e301] [cursor=pointer]:
                          - /url: "#B17-sensors-21-02485"
                        - text: ","
                        - link "18" [ref=e302] [cursor=pointer]:
