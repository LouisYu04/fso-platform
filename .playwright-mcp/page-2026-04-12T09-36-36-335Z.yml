                        - link "Figure 4" [ref=e2010] [cursor=pointer]:
                          - /url: "#fig_body_display_sensors-21-02485-f004"
                        - text: shows the SNR and throughput for the first scenario. The mobile user experiences drastic variations in short bursts in SNR due to the user’s random mobility. The user mobility accommodates for the twin effects i.e., the user device directionality vis-à-vis the LiFi AP, and the distance from it. The changes in SNR performance are reflected in the throughput of the user, as shown in
                        - link "Figure 5" [ref=e2011] [cursor=pointer]:
                          - /url: "#fig_body_display_sensors-21-02485-f005"
                        - text: . Since the user is not provided with a backup network (e.g., WiFi), the handover is not triggered, and thus the performance metrics are significantly affected. For the second scenario, we have considered a mobile and static user. The mobile user is initially connected to the LiFi AP but once it starts moving around, the SNR and the corresponding data rates/throughput drop significantly as shown in
                        - link "Figure 6" [ref=e2012] [cursor=pointer]:
                          - /url: "#fig_body_display_sensors-21-02485-f006"
                        - text: and
                        - link "Figure 7" [ref=e2013] [cursor=pointer]:
                          - /url: "#fig_body_display_sensors-21-02485-f007"
                        - text: ", respectively. On the other hand, the static user has a consistent gain. At around 5 s into the simulation, the SNR and data rate are not enough to meet the user requirement, therefore the user device starts the handover process by sending a request to the centralized controller (CC). The CC completed the handover process by re-adjusting the routes in the LiFi and WiFi APs and takes some time before the user SNR and data rates improve. Since the user is not connected to either of the networks during the handover process, it can incur some packet loss. However, although there is some packet loss, the instantaneous parameters-based handover ensures that the user device has connectivity, even if it is mobile and experiencing sudden fluctuations in SNR. This shows that when we provide LiFi with a backup system in the form of WiFi, its performance metrics improve significantly."
