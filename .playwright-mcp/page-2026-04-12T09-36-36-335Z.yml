                        - text: describes the simulation setup and the results. In
                        - link "Section 9" [ref=e333] [cursor=pointer]:
                          - /url: "#sec9-sensors-21-02485"
                        - text: ", we conclude our work."
                    - generic [ref=e334]:
                      - heading "2. Conceptual Overview of the LiFi Simulation Framework in ns-3" [level=2] [ref=e335]
                      - generic [ref=e336]: In this work, we have implemented an ns-3 framework for LiFi and provided its integration with the WiFi. First, we provide necessary mathematical descriptions of the critical aspects of the LiFi physical and MAC layers. For the physical layer, we describe the bidirectional LiFi channel, mobility, and packet reception metrics (e.g., SNR, BER). At the MAC layer, we provide multiuser access using time division multiple access (TDMA) with resource sharing capabilities and user association/reassociation with the APs. The mathematical description of LiFi is then developed into ns-3 designs with accompanied algorithms and their implementation. Once the physical and MAC layers LiFi are realized, we discuss its integration with the built-in ns-3 WiFi module based on the IEEE802.11 standard. The integration includes, among other techniques, a handover scheme that monitors critical performance metrics for LiFi users for a certain threshold and switches the networks accordingly.
                    - generic [ref=e337]:
                      - heading "3. LiFi System Model" [level=2] [ref=e338]
                      - generic [ref=e339]:
                        - text: The LiFi systems at the most fundamental level consist of LED transmitters that employ the principle of intensity modulation to convert the incoming electrical signal to information before transmission through the optical channel. The LED transmitter can register new users and serve multiple users over the same optical channel thus forming a LiFi access point (AP). The receivers are equipped with photodetectors (PD), which convert the falling light to optical current. Many of the modern receivers are mobile and equipped with the necessary hardware to model the mobility aspect of the LiFi system and analyze its effect on receiver gain. From the receiver gain and the channel, an accurate error assessment can be made for packet reception. A detailed mathematical model of the underlying components of the LiFi systems is discussed below. In
                        - link "Section 3" [ref=e340] [cursor=pointer]:
                          - /url: "#sec3-sensors-21-02485"
                        - text: ", the mathematical models are implemented into an open-source ns-3 framework."
                      - generic [ref=e341]:
                        - heading "3.1. Physical Layer" [level=3] [ref=e342]
                        - generic [ref=e343]: The LiFi physical layer represents the over-the-air interface including the channel, modulation and coding schemes, and packet reception metrics. For the channel, we consider the optical channel consisting of the LOS and non-LOS (NLOS) components. For the modulation, we consider the basic modulation schemes such as pulse amplitude modulation (PAM) and on-off keying (OOK) and advanced modulations such as quadrature amplitude modulation (QAM). The coding schemes are left as future work. The packet reception at the physical layer is modeled using the signal-to-noise ratio (SNR) and bit error rate (BER) models that are based on the considered modulation schemes. Below we provide the details of the physical layer aspects of the LiFi systems.
                        - generic [ref=e344]:
                          - heading "3.1.1. Channel Model" [level=4] [ref=e345]
                          - generic [ref=e346]:
                            - text: The LiFi channel consists of a LOS component that communicates through a direct path over the air, and the non-LOS (NLOS) paths that can be formed due to the reflections from the walls, ceiling, and other objects. The LiFi system predominately relies on the LOS gain; however, it has been demonstrated in [
                            - link "29" [ref=e347] [cursor=pointer]:
                              - /url: "#B29-sensors-21-02485"
                            - text: "] that at certain positions in the room, the gain from the NLOS channels can be enough to provide communication."
