                - generic [ref=e238]:
                  - paragraph
                  - generic [ref=e239]:
                    - generic [ref=e240]:
                      - heading "Abstract" [level=2] [ref=e241]
                      - generic [ref=e242]: Light Fidelity (LiFi) is a new candidate for wireless networking that utilizes the visible light spectrum and exploits the existing lighting infrastructure in the form of light-emitting diodes (LEDs). It provides point-to-point and point-to-multipoint communication on a bidirectional channel at very high data rates. However, the LiFi has small coverage, and its optical gain is closely related to the receiver’s directionality vis-à-vis the transmitter, therefore it can experience frequent service outages. To provide reliable coverage, the LiFi is integrated with other networking technologies such as wireless fidelity (WiFi) thus forming a hybrid system. The hybrid LiFi/WiFi system faces many challenges including but not limited to seamless integration with the WiFi, support for mobility, handover management, resource sharing, and load balancing. The existing literature has addressed one or the other aspect of the issues facing LiFi systems. There are limited free source tools available to holistically address these challenges in a scalable manner. To this end, we have developed an open-source simulation framework based on the network simulator 3 (ns-3), which realizes critical aspects of the LiFi wireless network. Our developed ns-3 LiFi framework provides a fully functional AP equipped with the physical layer and medium access control (MAC), a mobility model for the user device, and integration between LiFi and WiFi with a handover facility. Simulation results are produced to demonstrate the mobility and handover capabilities, and the performance gains from the LiFi-WiFi hybrid system in terms of packet delay, throughput, packet drop ratio (PDR), and fairness between users. The source code of the framework is made available for the use of the research community.
