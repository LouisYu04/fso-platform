                        - heading "3.3. AP Design with Multi-User Access Using TDMA" [level=3] [ref=e1205]
                        - generic [ref=e1206]: The LED-based light bulbs can be offered as APs by equipping them with capabilities such as multiple user access and dynamic user association/reassociation. The multiple-user access can be provided by sharing the AP resources (e.g., optical channel and queues) between users via MAC protocols such as time division multiple access (TDMA), carrier sense multiple access with collision avoidance (CSMA/CA), and code division multiple access (CDMA). On the other hand, dynamic user association is achieved with the modification to the MAC layer through provisions of protocols such as beacon framing or association request/response mechanism.
                        - generic [ref=e1207]: "Our simulation framework provides an implementation of multiuser access through TDMA that shares the same physical medium in time. Generally, in TDMA, the same frequency channel is divided into multiple time slots: The friction of time allocated to a user to transmit or receive data in the uplink or downlink. The slot’s time is determined by the amount of channel bandwidth and the deployed modulation scheme. Each user can have one or more of these slots and is allowed to transmit or receive data only in those time slots."
                        - generic [ref=e1208]: The TDMA slots are bundled into frames consisting of control slots for transmission control signal and data slots for data transmission. The control slots are used for management purposes such as advertisement of time synchronization information between the AP and the mobile stations, and beacons slots that are used for user association/reassociation. At the start of each frame, some numbers of slots are reserved to broadcast the time information of the slots allocated to each user, and at the end of each frame, the access point broadcasts beacons that contain its address and transmit power. The beacon messages are responded to by the user devices with addresses of their own and the detected SNR level. Lastly, the user device can transmit or receive actual information during the data slots.
                        - generic [ref=e1209]:
                          - text: The LiFi APs have a small coverage area and thus they can support only a small number of users; however, they can be served at much higher data rates due to larger available bandwidth. However, higher data rate is not the only metric that needs improvement, as many of the modern applications expect diverse quality of service (QoS) requirements in terms of delay, throughput, and reliability. Besides, internet-enabled devices can have several applications running simultaneously. A device can have a Skype and Zoom video or audio call, while simultaneously having active browsing sessions and a download or upload going in the background. Video and audio calls have stringent delay and throughput requirements. On the other hand, for best-effort (BE) traffic (e.g., web browsing) and background traffic (e.g., email and file uploads), violations in throughput and delay requirements are tolerable. An AP typically must support all these services simultaneously with available time and frequency resources. We provide a heuristic scheduling scheme to distribute frame slots among users according to the aforementioned QoS requirements to support these service requirements. The QoS categories are adopted from the categories mentioned in the IEEE 802.11 standards [
                          - link "34" [ref=e1210] [cursor=pointer]:
                            - /url: "#B34-sensors-21-02485"
                          - text: "]. The video and voice streams are allocated more slots compared to the background, and the best effort traffics. In a single TDMA frame, the data slots are distributed between the users according to the following piecewise equation."
