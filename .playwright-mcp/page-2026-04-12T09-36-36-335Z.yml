                        - generic [ref=e1445]: In this framework, we have only incorporated TDMA; however, other MAC protocols such as CSMA/CA, CMDA, and orthogonal frequency division multiplexing can be easily integrated. For CSMA, the ns-3 already has a module available that can be updated with minor modifications to work with this framework. Similarly, the ns-3 spectrum module provides frequency-dependent communication and can be modified to work as an OFDMA MAC layer protocol.
                    - generic [ref=e1446]:
                      - heading "4. LiFi Design in ns-3" [level=2] [ref=e1447]
                      - generic [ref=e1448]: "ns-3 is a reliable and reputable simulation platform to develop networking protocols that can be easily realized in production networks. It is open-source with added functionalities and has a wider acceptance in the research community. The ns-3 has a rich set of libraries and modules that can be exploited to develop and analyze new networking protocols and build large-scale networks. The core components of ns-3 include nodes, channels, net devices, and applications. Nodes in ns-3 are equivalent to the networking terminals such as APs, mobile phones, laptops, and servers. It can host mobility models, IP protocol stacks, and interface cards. The channel model provides generic channel functionalities but can be customized for other technologies such as WiFi and LiFi. We have customized the channel model to provide bidirectional communication. The ns-3 net devices represent the data link layer that provides access to the channel and interfaces with the network and transport layers. It can be customized to provide multiple users access through medium access control (MAC) protocols such as TDMA, CSMA/CA, and OFDMA. The application module represents a basic abstraction that generates some activities to be simulated. In addition to these basic components, the ns-3 provides helper classes to facilitate the installation of nodes, net devices, channels, and IP interfaces. The basic ns-3 abstractions are composed (interconnected) to realize a network instantiation in ns-3. The classes for every ns-3 module can be organized in these subfolders: helpers, models, examples, and documentation. The classes related to nodes, net devices including the MAC layer, and the physical layer are included in the model subfolder. The other subfolder consists of the classes related to the functionalities as their names indicate. For example, the helper subfolder stores files, and the example subdirectory contains use cases."
                      - generic [ref=e1449]:
                        - text: In this work, our ns-3 framework is based on the discussion in the previous sections. The existing ns-3 functionalities are customized and new features are added to realize the framework. Classes from the framework are placed in the appropriate directories. The core functionalities of the critical classes are described below, and interaction between the core components of the LiFi framework are shown in
                        - link "Figure 2" [ref=e1450] [cursor=pointer]:
                          - /url: "#fig_body_display_sensors-21-02485-f002"
                        - text: . However, a detailed description can be found in the documentation folder of the simulation framework.
