                  - paragraph
                - generic [ref=e252]:
                  - generic [ref=e253]:
                    - generic [ref=e254]:
                      - heading "1. Introduction" [level=2] [ref=e255]
                      - generic [ref=e256]:
                        - text: Over the last two decades, there has been exponential growth in the number of mobile devices. According to the CISCO visual network index (CVNI), by 2023, around 70% of the world population will have mobile phones [
                        - link "1" [ref=e257] [cursor=pointer]:
                          - /url: "#B1-sensors-21-02485"
                        - text: "]. The increase in mobile phones is coupled with an emphasis on exploring new use cases for mobile/cellular networks like the internet of things (IoT) to enable smart homes and smart cities, including vehicular communication ["
                        - link "1" [ref=e258] [cursor=pointer]:
                          - /url: "#B1-sensors-21-02485"
                        - text: "]. This rapid expansion in size and scope of mobile networks is expected to increase data consumption exponentially. The CVNI reports that around 48% of IoT traffic and around 80% of other mobile traffic will originate from the indoors ["
                        - link "2" [ref=e259] [cursor=pointer]:
                          - /url: "#B2-sensors-21-02485"
                        - text: "]. Similar trends in data consumption have been predicted for outdoor mobile networks. To support a large number of devices and to meet the growing traffic demands, the wireless research community has been looking for additional spectrum in the higher frequencies band, such as the millimeter waves (for 5G) in the range of 30 to 300 GHz. However, the increased use of the radio spectrum can result in increased interference, which can drive down the throughput. On the other hand, visible light communication (VLC), which relies on the visible light spectrum in the 430 THz to 730 THz range, is a promising candidate in the quest for additional spectrum in the high-frequency range. The VLC’s higher frequency spectrum ensures high data rates, even over 1 Gbps ["
                        - link "3" [ref=e260] [cursor=pointer]:
                          - /url: "#B3-sensors-21-02485"
                        - text: "]. Besides, it can provide secure communication as the visible light cannot penetrate walls and can thus be confined to a room to avoid eavesdropping. The wide deployment of lighting infrastructure in the form of LEDs further motivates the use of VLC. More importantly, the LiFi/VLC can co-exist in an interference-free manner with WiFi and cellular technologies such as LTE and 5G. These benefits put LiFi as a prime candidate for additional wireless communication technology in indoors and outdoors. In the indoors, LiFi is expected to be integrated with WiFi to increase its capacity, provide low latency and higher throughput ["
                        - link "4" [ref=e261] [cursor=pointer]:
                          - /url: "#B4-sensors-21-02485"
                        - text: ","
                        - link "5" [ref=e262] [cursor=pointer]:
                          - /url: "#B5-sensors-21-02485"
                        - text: ","
                        - link "6" [ref=e263] [cursor=pointer]:
                          - /url: "#B6-sensors-21-02485"
                        - text: "]. On the other hand, in the outdoors, the LiFi communication can be integrated with 5G to enable smart cities, particularly vehicular communication where low-latency safety-critical information can be delivered through the visible light medium ["
                        - link "7" [ref=e264] [cursor=pointer]:
                          - /url: "#B7-sensors-21-02485"
                        - text: ","
                        - link "8" [ref=e265] [cursor=pointer]:
                          - /url: "#B8-sensors-21-02485"
                        - text: ","
                        - link "9" [ref=e266] [cursor=pointer]:
                          - /url: "#B9-sensors-21-02485"
                        - text: "]."
                      - generic [ref=e267]:
                        - text: The advantages of VLC have been harnessed in the form of LiFi, which provides a complete wireless networking system [
                        - link "3" [ref=e268] [cursor=pointer]:
                          - /url: "#B3-sensors-21-02485"
                        - text: "]. The LiFi promises to use LED lights as access points (APs) and provide bidirectional high data rate communication and multiuser access with dynamic user associations. It is also expected to offer seamless mobility and interoperability with other networking systems such as WiFi and long-term evaluation (LTE) or 5G ["
                        - link "3" [ref=e269] [cursor=pointer]:
                          - /url: "#B3-sensors-21-02485"
                        - text: "]. However, the LiFi has a higher penetration loss, and a significant portion of its gain comes from the line of sight (LOS) communication, making it difficult to be used as a standalone system. Therefore, the LiFi is a complementary technology to WiFi, thus forming a hybrid networking system. The hybrid system of LiFi and WiFi can be realized in two ways: Symmetric and asymmetric, as shown in"
                        - link "Figure 1" [ref=e270] [cursor=pointer]:
                          - /url: "#fig_body_display_sensors-21-02485-f001"
                        - text: . In asymmetric hybrid systems, the downlink of LiFi is provided through VLC and the uplink is supported via WiFi. In symmetric hybrid system, the LiFi provides bidirectional communication in which the VLC provides the downlink communication, and the infrared provides the uplink. The hybrid network of LiFi/WiFi offers consistency in coverage, increase in capacity, and lower latency.
                      - generic [ref=e271]:
                        - generic [ref=e273] [cursor=pointer]:
                          - img "Sensors 21 02485 g001" [ref=e274]
                          - link [ref=e275]:
                            - /url: "#fig_body_display_sensors-21-02485-f001"
                        - generic [ref=e276]: Figure 1. Hybrid light fidelity/wireless fidelity (LiFi/WiFi) system.
                      - generic [ref=e277]:
                        - text: Although LiFi offers many advantages including the readily available infrastructure in the form of LED lights, it still needs significant efforts to address issues such as optimization of physical and MAC layer resources, handling user mobility, including the provision of seamless handover. The existing work has focused on many of these challenges; for example, in [
                        - link "10" [ref=e278] [cursor=pointer]:
                          - /url: "#B10-sensors-21-02485"
                        - text: "], the LiFi resources are shared among multiple users using the optical orthogonal frequency division multiplexing (OFDM). Miramirkhani et al. have modeled power and delay profiles of mobile VLC and provided a power adjustment mechanism to optimize gain ["
                        - link "11" [ref=e279] [cursor=pointer]:
                          - /url: "#B11-sensors-21-02485"
                        - text: "]. In ["
                        - link "12" [ref=e280] [cursor=pointer]:
                          - /url: "#B12-sensors-21-02485"
                        - text: "], the authors carried out experimental work for mitigating spatial and temporal crosstalk in optical MIMO systems by using decoding algorithms and equalizers, respectively. In ["
                        - link "13" [ref=e281] [cursor=pointer]:
                          - /url: "#B13-sensors-21-02485"
                        - text: "], the authors present the theoretical concepts and techniques involved in developing MATLAB models for a short-range 4 × 4 multiple-in multiple-out (MIMO) VLC system. Liverman et al. ["
                        - link "14" [ref=e282] [cursor=pointer]:
                          - /url: "#B14-sensors-21-02485"
                        - text: "] have developed a system called WiFo, integrating free-space optical communication (FSO) and WiFi system to provide higher throughput with seamless handover. Shen et al. ["
                        - link "15" [ref=e283] [cursor=pointer]:
                          - /url: "#B15-sensors-21-02485"
                        - text: "] have explored the effects of road surface irregularities on SNR performance of the VLC in the context of vehicular communication. Guzmán et al. ["
                        - link "16" [ref=e284] [cursor=pointer]:
                          - /url: "#B16-sensors-21-02485"
                        - text: "] have analyzed the OFDM performance for outdoor VLC in the presence of sunlight. The authors in ["
                        - link "17" [ref=e285] [cursor=pointer]:
                          - /url: "#B17-sensors-21-02485"
                        - text: "] have created a hybrid WiFi and LiFi system to provide LiFi and WiFi aggregated communication channels. The authors in ["
                        - link "9" [ref=e286] [cursor=pointer]:
                          - /url: "#B9-sensors-21-02485"
                        - text: "] have developed a VLC enabled system for low-latency, safety-critical intelligent transportation systems (ITS). Their system can deliver information under sub-millisecond up to 30 m, and under 10 ms for a distance of 50 m with 99% confidence. In ["
                        - link "8" [ref=e287] [cursor=pointer]:
                          - /url: "#B8-sensors-21-02485"
                        - text: "], experimental work has been carried out for joint 5G and VLC vehicular information delivery system. It is reported that 5G can achieve consistent latency of 9.5 ms and 2.5 ms for VLC. Khreishah et al. ["
                        - link "18" [ref=e288] [cursor=pointer]:
                          - /url: "#B18-sensors-21-02485"
                        - text: "] have proposed a framework for energy-efficient AP selection in VLC and WiFi hybrid systems. The LiFi channel is modeled with different modulation and coding rates are discussed in ["
                        - link "19" [ref=e289] [cursor=pointer]:
                          - /url: "#B19-sensors-21-02485"
                        - text: "]. In ["
                        - link "20" [ref=e290] [cursor=pointer]:
                          - /url: "#B20-sensors-21-02485"
                        - text: "], the user mobility and device orientation change effects on key performance metrics are explored. In ["
                        - link "4" [ref=e291] [cursor=pointer]:
                          - /url: "#B4-sensors-21-02485"
                        - text: "], integrated orthogonal frequency division multiple access (OFDMA)-based LiFi and WiFi systems are explored for load balancing and handover for mobile users. To avoid excessive handovers in an AP, a selection method is proposed by serving users simultaneously from multiple APs ["
                        - link "21" [ref=e292] [cursor=pointer]:
                          - /url: "#B21-sensors-21-02485"
                        - text: "]. The authors in ["
                        - link "5" [ref=e293] [cursor=pointer]:
                          - /url: "#B5-sensors-21-02485"
                        - text: "] have proposed a joint user-centric coordination multipoint (CoMP) to improve space diversity gain and thereby improve the signal-to-noise-to-interference ratio (SINR)."
                      - generic [ref=e294]:
                        - text: The literature on LiFi is mostly related to optimizing the physical and MAC resources and mobility and network association schemes [
                        - link "4" [ref=e295] [cursor=pointer]:
                          - /url: "#B4-sensors-21-02485"
                        - text: ","
                        - link "8" [ref=e296] [cursor=pointer]:
                          - /url: "#B8-sensors-21-02485"
                        - text: ","
                        - link "9" [ref=e297] [cursor=pointer]:
