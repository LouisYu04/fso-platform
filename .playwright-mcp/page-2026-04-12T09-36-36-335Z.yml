                      - generic [ref=e1534]:
                        - heading "4.4. Other Classes" [level=3] [ref=e1535]
                        - generic [ref=e1536]: We have provided helpers and other utility classes to facilitate the simulation of the LiFi networks. The helper classes facilitate building large-scale networks consisting of LiFi transmitters/APs configurations, including the user devices’ static association and integration with the WiFi. It also contains classes for easy configuration of the channels, physical layer, LiFi devices, and TDMA configurations. Apart from the helpers, we developed utility classes for MAC configuration and classes for performance analysis.
                    - generic [ref=e1537]:
                      - heading "5. Integration between LiFi and WiFi" [level=2] [ref=e1538]
                      - generic [ref=e1539]:
                        - text: The rapid fluctuations in the optical gain can result in frequent service outages. Therefore, the literature on LiFi strongly encourages its integration with other networking technologies such as WiFi, long-term evaluation (LTE), and/or 5G networks. This work considers the integration between LiFi and WiFi networks and leaves other networking technologies as future work. In
                        - link "Section 5.1" [ref=e1540] [cursor=pointer]:
                          - /url: "#sec5dot1-sensors-21-02485"
                        - text: ", we provide a brief overview of the ns-3 WiFi module, and in the later subsections, we discuss the different ways in which we can integrate LiFi and WiFi and address the associated challenges."
                      - generic [ref=e1541]:
                        - heading "5.1. ns-3 WiFi" [level=3] [ref=e1542]
                        - generic [ref=e1543]:
                          - text: "The WiFi has been standardized at the physical and MAC layer with regular standards updates to accommodate new features and technologies. The ns-3 WiFi module provides an implementation of nearly all standards of IEE802.11, starting from 802.11a to 802.11ac. In ns-3, the physical layer models packet reception using two distinct techniques: Yet another simulator (Yans) model and a spectrum-based physical layer ["
                          - link "35" [ref=e1544] [cursor=pointer]:
                            - /url: "#B35-sensors-21-02485"
                          - text: "]. The MAC layer models the 802.11 distributed coordination function (DCF) for infrastructure (access point mode) and an Ad-hoc mode for direct communication between the user or infrastructure devices. The QoS support is provided through a distributed channel access (DCA) and an enhanced distributed coordination channel access (EDCA). In EDCA, four different queues are maintained for different QoS classes and each class has a mechanism for channel access based on QoS requirements. In our simulation, we have integrated the IEEE802.11ac version of WiFi. However, other standards could be trivially added to the framework. We use these existing capabilities of WiFi ns-3 and our implementation of LiFi to provide a hybrid LiFi/WiFi system. The hybrid systems fall into two categories, namely asymmetric and symmetric. Both these arrangements are shown in"
                          - link "Figure 1" [ref=e1545] [cursor=pointer]:
                            - /url: "#fig_body_display_sensors-21-02485-f001"
                          - text: where AP1 provides asymmetric communication while AP2 provides symmetric communication. Below we provide a detailed description of these integration mechanisms.
                      - generic [ref=e1546]:
                        - heading "5.2. Asymmetric Integration between LiFi and WiFi" [level=3] [ref=e1547]
                        - generic [ref=e1548]: In the asymmetric arrangement, the LiFi downlink is provided through the VLC and the uplink via the WiFi. In addition to serving as an uplink to the LiFi users, the WiFi hosts’ other users and can be a potential landing network for the LiFi users when they experience connections drop. This asymmetric integration provides reliability because of the consistency of the WiFi signal. However, it can induce extra delay due to increased contention on the uplink, which can outweigh the LiFi benefits. Aside from this, several technical challenges need to be addressed before a fully functional system can be realized. Some of these challenges and their solutions are discussed below.
                        - generic [ref=e1549]:
                          - heading "5.2.1. Traffic Shaping at the Router" [level=4] [ref=e1550]
                          - generic [ref=e1551]:
                            - text: In traditional networks, the user devices use the same route for downlink and uplink communication. However, in the asymmetric hybrid system, the traffic destined to the LiFi network must be separated at the router and relayed to the LiFi AP before downlink transmission. For the results shown in
                            - link "Section 8" [ref=e1552] [cursor=pointer]:
                              - /url: "#sec8-sensors-21-02485"
                            - text: ", we have implemented a static routing table to separate traffic at the router, though these static routes can be replaced with dynamic routing. Each route in the static routing table consists of the destination IP, next hope interface IP, and the exit interface, and an example of this is shown in"
                            - link "Table 1" [ref=e1553] [cursor=pointer]:
                              - /url: "#table_body_display_sensors-21-02485-t001"
                            - text: .
                          - generic [ref=e1554]:
                            - generic [ref=e1555]: Table 1. Traffic shaping.
                            - generic [ref=e1557] [cursor=pointer]:
                              - img [ref=e1558]
                              - link [ref=e1559]:
                                - /url: "#table_body_display_sensors-21-02485-t001"
                        - generic [ref=e1560]:
                          - heading "5.2.2. Providing TCP and UDP Traffic over LiFi/WiFi Hybrid Systems" [level=4] [ref=e1561]
                          - generic [ref=e1562]: In the asymmetric hybrid systems, the WiFi is used as an uplink for the LiFi users including the establishment of TCP and UDP connections as well as for ACK transmissions/retransmissions. This arrangement poses a challenge for LiFi users, especially during the connection establishment. As we know, the TCP and UDP sockets listen to a remote server through the port and the IP interfaces used for connection establishment. Therefore, when the connection is requested through the WiFi uplink, and its response is relayed through the LiFi downlink to the user device, the listening socket will discard it because the response is received through a different IP interface and port address than the one used for connection establishment.
                          - generic [ref=e1563]:
                            - text: To address the above-mentioned challenge, we have used an address resolution protocol (ARP) spoofing mechanism; a similar approach has been adopted in the existing literature [
                            - link "36" [ref=e1564] [cursor=pointer]:
                              - /url: "#B36-sensors-21-02485"
                            - text: "]. This method involves reconfiguring the user devices’ caches to have the LiFi’s AP as a default gateway and, therefore, store its IP address and MAC addresses as gateway information. Thus, when the user device initiates a TCP/UDP, it listens on the interface connected to the LiFi network. The outgoing packets from the LiFi user device are captured and forwarded via the WiFi net device. When the server responds, and the message is relayed by the router through the LiFi downlink and passed to the user device, it is successfully received on the sender socket. These steps are listed in the form of Algorithm 2 below."
