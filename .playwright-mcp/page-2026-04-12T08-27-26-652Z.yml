    - link "Gbps impulse radio (IR) ultra-wideband (UWB) transmission over 100 meters multi mode fiber with 4 meters wireless transmission Optics Express, 2009 We present experimental demonstrations of in-building impulse radio (IR) ultra-wideband (UWB) link consisting of 100 m multi mode fiber (MMF) and 4 m wireless transmission at a record 4 Gbps, and a record 8 m wireless transmission at 2.5 Gbps. A directly modulated vertical cavity surface emitting laser (VCSEL) was used for the generation of the optical signal. 8 m at 2.5 Gbps corresponds to a bit rate--distance product of 20; the highest yet reported for wireless IR-UWB transmission." [ref=e348] [cursor=pointer]:
